  font-weight: 600;
  box-shadow: 0 1px 2px rgba(26,29,35,0.08), 0 0 0 0.5px rgba(26,29,35,0.06);
}
.dash-chip.is-active:hover {
  background: var(--surface);
  color: var(--ink);
}
.dash-chip.is-active.is-phase {
  background: var(--surface);
  color: var(--citrus-deep);
  box-shadow: 0 1px 2px rgba(232,118,58,0.18), 0 0 0 0.5px rgba(232,118,58,0.22);
}
.dash-chip.is-active.is-status-complete {
  background: var(--surface);
  color: var(--leaf);
  box-shadow: 0 1px 2px rgba(74,124,89,0.18), 0 0 0 0.5px rgba(74,124,89,0.22);
}
.dash-chip.is-active.is-status-in_progress {
  background: var(--surface);
  color: var(--citrus-deep);
  box-shadow: 0 1px 2px rgba(232,118,58,0.18), 0 0 0 0.5px rgba(232,118,58,0.22);
}
.dash-chip.is-active.is-status-blocked {
  background: var(--surface);
  color: var(--blocked);
  box-shadow: 0 1px 2px rgba(115,87,133,0.18), 0 0 0 0.5px rgba(115,87,133,0.22);
}
.dash-chip.is-active.is-status-not_started {
  background: var(--surface);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(26,29,35,0.08), 0 0 0 0.5px rgba(26,29,35,0.06);
}

.dash-custom-range {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0 12px;
  height: 30px;
  background: rgba(26,29,35,0.05);
  border: none;
  border-radius: 8px;
}
.dash-custom-range input[type="date"] {
  border: none; background: transparent;
  font-family: inherit; font-size: 12px;
  color: var(--ink);
  padding: 2px 0;
  outline: none;
  font-weight: 500;
}
.dash-custom-range span { font-size: 11px; color: var(--muted); }

.dash-filter-reset {
  font-size: 12px;
  color: var(--muted);
  padding: 0 12px;
  height: 30px;
  display: inline-flex;
  align-items: center;
  border-radius: 8px;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.12s ease;
  gap: 5px;
}
.dash-filter-reset:hover { color: var(--danger); background: var(--danger-soft); }

.dash-body {
  padding: 20px 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  flex: 1;
}

/* A row of cards that share a 12-column grid. Items inside use .dash-col-N
   classes to claim their width. Height behavior is stretch by default so
   every card in the row ends up the same height. */
.dash-row {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 14px;
  align-items: stretch;
}
/* 3 equal columns — used for Needs attention and Bugs & time budget. */
.dash-row.dash-row-three {
  grid-template-columns: repeat(3, 1fr);
}
/* Start-align variant — for rows where equal heights would be misleading
   (currently unused, retained for future one-offs). */
.dash-row.is-start { align-items: start; }

@media (max-width: 1100px) {
  .dash-row.dash-row-three { grid-template-columns: 1fr; }
}

.dash-section-head {
  display: flex; align-items: center; gap: 12px;
  margin: 10px 0 -2px;
}
.dash-section-head h3 {
  font-family: var(--font-display);
  font-size: 14px; font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--ink);
  margin: 0;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--muted);
  font-family: var(--font-body);
}
.dash-section-head .line {
  flex: 1; height: 1px; background: var(--line);
}

.dash-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 15px 17px;
  display: flex; flex-direction: column;
  gap: 10px;
  min-width: 0;
  transition: box-shadow 0.15s ease, transform 0.15s ease;
}
.dash-card.is-clickable { cursor: pointer; }
.dash-card.is-clickable:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.dash-card-title {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
  margin: 0;
  display: flex; align-items: center; gap: 8px;
}
.dash-card-title .dash-card-sub {
  font-weight: 400; letter-spacing: 0.02em;
  text-transform: none;
  color: var(--ink-3);
  margin-left: auto;
}

.dash-kpi { gap: 5px; }
.dash-kpi-val {
  font-family: var(--font-display);
  font-size: 36px; font-weight: 600;
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.025em;
  font-variant-numeric: tabular-nums;
  display: inline-flex; align-items: baseline; gap: 4px;
}
.dash-kpi-val .dash-kpi-unit {
  font-size: 18px; color: var(--ink-3);
  font-weight: 500;
}
.dash-kpi-meta {
  font-size: 11px; color: var(--ink-3);
  display: flex; align-items: center; gap: 6px;
}
.dash-kpi-meta .delta-up { color: var(--leaf); font-weight: 600; }
.dash-kpi-meta .delta-down { color: var(--danger); font-weight: 600; }
.dash-kpi-meta .delta-flat { color: var(--muted); font-weight: 600; }
.dash-kpi.is-warn .dash-kpi-val { color: var(--sun); }
.dash-kpi.is-danger .dash-kpi-val { color: var(--danger); }
.dash-kpi.is-good .dash-kpi-val { color: var(--leaf); }
.dash-kpi.is-info .dash-kpi-val { color: var(--info); }
.dash-kpi.is-blocked .dash-kpi-val { color: var(--blocked); }
.dash-kpi.is-citrus .dash-kpi-val { color: var(--citrus-deep); }
/* When the row stretches this KPI card taller than its natural height, glue
   the meta line to the bottom so the card's interior feels filled rather
   than top-clumped. */
.dash-kpi .dash-kpi-meta { margin-top: auto; }

/* Fill the card's stretched height with the main body element (list or empty
   state). Prevents the "content at top, empty hole below" look when an equal-
   height row sizes a short card to match a taller sibling. */
.dash-card > .dash-item-list,
.dash-card > .dash-empty,
.dash-card > .dash-phase-list {
  flex: 1;
  min-height: 0;
}
.dash-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.dash-kpi-ring {
  display: flex; align-items: center; gap: 14px;
}
.dash-kpi-ring svg { flex-shrink: 0; }
.dash-kpi-ring-text {
  display: flex; flex-direction: column; gap: 4px;
}

.dash-col-2 { grid-column: span 2; }
.dash-col-3 { grid-column: span 3; }
.dash-col-4 { grid-column: span 4; }
.dash-col-5 { grid-column: span 5; }
.dash-col-6 { grid-column: span 6; }
.dash-col-7 { grid-column: span 7; }
.dash-col-8 { grid-column: span 8; }
.dash-col-9 { grid-column: span 9; }
.dash-col-12 { grid-column: span 12; }

.dash-phase-list { display: flex; flex-direction: column; gap: 11px; }
.dash-phase-row { display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
.dash-phase-row:hover .dash-phase-title { color: var(--citrus-deep); }
.dash-phase-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 10px;
}
.dash-phase-title {
  font-size: 12px; font-weight: 500;
  color: var(--ink);
  transition: color 0.12s ease;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.dash-phase-num {
  font-family: var(--font-mono);
  font-size: 10px; color: var(--muted);
  margin-right: 8px;
}
.dash-phase-count {
  font-size: 11px; color: var(--ink-3);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.dash-phase-bar {
  height: 9px;
  border-radius: 4px;
  background: var(--bg-3);
  overflow: hidden;
  display: flex;
}
.dash-phase-seg { height: 100%; transition: flex-basis 0.25s ease; }
.dash-phase-seg.is-complete { background: var(--leaf); }
.dash-phase-seg.is-in_progress { background: var(--citrus); }
.dash-phase-seg.is-blocked { background: var(--danger); }
.dash-phase-seg.is-not_started { background: var(--line-2); }

.dash-chart-svg { display: block; width: 100%; height: auto; }
.dash-chart-legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  font-size: 11px; color: var(--ink-3);
  margin-top: 4px;
}
.dash-chart-legend span {
  display: inline-flex; align-items: center; gap: 6px;
}
.dash-chart-legend i {
  display: inline-block;
  width: 10px; height: 10px; border-radius: 2px;
}
.dash-chart-legend i.is-line {
  width: 14px; height: 2px; border-radius: 1px;
}

.dash-heatmap-wrap {
  overflow-x: auto;
  padding-bottom: 6px;
}
.dash-heatmap-inner {
  display: flex; gap: 10px;
  align-items: flex-start;
}
.dash-heatmap-daylabels {
  display: grid;
  grid-template-rows: repeat(7, 12px);
  gap: 3px;
  font-size: 9px;
  color: var(--muted);
  padding-top: 18px;
}
.dash-heatmap-col-wrap {
  display: flex; flex-direction: column; gap: 3px;
  flex: 1; min-width: 0;
}
.dash-heatmap-monthrow {
  display: flex; gap: 0;
  height: 12px;
  font-size: 9px;
  color: var(--muted);
  position: relative;
}
.dash-heatmap-monthrow span {
  position: absolute; top: 0;
  white-space: nowrap;
}
.dash-heatmap-grid {
  display: grid;
  grid-auto-flow: column;
  gap: 3px;
  grid-template-rows: repeat(7, 12px);
}
.dash-heatmap-cell {
  width: 12px; height: 12px;
  border-radius: 2px;
  background: var(--bg-3);
  border: 1px solid var(--line);
  cursor: default;
}
.dash-heatmap-cell.l1 { background: rgba(232,118,58,0.20); border-color: rgba(232,118,58,0.30); }
.dash-heatmap-cell.l2 { background: rgba(232,118,58,0.42); border-color: rgba(232,118,58,0.50); }
.dash-heatmap-cell.l3 { background: rgba(232,118,58,0.68); border-color: rgba(232,118,58,0.70); }
.dash-heatmap-cell.l4 { background: var(--citrus); border-color: var(--citrus-deep); }
.dash-heatmap-cell.is-today { box-shadow: 0 0 0 1.5px var(--ink); }
.dash-heatmap-scale {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--muted);
  margin-left: auto;
}
.dash-heatmap-scale i {
  width: 10px; height: 10px; border-radius: 2px;
  display: inline-block; border: 1px solid var(--line);
}

.dash-item-list { display: flex; flex-direction: column; gap: 0; }
.dash-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 6px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background 0.12s ease;
  border-radius: 3px;
}
.dash-item:last-child { border-bottom: none; }
.dash-item:hover { background: var(--bg-2); }
.dash-item-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0;
}
.dash-item-dot.is-not_started { background: var(--muted); }
.dash-item-dot.is-in_progress { background: var(--citrus); }
.dash-item-dot.is-complete { background: var(--leaf); }
.dash-item-dot.is-blocked { background: var(--danger); }
.dash-item-title {
  flex: 1;
  font-size: 12px; color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  min-width: 0;
}
.dash-item-meta {
  font-size: 10px; color: var(--muted);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.dash-item-pill {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.dash-item-pill.is-overdue { background: var(--danger-soft); color: var(--danger); }
.dash-item-pill.is-soon { background: var(--sun-soft); color: var(--sun); }
.dash-item-pill.is-blocked { background: var(--blocked-soft); color: var(--blocked); }
.dash-item-pill.is-urgent { background: var(--sun-soft); color: var(--sun); }
.dash-item-pill.is-bug { background: var(--danger-soft); color: var(--danger); }

.dash-empty {
  padding: 22px 6px;
  text-align: center;
  color: var(--ink-3);
  font-size: 11px;
  font-style: italic;
  border: 1px dashed var(--line);
  border-radius: var(--radius-sm);
}

/* Keep compatibility for any residual selectors. */
.dash-attention-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  align-items: stretch;
  gap: 14px;
}
.dash-attention-grid > .dash-card,
.dash-row.dash-row-three > .dash-card { min-height: 200px; }
.dash-item-list.is-capped {
  max-height: 260px;
  overflow-y: auto;
  padding-right: 4px;
}

/* Side-by-side split that pairs one tall card with a vertical stack of
   shorter cards — prevents the "wasted space under the short card" problem
   that a plain 12-col grid row creates when siblings have very different
   natural heights. */
.dash-split-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: stretch;
  gap: 14px;
}
.dash-split-row > .dash-split-stack {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}
.dash-split-row > .dash-split-stack > .dash-card:last-child { flex: 1; }
@media (max-width: 1100px) {
  .dash-split-row { grid-template-columns: 1fr; }
}

.dash-donut-wrap {
  display: flex; align-items: center; gap: 20px;
}
.dash-donut-legend {
  flex: 1;
  display: flex; flex-direction: column; gap: 6px;
  font-size: 12px;
}
.dash-donut-legend-row {
  display: flex; align-items: center; gap: 8px;
  color: var(--ink-2);
}
.dash-donut-legend-row i {
  width: 10px; height: 10px; border-radius: 2px;
  display: inline-block;
}
.dash-donut-legend-row .v {
  margin-left: auto;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
  font-weight: 600;
}

.dash-milestone-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 4px;
  border-bottom: 1px solid var(--line);
}
.dash-milestone-row:last-child { border-bottom: none; }
.dash-milestone-title {
  font-size: 12px; color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.dash-milestone-date {
  font-size: 11px; color: var(--ink-3);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.dash-milestone-countdown {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  background: var(--citrus-soft);
  color: var(--citrus-deep);
  font-variant-numeric: tabular-nums;
  min-width: 64px;
  text-align: center;
  white-space: nowrap;
}
.dash-milestone-countdown.is-past { background: var(--bg-3); color: var(--muted); }
.dash-milestone-countdown.is-soon { background: var(--sun-soft); color: var(--sun); }
.dash-milestone-countdown.is-now { background: var(--danger-soft); color: var(--danger); }

.dash-bug-sev-bar {
  display: flex; align-items: stretch;
  height: 8px; border-radius: 4px;
  overflow: hidden;
  background: var(--bg-3);
  margin-top: 2px;
}
.dash-bug-sev-seg { height: 100%; }
.dash-bug-sev-seg.is-critical { background: var(--danger); }
.dash-bug-sev-seg.is-high { background: var(--sun); }
.dash-bug-sev-seg.is-medium { background: var(--info); }
.dash-bug-sev-seg.is-low { background: var(--muted); }

.dash-time-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 4px;
  border-bottom: 1px solid var(--line);
  font-size: 12px;
}
.dash-time-row:last-child { border-bottom: none; }
.dash-time-bar-wrap {
  flex: 1;
  height: 6px; border-radius: 3px;
  background: var(--bg-3);
  overflow: hidden;
}
.dash-time-bar-fill {
  height: 100%;
  background: var(--citrus);
  border-radius: 3px;
}
.dash-time-title { min-width: 80px; color: var(--ink-2); }
.dash-time-value {
  font-variant-numeric: tabular-nums;
  color: var(--ink);
  font-weight: 600;
  min-width: 50px;
  text-align: right;
  font-size: 11px;
}

.is-dash-flash {
  animation: dash-flash 1.4s ease-out;
}
@keyframes dash-flash {
  0%   { box-shadow: 0 0 0 0 rgba(232,118,58,0.55); background: var(--citrus-soft); }
  60%  { box-shadow: 0 0 0 6px rgba(232,118,58,0); background: var(--citrus-soft); }
  100% { box-shadow: 0 0 0 0 rgba(232,118,58,0); background: transparent; }
}

@media (max-width: 1100px) {
  .dash-col-2, .dash-col-3 { grid-column: span 6; }
  .dash-col-4 { grid-column: span 6; }
  .dash-col-5 { grid-column: span 6; }
  .dash-col-6 { grid-column: span 12; }
  .dash-col-7 { grid-column: span 12; }
  .dash-col-8 { grid-column: span 12; }
  .dash-col-9 { grid-column: span 12; }
  .dash-attention-grid { grid-template-columns: 1fr; }
}
@media (max-width: 680px) {
  .dash-col-2, .dash-col-3, .dash-col-4, .dash-col-5 { grid-column: span 6; }
  .dash-body { grid-template-columns: repeat(6, 1fr); padding: 14px; gap: 10px; }
  .dash-header { padding: 14px 16px 10px; }
  .dash-kpi-val { font-size: 28px; }
}

/* ---------- Toast ---------- */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  padding: 10px 16px;
  background: var(--ink); color: white;
  border-radius: 7px;
  font-size: 12px; font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0; transform: translateY(10px);
  transition: all 0.22s ease;
  pointer-events: none;
  z-index: 300;
}
.toast.is-on { opacity: 1; transform: translateY(0); }
.toast.is-warn { background: var(--danger); }
.toast.is-success { background: var(--leaf); }

/* ---------- Backup reminder ---------- */
.backup-reminder {
  position: fixed; bottom: 22px; left: 22px;
  background: var(--surface);
  border: 1px solid var(--citrus);
  border-radius: var(--radius);
  padding: 14px 16px;
  max-width: 320px;
  box-shadow: var(--shadow-lg);
  z-index: 250;
  display: none;
}
.backup-reminder.is-on { display: block; }
.backup-reminder h4 {
  margin: 0 0 6px;
  font-family: var(--font-display);
  font-size: 14px; font-weight: 600;
  color: var(--ink);
}
.backup-reminder p {
  margin: 0 0 10px;
  font-size: 12px; line-height: 1.5;
  color: var(--ink-3);
}
.backup-reminder-actions {
  display: flex; gap: 6px;
}

/* ---------- Lock screen ---------- */
.lock-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.lock-screen.is-on { display: flex; }
.lock-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 38px 40px;
  max-width: 400px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.lock-icon {
  width: 56px; height: 56px;
  margin: 0 auto 18px;
  display: inline-flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--citrus), var(--citrus-deep));
  border-radius: 14px;
  color: white;
  box-shadow: 0 8px 20px rgba(232,118,58,0.25);
}
.lock-title {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 600;
  margin: 0 0 8px;
  letter-spacing: -0.015em;
}
.lock-sub {
  font-size: 13px; color: var(--ink-3);
  margin: 0 0 22px;
  line-height: 1.55;
}
.lock-input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--line-2);
  border-radius: 7px;
  font-size: 14px;
  margin-bottom: 12px;
  text-align: center;
  letter-spacing: 0.1em;
}
.lock-input:focus {
  outline: none; border-color: var(--citrus);
  box-shadow: var(--ring);
}
.lock-error {
  color: var(--danger);
  font-size: 12px;
  min-height: 18px;
  margin-bottom: 12px;
}

.fab {
  position: fixed; bottom: 22px; right: 22px;
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--ink);
  color: white;
  display: none;
  align-items: center; justify-content: center;
  box-shadow: var(--shadow-lg);
  z-index: 100;
  transition: all 0.15s ease;
}
.fab.is-visible { display: inline-flex; }
.fab:hover { background: var(--citrus-deep); transform: translateY(-2px); }

kbd {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 6px;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  min-width: 18px;
  box-shadow: 0 1px 0 var(--line-2);
}

/* ---------- Empty states ---------- */
.empty {
  padding: 36px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}
.empty-emoji { font-size: 28px; margin-bottom: 8px; display: block; }

/* ==========================================================
   HYBRID TASKS VIEW (Risk Radar list + Owner × Phase matrix)
   Imported from the Claude Design hybrid prototype.
   ========================================================== */

/* ---- At-risk editorial header with countdown ring ---- */
.risk-hero {
  display: flex; align-items: center; gap: 28px;
  padding: 20px 0 22px;
  margin-bottom: 18px;
  border-bottom: 1px solid var(--line);
}
.risk-hero-text { flex: 1; }
.risk-hero-kicker {
  font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
  color: var(--danger); text-transform: uppercase; margin-bottom: 10px;
}
.risk-hero-title {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.05;
  margin: 0 0 8px; color: var(--ink);
}
.risk-hero-title em { color: var(--danger); font-style: italic; font-weight: 500; }
.risk-hero-sub { color: var(--ink-3); margin: 0; font-size: 13px; }
.risk-ring { position: relative; width: 92px; height: 92px; flex-shrink: 0; }
.risk-ring svg { width: 100%; height: 100%; display: block; }
.risk-ring-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.risk-ring-num {
  font-family: var(--font-display); font-size: 26px; font-weight: 600;
  line-height: 1; color: var(--ink); font-variant-numeric: tabular-nums;
}
.risk-ring-lbl {
  font-size: 9px; letter-spacing: 0.1em; color: var(--muted);
  text-transform: uppercase; margin-top: 2px;
}

/* ---- Toolbar: search + new-task ---- */
.risk-toolbar {
  display: flex; gap: 10px; align-items: center;
  margin-bottom: 14px;
}
.risk-search-wrap {
  flex: 1;
  min-width: 0;
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px;
  height: 38px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--muted);
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.risk-search-wrap:focus-within {
  border-color: var(--citrus);
  box-shadow: var(--ring);
}
.risk-search-wrap > span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  color: var(--muted);
}
.risk-search-wrap > span svg { display: block; }
.risk-search {
  flex: 1;
  min-width: 0;
  height: 100%;
  padding: 0;
  margin: 0;
  border: none;
  background: transparent;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  font-family: inherit;
}
.risk-search::placeholder { color: var(--muted); }
.risk-add-btn { flex-shrink: 0; }

/* ---- Owner workload heatmap ---- */
.owner-heatmap {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 18px;
}
.heat-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
}
.heat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  gap: 8px;
}
.heat-cell { text-align: center; position: relative; }
.heat-bar {
  height: 38px; border-radius: 6px; position: relative;
  margin-bottom: 6px;
  transition: opacity 0.15s ease;
}
.heat-crit-dot {
  position: absolute; top: 4px; right: 4px;
  background: var(--danger); color: white;
  font-size: 9px; font-weight: 700;
  width: 16px; height: 16px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.heat-name { font-size: 10px; font-weight: 500; color: var(--ink-2); }
.heat-count {
  font-size: 14px; font-weight: 600;
  font-family: var(--font-display); color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.heat-empty {
  grid-column: 1 / -1;
  padding: 12px; font-size: 12px; color: var(--muted); font-style: italic;
  text-align: center;
}

/* ---- View toggle (Risk list / Owner × Phase) ---- */
.risk-toggle-row {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.risk-toggle-group {
  display: inline-flex;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 3px;
}
.risk-toggle-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: transparent;
  border: none;
  border-radius: 6px;
  font-size: 12px; font-weight: 500;
  color: var(--ink-3); cursor: pointer;
  transition: all 0.15s ease;
}
.risk-toggle-btn.is-on { background: var(--ink); color: white; }
.risk-toggle-btn svg { flex-shrink: 0; }
.risk-toggle-hint {
  font-size: 11px; color: var(--muted); font-style: italic;
}

/* ---- Risk bucket sections ---- */
.risk-list { display: flex; flex-direction: column; gap: 18px; }
.risk-bucket {
  display: flex; flex-direction: column; gap: 4px;
  border-left: 3px solid;
  padding-left: 12px;
}
.risk-bucket-head {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0 6px;
  margin-bottom: 2px;
  font-size: 12px;
}
.risk-bucket-label { font-weight: 600; }
.risk-bucket-count {
  margin-left: auto;
  background: var(--bg-3);
  padding: 2px 9px;
  border-radius: 10px;
  font-size: 11px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}

/* ---- Subtle phase sub-divider inside a bucket ---- */
.risk-phase-divider {
  display: flex; align-items: baseline; gap: 8px;
  padding: 8px 0 4px;
  margin-top: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.risk-phase-divider:first-of-type { margin-top: 0; padding-top: 4px; }
.risk-phase-divider-num {
  font-weight: 600;
  color: var(--ink-3);
}
.risk-phase-divider-name {
  font-family: var(--font-body);
  text-transform: none;
  letter-spacing: 0;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-3);
}
.risk-phase-divider-count {
  margin-left: auto;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
}

/* ---- Two-column grid that holds risk rows within each phase group ---- */
.risk-rows-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.risk-rows-grid .risk-phase-divider {
  grid-column: 1 / -1;
}
.risk-rows-grid .risk-row {
  align-self: start;
}
@media (max-width: 640px) {
  .risk-rows-grid { grid-template-columns: 1fr; }
}

/* ---- Risk row (single task in the bucket list) ---- */
.risk-row {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: border-color 0.12s ease, box-shadow 0.12s ease;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.risk-phase-tag-corner {
  position: absolute;
  top: 3px;
  right: 6px;
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--muted);
  opacity: 0.5;
  pointer-events: none;
  font-variant-numeric: tabular-nums;
  z-index: 1;
}
.risk-row:hover { border-color: var(--line-2); }
.risk-row.is-open {
  border-color: var(--citrus);
  box-shadow: 0 2px 8px rgba(232,118,58,0.08);
}
.risk-row.is-urgent { border-left: 3px solid var(--danger); }

.risk-row-main {
  display: grid;
  grid-template-columns: auto auto 1fr auto;
  align-items: center; gap: 10px;
  /* Extra right padding so the corner phase-tag has clear space and doesn't
     visually collide with the bug chip / repeat tag at the end of the meta. */
  padding: 10px 30px 10px 14px;
  cursor: pointer;
}
.risk-dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  border: none;
  padding: 0;
  cursor: pointer;
  transition: transform 0.12s ease;
}
.risk-dot:hover { transform: scale(1.2); }

.risk-status-chip {
  padding: 3px 9px;
  border-radius: 12px;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.05em;
  background: transparent;
  border: 1px solid;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  transition: background 0.12s ease;
}
.risk-status-chip:hover { background: rgba(0,0,0,0.02); }

.risk-row-title {
  font-size: 13px; font-weight: 500;
  color: var(--ink);
  line-height: 1.4;
  word-break: break-word;
}
.risk-row.is-open .risk-row-title { color: var(--citrus-deep); }

.risk-row-meta {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.risk-owner-pill {
  font-size: 10px; font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  letter-spacing: 0.04em;
  line-height: 1.2;
}
.risk-due {
  font-size: 11px; font-weight: 500;
  font-variant-numeric: tabular-nums;
}
.risk-bug-chip {
  font-size: 10px; font-weight: 600;
  background: var(--sun-soft);
  color: var(--sun);
  padding: 2px 7px;
  border-radius: 10px;
}

/* ---- Expanded row body (note + bugs + bug-log input) ---- */
.risk-row-body {
  padding: 12px 14px 14px;
  border-top: 1px dashed var(--line);
  background: var(--bg-2);
  display: flex; flex-direction: column; gap: 8px;
}
.risk-note {
  width: 100%;
  min-height: 54px;
  padding: 9px 11px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-family: inherit;
  font-size: 12px;
  color: var(--ink);
  resize: vertical;
  outline: none;
}
.risk-note:focus { border-color: var(--citrus); box-shadow: var(--ring); }
.risk-bug-item { display: flex; flex-direction: column; }
.risk-bug {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  background: var(--surface);
  border-left: 3px solid;
  border-radius: 4px;
  font-size: 11px;
  color: var(--ink-2);
}
.risk-bug:hover { background: var(--bg-2); }
.risk-bug-sev {
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
}
.risk-bug-title { flex: 1; }
.risk-bug-status {
  font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.risk-bug-form {
  display: flex; flex-direction: column; gap: 6px;
  border: 1px dashed var(--line-2);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  background: var(--bg-2);
}
.risk-bug-form-title {
  width: 100%; padding: 6px 10px;
  border: 1px solid var(--line); border-radius: var(--radius-sm);
  background: var(--surface); font-family: inherit;
  font-size: 11px; color: var(--ink); outline: none;
  box-sizing: border-box;
}
.risk-bug-form-title:focus { border-color: var(--citrus); box-shadow: var(--ring); }
.risk-bug-form-row {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.risk-bug-form-select {
  padding: 4px 6px;
  border: 1px solid var(--line); border-radius: var(--radius-sm);
  background: var(--surface); font-family: inherit;
  font-size: 11px; color: var(--ink); outline: none; cursor: pointer;
}
.risk-bug-form-reporter {
  flex: 1; min-width: 80px; padding: 4px 8px;
  border: 1px solid var(--line); border-radius: var(--radius-sm);
  background: var(--surface); font-family: inherit;
  font-size: 11px; color: var(--ink); outline: none;
}
.risk-bug-form-reporter:focus { border-color: var(--citrus); box-shadow: var(--ring); }
.risk-bug-form-desc {
  width: 100%; min-height: 52px; padding: 6px 10px;
  border: 1px solid var(--line); border-radius: var(--radius-sm);
  background: var(--surface); font-family: inherit;
  font-size: 11px; color: var(--ink); resize: vertical; outline: none;
  box-sizing: border-box;
}
.risk-bug-form-desc:focus { border-color: var(--citrus); box-shadow: var(--ring); }
.risk-bug-add-toggle {
  align-self: flex-start;
  padding: 4px 12px; border-radius: var(--radius-sm);
  background: transparent; color: var(--citrus-deep);
  font-size: 11px; font-weight: 600; font-family: inherit;
  border: 1px dashed var(--citrus); cursor: pointer; white-space: nowrap;
}
.risk-bug-add-toggle:hover { background: var(--citrus-soft); }
.risk-bug-form-add {
  padding: 4px 12px; border-radius: var(--radius-sm);
  background: var(--citrus); color: #fff;
  font-size: 11px; font-weight: 600; font-family: inherit;
  border: none; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.risk-bug-form-add:hover { background: var(--citrus-deep); }
.risk-bug-form-cancel {
  padding: 4px 10px; border-radius: var(--radius-sm);
  background: transparent; color: var(--ink-3);
  font-size: 11px; font-weight: 500; font-family: inherit;
  border: 1px solid var(--line-2); cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.risk-bug-form-cancel:hover { color: var(--ink); border-color: var(--line); }
.risk-bug-del-btn {
  margin-left: auto; padding: 1px 5px;
  border: none; background: none;
  color: var(--muted); font-size: 13px; line-height: 1;
  cursor: pointer; border-radius: 3px; flex-shrink: 0;
}
.risk-bug-del-btn:hover { color: var(--danger); background: var(--danger-soft); }
.risk-bug-steps-hint {
  font-size: 9px; font-weight: 600; letter-spacing: 0.05em;
  color: var(--muted); text-transform: uppercase;
  border: 1px solid var(--line-2); border-radius: 3px;
  padding: 1px 4px; cursor: default;
}
.risk-bug-reporter {
  font-size: 10px; color: var(--ink-3);
  font-style: italic;
}
.risk-bug-input {
  width: 100%; padding: 7px 11px;
  border: 1px dashed var(--line-2); border-radius: var(--radius-sm);
  background: var(--surface); font-family: inherit;
  font-size: 11px; color: var(--ink); outline: none;
}
.risk-bug-input:focus { border-style: solid; border-color: var(--citrus); box-shadow: var(--ring); }

/* ---- Matrix view (owners × phases) ---- */
.matrix-wrap {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow-x: auto;
  position: relative;
}
.matrix-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 12px;
}
.matrix-th {
  padding: 10px 8px;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--muted);
  text-transform: uppercase;
  text-align: left;
  border-bottom: 1px solid var(--line);
  vertical-align: bottom;
  background: var(--bg-2);
}
.matrix-owner-th { width: 200px; padding-left: 16px; }
.matrix-load-th { width: 110px; text-align: center; }
.matrix-phase-num {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 2px;
}
.matrix-phase-name {
  font-size: 10px; font-weight: 600;
  color: var(--ink-2);
  letter-spacing: 0;
  text-transform: none;
}
.matrix-owner-cell {
  padding: 12px 10px 12px 16px;
  border-bottom: 1px solid var(--line);
  display: flex; gap: 10px; align-items: center;
  vertical-align: top;
  min-width: 200px;
}
.matrix-avatar {
  width: 32px; height: 32px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
}
.matrix-owner-name { font-size: 12px; font-weight: 600; color: var(--ink); }
.matrix-owner-role {
  font-size: 9px; color: var(--muted);
  margin-top: 2px; letter-spacing: 0.1em;
}
.matrix-cell {
  padding: 6px;
  border-bottom: 1px solid var(--line);
  border-left: 1px solid var(--bg-3);
  vertical-align: top;
  min-width: 150px;
}
.matrix-chip-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  align-items: start;
}
@media (max-width: 900px) {
  .matrix-chip-grid { grid-template-columns: 1fr; }
}
.matrix-chip {
  padding: 6px 9px;
  border-left: 3px solid;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s ease;
  font-size: 11px;
}
.matrix-chip:hover { transform: translateX(1px); }
.matrix-chip.is-selected { box-shadow: 0 0 0 2px var(--citrus); }
.matrix-chip.is-complete { opacity: 0.6; }
.matrix-chip-top {
  display: flex; gap: 6px; align-items: center;
  margin-bottom: 3px;
}
.matrix-chip-status {
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.05em;
}
.matrix-chip-bugs { font-size: 9px; color: var(--sun); font-weight: 600; }
.matrix-chip-over { font-size: 10px; color: var(--danger); }
.matrix-chip-title { font-size: 11px; line-height: 1.3; color: var(--ink); font-weight: 500; }
.matrix-chip-title.is-new { color: var(--danger); font-weight: 600; }
.matrix-chip.is-complete .matrix-chip-title { text-decoration: line-through; }
.matrix-load-cell {
  padding: 10px;
  border-bottom: 1px solid var(--line);
  border-left: 1px solid var(--bg-3);
  text-align: center;
}
.matrix-load-wrap { text-align: center; }
.matrix-load-cells {
  display: flex; gap: 3px;
  justify-content: center;
  margin-bottom: 4px;
}
.matrix-load-dot {
  width: 8px; height: 14px; border-radius: 2px;
}
.matrix-load-num {
  font-size: 10px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.matrix-load-crit { color: var(--danger); }

/* ---- Matrix floating edit panel ---- */
.matrix-edit {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 360px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 18px;
  z-index: 30;
}
.matrix-edit-head {
  display: flex; justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
.matrix-edit-kicker {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  color: var(--muted); text-transform: uppercase;
}
.matrix-edit-title {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 500;
  margin-top: 4px;
  color: var(--ink);
  line-height: 1.3;
}
.matrix-edit-close {
  background: transparent;
  border: none;
  font-size: 22px;
  color: var(--muted);
  cursor: pointer;
  line-height: 1;
  padding: 0 4px;
}
.matrix-edit-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  align-items: center; margin-bottom: 10px;
}
.matrix-edit-chip {
  padding: 4px 11px;
  border: none; border-radius: 12px;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  font-family: inherit;
}
.matrix-edit-due {
  margin-left: auto;
  font-size: 10px;
  color: var(--ink-3);
}
.matrix-edit-note {
  width: 100%;
  min-height: 64px;
  padding: 9px 11px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-family: inherit;
  font-size: 12px;
  color: var(--ink);
  margin-bottom: 10px;
  resize: vertical;
  outline: none;
}
.matrix-edit-note:focus { border-color: var(--citrus); box-shadow: var(--ring); }

/* ---- Per-event status visuals on calendar pills ---- */
.cal-event.is-status-flagged {
  position: relative;
  box-shadow: inset 0 0 0 2px var(--sun);
}
.cal-event.is-status-flagged::before {
  content: "🚩";
  position: absolute;
  top: -3px; right: -3px;
  font-size: 10px;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,0.15));
}
.cal-event.is-status-completed {
  background: var(--leaf-soft) !important;
  color: var(--leaf) !important;
  border-left-color: var(--leaf) !important;
  text-decoration: line-through;
  opacity: 0.85;
}
.cal-event.is-status-cancelled {
  background: var(--bg-3) !important;
  color: var(--muted) !important;
  border-left-color: var(--muted) !important;
  text-decoration: line-through;
  opacity: 0.7;
}

/* ---- Schedule modal: status pill + notes textarea ---- */
.sched-status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px;
  border: 1px solid transparent;
  border-radius: 12px;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  font-family: inherit;
  transition: filter 0.12s ease;
}
.sched-status-pill:hover { filter: brightness(0.95); }
.sched-notes {
  width: 100%;
  min-height: 56px;
  margin-top: 8px;
  padding: 9px 11px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-family: inherit;
  font-size: 12px;
  color: var(--ink);
  resize: vertical;
  outline: none;
}
.sched-notes:focus { border-color: var(--citrus); box-shadow: var(--ring); }

/* ---- Event-update modal status row ---- */
.event-status-row {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.event-status-btn {
  padding: 5px 12px;
  border: 1px solid;
  border-radius: 14px;
  background: var(--surface);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s ease;
}
.event-status-btn:hover { filter: brightness(0.95); }
.event-status-btn.is-on { box-shadow: 0 0 0 2px var(--bg); }
.event-update-notes {
  width: 100%;
  min-height: 120px;
  padding: 10px 12px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-family: inherit;
  font-size: 13px;
  color: var(--ink);
  resize: vertical;
  outline: none;
}
.event-update-notes:focus { border-color: var(--citrus); box-shadow: var(--ring); }

/* ---- Weekly repeat tag on a task row ---- */
.risk-repeat-tag {
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--info-soft);
  color: var(--info);
  white-space: nowrap;
}

/* ---- Quick-urgent toggle on each row ---- */
.risk-urgent-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px;
  padding: 0;
  border-radius: 50%;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s ease;
  opacity: 0.45;
}
.risk-urgent-btn:hover {
  opacity: 1;
  color: var(--danger);
  background: var(--danger-soft);
}
.risk-urgent-btn.is-on {
  opacity: 1;
  color: var(--danger);
  background: var(--danger-soft);
  border-color: var(--danger);
  animation: risk-urgent-pulse 1.6s ease-in-out 1;
}
.risk-urgent-btn svg { width: 13px; height: 13px; display: block; }
@keyframes risk-urgent-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(178,58,72,0.35); }
  60%  { box-shadow: 0 0 0 6px rgba(178,58,72,0); }
  100% { box-shadow: 0 0 0 0 rgba(178,58,72,0); }
}

/* Owner pill is display-only now — assignment lives in the right-click menu. */

/* ---- Phase filter chip (set via sidebar nav link) ---- */
.phase-filter-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  margin-bottom: 12px;
  background: var(--citrus-soft);
  border: 1px solid var(--citrus);
  border-radius: var(--radius-sm);
}
.phase-filter-kicker {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--citrus-deep);
  text-transform: uppercase;
}
.phase-filter-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px;
  background: var(--surface);
  border: 1px solid var(--citrus);
  border-radius: 14px;
  cursor: pointer;
  font-family: inherit;
  transition: filter 0.12s ease;
}
.phase-filter-chip:hover { filter: brightness(0.97); }
.phase-filter-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  font-weight: 600;
}
.phase-filter-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
}
.phase-filter-x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px;
  border-radius: 8px;
  background: var(--bg-3);
  color: var(--muted);
  font-size: 14px; line-height: 1;
  font-weight: 600;
  margin-left: 2px;
}
.phase-filter-chip:hover .phase-filter-x {
  background: var(--danger-soft);
  color: var(--danger);
}
.phase-filter-meta {
  margin-left: auto;
  font-size: 11px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}

/* ---- Archive: row visuals + settings toggle group ---- */
.risk-row.is-archived {
  opacity: 0.62;
  background: var(--bg-2);
  border-style: dashed;
}
.risk-row.is-archived .risk-row-title {
  color: var(--ink-3);
  font-style: italic;
}
.risk-archived-tag {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em;
  padding: 2px 6px;
  border-radius: 8px;
  background: var(--bg-3);
  color: var(--muted);
}
.risk-unarchive-btn {
  font-size: 10px; font-weight: 600;
  padding: 3px 9px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--line-2);
  color: var(--ink-2);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s ease;
}
.risk-unarchive-btn:hover {
  border-color: var(--citrus);
  color: var(--citrus-deep);
  background: var(--citrus-soft);
}

/* Settings modal — three-state archive view picker */
.archive-toggle-group {
  display: flex; gap: 4px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 3px;
}
.archive-toggle-btn {
  flex: 1;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px 10px;
  background: transparent;
  border: none;
  border-radius: 6px;
  font-size: 12px; font-weight: 500;
  color: var(--ink-3);
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
}
.archive-toggle-btn:hover { color: var(--ink); background: var(--surface); }
.archive-toggle-btn.is-on {
  background: var(--ink); color: white;
}
.archive-toggle-btn.is-on .archive-toggle-count {
  background: rgba(255,255,255,0.18); color: white;
}
.archive-toggle-count {
  font-size: 10px; font-weight: 600;
  background: var(--bg-3);
  color: var(--ink-3);
  padding: 1px 7px;
  border-radius: 8px;
  font-variant-numeric: tabular-nums;
}

/* ---- Calendar restyle (matches Hybrid design language) ---- */
.calendar-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 22px;
}
.calendar-card .cal-header {
  display: flex; align-items: center; gap: 12px;
  padding: 0 0 14px;
  margin-bottom: 14px;
  border-bottom: 1px dashed var(--line);
}
.calendar-card .cal-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0;
  flex: 1;
}
.calendar-card .cal-today-btn,
.calendar-card .cal-nav-btn {
  border: 1px solid var(--line-2);
  background: var(--bg-2);
  border-radius: var(--radius-sm);
  font-size: 11px;
  color: var(--ink-3);
  padding: 6px 10px;
  cursor: pointer;
  font-family: inherit;
}
.calendar-card .cal-today-btn:hover,
.calendar-card .cal-nav-btn:hover {
  background: var(--citrus-soft); color: var(--citrus-deep); border-color: var(--citrus);
}
.calendar-card .cal-nav { display: inline-flex; gap: 4px; }
.calendar-card .cal-grid { border-radius: var(--radius-sm); }
.calendar-card .cal-dow {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
  background: var(--bg-2);
  padding: 8px 10px;
}
.calendar-card .cal-day { background: var(--surface); }
.calendar-card .cal-day.is-weekend { background: var(--bg-2); }
.calendar-card .cal-day.is-other-month { background: var(--bg-3); color: var(--muted); opacity: 0.85; }
.calendar-card .cal-day.has-ooo,
.cal-day.has-ooo {
  background: var(--leaf-soft);
}
.calendar-card .cal-day.has-ooo.is-weekend,
.cal-day.has-ooo.is-weekend {
  background: #D9E7DC;
}
.calendar-card .cal-day:hover,
.calendar-card .cal-day.is-weekend:hover,
.calendar-card .cal-day.is-other-month:hover { background: #FEF8F5; }
.calendar-card .cal-daynum {
  font-family: var(--font-display);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}
.calendar-card .cal-day.is-today .cal-daynum {
  color: white;
  font-weight: 700;
  background: var(--citrus);
  border-radius: 50%;
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.calendar-card .cal-event {
  border-left: 3px solid var(--citrus);
  border-radius: 4px;
  padding: 3px 6px;
  background: var(--citrus-soft);
  color: var(--citrus-deep);
  font-weight: 500;
  font-size: 10px;
}
.calendar-card .cal-event.is-milestone {
  background: var(--danger-soft); color: var(--danger); border-left-color: var(--danger);
}
.calendar-card .cal-event.is-recurring {
  background: var(--info-soft); color: var(--info); border-left-color: var(--info);
}
.calendar-card .cal-event.is-complete {
  background: var(--leaf-soft); color: var(--leaf); border-left-color: var(--leaf);
}
.calendar-card .cal-event.is-overdue {
  background: var(--danger-soft); color: var(--danger); border-left-color: var(--danger);
}
/* OOO-specific styling (solid green bold) — other types keep their own soft styles */
.calendar-card .cal-event.is-ooo {
  background: var(--leaf); color: #fff; border-left: 0;
  font-weight: 600;
}
.calendar-card .cal-event.is-ooo .evt-inner::before {
  content: "";
  flex: 0 0 auto;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  background:
    linear-gradient(to bottom, rgba(255,255,255,0.95) 0 3px, rgba(255,255,255,0.35) 3px);
}

/* Generic milestone-pill layout (applies to any type — any pill with .evt-inner).
   Fixed height, but keep overflow: hidden so long titles still truncate with
   ellipsis on single-day pills. The range-start pill below opens overflow
   back up for the floated label. */
.calendar-card .cal-event:has(.evt-inner) {
  padding: 0 8px;
  border-radius: 3px;
  margin-top: -2px;
  display: flex;
  align-items: center;
  position: relative;
  height: 20px;
}
.calendar-card .cal-event .evt-inner {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  pointer-events: none;
  /* Truncate with ellipsis when the pill is overflow: hidden (non-range pills) */
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
/* Open up overflow only on range-start pills so the absolute-positioned label
   can float past the pill's right edge into the next cell. */
.calendar-card .cal-event.is-range-start:not(.is-range-end):has(.evt-inner) {
  overflow: visible;
}
.calendar-card .cal-event.is-range-start:not(.is-range-end):has(.evt-inner) .evt-inner {
  overflow: visible;
  text-overflow: clip;
}
/* Range-start milestone: raise z-index so its floated label sits over the
   neighbor, and extend by 1 extra px to bridge the grid's 1px gap. */
.calendar-card .cal-event.is-range-start:not(.is-range-end):has(.evt-inner) {
  z-index: 2;
  margin-right: -9px;
}
.calendar-card .cal-event.is-range-locked:has(.evt-inner) {
  margin-left: -8px;
  margin-right: -9px;
}
.cal-day.has-range-start,
.calendar-card .cal-day.has-range-start {
  overflow: visible;
  z-index: 2;
}
.cal-day.has-range-start .cal-events {
  overflow: visible;
}
/* Float the label to center on the cell boundary */
.calendar-card .cal-event.is-range-start:not(.is-range-end) .evt-inner {
  position: absolute;
  left: 100%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  pointer-events: none;
}
.calendar-card .cal-event.is-range-end:not(.is-range-start) .evt-inner,
.calendar-card .cal-event.is-range-locked .evt-inner {
  display: none;
}
/* OOO label specifically gets its own solid-green background so it visually
   reads as a continuation of the bold OOO band even when it floats */
.calendar-card .cal-event.is-ooo.is-range-start:not(.is-range-end) .evt-inner {
  background: var(--leaf);
  padding: 0 8px;
  height: 20px;
  border-radius: 3px;
}
.calendar-card .cal-event.is-focus {
  background: var(--blocked-soft); color: var(--blocked); border-left-color: var(--blocked);
}
.calendar-card .cal-event.is-lunch {
  background: var(--sun-soft); color: var(--sun); border-left-color: var(--sun);
}
.calendar-card .cal-event.is-routine {
  background: var(--bg-3); color: var(--ink-3); border-left-color: var(--muted);
}
/* Multi-day milestone range — connect the pills edge-to-edge across cells.
   .cal-day has padding: 7px 8px 6px and overflow: hidden, so pulling the pill
   out by -8px on each side makes it touch the cell boundary. Only a 1px grid
   line separates the two pills, reading as a continuous band. */
.calendar-card .cal-event.is-range-start:not(.is-range-end) {
  border-top-right-radius: 0;
  border-bottom-right-radius: 0;
  margin-right: -8px;
  padding-right: 8px;
}
.calendar-card .cal-event.is-range-end:not(.is-range-start) {
  border-top-left-radius: 0;
  border-bottom-left-radius: 0;
  border-left: 0;
  margin-left: -8px;
  padding-left: 8px;
}
.calendar-card .cal-event.is-range-locked {
  border-radius: 0;
  border-left: 0;
  margin-left: -8px;
  margin-right: -8px;
  padding-left: 8px;
  padding-right: 8px;
}
.calendar-card .cal-legend {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ---- Calendar Day / Week timed views ---- */
.cal-view-toggle {
  display: inline-flex;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 2px;
  margin-left: 4px;
}
.cal-view-btn {
  padding: 5px 10px;
  border: none;
  background: transparent;
  border-radius: 5px;
  font-size: 11px; font-weight: 500;
  color: var(--ink-3);
  cursor: pointer;
  font-family: inherit;
}
.cal-view-btn:hover { color: var(--ink); background: var(--surface); }
.cal-view-btn.is-on { background: var(--ink); color: white; }
.cal-header .btn-outline.is-on {
  background: var(--citrus-soft);
  border-color: var(--citrus);
  color: var(--citrus-deep);
}

.cal-legend-filter {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  background: var(--surface);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-pill);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.12s ease;
}
.cal-legend-filter:hover {
  border-color: var(--citrus);
  color: var(--citrus-deep);
}
.cal-legend-filter.is-on {
  background: var(--citrus);
  border-color: var(--citrus-deep);
  color: white;
}
.cal-legend-filter.is-on:hover { background: var(--citrus-deep); color: white; }
.cal-legend-filter svg { width: 12px; height: 12px; }

.timed-view {
  display: grid;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: clip;
  font-size: 12px;
}
.timed-view-day  { grid-template-columns: 64px 1fr; }
.timed-view-week { grid-template-columns: 64px repeat(7, 1fr); }
.timed-labels {
  border-right: 1px solid var(--line);
  background: var(--bg-2);
  display: flex; flex-direction: column;
}
.timed-labels-col-spacer {
  height: 44px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--line);
}
.timed-labels-allday {
  height: 60px;
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 8px;
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--line);
}
.timed-hour-label {
  height: 44px;
  padding: 2px 8px 0 0;
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  border-bottom: 1px dashed var(--line);
}
.timed-col-wrap {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--line);
  min-width: 0;
}
.timed-col-wrap:last-child { border-right: none; }
.timed-col-header {
  height: 44px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
}
.timed-col-header.is-today { background: var(--citrus-soft); }
.timed-col-header .timed-col-dow {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted);
}
.timed-col-header.is-today .timed-col-dow { color: var(--citrus-deep); }
.timed-col-header .timed-col-num {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.timed-col-header.is-today .timed-col-num { color: var(--citrus-deep); }
.timed-col {
  display: flex; flex-direction: column;
  min-width: 0;
}
.timed-col.is-today { background: rgba(232,118,58,0.03); }
.timed-col.has-ooo {
  background: var(--leaf-soft);
  /* Small white inset on both sides so adjacent OOO columns visually separate */
  box-shadow: inset 3px 0 0 var(--surface), inset -3px 0 0 var(--surface);
}
.timed-col.has-ooo.is-today { background: #DEE9DA; }
.timed-col.has-ooo .timed-slot { background: transparent; }
.timed-allday {
  /* Fixed height so every column's grid starts at the same Y, which keeps
     column bottoms (and OOO green tints) aligned across the week view. */
  height: 60px;
  border-bottom: 1px solid var(--line);
  padding: 4px 6px;
  display: flex; flex-direction: row; flex-wrap: wrap; gap: 4px;
  align-content: flex-start;
  background: var(--bg-2);
  /* overflow kept visible so multi-day OOO pills can cross column boundaries
     via negative margins. Columns almost never have >2 all-day events. */
}
.timed-allday-empty { display: none; }
.timed-grid {
  position: relative;
  height: calc(44px * 16); /* HOUR_PX * TIMED_HOUR_COUNT */
}
.timed-slot {
  height: 44px;
  border-bottom: 1px dashed var(--line);
  cursor: pointer;
}
.timed-slot:hover { background: rgba(232,118,58,0.05); }
.timed-pill {
  background: var(--citrus-soft);
  color: var(--citrus-deep);
  border-left: 3px solid var(--citrus);
  border-radius: 4px;
  padding: 4px 6px;
  font-size: 11px;
  cursor: pointer;
  overflow: hidden;
  transition: filter 0.12s ease;
}
.timed-pill:hover { filter: brightness(0.96); }
.timed-pill.is-allday {
  border-left-width: 3px;
  padding: 2px 8px;
  font-size: 10px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 0 0 auto;
  width: min(160px, 100%);
}
.timed-pill.is-milestone {
  background: var(--danger-soft);
  color: var(--danger);
  border-left-color: var(--danger);
}
.timed-pill.is-recurring {
  background: var(--info-soft);
  color: var(--info);
  border-left-color: var(--info);
}
.timed-pill.is-ooo {
  background: var(--leaf);
  color: #fff;
  border-left: 0;
  font-weight: 600;
}
/* All-day milestone pill in week view: fills the column, fixed height so
   range-start and range-end pills match for clean visual merging. */
.timed-pill.is-allday:has(.evt-inner) {
  width: 100%;
  max-width: 100%;
  padding: 0 8px;
  height: 20px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  position: relative;
  overflow: visible;
}
.timed-pill.is-allday .evt-inner {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  pointer-events: none;
}
.timed-pill.is-allday.is-ooo .evt-inner::before {
  content: "";
  flex: 0 0 auto;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.95) 0 3px, rgba(255,255,255,0.35) 3px);
}
/* Open up overflow on columns containing a range-start so the label can
   float past the column boundary */
.timed-col.has-range-start,
.timed-col.has-range-start .timed-allday {
  overflow: visible;
}
.timed-col.has-range-start {
  position: relative;
  z-index: 2;
}
/* Multi-day milestone band: stretch pills edge-to-edge across cell padding
   + the col-wrap's 1px separator so adjacent columns merge visually. */
.timed-pill.is-allday.is-range-start:not(.is-range-end):has(.evt-inner) {
  border-top-right-radius: 0;
  border-bottom-right-radius: 0;
  margin-right: -7px;
}
.timed-pill.is-allday.is-range-end:not(.is-range-start):has(.evt-inner) {
  border-top-left-radius: 0;
  border-bottom-left-radius: 0;
  margin-left: -6px;
}
.timed-pill.is-allday.is-range-locked:has(.evt-inner) {
  border-radius: 0;
  margin-left: -6px;
  margin-right: -7px;
}
/* Week view: clip ALL all-day milestone labels within their column. */
.timed-view-week .timed-pill.is-allday:has(.evt-inner) {
  overflow: hidden;
}
.timed-view-week .timed-pill.is-allday .evt-inner {
  flex: 1;
  min-width: 0;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  pointer-events: none;
}
.timed-pill.is-allday.is-range-end:not(.is-range-start) .evt-inner,
.timed-pill.is-allday.is-range-locked .evt-inner {
  display: none;
}
/* OOO label keeps its solid-green background and flex layout for the icon */
.timed-view-week .timed-pill.is-allday.is-ooo .evt-inner {
  display: flex;
  align-items: center;
  background: var(--leaf);
  padding: 0 8px;
  height: 20px;
  border-radius: 3px;
}
.timed-pill.is-focus {
  background: var(--blocked-soft); color: var(--blocked); border-left-color: var(--blocked);
}
.timed-pill.is-lunch {
  background: var(--sun-soft); color: var(--sun); border-left-color: var(--sun);
}
.timed-pill.is-routine {
  background: var(--bg-3); color: var(--ink-3); border-left-color: var(--muted);
}
.timed-pill.is-complete,
.timed-pill.is-status-completed {
  background: var(--leaf-soft);
  color: var(--leaf);
  border-left-color: var(--leaf);
  text-decoration: line-through;
  opacity: 0.85;
}
.timed-pill.is-status-cancelled {
  background: var(--bg-3);
  color: var(--muted);
  border-left-color: var(--muted);
  text-decoration: line-through;
  opacity: 0.7;
}
.timed-grid > .timed-pill {
  /* When inside the grid, the pills are absolutely positioned by JS. */
  position: absolute;
  left: 4px;
  right: 4px;
  z-index: 2;
}
.timed-pill-time {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.04em;
  opacity: 0.8;
  margin-bottom: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.timed-pill-title {
  font-weight: 500;
  line-height: 1.25;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.timed-now {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: var(--danger);
  z-index: 5;
  pointer-events: none;
}
.timed-now::before {
  content: "";
  position: absolute;
  left: -4px; top: -3px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--danger);
}

/* ---- Calendar upcoming list (Risk-row aesthetic) ---- */
.cal-upcoming-section {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
}
.cal-upcoming-head { margin-bottom: 12px; }
.cal-upcoming-kicker {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em; color: var(--muted);
  text-transform: uppercase;

}
.cal-upcoming-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;

}
.cal-upcoming-list {
  display: flex; flex-direction: column; gap: 4px;
}
.cal-up-row {
  display: grid;
  grid-template-columns: auto 64px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color 0.12s ease, box-shadow 0.12s ease;
}
.cal-up-title-wrap { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.cal-up-note {
  font-size: 11px;
  color: var(--ink-3);
  font-style: italic;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.cal-up-status {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 2px 8px;
  border: 1px solid;
  border-radius: 10px;
}
.cal-up-row:hover { border-color: var(--citrus); box-shadow: 0 2px 8px rgba(232,118,58,0.08); }
.cal-up-row.is-complete { opacity: 0.6; }
.cal-up-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.cal-up-date {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
}
.cal-up-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
}
.cal-up-row.is-complete .cal-up-title {
  text-decoration: line-through;

}
.cal-up-meta {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.cal-up-kind {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
}

/* ---------- Responsive ---------- */
@media (max-width: 960px) {
  .main { padding: 20px 18px 60px; }
  .hero-title { font-size: 32px; }
}

/* Laptop / tablet / phone (≤1280px) — collapse the sidebar to a thin strip
   with a breathing chevron, expand on hover. Works at every viewport width
   below the breakpoint, no longer disappears entirely on small screens. */
@media (max-width: 1280px) {
  .app {
    grid-template-columns: 14px 1fr;
  }
  .sidebar {
    padding: 0;
    overflow: visible;
    transition: width 0.22s ease, padding 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    z-index: 40;
    background: transparent;
    border-right: none;
    position: sticky;
  }
  /* Hide ALL the inner sidebar content while collapsed. */
  .sidebar > * { opacity: 0; pointer-events: none; transition: opacity 0.12s ease; }
  /* Breathing chevron — sticks to the left edge of the viewport, pulses
     gently outward to invite the user to hover. */
  .sidebar::after {
    content: "›";
    position: absolute;
    top: 50%;
    right: -2px;
    transform: translateY(-50%);
    width: 22px;
    height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    color: var(--citrus-deep);
    border: 1px solid var(--line);
    border-left: none;
    border-radius: 0 12px 12px 0;
    box-shadow: 2px 2px 8px rgba(26,29,35,0.06);
    font-size: 16px; font-weight: 700;
    pointer-events: none;
    animation: sidebar-breathe 1.8s ease-in-out infinite;
    transition: opacity 0.18s ease;
  }
  @keyframes sidebar-breathe {
    0%, 100% { transform: translate(0, -50%); opacity: 0.85; }
    50%      { transform: translate(4px, -50%); opacity: 1; }
  }

  /* Expand on hover: overlay the main content with a full sidebar.
     `.is-pinned-hover` is a JS-driven mirror of :hover, applied after a
     re-render that replaced the sidebar DOM while the cursor was still over
     it (CSS :hover wouldn't re-fire until the next mousemove). */
  .sidebar:hover,
  .sidebar.is-pinned-hover {
    position: fixed;
    width: 280px;
    padding: 20px 14px;
    background: var(--surface);
    border-right: 1px solid var(--line);
    box-shadow: var(--shadow-lg);
    top: 72px;
    left: 0;
    height: calc(100vh - 72px);
  }
  .sidebar:hover > *,
  .sidebar.is-pinned-hover > * { opacity: 1; pointer-events: auto; }
  .sidebar:hover::after,
  .sidebar.is-pinned-hover::after {
    opacity: 0;
    animation: none;
  }
}

/* ---------- Mobile (≤768px) overrides — must come AFTER the 1280px block
   so they win the cascade on small viewports. ---------- */
@media (max-width: 768px) {
  body { overflow-x: clip; }

  /* ---- Layout shell ---- */
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 56px 1fr;
    grid-template-areas: "topbar" "main";
    min-width: 0;
  }
  .topbar {
    padding: 0 12px;
    gap: 10px;
    min-width: 0;
  }
  .brand-mark { height: 48px; margin: -4px 0; }
  .brand-text { font-size: 14px; }
  .brand-sub { font-size: 9px; margin-top: 2px; }
  .topbar-hamburger { display: inline-flex; margin-left: 0; }
  .topbar > .topbar-tabs,
  .topbar > .topbar-spacer,
  .topbar > .topbar-actions { display: none; }
  .topbar > .countdown {
    margin-left: auto;
    padding: 5px 10px;
    font-size: 11px;
    gap: 5px;
    white-space: nowrap;
  }
  .topbar > .countdown b { font-size: 12px; }
  .sidebar,
  .sidebar:hover { display: none; }
  .sidebar::after { display: none; content: none; }
  .main {
    padding: 16px 14px 60px;
    min-width: 0;
    max-width: 100%;
  }

  /* ---- Universal text overflow guard ---- */
  .main h1, .main h2, .main h3,
  .risk-hero-title, .hero-title, .phase-title, .attention-title,
  .task-title, .risk-row-title, .bug-title,
  .modal-title, .dash-title, .iw-title {
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  /* ---- Tasks view ---- */
  .risk-hero {
    gap: 12px;
    padding: 14px 0 16px;
    align-items: center;
    flex-wrap: nowrap;
  }
  .risk-hero-text { min-width: 0; flex: 1 1 auto; }
  .risk-hero-kicker { margin-bottom: 6px; }
  .risk-hero-title { font-size: 22px; line-height: 1.1; }
  .risk-hero-sub { font-size: 12px; }
  .risk-ring { width: 68px; height: 68px; flex-shrink: 0; align-self: flex-start; margin-top: 4px; }
  .risk-ring-num { font-size: 18px; }
  .risk-ring-lbl { font-size: 8px; }
  .hero-title { font-size: 26px; }
  .phase-header {
    padding: 12px 14px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .phase-title { font-size: 16px; min-width: 0; flex: 1 1 60%; }
  .phase-window { display: none; }
  .phase-progress { font-size: 11px; }
  .risk-toolbar { flex-wrap: wrap; gap: 8px; }
  .risk-toolbar .risk-search-wrap { flex: 1 1 100%; }
  .risk-rows-grid { grid-template-columns: 1fr; }
  .risk-toggle-row { gap: 8px; }
  .risk-toggle-btn { padding: 6px 10px; font-size: 11px; }
  .risk-toggle-hint { display: none; }
  .risk-row { min-width: 0; }
  .task-grid {
    grid-template-columns: auto 1fr;
    gap: 6px 8px;
    padding: 10px 12px;
  }
  .task-title {
    grid-column: 1 / -1;
    min-width: 0;
    overflow-wrap: anywhere;
  }
  .task-meta, .task-actions {
    grid-column: 1 / -1;
    flex-wrap: wrap;
  }
  .attention-header { flex-wrap: wrap; gap: 8px; }
  .attention-meta { margin-left: 0; flex-basis: 100%; }
  .attention-item { font-size: 12px; padding: 8px 10px; }
  .attention-list { grid-template-columns: 1fr !important; }

  /* ---- Owner workload heatmap ---- */
  .owner-heatmap { padding: 12px; }
  .heat-row { grid-template-columns: repeat(auto-fit, minmax(64px, 1fr)); gap: 6px; }
  .heat-bar { height: 32px; }

  /* ---- Owner × Phase matrix ---- */
  .matrix-chip-grid { grid-template-columns: 1fr; }

  /* ---- Bugs view ---- */
  .bugs-header { flex-wrap: wrap; gap: 8px; }
  .bugs-title { font-size: 16px; min-width: 0; overflow-wrap: anywhere; }
  .bugs-global-summary { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .bug-row, .bugs-section .bug-row { grid-template-columns: auto 1fr auto; gap: 6px 8px; padding: 10px 12px; }
  .bug-title { min-width: 0; overflow-wrap: anywhere; }

  /* ---- Calendar view ---- */
  .cal-header,
  .calendar-card .cal-header {
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 12px;
    align-items: center;
  }
  .cal-title,
  .calendar-card .cal-title {
    flex: 1 1 100%;
    width: 100%;
    min-width: 0;
    font-size: 18px;
    line-height: 1.2;
    overflow-wrap: anywhere;
    white-space: normal;
  }
  .cal-header .cal-today-btn,
  .calendar-card .cal-today-btn { font-size: 11px; padding: 6px 10px; }
  .cal-nav { gap: 2px; }
  .cal-nav-btn { width: 32px; height: 32px; }
  .cal-view-toggle { display: inline-flex; flex-wrap: wrap; }
  .cal-view-toggle .cal-view-btn { padding: 6px 10px; font-size: 11px; }
  .cal-header .btn,
  .cal-header .btn-outline { padding: 6px 10px; font-size: 11px; }
  .cal-header .btn-outline span { display: none; }
  .cal-header > .cal-today-btn { margin-left: 0; }
  .cal-grid {
    font-size: 11px;
  }
  .cal-grid > * { min-width: 0; }
  .calendar-card { padding: 10px; }
  .timed-view-day { grid-template-columns: 44px 1fr; }
  .timed-view-week { grid-template-columns: 44px repeat(7, 1fr); font-size: 10px; }
  .timed-col-header .timed-col-num { font-size: 13px; }
  .timed-col-header .timed-col-dow { font-size: 9px; }

  /* ---- Tab navigation (keep horizontally scrollable, never overflow) ---- */
  .tab-nav {
    flex-wrap: nowrap;
    overflow-x: auto;
    overscroll-behavior-x: contain;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-nav > * { flex-shrink: 0; }

  /* ---- Modals — use the full screen ---- */
  .modal {
    width: 100vw !important;
    max-width: 100vw !important;
    max-height: 100vh !important;
    height: 100vh;
    border-radius: 0;
    margin: 0;
  }
  .modal-overlay { padding: 0; }
  .modal-header {
    padding: 14px 16px;
    flex-wrap: wrap;
    gap: 8px;
    position: sticky; top: 0; z-index: 5;
    background: var(--surface);
  }
  .modal-title { font-size: 17px; min-width: 0; overflow-wrap: anywhere; }
  .modal-body { padding: 14px 16px; }
  .modal:has(#schedule-modal-body) { width: 100vw !important; max-width: 100vw !important; }

  /* ---- Edit form — collapse multi-column grids to single column ---- */
  .edit-form .ef-row,
  .edit-form .ef-grid,
  .edit-form .ef-grid-2,
  .edit-form .ef-grid-3 { grid-template-columns: 1fr !important; }
  .edit-form .ef-select-with-add { flex-wrap: wrap; }
  .edit-form input,
  .edit-form select,
  .edit-form textarea { width: 100%; min-width: 0; max-width: 100%; box-sizing: border-box; }

  /* ---- Calendar Import Wizard ---- */
  .modal.is-wizard {
    width: 100vw !important;
    max-width: 100vw !important;
    height: 100vh;
    max-height: 100vh !important;
    border-radius: 0;
  }
  .iw-summary { padding: 8px 14px; font-size: 11px; flex-wrap: wrap; }
  .iw-table { font-size: 11px; }

  /* ---- Dashboard overlay ---- */
  .dash-overlay { padding: 0; }
  .dash-shell {
    width: 100vw !important;
    max-width: 100vw !important;
    height: 100vh;
    max-height: 100vh !important;
    border-radius: 0;
  }
  .dash-header { padding: 14px 16px 10px; flex-wrap: wrap; gap: 10px; }
  .dash-header-top { flex-wrap: wrap; gap: 10px; }
  .dash-title { font-size: 18px; min-width: 0; overflow-wrap: anywhere; }
  .dash-body {
    grid-template-columns: 1fr !important;
    padding: 14px;
    gap: 12px;
  }
  .dash-col-2, .dash-col-3, .dash-col-4, .dash-col-5,
  .dash-col-6, .dash-col-7, .dash-col-8, .dash-col-9,
  .dash-col-12 { grid-column: 1 / -1 !important; }
  .dash-row, .dash-row-three, .dash-split-row { grid-template-columns: 1fr !important; }
  .dash-attention-grid { grid-template-columns: 1fr !important; }
  .dash-kpi-val { font-size: 24px; }
  .dash-time-title { min-width: 0; }

  /* ---- Toast & backup reminder — clamp inside viewport ---- */
  .toast { left: 12px; right: 12px; bottom: 12px; max-width: calc(100vw - 24px); }
  .backup-reminder { left: 12px; right: 12px; bottom: 12px; max-width: calc(100vw - 24px); }

  /* ---- FAB position above iOS home indicator ---- */
  .fab { bottom: 16px; right: 16px; }

  /* ---- Mobile menu uses bigger viewport ---- */
  .mobile-menu { max-height: calc(100vh - 56px); }

  /* ---- Generic safety: media + long content ---- */
  .main img, .main video,
  .modal img, .modal video,
  .mobile-menu img, .mobile-menu video { max-width: 100%; height: auto; }
  .main pre, .main code,
  .modal pre, .modal code { white-space: pre-wrap; word-break: break-word; }
}

.modal.is-wizard .modal-body {

  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.iw-summary {

}

.iw-summary .iw-pill {

}

.iw-toolbar .iw-date {

  color: var(--ink);

}
.iw-toolbar .iw-label {

}
.iw-toolbar .iw-sep {

  height: 24px;
  background: var(--line);
}
.iw-toolbar .iw-check {

  gap: 6px;

  color: var(--ink-2);

  user-select: none;
}
.iw-toolbar select.iw-select {

  border-radius: var(--radius-sm);

}
.iw-toolbar .iw-btn-sm {
  padding: 7px 12px;
  font-size: 12px;
  font-weight: 600;

  background: var(--surface);

}
.iw-toolbar .iw-btn-sm:hover { border-color: var(--citrus); color: var(--citrus-deep); }
.iw-toolbar .iw-btn-sm.iw-danger-btn:hover { border-color: var(--danger); color: var(--danger); }

.iw-table-wrap {
  flex: 1;
  overflow: auto;
  background: var(--bg-2);
}

  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
  table-layout: fixed;
}
.iw-table thead th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--bg-3);
  color: var(--ink-2);
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 10px 8px;

  overflow: hidden;
  text-overflow: ellipsis;
}
.iw-table thead th.iw-th-resizable { position: sticky; }
.iw-resizer {
  position: absolute;
  top: 0;
  right: -3px;
  width: 6px;
  height: 100%;
  cursor: col-resize;
  user-select: none;
  z-index: 3;
  background: transparent;
  transition: background 0.12s ease;
}
.iw-resizer:hover,
.iw-resizer.is-dragging { background: var(--citrus); }
.iw-th-wrap {
  position: relative;
  display: block;
  width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}
.iw-table tbody tr {

}
.iw-table tbody tr:hover { background: var(--bg-2); }

.iw-table tbody tr.iw-row-dupe:hover { background: #f5d0d5; }
.iw-table tbody tr.iw-row-replace { background: var(--leaf-soft); }
.iw-table tbody tr.iw-row-replace:hover { background: #d4e4d7; }
.iw-table tbody tr.iw-row-unchecked { opacity: 0.55; }
.iw-table tbody tr.iw-row-expand { background: var(--bg-2); }
.iw-table tbody tr.iw-row-expand:hover { background: var(--bg-2); }
.iw-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  overflow: hidden;

.iw-table td.iw-col-check { text-align: center; }
.iw-table td.iw-col-actions { text-align: right; white-space: nowrap; }
.iw-table input[type="date"],
.iw-table input[type="time"],
.iw-table input[type="text"],

  background: transparent;
  border-radius: 5px;
  font-size: 13px;
  color: var(--ink);
}
.iw-table input[type="text"]:hover,
.iw-table input[type="date"]:hover,
.iw-table input[type="time"]:hover,
.iw-table select:hover {

  background: var(--surface);
}
.iw-table input[type="text"]:focus,
.iw-table input[type="date"]:focus,
.iw-table input[type="time"]:focus,

}
.iw-table .iw-time-group {

  font-size: 11px;

  padding: 4px 4px;

}
.iw-table .iw-time-group .iw-time-arrow { flex: 0 0 auto; }
.iw-table .iw-date-range {

  gap: 3px;
  align-items: center;
  min-width: 0;
}
.iw-table .iw-date-range input { flex: 1 1 0; min-width: 0; width: auto; font-size: 12px; padding: 4px 4px; }
.iw-table .iw-date-range .iw-date-arrow { flex: 0 0 auto; font-size: 10px; color: var(--muted); }
.iw-table .iw-allday { font-size: 10px; color: var(--muted); font-style: italic; }
.iw-table .iw-title-input { font-weight: 500; }

.iw-badge {
  display: inline-block;
  padding: 2px 7px;

  font-size: 10px;
  font-weight: 700;

  text-transform: uppercase;
}
.iw-badge-dupe { background: var(--danger-soft); color: var(--danger); }

.iw-row-btn {

}
.iw-row-btn:hover { background: var(--bg-3); color: var(--ink); }

.iw-footer-actions { display: flex; gap: 8px; }
