function syncFilterChips() {
  const group = $("#status-chips");
  if (group) {
    group.querySelectorAll(".chip").forEach(btn => {
      btn.classList.toggle("is-on", btn.dataset.status === UI.statusFilter);
    });
  }
  const urgent = $("#urgent-chip");
  if (urgent) urgent.classList.toggle("is-on", !!UI.urgentOnly);
}

function renderPhaseList() {
  // Legacy incremental re-render; the Hybrid tasks view doesn't use a
  // #phase-list container, so fall through to the full tasks re-render to
  // keep existing callers (task edits, status cycles, etc.) working.
  const list = $("#phase-list");
  if (!list) {
    if (UI.view === "tasks" && typeof renderMain === "function") renderMain();
    return;
  }
  list.innerHTML = "";

  const q = (UI.search || "").toLowerCase().trim();
  const matchesFilter = (t) => {
    const s = STATE[t.id];
    if (!passesArchiveFilter(s)) return false;
    if (UI.statusFilter !== "all" && s.status !== UI.statusFilter) return false;
    if (UI.urgentOnly && !s.urgent) return false;
    if (q) {
      const hay = (getTitle(t, s) + " " + getDesc(t, s) + " " + (s.notes || "") + " " + (s.owner || "")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  };

  effectivePhases().forEach(p => {
    // build filtered groups for this phase
    const visibleGroups = p.groups.map(g => ({
      ...g,
      tasks: g.tasks.filter(matchesFilter)
    })).filter(g => g.tasks.length > 0);

    // if filtering and nothing matches, skip
    const isFiltering = q || UI.statusFilter !== "all" || UI.urgentOnly;
    if (isFiltering && visibleGroups.length === 0) return;

    const isOpen = UI.openPhases[p.id] || isFiltering;
    const st = phaseStats(p);

    const header = h("div", { class: "phase-header" }, [
      h("span", { class: "phase-num" }, p.num),
      h("div", { class: "phase-title" }, p.title),
      h("div", { class: "phase-window" }, p.window),
      h("div", { class: "phase-stats" }, [
        st.urgent > 0 ? h("div", { class: "phase-stat is-urgent" }, [h("span", { class: "n" }, st.urgent), h("span", {}, "urgent")]) : null,
        st.bugs > 0 ? h("div", { class: "phase-stat" }, [h("span", { class: "n" }, st.bugs), h("span", {}, "bugs")]) : null,
        h("div", { class: "phase-stat is-complete" }, [
          h("span", { class: "n" }, `${st.complete}/${st.total}`),
          h("span", {}, "done")
        ])
      ]),
      h("div", { class: "phase-ring", style: `--dash: ${st.pct} ${100 - st.pct}` }, [
        h("span", { class: "pct" }, st.pct + "%"),
        (() => {
          const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
          svg.setAttribute("width", "32"); svg.setAttribute("height", "32"); svg.setAttribute("viewBox", "0 0 32 32");
          const bg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          bg.setAttribute("cx","16"); bg.setAttribute("cy","16"); bg.setAttribute("r","14");
          bg.setAttribute("class","bg");
          svg.appendChild(bg);
          const fg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          fg.setAttribute("cx","16"); fg.setAttribute("cy","16"); fg.setAttribute("r","14");
          fg.setAttribute("pathLength","100"); fg.setAttribute("class","fg");
          svg.appendChild(fg);
          return svg;
        })()
      ]),
      h("div", { class: "phase-chevron", html: ICONS.chevron })
    ]);
    header.addEventListener("click", () => {
      UI.openPhases[p.id] = !UI.openPhases[p.id];
      saveUI();
      renderPhaseList();
    });
    header.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      e.stopPropagation();
      openPhaseContextMenu(e.clientX, e.clientY, p.id);
    });

    const body = h("div", { class: "phase-body" });
    body.appendChild(h("div", { class: "phase-desc" }, p.desc));
    visibleGroups.forEach(g => {
      const groupTitle = h("div", { class: "group-title" }, g.title);
      groupTitle.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        e.stopPropagation();
        openGroupContextMenu(e.clientX, e.clientY, p.id, g.id);
      });
      body.appendChild(groupTitle);
      g.tasks.forEach(t => body.appendChild(renderTask(t)));
      // "+ Add task" button at the end of each group (hidden during filtering so
      // the list isn't cluttered with the control while you're searching).
      if (!isFiltering) {
        body.appendChild(h("button", {
          class: "add-task-btn",
          onclick: (e) => { e.stopPropagation(); openNewTaskEditor({ phaseId: p.id, groupId: g.id }); }
        }, [
          h("span", { html: ICONS.plus }),
          h("span", {}, "Add task")
        ]));
      }
    });

    const phase = h("section", {
      class: "phase" + (isOpen ? " is-open" : ""),
      id: "phase-" + p.id
    }, [header, body]);
    list.appendChild(phase);
  });

  if (list.children.length === 0) {
    list.appendChild(h("div", { class: "empty" }, [
      h("span", { class: "empty-emoji" }, "🔍"),
      h("div", {}, lbl("emptyTasks"))
    ]));
  }
}

/* ============================================================================
   TASK CARD
   ============================================================================ */
function renderTask(t) {
  const s = STATE[t.id];
  const isExpanded = UI.openTasks[t.id];
  const bugs = s.bugs || [];
  const openBugs = bugs.filter(b => b.status === "open" || b.status === "in_progress");
  const criticalBugs = openBugs.filter(b => b.severity === "critical").length;
  const overdue = s.dueDate && s.status !== "complete" && new Date(s.dueDate + "T00:00:00") < new Date(new Date().toDateString());

  const header = h("div", { class: "task-header" }, [
    // Status button
    h("div", { class: "task-status" }, [
      h("button", {
        class: "task-status-btn status-" + s.status,
        onclick: (e) => { e.stopPropagation(); toggleStatusMenu(t.id); }
      }, STATUS_LABELS[s.status]),
      renderStatusMenu(t.id)
    ]),
    h("div", { class: "task-title" }, getTitle(t, s)),
    h("div", { class: "task-badges" }, [
      // Urgent — always a clickable fire icon; subtle when off, only shows on task hover
      s.urgent
        ? h("button", {
            class: "badge badge-urgent badge-clickable",
            title: "Click to unmark urgent",
            onclick: (e) => { e.stopPropagation(); toggleUrgent(t.id); },
            html: ICONS.fire + "<span>Urgent</span>"
          })
        : h("button", {
            class: "badge-quick",
            title: "Mark urgent",
            onclick: (e) => { e.stopPropagation(); toggleUrgent(t.id); },
            html: ICONS.fire
          }),
      s.priority === "priority" ? h("span", { class: "badge badge-priority" }, "★ Priority") : null,
      // Owner — click to edit inline
      s.owner
        ? h("button", {
            class: "badge badge-owner badge-clickable",
            title: "Click to edit owner",
            "data-owner-for": t.id,
            onclick: (e) => { e.stopPropagation(); startOwnerInline(t.id, e.currentTarget); }
          }, "@" + s.owner)
        : h("button", {
            class: "badge-quick",
            title: "Add owner",
            "data-owner-for": t.id,
            onclick: (e) => { e.stopPropagation(); startOwnerInline(t.id, e.currentTarget); }
          }, "+ owner"),
      // Due date — click opens native date picker
      s.dueDate
        ? h("label", {
            class: "badge badge-due badge-clickable badge-due-wrap" + (overdue ? " is-overdue" : ""),
            title: overdue ? "Overdue — click to change" : "Click to change due date",
            onclick: (e) => e.stopPropagation()
          }, [
            h("span", {}, (overdue ? "⚠ " : "") + fmtDateShort(s.dueDate)),
            h("input", {
              type: "date",
              value: s.dueDate,
              onchange: (e) => updateTaskField(t.id, "dueDate", e.target.value)
            })
          ])
        : h("label", {
            class: "badge-quick badge-quick-date",
            title: "Add due date",
            onclick: (e) => e.stopPropagation()
          }, [
            h("span", {}, "+ due"),
            h("input", {
              type: "date",
              onchange: (e) => updateTaskField(t.id, "dueDate", e.target.value)
            })
          ]),
      openBugs.length > 0 ? h("span", {
        class: "badge badge-bugs" + (criticalBugs > 0 ? " has-critical" : "")
      }, openBugs.length + " bug" + (openBugs.length > 1 ? "s" : "")) : null
    ].filter(Boolean)),
    h("div", { class: "task-chevron", html: ICONS.chevron })
  ]);
  header.addEventListener("click", (e) => {
    if (e.target.closest(".task-status-menu") || e.target.closest(".task-status-btn")) return;
    UI.openTasks[t.id] = !UI.openTasks[t.id];
    saveUI();
    renderPhaseList();
  });

  const task = h("div", {
    class: "task" +
      (s.urgent ? " is-urgent" : "") +
      (s.status === "complete" ? " is-complete" : "") +
      (isExpanded ? " is-expanded" : ""),
    id: "task-" + t.id
  }, [header]);
  task.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    e.stopPropagation();
    openTaskContextMenu(e.clientX, e.clientY, t.id);
  });
  const _desc = getDesc(t, s);
  if (_desc) {
    task.addEventListener("mouseenter", () => showDescCallout(_desc, task));
    task.addEventListener("mouseleave", hideDescCallout);
  }

  if (isExpanded) {
    const body = h("div", { class: "task-body" });

    // Editable fields
    body.appendChild(h("div", { class: "task-fields" }, [
      h("div", {}, [
        h("label", { class: "field-label" }, "Owner"),
        h("input", {
          class: "field-input", type: "text",
          value: s.owner || "", placeholder: "Unassigned",
          onchange: (e) => updateTaskField(t.id, "owner", e.target.value)
        })
      ]),
      h("div", {}, [
        h("label", { class: "field-label" }, "Due date"),
        h("input", {
          class: "field-input", type: "date",
          value: s.dueDate || "",
          onchange: (e) => updateTaskField(t.id, "dueDate", e.target.value)
        })
      ]),
      h("div", {}, [
        h("label", { class: "field-label" }, "Last updated"),
        h("div", { style: "font-size:11px;color:var(--muted);padding:7px 0;" },
          s.updated ? new Date(s.updated).toLocaleString() : "Never")
      ])
    ]));

    body.appendChild(h("label", { class: "field-label" }, "Notes"));
    body.appendChild(h("textarea", {
      class: "notes-area", placeholder: "Progress notes, blockers, decisions, links…",
      value: s.notes || "",
      onchange: (e) => updateTaskField(t.id, "notes", e.target.value)
    }));

    body.appendChild(h("div", { class: "task-actions" }, [
      h("button", {
        class: "mini-btn" + (s.urgent ? " is-on" : ""),
        onclick: () => toggleUrgent(t.id)
      }, [
        h("span", { html: ICONS.fire }),
        h("span", {}, s.urgent ? "Unmark urgent" : "Mark urgent")
      ])
    ]));

    // Bugs section
    body.appendChild(renderBugsForTask(t.id));
    task.appendChild(body);
  }

  return task;
}

function renderStatusMenu(taskId) {
  const menu = h("div", { class: "task-status-menu" + (UI.statusMenu === taskId ? " is-open" : "") });
  const options = [
    { k: "not_started", label: "Not started", dot: "not_started" },
    { k: "in_progress", label: "In progress", dot: "in_progress" },
    { k: "complete", label: "Complete", dot: "complete" },
    { k: "blocked", label: "Blocked", dot: "blocked" }
  ];
  options.forEach((o, i) => {
    menu.appendChild(h("button", {
      onclick: (e) => { e.stopPropagation(); setStatus(taskId, o.k); }
    }, [
      h("span", { class: "dot status-" + o.dot,
        style: `background: var(--${o.k === "complete" ? "leaf" : o.k === "in_progress" ? "info" : o.k === "blocked" ? "blocked" : "muted"})` }),
      h("span", {}, o.label),
      h("kbd", { class: "kbd" }, String(i + 1))
    ]));
  });
  return menu;
}

/* ============================================================================
   BUGS (per-task)
   ============================================================================ */
function renderBugsForTask(taskId) {
  const s = STATE[taskId];
  const bugs = s.bugs || [];
  const openBugs = bugs.filter(b => b.status === "open" || b.status === "in_progress").length;
  const criticalBugs = bugs.filter(b => b.severity === "critical" && b.status !== "resolved" && b.status !== "wont_fix").length;

  const section = h("div", { class: "bugs-section" }, [
    h("div", { class: "bugs-header" }, [
      h("div", { html: ICONS.bug, style: "color: var(--sun);" }),
      h("div", { class: "bugs-title" }, "Bugs"),
      bugs.length > 0 ? h("div", {
        class: "bugs-count" + (criticalBugs > 0 ? " has-critical" : "")
      }, `${openBugs} open / ${bugs.length} total`) : null
    ].filter(Boolean))
  ]);

  const bugList = h("div", { class: "bug-list" });
  bugs.forEach(bug => bugList.appendChild(renderBug(taskId, bug)));
  section.appendChild(bugList);

  section.appendChild(h("button", {
    class: "bug-add-btn",
    onclick: () => addBug(taskId)
  }, [h("span", { html: ICONS.plus }), h("span", {}, "Add bug")]));

  return section;
}

function renderBug(taskId, bug) {
  const isOpen = UI.openBugs[bug.id];
  const header = h("div", {}, [
    h("div", { class: "bug-row-1" }, [
      h("div", { class: "bug-title" }, bug.title || "(Untitled bug)"),
      h("span", { class: "bug-severity sev-" + bug.severity }, SEVERITY_LABELS[bug.severity]),
      h("span", { class: "bug-status-chip bst-" + bug.status }, BUG_STATUS_LABELS[bug.status])
    ]),
    h("div", { class: "bug-meta" }, [
      bug.reporter ? h("span", {}, "@" + bug.reporter) : null,
      bug.reportedDate ? h("span", {}, fmtDateShort(bug.reportedDate)) : null,
      bug.zendeskUrl ? h("span", {}, "Zendesk linked") : null,
      bug.airtableUrl ? h("span", {}, "Airtable linked") : null
    ].filter(Boolean))
  ]);
  header.addEventListener("click", () => {
    UI.openBugs[bug.id] = !UI.openBugs[bug.id];
    saveUI();
    renderPhaseList();
  });

  const bugEl = h("div", {
    class: "bug-item severity-" + bug.severity +
      (bug.status === "resolved" ? " is-resolved" : "") +
      (isOpen ? " is-open" : "")
  }, [header]);

  if (isOpen) {
    const body = h("div", { class: "bug-body" });

    body.appendChild(h("label", { class: "field-label" }, "Title"));
    body.appendChild(h("input", {
      class: "bug-input", type: "text", value: bug.title || "",
      placeholder: "Brief description of the bug",
      onchange: (e) => updateBug(taskId, bug.id, "title", e.target.value)
    }));

    body.appendChild(h("div", { class: "bug-fields", style: "margin-top:10px;" }, [
      h("div", {}, [
        h("label", { class: "field-label" }, "Severity"),
        h("select", {
          class: "bug-input",
          onchange: (e) => updateBug(taskId, bug.id, "severity", e.target.value)
        }, [
          ["critical", "Critical — blocks go-live"],
          ["high", "High — major feature broken"],
          ["medium", "Medium — workaround exists"],
          ["low", "Low — cosmetic / minor"]
        ].map(([v, l]) => {
          const opt = h("option", { value: v }, l);
          if (bug.severity === v) opt.selected = true;
          return opt;
        }))
      ]),
      h("div", {}, [
        h("label", { class: "field-label" }, "Status"),
        h("select", {
          class: "bug-input",
          onchange: (e) => updateBug(taskId, bug.id, "status", e.target.value)
        }, Object.entries(BUG_STATUS_LABELS).map(([v, l]) => {
          const opt = h("option", { value: v }, l);
          if (bug.status === v) opt.selected = true;
          return opt;
        }))
      ]),
      h("div", {}, [
        h("label", { class: "field-label" }, "Reporter"),
        h("input", {
          class: "bug-input", type: "text",
          value: bug.reporter || "", placeholder: "Who found it",
          onchange: (e) => updateBug(taskId, bug.id, "reporter", e.target.value)
        })
      ]),
      h("div", {}, [
        h("label", { class: "field-label" }, "Reported"),
        h("input", {
          class: "bug-input", type: "date",
          value: bug.reportedDate || "",
          onchange: (e) => updateBug(taskId, bug.id, "reportedDate", e.target.value)
        })
      ])
    ]));

    body.appendChild(h("label", { class: "field-label" }, "Steps to reproduce"));
    body.appendChild(h("textarea", {
      class: "bug-textarea",
      placeholder: "1. Open … 2. Click … 3. Observe …",
      value: bug.stepsToReproduce || "",
      onchange: (e) => updateBug(taskId, bug.id, "stepsToReproduce", e.target.value)
    }));

    body.appendChild(h("label", { class: "field-label" }, "Resolution"));
    body.appendChild(h("textarea", {
      class: "bug-textarea",
      placeholder: "Fix applied / workaround / root cause",
      value: bug.resolution || "",
      onchange: (e) => updateBug(taskId, bug.id, "resolution", e.target.value)
    }));

    body.appendChild(h("div", { class: "bug-fields", style: "margin-top:10px;" }, [
      h("div", {}, [
        h("label", { class: "field-label" }, "Zendesk ticket URL"),
        h("input", {
          class: "bug-input", type: "url",
          placeholder: "https://yourco.zendesk.com/agent/tickets/1234",
          value: bug.zendeskUrl || "",
          onchange: (e) => updateBug(taskId, bug.id, "zendeskUrl", e.target.value)
        })
      ]),
      h("div", {}, [
        h("label", { class: "field-label" }, "Airtable record URL"),
        h("input", {
          class: "bug-input", type: "url",
          placeholder: "https://airtable.com/appXXX/tblXXX/…",
          value: bug.airtableUrl || "",
          onchange: (e) => updateBug(taskId, bug.id, "airtableUrl", e.target.value)
        })
      ])
    ]));

    if (bug.zendeskUrl || bug.airtableUrl) {
      const links = h("div", { class: "bug-link-row" });
      if (bug.zendeskUrl) links.appendChild(h("a", {
        class: "bug-link zendesk", href: bug.zendeskUrl, target: "_blank",
        html: ICONS.zendesk + "<span>Zendesk →</span>"
      }));
      if (bug.airtableUrl) links.appendChild(h("a", {
        class: "bug-link airtable", href: bug.airtableUrl, target: "_blank",
        html: ICONS.airtable + "<span>Airtable →</span>"
      }));
      body.appendChild(links);
    }

    body.appendChild(h("div", { style: "margin-top: 12px; text-align: right;" }, [
      h("button", {
        class: "mini-btn", style: "color: var(--danger); border-color: rgba(178,58,72,0.3);",
        onclick: () => deleteBug(taskId, bug.id)
      }, [h("span", { html: ICONS.x }), h("span", {}, "Delete bug")])
    ]));

    bugEl.appendChild(body);
  }

  return bugEl;
}

/* ============================================================================
   CALENDAR VIEW
   ============================================================================ */
function renderCalendarView(main) {
  // Anchor for day/week views (calCursor); month uses calMonth.
  if (!UI.calCursor) UI.calCursor = ymd(new Date());
  const cursorDate = new Date(UI.calCursor + "T00:00:00");
  const view = UI.calView || "month";

  const [yearStr, monthStr] = UI.calMonth.split("-");
  const year = parseInt(yearStr, 10);
  const month = parseInt(monthStr, 10) - 1;
  const monthDate = new Date(year, month, 1);
  const monthName = monthDate.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const days = daysUntil(GO_LIVE);

  // ---- Editorial hero (matches the Risk Radar aesthetic)
  // Count events in the visible window (depends on view).
  const monthLast = new Date(year, month + 1, 0);
  const monthStart = ymd(new Date(year, month, 1));
  const monthEnd = ymd(monthLast);
  let visibleCount = 0;
  let windowLabel = "";
  if (view === "month") {
    for (let d = 1; d <= monthLast.getDate(); d++) {
      visibleCount += eventsOnDate(ymd(new Date(year, month, d))).length;
    }
    windowLabel = monthName;
  } else if (view === "week") {
    const wkStart = startOfWeek(cursorDate);
    for (let i = 0; i < 7; i++) {
      const d = new Date(wkStart); d.setDate(d.getDate() + i);
      visibleCount += eventsOnDate(ymd(d)).length;
    }
    windowLabel = weekRangeLabel(wkStart);
  } else {
    visibleCount = eventsOnDate(UI.calCursor).length;
    windowLabel = cursorDate.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
  }

  main.appendChild(h("section", { class: "risk-hero" }, [
    h("div", { class: "risk-hero-text" }, [
      h("div", { class: "risk-hero-kicker" }, "SCHEDULE · " + (lbl("tabs.calendar") || "Calendar")),
      h("h2", {
        class: "risk-hero-title",
        html: `What&apos;s <em>coming</em> for July&nbsp;13.`
      }),
      h("p", { class: "risk-hero-sub" },
        `${visibleCount} event${visibleCount === 1 ? "" : "s"} ${view === "month" ? "this month" : view === "week" ? "this week" : "today"} · ${days >= 0 ? days : 0} days to go-live`)
    ]),
    renderCountdownRing(days)
  ]));

  // ---- Active phase filter chip (set via sidebar nav) — mirrors the Tasks view
  const activeCalPhase = UI.phaseFilter
    ? effectivePhases().find(p => p.id === UI.phaseFilter)
    : null;
  if (activeCalPhase) {
    let phaseTaskCount = 0;
    Object.entries(STATE).forEach(([tid, s]) => {
      const t = TASK_INDEX[tid];
      if (!t || t.phaseId !== activeCalPhase.id) return;
      if (!passesArchiveFilter(s)) return;
      if (!taskRange(s)) return;
      phaseTaskCount++;
    });
    main.appendChild(h("div", { class: "phase-filter-bar" }, [
      h("span", { class: "phase-filter-kicker" }, "FILTERED BY PHASE"),
      h("button", {
        class: "phase-filter-chip",
        onclick: () => {
          UI.phaseFilter = null;
          UI.activeNavPhase = null;
          saveUI();
          renderShell();
        },
        title: "Clear filter"
      }, [
        h("span", { class: "phase-filter-num" }, activeCalPhase.num),
        h("span", { class: "phase-filter-name" }, activeCalPhase.title),
        h("span", { class: "phase-filter-x" }, "×")
      ]),
      h("span", { class: "phase-filter-meta" },
        `${phaseTaskCount} scheduled task${phaseTaskCount === 1 ? "" : "s"} · milestones unaffected`)
    ]));
  }

  // ---- Owner workload heatmap (still scoped to the visible month)
  const monthRows = [];
  effectivePhases().forEach(p => {
    p.groups.forEach(g => {
      g.tasks.forEach(t => {
        const s = STATE[t.id];
        if (!s) return;
        if (!passesArchiveFilter(s)) return;
        const range = taskRange(s);
        if (!range) return;
        if (range.end < monthStart || range.start > monthEnd) return;
        monthRows.push({
          t, s, phaseId: p.id, phaseNum: p.num, phaseTitle: p.title,
          groupId: g.id, groupTitle: g.title,
          title: getTitle(t, s),
          desc: getDesc(t, s),
          risk: riskOf(t, s)
        });
      });
    });
  });
  const calHeatmapEl = renderOwnerHeatmap(monthRows);
  if (calHeatmapEl) main.appendChild(calHeatmapEl);

  const wrap = h("div", { class: "calendar-wrap calendar-card" });

  // ---- Header (title + view selector + nav + actions)
  const navPrev = () => {
    if (view === "month") UI.calMonth = shiftMonth(UI.calMonth, -1);
    else if (view === "week") UI.calCursor = ymdShift(UI.calCursor, -7);
    else UI.calCursor = ymdShift(UI.calCursor, -1);
    saveUI(); renderMain();
  };
  const navNext = () => {
    if (view === "month") UI.calMonth = shiftMonth(UI.calMonth, 1);
    else if (view === "week") UI.calCursor = ymdShift(UI.calCursor, 7);
    else UI.calCursor = ymdShift(UI.calCursor, 1);
    saveUI(); renderMain();
  };
  const goToday = () => {
    const t = new Date();
    UI.calMonth = ym(t);
    UI.calCursor = ymd(t);
    saveUI(); renderMain();
  };

  wrap.appendChild(h("div", { class: "cal-header" }, [
    h("div", { class: "cal-title" }, view === "month" ? monthName : windowLabel),
    h("button", { class: "cal-today-btn", onclick: goToday }, lbl("cal.today")),
    h("div", { class: "cal-nav" }, [
      h("button", { class: "cal-nav-btn", html: ICONS.chevLeft, onclick: navPrev }),
      h("button", { class: "cal-nav-btn", html: ICONS.chevRight, onclick: navNext })
    ]),
    // View selector — Day / Week / Month
    h("div", { class: "cal-view-toggle" }, ["day","week","month"].map(v =>
      h("button", {
        class: "cal-view-btn" + (view === v ? " is-on" : ""),
        onclick: () => {
          UI.calView = v;
          if (v !== "month" && !UI.calCursor) UI.calCursor = ymd(new Date());
          saveUI(); renderMain();
        }
      }, v[0].toUpperCase() + v.slice(1))
    )),
    h("button", {
      class: "btn btn-outline",
      onclick: () => openNewMilestoneEditor(),
      html: ICONS.plus
    }),
    h("button", {
      class: "btn btn-outline",
      onclick: exportICS,
      html: ICONS.download + "<span>" + lbl("cal.exportIcs") + "</span>"
    })
  ]));

  // ---- Body — switch by view
  const todayStr = ymd(new Date());
  if (view === "day") {
    wrap.appendChild(renderTimedDay(UI.calCursor, todayStr));
  } else if (view === "week") {
    wrap.appendChild(renderTimedWeek(startOfWeek(cursorDate), todayStr));
  } else {
    // Existing month grid — Google-style, no separate weekday header row.
    // Weekday label is rendered inside each cell in the first row (topRow: true).
    const grid = h("div", { class: "cal-grid" });
    const firstDay = new Date(year, month, 1);
    const firstWeekday = firstDay.getDay();
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const prevLastDay = new Date(year, month, 0).getDate();
    let cellIdx = 0;
    for (let i = firstWeekday - 1; i >= 0; i--) {
      const dayNum = prevLastDay - i;
      const d = new Date(year, month - 1, dayNum);
      grid.appendChild(renderCalDay(d, { otherMonth: true, todayStr, topRow: cellIdx < 7 }));
      cellIdx++;
    }
    for (let d = 1; d <= daysInMonth; d++) {
      grid.appendChild(renderCalDay(new Date(year, month, d), { todayStr, topRow: cellIdx < 7 }));
      cellIdx++;
    }
    // No separate weekday header row now, so totalCells = grid.children.length
    const totalCells = grid.children.length;
    const trailing = (7 - (totalCells % 7)) % 7;
    for (let d = 1; d <= trailing; d++) {
      grid.appendChild(renderCalDay(new Date(year, month + 1, d), { otherMonth: true, todayStr }));
    }
    wrap.appendChild(grid);
  }

  // Legend / filter chips — each chip toggles visibility of its type.
  // Leftmost items are non-toggleable (tasks, complete state, recurring);
  // middle items are milestone-type toggles stored in UI.calTypeFilters.
  if (!UI.calTypeFilters) UI.calTypeFilters = {};
  const typeChip = (key, label, swatchCls) => {
    const isHidden = UI.calTypeFilters[key] === false;
    return h("button", {
      class: "legend-chip" + (isHidden ? " is-hidden" : ""),
      title: isHidden ? `${label} hidden — click to show` : `${label} visible — click to hide`,
      onclick: () => {
        UI.calTypeFilters[key] = isHidden ? true : false;
        saveUI();
        renderMain();
      }
    }, [
      h("span", { class: "legend-dot " + swatchCls }),
      h("span", {}, label)
    ]);
  };
  wrap.appendChild(h("div", { class: "cal-legend" }, [
    h("div", { class: "legend-item" }, [h("span", { class: "legend-swatch task" }), h("span", {}, lbl("cal.legendTaskDue"))]),
    h("div", { class: "legend-item" }, [h("span", { class: "legend-dot complete" }), h("span", {}, lbl("cal.legendComplete"))]),
    h("div", { class: "legend-item" }, [h("span", { class: "legend-dot recurring" }), h("span", {}, lbl("cal.legendRecurring"))]),
    typeChip("meeting",   "Milestone",   "milestone"),
    typeChip("ooo",       "OOO",         "ooo"),
    typeChip("focus",     "Focus",       "focus"),
    typeChip("lunch",     "Lunch",       "lunch"),
    typeChip("routine",   "Routine",     "routine"),
    h("button", {
      class: "cal-legend-filter" + (UI.calWonderfulOnly ? " is-on" : ""),
      onclick: () => {
        UI.calWonderfulOnly = !UI.calWonderfulOnly;
        saveUI();
        renderMain();
      },
      title: UI.calWonderfulOnly
        ? "Showing only native tasks/milestones and events with \"Wonderful\" in the title. Click to show everything."
        : "Filter calendar: hide Google Calendar imports that don't contain \"Wonderful\"."
    }, [
      h("span", { html: ICONS.search }),
      h("span", {}, UI.calWonderfulOnly ? "Wonderful only ✓" : "Wonderful only")
    ])
  ]));

  main.appendChild(wrap);

  // Upcoming list — styled like Risk Radar rows
  const upcoming = getUpcoming(30);
  const upWrap = h("section", { class: "cal-upcoming-section" }, [
    h("div", { class: "cal-upcoming-head" }, [
      h("div", { class: "cal-upcoming-kicker" }, "NEXT 30 DAYS"),
      h("div", { class: "cal-upcoming-title" }, lbl("cal.nextDays"))
    ])
  ]);
  if (upcoming.length === 0) {
    upWrap.appendChild(h("div", { class: "empty" }, [
      h("span", { class: "empty-emoji" }, "📅"),
      h("div", {}, lbl("cal.nothingScheduled"))
    ]));
  } else {
    const list = h("div", { class: "cal-upcoming-list" });
    upcoming.forEach(ev => {
      const isTask = ev.kind === "task";
      const t = isTask ? TASK_INDEX[ev.taskId] : null;
      const s = isTask ? STATE[ev.taskId] : null;
      const risk = isTask && s ? riskOf(t, s) : null;
      // For non-tasks pull the per-occurrence/per-event status from STATE.
      // milestoneIndex / recurringIndex are not present on `upcoming` rows yet,
      // so derive them from the source arrays by matching title+date.
      let evRef = null;
      if (ev.kind === "milestone") {
        const idx = MILESTONES.findIndex(m => m.date === ev.date && m.title === ev.title);
        if (idx >= 0) evRef = { kind: "milestone", milestoneIndex: idx };
      } else if (ev.kind === "recurring") {
        const idx = RECURRING.findIndex(r => r.title === ev.title);
        if (idx >= 0) evRef = { kind: "recurring", recurringIndex: idx };
      }
      const evStatusKey = evRef ? eventStatus(evRef, ev.date) : null;
      const evNotesText = evRef ? eventNotes(evRef, ev.date) : "";
      const dotColor = risk ? RISK_META[risk].color
        : evStatusKey === "completed" ? "var(--leaf)"
        : evStatusKey === "flagged" ? "var(--sun)"
        : evStatusKey === "cancelled" ? "var(--muted)"
        : ev.kind === "milestone" ? (ev.type === "critical" ? "var(--danger)" : "var(--citrus-deep)")
        : "var(--info)";
      const kindLabel = ev.kind === "milestone" ? "Milestone"
        : ev.kind === "recurring" ? "Recurring"
        : ev.complete ? "Complete" : "Task due";
      const isMarked = evStatusKey === "completed" || evStatusKey === "cancelled";
      const ownerHue = s ? teamHueOf(s.owner) : 0;
      const row = h("div", {
        class: "cal-up-row" + (ev.complete || isMarked ? " is-complete" : ""),
        onclick: () => {
          if (ev.taskId) jumpToTask(ev.taskId);
          else if (evRef) openEventUpdateModal(evRef, ev.date);
        }
      }, [
        h("span", { class: "cal-up-dot", style: `background: ${dotColor};` }),
        h("div", { class: "cal-up-date" }, fmtDateShort(ev.date)),
        h("div", { class: "cal-up-title-wrap" }, [
          h("div", { class: "cal-up-title" }, ev.title),
          evNotesText ? h("div", { class: "cal-up-note" }, evNotesText) : null
        ].filter(Boolean)),
        h("div", { class: "cal-up-meta" }, [
          s && s.owner ? h("span", {
            class: "risk-owner-pill",
            title: s.owner,
            style: `background: hsl(${ownerHue} 55% 94%); color: hsl(${ownerHue} 40% 30%);`
          }, ownerInitials(s.owner)) : null,
          evStatusKey && evStatusKey !== "scheduled" ? h("span", {
            class: "cal-up-status",
            style: `color: ${dotColor}; border-color: ${dotColor}40;`
          }, EVENT_STATUS_LABELS[evStatusKey] || evStatusKey) : null,
          h("span", { class: "cal-up-kind" }, kindLabel)
        ].filter(Boolean))
      ]);
      list.appendChild(row);
    });
    upWrap.appendChild(list);
  }
  main.appendChild(upWrap);
}

/* ============================================================================
   CONTEXT MENU + EDIT MODALS
   ============================================================================ */
function showContextMenu(x, y, items) {
  const menu = $("#ctx-menu");
  if (!menu) return;
  menu.innerHTML = "";
  items.forEach(item => {
    if (item.sep) {
      menu.appendChild(h("div", { class: "ctx-sep" }));
      return;
    }
    menu.appendChild(h("button", {
      class: item.danger ? "is-danger" : "",
      onclick: (e) => {
        e.stopPropagation();
        hideContextMenu();
        item.onClick && item.onClick();
      }
    }, [
      h("span", {}, item.label),
      item.kbd ? h("span", { class: "ctx-kbd" }, item.kbd) : null
    ].filter(Boolean)));
  });
  menu.classList.add("is-visible");
  menu.setAttribute("aria-hidden", "false");
  requestAnimationFrame(() => {
    const r = menu.getBoundingClientRect();
    const pad = 6;
    let left = x, top = y;
    if (left + r.width > window.innerWidth - pad) left = window.innerWidth - r.width - pad;
    if (top + r.height > window.innerHeight - pad) top = window.innerHeight - r.height - pad;
    if (left < pad) left = pad;
    if (top < pad) top = pad;
    menu.style.left = left + "px";
    menu.style.top = top + "px";
  });
}

function hideContextMenu() {
  const menu = $("#ctx-menu");
  if (!menu) return;
  menu.classList.remove("is-visible");
  menu.setAttribute("aria-hidden", "true");
}

/* ---------- Task editor ---------- */
function openTaskEditor(taskId) {
  const t = TASK_INDEX[taskId];
  const s = STATE[taskId];
  if (!t || !s) return;
  const form = h("div", { class: "edit-form" });

  const titleIn = h("input", { type: "text", value: getTitle(t, s) });
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Title"),
    titleIn
  ]));

  const descIn = h("textarea", {}, getDesc(t, s));
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Description"),
    descIn
  ]));

  const statusIn = h("select", {},
    Object.entries(STATUS_LABELS).map(([v, label]) =>
      h("option", v === s.status ? { value: v, selected: true } : { value: v }, label)));
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Status"),
    statusIn
  ]));

  const urgentIn = h("input", s.urgent ? { type: "checkbox", checked: true } : { type: "checkbox" });
  const priorityIn = h("input", s.priority === "priority" ? { type: "checkbox", checked: true } : { type: "checkbox" });
  form.appendChild(h("div", { class: "ef-row ef-inline" }, [
    h("label", { class: "ef-check" }, [urgentIn, h("span", {}, "Urgent")]),
    h("label", { class: "ef-check" }, [priorityIn, h("span", {}, "Priority")])
  ]));

  const ownerIn = h("input", { type: "text", value: s.owner || "", placeholder: "owner name" });
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Owner"),
    ownerIn
  ]));

  const startIn = h("input", { type: "date", value: s.startDate || "" });
  const endIn = h("input", { type: "date", value: s.dueDate || "" });
  form.appendChild(h("div", { class: "ef-dates" }, [
    h("div", { class: "ef-row" }, [h("label", { class: "ef-label" }, "Start date"), startIn]),
    h("div", { class: "ef-row" }, [h("label", { class: "ef-label" }, "Due / end date"), endIn])
  ]));

  // ---- Time of day (optional). Empty = all-day.
  const startTimeIn = h("input", { type: "time", value: s.startTime || "" });
  const endTimeIn = h("input", { type: "time", value: s.endTime || "" });
  const allDayHint = h("div", {
    style: "font-size:11px;color:var(--muted);margin-top:-2px;"
  }, (s.startTime || s.endTime)
      ? "Has a time — shown at this slot in Day / Week views, with the time prefix in Month."
      : "All-day task — shown pinned at the top of Day / Week views, no time prefix.");
  const updateAllDayHint = () => {
    allDayHint.textContent = (startTimeIn.value || endTimeIn.value)
      ? "Has a time — shown at this slot in Day / Week views, with the time prefix in Month."
      : "All-day task — shown pinned at the top of Day / Week views, no time prefix.";
  };
  startTimeIn.addEventListener("change", updateAllDayHint);
  endTimeIn.addEventListener("change", updateAllDayHint);
  form.appendChild(h("div", { class: "ef-dates" }, [
    h("div", { class: "ef-row" }, [h("label", { class: "ef-label" }, "Start time"), startTimeIn]),
    h("div", { class: "ef-row" }, [h("label", { class: "ef-label" }, "End time"), endTimeIn])
  ]));
  form.appendChild(makeTimePair(startTimeIn, endTimeIn, { onChange: updateAllDayHint }));
  form.appendChild(allDayHint);

  // Repeats: cadence dropdown — anchored on the Start date.
  const repeatIn = h("select", {});
  const fillRepeatLabels = () => {
    const anchor = startIn.value || s.startDate || "";
    const cur = repeatIn.value || s.repeat || "none";
    repeatIn.innerHTML = "";
    REPEAT_OPTIONS.forEach(opt => {
      repeatIn.appendChild(h("option",
        opt === cur ? { value: opt, selected: true } : { value: opt },
        repeatOptionLabel(opt, anchor)));
    });
  };
  fillRepeatLabels();
  startIn.addEventListener("change", fillRepeatLabels);
  const repeatHint = h("div", {
    style: "font-size:11px;color:var(--muted);margin-top:-2px;"
  }, s.repeat && s.repeat !== "none"
      ? "Calendar shows one pill per occurrence inside the date range. Each occurrence has its own status + notes."
      : "Pick a cadence to make this a recurring task — every day, every week (on the Start day), every 2 weeks, or monthly on the same day-of-month.");
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Repeats"), repeatIn
  ]));
  form.appendChild(repeatHint);
  repeatIn.addEventListener("change", () => {
    const v = repeatIn.value;
    repeatHint.textContent = (v && v !== "none")
      ? "Calendar shows one pill per occurrence inside the date range. Each occurrence has its own status + notes."
      : "Pick a cadence to make this a recurring task — every day, every week (on the Start day), every 2 weeks, or monthly on the same day-of-month.";
  });

  const notesIn = h("textarea", {}, s.notes || "");
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Notes"),
    notesIn
  ]));

  const save = h("button", {
    class: "btn btn-primary",
    onclick: async () => {
      const nextTitle = titleIn.value.trim();
      const nextDesc = descIn.value.trim();
      s.titleOverride = (nextTitle && nextTitle !== t.title) ? nextTitle : "";
      s.descOverride = (nextDesc && nextDesc !== (t.desc || "")) ? nextDesc : "";
      s.status = statusIn.value;
      s.urgent = !!urgentIn.checked;
      s.priority = priorityIn.checked ? "priority" : null;
      s.owner = ownerIn.value.trim();
      const start = startIn.value;
      const end = endIn.value;
      if (start && end && start > end) { s.startDate = end; s.dueDate = start; }
      else {
        s.startDate = (start && end && start !== end) ? start : "";
        s.dueDate = end || start || "";
      }
      s.repeat = repeatIn.value;
      s.repeatDay = null; // legacy field — cadence is now derived from Start date
      const newStartTime = startTimeIn.value || "";
      const newEndTime = endTimeIn.value || "";
      const timeChanged = (s.startTime || "") !== newStartTime || (s.endTime || "") !== newEndTime;
      s.startTime = newStartTime;
      s.endTime = newEndTime;
      // Saving a task-level time wipes any per-occurrence overrides — acts as
      // the "apply to all occurrences" path (per the user's bulk-edit ask).
      if (timeChanged && STATE.__occurrenceTimes) {
        Object.keys(STATE.__occurrenceTimes).forEach(k => {
          if (k.startsWith("task:" + t.id + ":")) delete STATE.__occurrenceTimes[k];
        });
      }
      s.notes = notesIn.value;
      s.updated = new Date().toISOString();
      await saveState();
      closeModal();
      renderShell();
      toast("Saved");
    }
  }, "Save");
  const cancel = h("button", { class: "btn btn-outline", onclick: closeModal }, "Cancel");

  form.appendChild(h("div", { class: "ef-footer" }, [
    h("div", { class: "spacer" }),
    cancel, save
  ]));

  openModal({ title: "Edit task", body: form });
}

  ]));

  const reset = h("button", {
    class: "btn btn-outline",

      if (STATE.__overrides?.phases) delete STATE.__overrides.phases[phaseId];
      await saveState();
      closeModal();
      renderShell();
      toast("Reset");
    }
  }, "Reset to default");
  const save = h("button", {
    class: "btn btn-primary",
    onclick: async () => {
      STATE.__overrides = STATE.__overrides || {};
      STATE.__overrides.phases = STATE.__overrides.phases || {};
      const entry = {};
      if (numIn.value.trim() && numIn.value.trim() !== p.num) entry.num = numIn.value.trim();
      if (winIn.value.trim() !== (p.window || "")) entry.window = winIn.value.trim();
      if (titleIn.value.trim() && titleIn.value.trim() !== p.title) entry.title = titleIn.value.trim();
      if (descIn.value !== (p.desc || "")) entry.desc = descIn.value;
      if (Object.keys(entry).length === 0) delete STATE.__overrides.phases[phaseId];
      else STATE.__overrides.phases[phaseId] = entry;

/* ---------- Custom task creator ---------- */
function openNewTaskEditor(opts) {
  // opts: { phaseId?, groupId?, prefillStart?, prefillEnd? }
  // If phaseId/groupId are missing, user picks them from dropdowns.
  const form = h("div", { class: "edit-form" });

  // Quick link to switch to a milestone instead. Recurring used to be a
  // separate kind — it's now a "Repeats" option on the task itself (below).
  form.appendChild(h("div", { class: "ef-kind-switch" }, [
    h("span", { class: "ef-kind-label" }, "Creating a task."),
    h("button", {
      class: "ef-kind-link",
      onclick: () => {
        closeModal();
        openNewMilestoneEditor(opts.prefillStart || opts.prefillEnd);
      }
    }, "Make it a milestone →")
  ]));

  const titleIn = h("input", { type: "text", value: "", placeholder: "Task title" });
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Title"), titleIn
  ]));

  const descIn = h("textarea", { placeholder: "Description (optional)" }, "");
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Description"), descIn
  ]));

  // Phase + group pickers
  const phaseSelect = h("select", {});
  const fillPhases = (preferId) => {
    phaseSelect.innerHTML = "";
    effectivePhases().forEach(p => {
      const sel = (preferId || opts.phaseId) === p.id;
      phaseSelect.appendChild(h("option",
        sel ? { value: p.id, selected: true } : { value: p.id },
        `${p.num} — ${p.title}`));
    });
  };
  fillPhases();
  const groupSelect = h("select", {});
  const fillGroups = (preferId) => {
    groupSelect.innerHTML = "";
    const pid = phaseSelect.value;
    const p = effectivePhases().find(x => x.id === pid);
    if (!p) return;
    p.groups.forEach(g => {
      const sel = preferId
        ? g.id === preferId
        : (opts.groupId === g.id && opts.phaseId === pid);
      groupSelect.appendChild(h("option",
        sel ? { value: g.id, selected: true } : { value: g.id },
        g.title));
    });
  };
  fillGroups();
  phaseSelect.addEventListener("change", () => fillGroups());

  const phaseAddBtn = h("button", {
    type: "button",
    class: "ef-add-btn",
    title: "Create a new phase",
    onclick: () => startInlinePhaseCreate(phaseSelect, phaseAddBtn, fillPhases, fillGroups),
    html: ICONS.plus
  });
  const groupAddBtn = h("button", {
    type: "button",
    class: "ef-add-btn",
    title: "Create a new group in this phase",
    onclick: () => {
      if (!phaseSelect.value) { toast("Pick a phase first"); return; }
      startInlineGroupCreate(groupSelect, groupAddBtn, phaseSelect.value, fillGroups);
    },
    html: ICONS.plus
  });

  form.appendChild(h("div", { class: "ef-dates" }, [
    h("div", { class: "ef-row" }, [
      h("label", { class: "ef-label" }, "Phase"),
      h("div", { class: "ef-select-with-add" }, [phaseSelect, phaseAddBtn])
    ]),
    h("div", { class: "ef-row" }, [
      h("label", { class: "ef-label" }, "Group"),
      h("div", { class: "ef-select-with-add" }, [groupSelect, groupAddBtn])
    ])
  ]));

  const statusIn = h("select", {},
    Object.entries(STATUS_LABELS).map(([v, label]) => h("option", { value: v }, label)));
  const urgentIn = h("input", { type: "checkbox" });
  const priorityIn = h("input", { type: "checkbox" });
  form.appendChild(h("div", { class: "ef-row ef-inline" }, [
    h("label", { class: "ef-check" }, [urgentIn, h("span", {}, "Urgent")]),
    h("label", { class: "ef-check" }, [priorityIn, h("span", {}, "Priority")]),
    h("div", { style: "flex:1" }),
    h("label", { class: "ef-label", style: "margin-right:6px" }, "Status"),
    statusIn
  ]));

  const ownerIn = h("input", { type: "text", value: "", placeholder: "owner name" });
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Owner"), ownerIn
  ]));

  const startIn = h("input", { type: "date", value: opts.prefillStart || "" });
  const endIn = h("input", { type: "date", value: opts.prefillEnd || opts.prefillStart || "" });
  form.appendChild(h("div", { class: "ef-dates" }, [
    h("div", { class: "ef-row" }, [h("label", { class: "ef-label" }, "Start date"), startIn]),
    h("div", { class: "ef-row" }, [h("label", { class: "ef-label" }, "Due / end date"), endIn])
  ]));

  // Repeats — single dropdown anchored on the Start date below.
  const repeatIn = h("select", {});
  const fillRepeatLabels = () => {
    const anchor = startIn.value || opts.prefillStart || "";
    const cur = repeatIn.value || opts.prefillRepeat || "none";
    repeatIn.innerHTML = "";
    REPEAT_OPTIONS.forEach(opt => {
      repeatIn.appendChild(h("option",
        opt === cur ? { value: opt, selected: true } : { value: opt },
        repeatOptionLabel(opt, anchor)));
    });
  };
  fillRepeatLabels();
  startIn.addEventListener("change", fillRepeatLabels);
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Repeats"), repeatIn
  ]));

  const notesIn = h("textarea", { placeholder: "Notes (optional)" }, "");
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Notes"), notesIn
  ]));

  const create = h("button", {
    class: "btn btn-primary",
    onclick: async () => {
      const title = titleIn.value.trim();
      if (!title) { toast("Title required"); return; }
      const id = "ct-" + (Date.now().toString(36)) + "-" + Math.floor(Math.random() * 10000).toString(36);
      const phaseId = phaseSelect.value;
      const groupId = groupSelect.value;
      STATE.__customTasks = STATE.__customTasks || [];
      STATE.__customTasks.push({ id, phaseId, groupId, title, desc: descIn.value.trim() });
      rebuildTaskIndex();
      const t = TASK_INDEX[id];
      STATE[id] = defaultTaskState(t);
      STATE[id].status = statusIn.value;
      STATE[id].urgent = !!urgentIn.checked;
      STATE[id].priority = priorityIn.checked ? "priority" : null;
      STATE[id].owner = ownerIn.value.trim();
      const start = startIn.value, end = endIn.value;
      if (start && end && start > end) { STATE[id].startDate = end; STATE[id].dueDate = start; }
      else {
        STATE[id].startDate = (start && end && start !== end) ? start : "";
        STATE[id].dueDate = end || start || "";
      }
      STATE[id].repeat = repeatIn.value;
      STATE[id].repeatDay = null; // legacy — cadence anchors on Start date
      STATE[id].notes = notesIn.value;
      STATE[id].updated = new Date().toISOString();
      UI.openPhases[phaseId] = true;
      saveUI();
      await saveState();
      closeModal();
      renderShell();
      toast("Task added");
    }
  }, "Create task");
  const cancel = h("button", { class: "btn btn-outline", onclick: closeModal }, "Cancel");

  form.appendChild(h("div", { class: "ef-footer" }, [h("div", { class: "spacer" }), cancel, create]));
  openModal({ title: "New task", body: form });
}

          toast("Moved");

            if (r) { setView("calendar"); UI.calMonth = r.start.slice(0, 7); saveUI(); renderMain(); }
            else { toast("Not scheduled"); }
          }
        },

/* Lightweight modal for adding a status + notes update to any event. */
function openEventUpdateModal(ev, dateStr) {
  let title;
  if (ev.kind === "task") {
    const t = TASK_INDEX[ev.taskId];
    const s = STATE[ev.taskId];
    title = getTitle(t, s);
  } else if (ev.kind === "milestone") {
    title = MILESTONES[ev.milestoneIndex]?.title || "Milestone";
  } else if (ev.kind === "recurring") {
    title = (RECURRING[ev.recurringIndex]?.title || "Recurring") + " — " + fmtDateShort(dateStr);
  }
  const meta = eventStatusMeta(ev, dateStr);
  const notes = eventNotes(ev, dateStr);
  // Decide status set: a non-repeating task uses the task lifecycle;
  // milestones, legacy-recurring, and repeat-task occurrences all use the
  // event lifecycle (Scheduled / Flagged / Completed / Cancelled).
  const useTaskStatus = ev.kind === "task" && !ev.isRepeatOccurrence;
  const cycleSet = useTaskStatus ? STATUS_CYCLE : EVENT_STATUS_CYCLE;

  const form = h("div", { class: "edit-form" });

  // Editing a task occurrence — let the user jump to the full task editor.
  if (ev.kind === "task") {
    form.appendChild(h("div", { class: "ef-kind-switch" }, [
      h("span", { class: "ef-kind-label" },
        ev.isRepeatOccurrence
          ? "Updating this occurrence only."
          : "Quick status / notes."),
      h("button", {
        class: "ef-kind-link",
        onclick: () => { closeModal(); openTaskEditor(ev.taskId); }
      }, "Edit the underlying task →")
    ]));
  }

  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Status"),
    h("div", { class: "event-status-row" },
      cycleSet.map(s => {
        const isOn = s === meta.key;
        const color = useTaskStatus
          ? (({ not_started: "var(--ink-3)", in_progress: "var(--info)", complete: "var(--leaf)", blocked: "var(--blocked)" })[s])
          : EVENT_STATUS_COLORS[s];
        const label = useTaskStatus ? (STATUS_LABELS[s] || s) : EVENT_STATUS_LABELS[s];
        return h("button", {
          class: "event-status-btn" + (isOn ? " is-on" : ""),
          style: isOn
            ? `background: ${color}; color: white; border-color: ${color};`
            : `color: ${color}; border-color: ${color}40;`,
          onclick: async () => {
            await setEventStatus(ev, dateStr, s);
            // Re-render the modal in place
            closeModal(); openEventUpdateModal(ev, dateStr);
          }
        }, label);
      })
    )
  ]));

  // Time inputs — for milestones edits the milestone directly, for tasks /
  // recurring edits the per-occurrence override (or the task itself when
  // not a repeat occurrence).
  const evCurTimes = eventTimes(ev, dateStr);
  const upStart = h("input", { type: "time", value: evCurTimes.startTime || "" });
  const upEnd = h("input", { type: "time", value: evCurTimes.endTime || "" });
  form.appendChild(h("div", { class: "ef-dates" }, [
    h("div", { class: "ef-row" }, [h("label", { class: "ef-label" }, "Start time"), upStart]),
    h("div", { class: "ef-row" }, [h("label", { class: "ef-label" }, "End time"), upEnd])
  ]));
  form.appendChild(makeTimePair(upStart, upEnd));
  form.appendChild(h("div", {
    style: "font-size:11px;color:var(--muted);margin-top:-2px;"
  }, ev.isRepeatOccurrence
      ? "This occurrence only — leaves other occurrences untouched."
      : (ev.kind === "task"
          ? "Applies to this task. Leave blank for an all-day task."
          : "Leave blank for an all-day event.")));

  const notesArea = h("textarea", {
    class: "event-update-notes",
    placeholder: ev.isRepeatOccurrence
      ? `Notes for ${fmtDateShort(dateStr)} — what transpired this time…`
      : "What transpired? Decisions, follow-ups, who said what…"
  }, notes);
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" },
      ev.isRepeatOccurrence ? "Notes (this occurrence only)" : "Notes"),
    notesArea
  ]));

  const save = h("button", {
    class: "btn btn-primary",
    onclick: async () => {
      // Set time first; setEventTimes handles the per-occurrence vs task-level
      // routing based on ev.isRepeatOccurrence.
      const newStart = upStart.value || "";
      const newEnd = upEnd.value || "";
      const timeChanged = newStart !== (evCurTimes.startTime || "") ||
                          newEnd !== (evCurTimes.endTime || "");
      if (timeChanged) {
        await setEventTimes(ev, dateStr, newStart, newEnd, !ev.isRepeatOccurrence);
      }
      await setEventNotes(ev, dateStr, notesArea.value);
      closeModal();
      renderMain();
      toast("Update saved");
    }
  }, "Save update");
  const cancel = h("button", { class: "btn btn-outline", onclick: closeModal }, "Cancel");
  form.appendChild(h("div", { class: "ef-footer" }, [h("div", { class: "spacer" }), cancel, save]));

  openModal({ title: "Update · " + title, body: form });
}

/* Mobile/touch gesture for empty date cells:
 *   Tap        → does nothing (intentional — prevents accidental opens)
 *   Hold 500ms → openNewMilestoneEditor(dateStr) to create a new entry on that date
 * Desktop mouse interactions are unaffected. */
function attachMobileDateGestures(cell, dateStr) {
  if (!HAS_TOUCH) return;
  const HOLD_DELAY = 500;
  const MOVE_THRESHOLD = 12;
  let holdTimer = null;
  let touchActive = false;
  let startX = 0, startY = 0;

  cell.addEventListener("touchstart", (e) => {
    // Don't trigger on touches that started inside a pill — that pill has its own gesture handler.
    if (e.target.closest(".cal-event, .timed-pill")) return;
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    touchActive = true;
    holdTimer = setTimeout(() => {
      holdTimer = null;
      if (navigator.vibrate) { try { navigator.vibrate(35); } catch {} }
      openNewMilestoneEditor(dateStr);
    }, HOLD_DELAY);
  }, { passive: true });

  cell.addEventListener("touchmove", (e) => {
    const t = e.touches[0];
    if (!t) return;
    if (Math.hypot(t.clientX - startX, t.clientY - startY) > MOVE_THRESHOLD) {
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      touchActive = false;
    }
  }, { passive: true });

  cell.addEventListener("touchend", () => {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  }, { passive: true });

  cell.addEventListener("touchcancel", () => {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
    touchActive = false;
  });

  // On touch devices, always suppress the click that follows a tap so the
  // existing onclick (e.g. showScheduleModal) does not fire. The new entry is
  // created exclusively via the long-press timer above.
  cell.addEventListener("click", (e) => {
    if (touchActive) {
      e.stopPropagation();
      e.preventDefault();
      touchActive = false;
    }
  }, true);
}

/* Mobile/touch gestures for calendar pills:
 *   Tap (release < 500ms)              → show preview tooltip
 *   Hold (500–900ms then release)      → open editor
 *   Long-press (900ms+) then drag      → reschedule onto another date
 * Desktop mouse interactions (click/HTML5 drag) are unaffected. */
const HAS_TOUCH = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
function attachMobileCalGestures(el, ev, dateStr, edge, isDraggable) {
  if (!HAS_TOUCH) return;

  const EDIT_DELAY = 500;
  const DRAG_DELAY = 900;
  const MOVE_THRESHOLD = 12;

  let dragArmTimer = null;
  let inDragMode = false;
  let suppressClick = false;
  let startX = 0, startY = 0;
  let touchStartTs = 0;
  let ghost = null;
  let lastDropEl = null;
  let movedBeforeDrag = false;

  const clearHighlights = () => {
    document.querySelectorAll(".cal-day.is-drag-over, .timed-col-wrap.is-drag-over")
      .forEach(c => c.classList.remove("is-drag-over"));
  };
  const cleanup = () => {
    if (dragArmTimer) { clearTimeout(dragArmTimer); dragArmTimer = null; }
    if (ghost) { ghost.remove(); ghost = null; }
    el.classList.remove("is-drag-mobile");
    inDragMode = false;
    movedBeforeDrag = false;
    clearHighlights();
  };

  const openEditor = () => {
    hideEventTooltip();
    if (ev.kind === "task") {
      if (ev.isRepeatOccurrence) openEventUpdateModal(ev, dateStr);
      else openTaskEditor(ev.taskId);
    } else if (ev.kind === "milestone") {
      openMilestoneEditor(ev.milestoneIndex);
    } else if (ev.kind === "recurring") {
      openEventUpdateModal(ev, dateStr);
    }
  };

  el.addEventListener("touchstart", (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    touchStartTs = Date.now();
    suppressClick = false;
    movedBeforeDrag = false;

    if (isDraggable) {
      dragArmTimer = setTimeout(() => {
        inDragMode = true;
        hideEventTooltip();
        el.classList.add("is-drag-mobile");
        if (navigator.vibrate) { try { navigator.vibrate(35); } catch {} }
        const r = el.getBoundingClientRect();
        ghost = el.cloneNode(true);
        ghost.style.position = "fixed";
        ghost.style.left = (startX - r.width / 2) + "px";
        ghost.style.top  = (startY - r.height / 2) + "px";
        ghost.style.width = r.width + "px";
        ghost.style.opacity = "0.92";
        ghost.style.pointerEvents = "none";
        ghost.style.zIndex = "9999";
        ghost.style.boxShadow = "0 8px 24px rgba(0,0,0,0.18)";
        ghost.style.transform = "scale(1.04)";
        document.body.appendChild(ghost);
      }, DRAG_DELAY);
    }
  }, { passive: true });

  el.addEventListener("touchmove", (e) => {
    const t = e.touches[0];
    if (!t) return;
    const dx = t.clientX - startX, dy = t.clientY - startY;
    if (!inDragMode) {
      if (Math.hypot(dx, dy) > MOVE_THRESHOLD) {
        movedBeforeDrag = true;
        if (dragArmTimer) { clearTimeout(dragArmTimer); dragArmTimer = null; }
      }
      return;
    }
    e.preventDefault();
    if (ghost) {
      const r = el.getBoundingClientRect();
      ghost.style.left = (t.clientX - r.width / 2) + "px";
      ghost.style.top  = (t.clientY - r.height / 2) + "px";
      ghost.style.display = "none";
    }
    const target = document.elementFromPoint(t.clientX, t.clientY);
    if (ghost) ghost.style.display = "";
    const cell = target ? target.closest("[data-date]") : null;
    if (cell !== lastDropEl) {
      clearHighlights();
      if (cell) cell.classList.add("is-drag-over");
      lastDropEl = cell;
    }
  }, { passive: false });

  el.addEventListener("touchend", (e) => {
    const dt = Date.now() - touchStartTs;
    if (dragArmTimer) { clearTimeout(dragArmTimer); dragArmTimer = null; }

    if (inDragMode) {
      e.preventDefault();
      suppressClick = true;
      const tt = e.changedTouches[0];
      if (ghost) ghost.style.display = "none";
      const target = tt ? document.elementFromPoint(tt.clientX, tt.clientY) : null;
      const cell = target ? target.closest("[data-date]") : null;
      const targetDate = cell ? cell.getAttribute("data-date") : null;
      cleanup();
      if (targetDate && ev.taskId && targetDate !== dateStr) {
        dropTaskOnDate({
          taskId: ev.taskId,
          anchor: dateStr,
          start: ev.startDate,
          end: ev.dueDate,
          edge: edge || "single"
        }, targetDate);
      }
      return;
    }

    if (movedBeforeDrag) { cleanup(); return; }

    e.preventDefault();
    suppressClick = true;
    cleanup();

    if (dt < EDIT_DELAY) {
      showEventTooltip(el, ev, dateStr);
      setTimeout(hideEventTooltip, 4000);
    } else {
      openEditor();
    }
  }, { passive: false });

  el.addEventListener("touchcancel", cleanup);

  el.addEventListener("click", (e) => {
    if (suppressClick) {
      e.stopPropagation();
      e.preventDefault();
      suppressClick = false;
    }
  }, true);
}

function showEventTooltip(targetEl, ev, dateStr) {
  const tip = $("#cal-tooltip");
  if (!tip) return;
  tip.innerHTML = "";

  tip.appendChild(h("div", { class: "tt-title" }, ev.title));

  const meta = h("div", { class: "tt-meta-row" });
  let status = null;
  let taskRec = null;
  let stateRec = null;
  if (ev.kind === "milestone") {
    const typeMeta = MILESTONE_TYPE_META.find(t => t.key === ev.type);
    const pillLabel = ev.type === "critical"
      ? "Critical milestone"
      : (typeMeta ? typeMeta.label : "Milestone");
    const pillCls = typeMeta ? typeMeta.cls : "is-milestone";
    meta.appendChild(h("span", { class: "tt-pill " + pillCls }, pillLabel));
    const evMeta = eventStatusMeta(ev, dateStr);
    meta.appendChild(h("span", {
      class: "tt-pill",
      style: `background: ${evMeta.color}20; color: ${evMeta.color};`
    }, evMeta.label));
  } else if (ev.kind === "recurring") {
    meta.appendChild(h("span", { class: "tt-pill is-recurring" }, "Recurring"));
    const evMeta = eventStatusMeta(ev, dateStr);
    meta.appendChild(h("span", {
      class: "tt-pill",
      style: `background: ${evMeta.color}20; color: ${evMeta.color};`
    }, evMeta.label));
  } else if (ev.kind === "task") {
    stateRec = STATE[ev.taskId] || null;
    taskRec = TASK_INDEX[ev.taskId] || null;
    status = stateRec?.status;
    if (status) {
      meta.appendChild(h("span", { class: "tt-pill status-" + status },
        STATUS_LABELS[status] || status));
    }
    if (stateRec?.urgent) meta.appendChild(h("span", { class: "tt-pill is-urgent" }, "Urgent"));
    if (stateRec?.priority === "priority") meta.appendChild(h("span", { class: "tt-pill is-priority" }, "Priority"));
  }
  if (meta.children.length) tip.appendChild(meta);

  const desc = ev.desc || (taskRec ? getDesc(taskRec, stateRec) : "");
  if (desc) tip.appendChild(h("div", { class: "tt-desc" }, desc));

  if (ev.kind === "task" && stateRec) {
    const range = taskRange(stateRec);
    if (range) {
      const label = range.start === range.end
        ? fmtDate(range.start)
        : fmtDate(range.start) + " → " + fmtDate(range.end);
      tip.appendChild(h("div", { class: "tt-field" }, [
        h("span", { class: "tt-k" }, "Dates"),
        h("span", { class: "tt-v" }, label)
      ]));
    }
    if (stateRec.owner) {
      tip.appendChild(h("div", { class: "tt-field" }, [
        h("span", { class: "tt-k" }, "Owner"),
        h("span", { class: "tt-v" }, "@" + stateRec.owner)
      ]));
    }
    const bugs = stateRec.bugs || [];
    const openBugs = bugs.filter(b => b.status === "open" || b.status === "in_progress").length;
    if (openBugs > 0) {
      tip.appendChild(h("div", { class: "tt-field" }, [
        h("span", { class: "tt-k" }, "Bugs"),
        h("span", { class: "tt-v" }, `${openBugs} open / ${bugs.length} total`)
      ]));
    }
    if (stateRec.updated) {
      tip.appendChild(h("div", { class: "tt-field" }, [
        h("span", { class: "tt-k" }, "Updated"),
        h("span", { class: "tt-v" }, new Date(stateRec.updated).toLocaleString())
      ]));
    }
    if (stateRec.notes) {
      tip.appendChild(h("div", { class: "tt-notes" }, stateRec.notes));
    }
    if (taskRec) {
      const phase = PHASES.find(p => p.id === taskRec.phaseId);
      const group = phase ? phase.groups.find(g => g.id === taskRec.groupId) : null;
      const phaseLine = (phase ? `${phase.num} · ${phase.title}` : "")
        + (group ? " — " + group.title : "");
      if (phaseLine) tip.appendChild(h("div", { class: "tt-phase" }, phaseLine));
    }
    const isRange = !!range && range.start !== range.end;
    const edgeHint = isRange
      ? "Drag the start or end day to resize; middle days are locked. Click to open scheduler."
      : "Drag to move · Click to open scheduler";
    tip.appendChild(h("div", { class: "tt-hint" }, edgeHint));
  } else if (ev.kind === "milestone") {
    tip.appendChild(h("div", { class: "tt-field" }, [
      h("span", { class: "tt-k" }, "Date"),
      h("span", { class: "tt-v" }, fmtDate(ev.date))
    ]));
    const evNotes = eventNotes(ev, dateStr);
    if (evNotes) tip.appendChild(h("div", { class: "tt-notes" }, evNotes));
    tip.appendChild(h("div", { class: "tt-hint" }, "Right-click → Add update / notes"));
  } else if (ev.kind === "recurring") {
    const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    if (ev.dayOfWeek != null) {
      tip.appendChild(h("div", { class: "tt-field" }, [
        h("span", { class: "tt-k" }, "Cadence"),
        h("span", { class: "tt-v" }, "Every " + dayNames[ev.dayOfWeek])
      ]));
    }
    if (ev.startDate && ev.endDate) {
      tip.appendChild(h("div", { class: "tt-field" }, [
        h("span", { class: "tt-k" }, "Window"),
        h("span", { class: "tt-v" }, fmtDateShort(ev.startDate) + " → " + fmtDateShort(ev.endDate))
      ]));
    }
    const evNotes = eventNotes(ev, dateStr);
    if (evNotes) tip.appendChild(h("div", { class: "tt-notes" }, evNotes));
    tip.appendChild(h("div", { class: "tt-hint" }, "Right-click → Add update / notes for this date"));
  }

  tip.classList.add("is-visible");
  tip.setAttribute("aria-hidden", "false");
  // Position after layout so we can measure the content.
  const rect = targetEl.getBoundingClientRect();
  requestAnimationFrame(() => {
    const tr = tip.getBoundingClientRect();
    const pad = 8;
    let top = rect.bottom + 6;
    let left = rect.left;
    if (top + tr.height > window.innerHeight - pad) top = rect.top - tr.height - 6;
    if (top < pad) top = pad;
    if (left + tr.width > window.innerWidth - pad) left = window.innerWidth - tr.width - pad;
    if (left < pad) left = pad;
    tip.style.top = top + "px";
    tip.style.left = left + "px";
  });
}

function hideEventTooltip() {
  const tip = $("#cal-tooltip");
  if (!tip) return;
  tip.classList.remove("is-visible");
  tip.setAttribute("aria-hidden", "true");
}

// Date helpers for Day/Week views.
function startOfWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay()); // Sunday-start
  return d;
}
function ymdShift(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return ymd(d);
}
function weekRangeLabel(weekStart) {
  const end = new Date(weekStart); end.setDate(end.getDate() + 6);
  const startMonth = weekStart.toLocaleDateString("en-US", { month: "short" });
  const endMonth = end.toLocaleDateString("en-US", { month: "short" });
  if (startMonth === endMonth) {
    return `${startMonth} ${weekStart.getDate()} – ${end.getDate()}, ${end.getFullYear()}`;
  }
  return `${startMonth} ${weekStart.getDate()} – ${endMonth} ${end.getDate()}, ${end.getFullYear()}`;
}

// Hour-range and timed-event helpers shared by Day + Week views.
const TIMED_HOUR_START = 6;   // 6 AM
const TIMED_HOUR_END = 22;    // 10 PM
const TIMED_HOUR_COUNT = TIMED_HOUR_END - TIMED_HOUR_START; // 16
const HOUR_PX = 44;           // visual height of one hour row
function hhmmToHours(hhmm) {
  if (!hhmm) return null;
  const [h, m] = hhmm.split(":").map(n => parseInt(n, 10));
  if (isNaN(h)) return null;
  return h + (m || 0) / 60;
}
function eventTopAndHeight(startHHMM, endHHMM) {
  const startH = hhmmToHours(startHHMM);
  if (startH == null) return null;
  let endH = hhmmToHours(endHHMM);
  if (endH == null || endH <= startH) endH = startH + 0.75; // default 45-min slot
  const top = (Math.max(startH, TIMED_HOUR_START) - TIMED_HOUR_START) * HOUR_PX;
  const bottom = (Math.min(endH, TIMED_HOUR_END) - TIMED_HOUR_START) * HOUR_PX;
  return { top: Math.max(0, top), height: Math.max(20, bottom - top) };
}
// Render the all-day strip + hour grid for one day. Used by Day view directly
// and Week view per column.
function renderTimedDayColumn(dateStr, opts = {}) {
  const all = eventsOnDate(dateStr);
  const isToday = opts.todayStr === dateStr;
  const allDayEvents = [];
  const timedEvents = [];
  all.forEach(ev => {
    const t = eventTimes(ev, dateStr);
    if (t.startTime) {
      const pos = eventTopAndHeight(t.startTime, t.endTime);
      timedEvents.push({ ev, t, pos });
    } else {
      allDayEvents.push({ ev, t });
    }
  });
  // Ranged milestones (OOO, or any same-title adjacent-day grouping) surface
  // to the top of the all-day strip so the merged band sits above other pills.
  allDayEvents.sort((a, b) => {
    const aw = (a.ev.kind === "milestone" && (a.ev.isRange || a.ev.type === "ooo")) ? 0 : 1;
    const bw = (b.ev.kind === "milestone" && (b.ev.isRange || b.ev.type === "ooo")) ? 0 : 1;
    return aw - bw;
  });

  const oooActive = all.find(ev => ev.kind === "milestone" && ev.type === "ooo");
  const hasOOO = !!oooActive;
  // Any milestone range-start (native or virtual) opens column overflow for label floating
  const hasRangeStart = all.some(ev =>
    ev.kind === "milestone" && ev.isRange && ev.isStart && !ev.isEnd
  );
  const col = h("div", {
    class: "timed-col"
      + (isToday ? " is-today" : "")
      + (hasOOO ? " has-ooo" : "")
      + (hasRangeStart ? " has-range-start" : "")
  });

  // All-day strip
  const allDayStrip = h("div", { class: "timed-allday" });
  if (allDayEvents.length === 0) {
    allDayStrip.appendChild(h("div", { class: "timed-allday-empty" }, ""));
  } else {
    allDayEvents.forEach(({ ev, t }) => {
      allDayStrip.appendChild(makeTimedPill(ev, dateStr, t, "allday"));
    });
  }
  col.appendChild(allDayStrip);

  // Hour grid with timed events absolutely positioned
  const grid = h("div", { class: "timed-grid", "data-date": dateStr });
  for (let i = 0; i < TIMED_HOUR_COUNT; i++) {
    const slot = h("div", { class: "timed-slot" });
    const hourAtSlot = TIMED_HOUR_START + i;
    slot.addEventListener("click", () => {
      // Click an empty slot → open schedule modal pre-anchored to that hour.
      // For now, just open the schedule modal for the day.
      showScheduleModal(dateStr);
    });
    grid.appendChild(slot);
  }
  // Now the timed events as absolutely-positioned children
  timedEvents.forEach(({ ev, t, pos }) => {
    if (!pos) return;
    const pill = makeTimedPill(ev, dateStr, t, "timed");
    pill.style.top = pos.top + "px";
    pill.style.height = pos.height + "px";
    grid.appendChild(pill);
  });
  col.appendChild(grid);

  // "Now" indicator if today
  if (isToday) {
    const now = new Date();
    const nowH = now.getHours() + now.getMinutes() / 60;
    if (nowH >= TIMED_HOUR_START && nowH <= TIMED_HOUR_END) {
      const nowLine = h("div", { class: "timed-now" });
      nowLine.style.top = ((nowH - TIMED_HOUR_START) * HOUR_PX) + "px";
      grid.appendChild(nowLine);
    }
  }

  return col;
}

// Build the visual pill for a timed/all-day event in the day/week views.
// True if `times.endTime` (or startTime, if no end) on today has already passed.
// Returns false for past/future dates and all-day events.
function isEventTimePast(times, dateStr, todayStr) {
  if (dateStr !== todayStr) return false;
  const boundary = times && (times.endTime || times.startTime);
  if (!boundary) return false;
  const [H, M] = boundary.split(":").map(Number);
  if (Number.isNaN(H)) return false;
  const now = new Date();
  return (now.getHours() * 60 + now.getMinutes()) > (H * 60 + (M || 0));
}

function makeTimedPill(ev, dateStr, times, mode) {
  let cls = "timed-pill";
  if (ev.kind === "milestone") {
    cls += " " + (MILESTONE_TYPE_CLS[ev.type] || "is-milestone");
  }
  if (ev.kind === "recurring") cls += " is-recurring";
  if (ev.kind === "task" && ev.complete) cls += " is-complete";
  if (mode === "allday") cls += " is-allday";
  // Multi-day range classes mirror the month-view convention so CSS can
  // connect pills across columns with negative margins + hide labels
  // on end/mid cells, centering the label across the boundary.
  if (ev.isRange) {
    if (ev.isStart) cls += " is-range-start";
    if (ev.isEnd) cls += " is-range-end";
    if (ev.isMid) cls += " is-range-locked";
  }
  const todayStrLocal = ymd(new Date());
  if (dateStr < todayStrLocal) cls += " is-past";
  else if (isEventTimePast(times, dateStr, todayStrLocal)) cls += " is-past-today";
  const evMeta = eventStatusMeta(ev, dateStr);
  if (evMeta && evMeta.key === "completed") cls += " is-status-completed";
  if (evMeta && evMeta.key === "cancelled") cls += " is-status-cancelled";
  const pill = h("div", {
    class: cls,
    onclick: (e) => {
      e.stopPropagation();
      hideEventTooltip();
      if (ev.kind === "task") {
        if (ev.isRepeatOccurrence) openEventUpdateModal(ev, dateStr);
        else openTaskEditor(ev.taskId);
      } else if (ev.kind === "milestone") {
        openMilestoneEditor(ev.milestoneIndex);
      } else {
        openEventUpdateModal(ev, dateStr);
      }
    },
    onmouseenter: (e) => showEventTooltip(e.currentTarget, ev, dateStr),
    onmouseleave: hideEventTooltip,
    oncontextmenu: (e) => {
      e.preventDefault();
      e.stopPropagation();
      hideEventTooltip();
      if (ev.kind === "task" && ev.taskId) openTaskContextMenu(e.clientX, e.clientY, ev.taskId);
      else if (ev.kind === "milestone") openMilestoneContextMenu(e.clientX, e.clientY, ev.milestoneIndex, dateStr);
      else if (ev.kind === "recurring") openRecurringContextMenu(e.clientX, e.clientY, ev.recurringIndex, dateStr);
    }
  });
  if (mode === "timed" && times.startTime) {
    pill.appendChild(h("div", { class: "timed-pill-time" },
      fmtTimeRange(times.startTime, times.endTime)));
  }
  // All-day milestone pills wrap title in .evt-inner so CSS can float the
  // label across a range boundary (matches month-view convention — works for
  // OOO, Focus, Lunch, and any other same-title adjacent-day grouping).
  if (mode === "allday" && ev.kind === "milestone") {
    pill.appendChild(h("span", { class: "evt-inner" }, ev.title));
  } else {
    pill.appendChild(h("div", { class: "timed-pill-title" }, ev.title));
  }
  // Mobile: tap=preview, hold=edit, long-press=drag-to-move
  attachMobileCalGestures(pill, ev, dateStr, "single", ev.kind === "task" && !!ev.taskId);
  return pill;
}

// Day view — single column with all-day strip + hour grid
function renderTimedDay(dateStr, todayStr) {
  const wrap = h("div", { class: "timed-view timed-view-day" });
  const labels = h("div", { class: "timed-labels" });
  labels.appendChild(h("div", { class: "timed-labels-col-spacer" }));
  labels.appendChild(h("div", { class: "timed-labels-allday" }, "All day"));
  for (let h_ = TIMED_HOUR_START; h_ < TIMED_HOUR_END; h_++) {
    const hh = h_ === 0 ? 12 : (h_ > 12 ? h_ - 12 : h_);
    labels.appendChild(h("div", { class: "timed-hour-label" },
      `${hh} ${h_ < 12 ? "AM" : "PM"}`));
  }
  wrap.appendChild(labels);
  // Date header
  const colWrap = h("div", { class: "timed-col-wrap", "data-date": dateStr });
  attachMobileDateGestures(colWrap, dateStr);
  const d = new Date(dateStr + "T00:00:00");
  colWrap.appendChild(h("div", {
    class: "timed-col-header" + (dateStr === todayStr ? " is-today" : "")
  }, [
    h("span", { class: "timed-col-dow" }, d.toLocaleDateString("en-US", { weekday: "short" })),
    h("span", { class: "timed-col-num" }, String(d.getDate()))
  ]));
  colWrap.appendChild(renderTimedDayColumn(dateStr, { todayStr }));
  wrap.appendChild(colWrap);
  return wrap;
}

// Week view — 7 columns with shared all-day strip + hour grid
function renderTimedWeek(weekStart, todayStr) {
  const wrap = h("div", { class: "timed-view timed-view-week" });

  for (let h_ = TIMED_HOUR_START; h_ < TIMED_HOUR_END; h_++) {
