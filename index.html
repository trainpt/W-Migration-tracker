<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wonderful Citrus · PickTrace 3.0 Migration Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   Design tokens — warm, editorial, Wonderful-inspired
   ========================================================== */
:root {
  --bg: #F7F3EC;
  --bg-2: #FBF8F3;
  --bg-3: #F1ECE2;
  --surface: #FFFFFF;
  --ink: #1A1D23;
  --ink-2: #3D4148;
  --ink-3: #6B6860;
  --muted: #9A948A;
  --line: #E9E3D6;
  --line-2: #D6CFC2;
  --citrus: #E8763A;
  --citrus-deep: #C95D26;
  --citrus-soft: #FBE8D8;
  --citrus-glow: rgba(232,118,58,0.14);
  --leaf: #4A7C59;
  --leaf-soft: #E1EBE3;
  --sun: #D97706;
  --sun-soft: #FCEBD3;
  --danger: #B23A48;
  --danger-soft: #F8DFE2;
  --blocked: #735785;
  --blocked-soft: #EADFF0;
  --info: #3E6F9A;
  --info-soft: #E5EEF5;
  --font-display: "Fraunces", "Iowan Old Style", Georgia, serif;
  --font-body: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-pill: 999px;
  --shadow-sm: 0 1px 2px rgba(26,29,35,0.04);
  --shadow-md: 0 4px 14px rgba(26,29,35,0.07);
  --shadow-lg: 0 16px 40px rgba(26,29,35,0.10);
  --ring: 0 0 0 3px rgba(232,118,58,0.22);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; overscroll-behavior: none; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, a:focus-visible {
  outline: none;
  box-shadow: var(--ring);
  border-radius: var(--radius-sm);
}
input, textarea, select { font: inherit; color: inherit; }
a { color: var(--citrus-deep); text-decoration: none; }
a:hover { color: var(--citrus); text-decoration: underline; }
::selection { background: var(--citrus); color: white; }

/* ==========================================================
   App shell
   ========================================================== */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: 72px 1fr;
  grid-template-areas: "topbar topbar" "sidebar main";
  min-height: 100vh;
}

/* ---------- Topbar ---------- */
.topbar {
  grid-area: topbar;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 50;
  will-change: transform;
}
.brand { display: flex; align-items: center; gap: 11px; }
.brand-mark {
  display: inline-block;
  height: 80px;
  width: auto;
  margin: -8px 0;
  color: var(--citrus-deep);
  flex-shrink: 0;
  line-height: 0;
  /* Mouse-tracked tilt. Transform is set dynamically in JS; the
     transition smooths jitter and makes the rest pose look natural. */
  transform: perspective(420px) rotateY(0deg) rotateX(0deg);
  transform-origin: 50% 50%;
  transition: transform 0.18s ease-out;
  will-change: transform;
}
.brand-mark svg {
  height: 100%;
  width: auto;
  display: block;
}
.brand-text {
  font-family: var(--font-display);
  font-weight: 600; font-size: 17px;
  letter-spacing: -0.015em; line-height: 1;
}
.brand-sub {
  display: block;
  font-family: var(--font-body);
  font-size: 10px; font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-top: 4px;
}
.topbar-spacer { flex: 1; }
.topbar-tabs {
  display: flex;
  align-self: stretch;
  align-items: stretch;
  gap: 0;
  margin-left: 8px;
}
.topbar-tabs .view-tab {
  padding: 0 16px;
  height: auto;
  border-radius: 0;
  font-size: 13px;
  display: inline-flex; align-items: center; gap: 7px;
}
.topbar-tabs .view-tab.is-active::after {
  bottom: 0;
  left: 12px;
  right: 12px;
}
.countdown {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: var(--radius-pill);
  background: var(--citrus-soft); color: var(--citrus-deep);
  font-size: 12px; font-weight: 500;
}
.countdown b {
  font-family: var(--font-display); font-weight: 600;
  font-size: 14px; font-variant-numeric: tabular-nums;
}
.topbar-actions { display: flex; gap: 6px; align-items: center; }

/* ---------- Mobile hamburger + slide-down menu ---------- */
.topbar-hamburger {
  display: none;
  align-items: center; justify-content: center;
  width: 44px; height: 44px;
  border-radius: var(--radius-sm);
  color: var(--ink);
  background: transparent;
  border: 1px solid var(--line-2);
  flex-shrink: 0;
  margin-left: auto;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}
.topbar-hamburger:hover,
.topbar-hamburger.is-open {
  background: var(--citrus-soft);
  color: var(--citrus-deep);
  border-color: var(--citrus);
}
.topbar-hamburger svg { display: block; }
.mobile-menu {
  display: none;
  position: fixed;
  top: 56px;
  left: 0; right: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  box-shadow: var(--shadow-lg);
  padding: 14px 16px 18px;
  z-index: 49;
  max-height: calc(100vh - 56px);
  overflow-y: auto;
  overscroll-behavior: contain;
}
.mobile-menu.is-open { display: block; }
.mobile-menu-section {
  display: flex; flex-direction: column; gap: 6px;
  padding: 8px 0;
}
.mobile-menu-section + .mobile-menu-section {
  border-top: 1px solid var(--line);
  padding-top: 12px;
  margin-top: 4px;
}
.mobile-menu-heading {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
  padding: 0 4px 4px;
}
.mobile-menu .view-tab,
.mobile-menu .btn,
.mobile-menu .nav-link {
  width: 100%;
  min-height: 44px;
  font-size: 15px;
  padding: 10px 12px;
  justify-content: flex-start;
  border-radius: var(--radius-sm);
}
.mobile-menu .view-tab.is-active::after { display: none; }
.mobile-menu .view-tab.is-active {
  background: var(--citrus-soft);
  color: var(--citrus-deep);
  font-weight: 600;
}
.mobile-menu .countdown {
  align-self: flex-start;
  font-size: 13px;
  padding: 8px 14px;
}


.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500;
  transition: all 0.15s ease;
}
.btn-outline {
  border: 1px solid var(--line-2);
  background: var(--surface);
  color: var(--ink-2);
}
.btn-outline:hover { border-color: var(--citrus); color: var(--citrus-deep); background: var(--citrus-soft); }
.btn-ghost { color: var(--ink-3); }
.btn-ghost:hover { color: var(--citrus-deep); background: var(--citrus-soft); }
.btn-primary {
  background: var(--ink);
  color: white;
  padding: 8px 14px;
}
.btn-primary:hover { background: var(--citrus-deep); }
.btn-danger {
  background: var(--danger-soft);
  color: var(--danger);
}
.btn-danger:hover { background: var(--danger); color: white; }

.lock-indicator {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 500;
  background: var(--leaf-soft); color: var(--leaf);
}
.lock-indicator.is-locked { background: var(--sun-soft); color: var(--sun); }

/* ---------- Sidebar ---------- */
.sidebar {
  grid-area: sidebar;
  background: var(--surface);
  border-right: 1px solid var(--line);
  padding: 20px 14px;
  overflow-y: auto;
  overscroll-behavior: none;
  position: sticky;
  top: 72px;
  height: calc(100vh - 72px);
  /* Column layout so the Summary block can pin to the bottom via margin-top:auto */
  display: flex;
  flex-direction: column;
  min-height: 0;
}
/* The sidebar divider right before Summary becomes the push-to-bottom anchor. */
.sidebar > .sidebar-divider { margin-top: auto; }
.sidebar-heading {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
  padding: 0 8px 8px;
}
.phase-group-header {
  display: flex; align-items: center;
  gap: 4px;
  padding: 6px 4px 6px 6px;
  margin-top: 6px;
  border-radius: var(--radius-sm);
}
.phase-group-header:hover { background: var(--bg-3); }
.phase-group-toggle {
  flex: 1 1 auto;
  display: flex; align-items: center; gap: 6px;
  padding: 2px 4px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  text-align: left;
  background: transparent; border: 0; cursor: pointer;
  min-width: 0;
}
.phase-group-toggle:hover { color: var(--ink); }
.phase-group-chevron {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px;
  color: var(--muted);
  transition: transform 0.15s ease;
}
.phase-group-header:not(.is-collapsed) .phase-group-chevron { transform: rotate(90deg); }
.phase-group-title {
  flex: 1 1 auto;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.phase-group-add, .phase-group-menu {
  flex: 0 0 auto;
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  padding: 0;
  font-size: 13px; line-height: 1;
  color: var(--muted);
  background: transparent; border: 0; border-radius: 4px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.12s ease, background 0.12s ease, color 0.12s ease;
}
.phase-group-header:hover .phase-group-add,
.phase-group-header:hover .phase-group-menu { opacity: 1; }
.phase-group-add:hover, .phase-group-menu:hover { background: var(--bg-1); color: var(--ink); }
.phase-group-add svg { width: 13px; height: 13px; }
.phase-group-empty {
  padding: 4px 10px 8px 28px;
  font-size: 11px; color: var(--muted); font-style: italic;
}
.nav-link.nav-link-grouped { padding-left: 22px; }
.phase-group-new {
  display: flex; align-items: center; gap: 8px;
  width: 100%;
  padding: 8px 10px;
  margin-top: 8px;
  font-size: 12px; font-weight: 500;
  color: var(--muted);
  background: transparent;
  border: 1px dashed var(--line);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s ease;
}
.phase-group-new:hover { color: var(--ink); border-color: var(--ink-3, var(--ink-2)); background: var(--bg-3); }
.phase-group-new svg { width: 13px; height: 13px; }
.mobile-menu-subheading {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
  padding: 8px 8px 4px;
  margin-top: 4px;
}
.nav-link {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 8px 10px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; color: var(--ink-2);
  text-align: left;
  position: relative;
  transition: all 0.15s ease;
}
.nav-link:hover { background: var(--bg-3); }
.nav-link.is-complete {
  background: var(--leaf-soft);
  color: var(--leaf);
}
.nav-link.is-complete .nav-num,
.nav-link.is-complete .nav-progress { color: var(--leaf); opacity: 0.85; }
.nav-link.is-complete:hover { background: var(--leaf-soft); filter: brightness(0.97); }
.nav-link.is-active {
  background: var(--citrus-soft);
  color: var(--citrus-deep);
  font-weight: 600;
  box-shadow: inset 3px 0 0 var(--citrus);
}
.nav-link.is-active.is-complete { background: var(--citrus-soft); color: var(--citrus-deep); }
.nav-link.is-active.is-complete .nav-num,
.nav-link.is-active.is-complete .nav-progress { color: var(--citrus); opacity: 1; }
.nav-num {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 500;
  color: var(--muted);
  min-width: 22px;
}
.nav-link.is-active .nav-num { color: var(--citrus); }
.nav-progress {
  margin-left: auto;
  font-size: 10px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.sidebar-divider {
  border-top: 1px solid var(--line);
  margin: 16px 8px;
}
.sidebar-stats { padding: 0 8px; }
.stat-row {
  display: flex; justify-content: space-between;
  padding: 5px 0; font-size: 12px;
}
.stat-row .k { color: var(--ink-3); }
.stat-row .v {
  font-weight: 600; color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.stat-row.is-urgent .v { color: var(--danger); }
.stat-row.is-blocked .v { color: var(--blocked); }
.stat-row.is-complete .v { color: var(--leaf); }

.tab-nav {
  display: flex; gap: 2px;
  padding: 4px 8px 0;
  margin-bottom: 12px;
}
.tab-btn {
  padding: 7px 10px;
  font-size: 12px; font-weight: 500;
  color: var(--ink-3);
  border-radius: var(--radius-sm);
  flex: 1;
  transition: all 0.15s ease;
}
.tab-btn:hover { background: var(--bg-3); color: var(--ink-2); }
.tab-btn.is-active {
  background: var(--ink);
  color: white;
}

/* ---------- Main ---------- */
.main {
  grid-area: main;
  padding: 28px 32px 80px;
  max-width: 1180px;
  width: 100%;
  margin: 0 auto;
  justify-self: center;
}

.hero {
  margin-bottom: 28px;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--line);
  position: relative;
}
.hero-kicker {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--citrus-deep);
  padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--citrus-soft);
  margin-bottom: 16px;
}
.hero-title {
  font-family: var(--font-display);
  font-size: 44px; font-weight: 500;
  line-height: 1.05; letter-spacing: -0.025em;
  margin: 0 0 10px;
  color: var(--ink);
}
.hero-title em {
  color: var(--citrus-deep);
  font-style: italic; font-weight: 400;
}
.hero-subtitle {
  max-width: 640px;
  color: var(--ink-3);
  font-size: 15px; line-height: 1.55;
  margin: 0;
}
.hero-progress {
  margin-top: 22px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 18px;
}
.progress-track {
  height: 8px;
  background: var(--bg-3);
  border-radius: var(--radius-pill);
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--citrus) 0%, var(--citrus-deep) 100%);
  border-radius: var(--radius-pill);
  transition: width 0.4s ease;
}
.progress-label {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.progress-label .num { color: var(--citrus-deep); }
.progress-label .sub {
  font-family: var(--font-body); font-size: 11px;
  font-weight: 500; color: var(--muted);
  display: block; margin-top: 2px;
}

/* ---------- Tabs ---------- */
.view-tabs { display: none; }
.view-tab {
  padding: 10px 16px;
  font-size: 13px; font-weight: 500;
  color: var(--ink-3);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  position: relative;
  transition: all 0.15s ease;
  display: inline-flex; align-items: center; gap: 7px;
}
.view-tab:hover { color: var(--ink); }
.view-tab.is-active {
  color: var(--citrus-deep);
}
.view-tab.is-active::after {
  content: "";
  position: absolute;
  bottom: -1px; left: 16px; right: 16px;
  height: 2px;
  background: var(--citrus);
  border-radius: 2px 2px 0 0;
}
.view-tab .count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px;
  padding: 0 5px; border-radius: var(--radius-pill);
  background: var(--bg-3);
  font-size: 10px; font-weight: 600;
  color: var(--ink-3);
}
.view-tab.is-active .count { background: var(--citrus-soft); color: var(--citrus-deep); }
.view-panel { display: none; }
.view-panel.is-active { display: block; }

/* ---------- Filter bar ---------- */
.filter-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.search-wrap {
  flex: 1; max-width: 320px;
  position: relative;
}
.search-wrap svg {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}
.search {
  width: 100%;
  padding: 9px 12px 9px 34px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 13px;
  transition: all 0.15s ease;
}
.search:focus {
  border-color: var(--citrus);
  outline: none;
  box-shadow: var(--ring);
}
.chip-group { display: flex; gap: 4px; }
.chip {
  padding: 6px 11px; border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 500;
  color: var(--ink-3);
  background: var(--surface);
  border: 1px solid var(--line-2);
  transition: all 0.15s ease;
}
.chip:hover { border-color: var(--ink-3); color: var(--ink-2); }
.chip.is-on {
  background: var(--citrus-deep); color: white;
  border-color: var(--citrus-deep);
  box-shadow: 0 0 0 3px var(--citrus-soft);
  font-weight: 600;
}
.chip.is-on.chip-urgent { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 0 3px var(--danger-soft); }

/* ---------- Attention panel ---------- */
.attention {
  background: linear-gradient(135deg, #fff 0%, var(--citrus-soft) 100%);
  border: 1px solid rgba(232,118,58,0.2);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}
.attention-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.attention-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 600;
  letter-spacing: -0.015em;
  color: var(--ink);
}
.attention-meta {
  margin-left: auto;
  font-size: 11px; color: var(--ink-3);
}
.attention-list {
  display: grid; gap: 7px;
}
.attention-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid rgba(232,118,58,0.15);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.12s ease;
}
.attention-item:hover { border-color: var(--citrus); transform: translateX(2px); }
.attention-item .dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.attention-item .dot.urgent { background: var(--danger); }
.attention-item .dot.blocked { background: var(--blocked); }
.attention-item .dot.due { background: var(--sun); }
.attention-item .title { flex: 1; color: var(--ink); font-weight: 500; }
.attention-item .meta { font-size: 11px; color: var(--muted); }

/* ---------- Phase sections ---------- */
.phase {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--line);
  margin-bottom: 16px;
  overflow: hidden;
  transition: box-shadow 0.15s ease;
}
.phase:hover { box-shadow: var(--shadow-sm); }
.phase.is-open { box-shadow: var(--shadow-sm); }

.phase-header {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s ease;
}
.phase-header:hover { background: var(--bg-2); }
.phase-num {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 500;
  color: var(--muted);
  min-width: 28px;
  letter-spacing: 0.05em;
}
.phase-title {
  font-family: var(--font-display);
  font-size: 19px; font-weight: 600;
  letter-spacing: -0.015em;
  color: var(--ink);
  flex: 1;
}
.phase-window {
  font-size: 11px; color: var(--muted);
  margin-left: 12px;
  white-space: nowrap;
}
.phase-stats {
  display: flex; align-items: center; gap: 14px;
  font-size: 11px;
}
.phase-stat {
  display: flex; align-items: center; gap: 4px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.phase-stat .n { font-weight: 600; color: var(--ink); }
.phase-stat.is-complete .n { color: var(--leaf); }
.phase-stat.is-urgent .n { color: var(--danger); }
.phase-ring {
  position: relative;
  width: 32px; height: 32px;
  flex-shrink: 0;
}
.phase-ring svg { transform: rotate(-90deg); }
.phase-ring circle { fill: none; stroke-width: 3; }
.phase-ring .bg { stroke: var(--line); }
.phase-ring .fg {
  stroke: var(--citrus);
  stroke-dasharray: var(--dash, 0 100);
  transition: stroke-dasharray 0.4s ease;
}
.phase-ring .pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600;
  color: var(--ink-2);
  font-variant-numeric: tabular-nums;
}
.phase-chevron {
  color: var(--muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.phase.is-open .phase-chevron { transform: rotate(180deg); }

.phase-body {
  display: none;
  padding: 14px 20px 18px;
  border-top: 1px solid var(--line);
  gap: 10px;
  align-content: start;
}
.phase.is-open .phase-body {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
}

.phase-desc {
  grid-column: 1 / -1;
  padding: 0 0 12px;
  font-size: 13px; color: var(--ink-3);
  line-height: 1.55;
  border-bottom: 1px dashed var(--line);
  margin: 0 0 2px;
}

.group-title {
  grid-column: 1 / -1;
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
  margin: 6px 0 0;
}
.group-title:first-of-type { margin-top: 0; }

/* ---------- Task card ---------- */
.task {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  margin-bottom: 0;
  background: var(--surface);
  transition: all 0.12s ease;
  overflow: hidden;
  align-self: start;
}
.task:hover { border-color: var(--line-2); }
.task.is-urgent { border-left: 3px solid var(--danger); }
.task.is-complete { opacity: 0.72; }
.task.is-expanded {
  border-color: var(--citrus);
  box-shadow: 0 2px 8px rgba(232,118,58,0.08);
  grid-column: 1 / -1;
}

.task-header {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  cursor: pointer;
}
.task-status {
  position: relative;
  flex-shrink: 0;
}
.task-status-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 9px;
  border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 500;
  border: 1px solid transparent;
  transition: all 0.12s ease;
}
.task-status-btn:hover { box-shadow: var(--shadow-sm); }
.task-status-btn::after {
  content: ""; display: inline-block;
  width: 0; height: 0;
  border-left: 3px solid transparent;
  border-right: 3px solid transparent;
  border-top: 4px solid currentColor;
  margin-left: 2px; opacity: 0.6;
}
.status-not_started { background: var(--bg-3); color: var(--ink-3); }
.status-in_progress { background: var(--info-soft); color: var(--info); }
.status-complete { background: var(--leaf-soft); color: var(--leaf); }
.status-blocked { background: var(--blocked-soft); color: var(--blocked); }

.task-status-menu {
  position: absolute; top: calc(100% + 4px); left: 0;
  background: var(--surface);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  padding: 4px;
  min-width: 160px;
  z-index: 20;
  display: none;
}
.task-status-menu.is-open { display: block; }
/* When a status dropdown is open, let it escape the rounded/clipping ancestors */
.task:has(.task-status-menu.is-open),
.phase:has(.task-status-menu.is-open) { overflow: visible; }
.task-status-menu button {
  display: flex; align-items: center; gap: 8px;
  width: 100%;
  padding: 7px 10px;
  border-radius: 5px;
  font-size: 12px; font-weight: 500;
  text-align: left;
  transition: background 0.1s ease;
}
.task-status-menu button:hover { background: var(--bg-2); }
.task-status-menu .dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.task-status-menu .kbd {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
}

.task-title {
  font-size: 13px; font-weight: 500;
  color: var(--ink);
  line-height: 1.4;
}
.desc-callout {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--line-2);
  border-radius: 6px;
  padding: 9px 12px;
  font-size: 12px;
  color: var(--ink-3);
  line-height: 1.5;
  max-width: 300px;
  z-index: 9000;
  box-shadow: 0 4px 14px rgba(0,0,0,0.10);
  pointer-events: none;
  display: none;
}
/* Arrow pointing up (callout is below the card) */
.desc-callout::before {
  content: "";
  position: absolute;
  top: -6px;
  left: var(--arrow-x, 50%);
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top: none;
  border-bottom-color: var(--line-2);
}
.desc-callout::after {
  content: "";
  position: absolute;
  top: -5px;
  left: var(--arrow-x, 50%);
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top: none;
  border-bottom-color: var(--surface);
}
/* Arrow pointing down (callout is above the card) */
.desc-callout.is-above::before {
  top: auto; bottom: -6px;
  border-top-color: var(--line-2);
  border-bottom: none;
}
.desc-callout.is-above::after {
  top: auto; bottom: -5px;
  border-top-color: var(--surface);
  border-bottom: none;
}
.task.is-complete .task-title { text-decoration: line-through; color: var(--ink-3); }

.task-badges {
  display: flex; gap: 5px; align-items: center;
}
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 500;
}
.badge-urgent { background: var(--danger-soft); color: var(--danger); }
.badge-priority { background: var(--sun-soft); color: var(--sun); }
.badge-owner {
  background: var(--bg-3); color: var(--ink-3);
  max-width: 100px; overflow: hidden;
  white-space: nowrap; text-overflow: ellipsis;
}
.badge-due { background: var(--info-soft); color: var(--info); }
.badge-due.is-overdue { background: var(--danger-soft); color: var(--danger); }
.badge-bugs { background: var(--sun-soft); color: var(--sun); }
.badge-bugs.has-critical { background: var(--danger-soft); color: var(--danger); }

/* Clickable / inline-editable badge variants */
.badge-clickable { cursor: pointer; border: 1px solid transparent; transition: filter 0.1s ease, border-color 0.1s ease; }
.badge-clickable:hover { filter: brightness(0.94); border-color: currentColor; }
.badge-due-wrap { position: relative; display: inline-flex; align-items: center; }
.badge-due-wrap input[type="date"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  border: 0; padding: 0; margin: 0; width: 100%; height: 100%;
}
.badge-edit-input {
  background: var(--surface); color: var(--ink);
  border: 1px solid var(--citrus);
  border-radius: var(--radius-pill);
  padding: 2px 8px;
  font-size: 10px; font-weight: 500;
  width: 110px;
  outline: none;
}
.badge-edit-input:focus { box-shadow: 0 0 0 3px var(--citrus-soft); }
.badge-quick {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.12s ease;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  border: 1px dashed var(--line-2);
  background: transparent;
  color: var(--muted);
  font-size: 10px; font-weight: 500;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 3px;
}
.task:hover .badge-quick { opacity: 1; pointer-events: auto; }
.badge-quick:hover { color: var(--ink-3); border-color: var(--line); background: var(--bg-3); }
.badge-quick-date { position: relative; }
.badge-quick-date input[type="date"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  border: 0; padding: 0; margin: 0; width: 100%; height: 100%;
}

.task-chevron {
  color: var(--muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.task.is-expanded .task-chevron { transform: rotate(180deg); }

.task-body {
  display: none;
  padding: 0 14px 14px;
  border-top: 1px dashed var(--line);
  margin-top: 0;
  padding-top: 12px;
}
.task.is-expanded .task-body { display: block; }

.task-desc {
  font-size: 13px; color: var(--ink-3);
  padding: 2px 0 10px;
  line-height: 1.55;
}

.task-fields {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}
.field-label {
  display: block;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.field-input {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--line-2);
  border-radius: 6px;
  background: var(--bg-2);
  font-size: 12px;
  color: var(--ink);
  transition: all 0.12s ease;
}
.field-input:focus {
  outline: none;
  border-color: var(--citrus);
  background: var(--surface);
  box-shadow: var(--ring);
}
.field-input[type="date"] { font-family: var(--font-body); }

.notes-area {
  width: 100%;
  min-height: 60px;
  padding: 9px 11px;
  border: 1px solid var(--line-2);
  border-radius: 6px;
  background: var(--bg-2);
  font-size: 12px; line-height: 1.5;
  color: var(--ink);
  resize: vertical;
  font-family: var(--font-body);
  transition: all 0.12s ease;
}
.notes-area:focus {
  outline: none;
  border-color: var(--citrus);
  background: var(--surface);
  box-shadow: var(--ring);
}

.task-actions {
  display: flex; gap: 6px; align-items: center;
  margin-top: 10px;
  flex-wrap: wrap;
}
.mini-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 9px;
  border: 1px solid var(--line-2);
  border-radius: 6px;
  background: var(--surface);
  font-size: 11px; font-weight: 500;
  color: var(--ink-3);
  transition: all 0.12s ease;
}
.mini-btn:hover { border-color: var(--ink-3); color: var(--ink); }
.mini-btn.is-on {
  background: var(--danger-soft); color: var(--danger);
  border-color: rgba(178,58,72,0.3);
}
.mini-btn .count {
  padding: 0 4px; border-radius: 3px;
  background: var(--bg-3);
  font-variant-numeric: tabular-nums;
}

/* ---------- Bug section ---------- */
.bugs-section {
  border-top: 1px dashed var(--line);
  margin-top: 14px;
  padding-top: 14px;
}
.bugs-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.bugs-title {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
}
.bugs-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px;
  padding: 0 5px; border-radius: var(--radius-pill);
  background: var(--sun-soft); color: var(--sun);
  font-size: 10px; font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.bugs-count.has-critical { background: var(--danger-soft); color: var(--danger); }

.bug-list { display: grid; gap: 6px; }
.bug-item {
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--bg-2);
  padding: 10px 12px;
  transition: all 0.12s ease;
}
.bug-item:hover { border-color: var(--line-2); }
.bug-item.severity-critical { border-left: 3px solid var(--danger); }
.bug-item.severity-high { border-left: 3px solid var(--sun); }
.bug-item.severity-medium { border-left: 3px solid var(--info); }
.bug-item.severity-low { border-left: 3px solid var(--muted); }
.bug-item.is-resolved { opacity: 0.55; }
.bug-item.is-resolved .bug-title { text-decoration: line-through; }

.bug-row-1 {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px;
}
.bug-title {
  font-size: 12px; font-weight: 600;
  color: var(--ink);
  flex: 1;
}
.bug-severity, .bug-status-chip {
  font-size: 9px; font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.sev-critical { background: var(--danger-soft); color: var(--danger); }
.sev-high { background: var(--sun-soft); color: var(--sun); }
.sev-medium { background: var(--info-soft); color: var(--info); }
.sev-low { background: var(--bg-3); color: var(--ink-3); }

.bst-open { background: var(--danger-soft); color: var(--danger); }
.bst-in_progress { background: var(--info-soft); color: var(--info); }
.bst-resolved { background: var(--leaf-soft); color: var(--leaf); }
.bst-wont_fix { background: var(--bg-3); color: var(--ink-3); }

.bug-meta {
  display: flex; gap: 10px;
  font-size: 10px; color: var(--muted);
  flex-wrap: wrap;
}
.bug-meta span { display: inline-flex; align-items: center; gap: 3px; }
.bug-body {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--line);
}
.bug-item.is-open .bug-body { display: block; }
.bug-fields {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px;
  margin-bottom: 8px;
}
.bug-input {
  width: 100%;
  padding: 6px 9px;
  border: 1px solid var(--line-2);
  border-radius: 5px;
  background: var(--surface);
  font-size: 11px;
  color: var(--ink);
}
.bug-input:focus {
  outline: none; border-color: var(--citrus);
  box-shadow: 0 0 0 2px rgba(232,118,58,0.15);
}
.bug-textarea {
  width: 100%; min-height: 45px;
  padding: 7px 9px;
  border: 1px solid var(--line-2);
  border-radius: 5px;
  background: var(--surface);
  font-size: 11px; line-height: 1.4;
  color: var(--ink);
  font-family: var(--font-body);
  resize: vertical;
}
.bug-textarea:focus {
  outline: none; border-color: var(--citrus);
  box-shadow: 0 0 0 2px rgba(232,118,58,0.15);
}
.bug-link-row {
  display: flex; gap: 6px; margin-top: 6px;
  flex-wrap: wrap;
}
.bug-link {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 10px; font-weight: 500;
}
.bug-link.zendesk { background: #E9F0FC; color: #1F6FD6; }
.bug-link.airtable { background: #FFF4D6; color: #8B6408; }
.bug-link:hover { text-decoration: none; opacity: 0.85; }

.bug-add-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 11px;
  border: 1px dashed var(--line-2);
  border-radius: 6px;
  background: transparent;
  color: var(--ink-3);
  font-size: 11px; font-weight: 500;
  width: 100%;
  justify-content: center;
  transition: all 0.12s ease;
}
.bug-add-btn:hover {
  border-color: var(--sun);
  color: var(--sun);
  background: var(--sun-soft);
}

/* ---------- Calendar view ---------- */
.calendar-wrap {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 20px;
}
.cal-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px;
}
.cal-title {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 600;
  letter-spacing: -0.015em;
  color: var(--ink);
  flex: 1;
}
.cal-nav {
  display: flex; align-items: center; gap: 4px;
}
.cal-nav-btn {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 6px;
  background: var(--bg-2);
  color: var(--ink-2);
  transition: all 0.12s ease;
}
.cal-nav-btn:hover { background: var(--citrus-soft); color: var(--citrus-deep); }
.cal-today-btn {
  padding: 7px 12px;
  font-size: 12px; font-weight: 500;
  color: var(--ink-2);
  border: 1px solid var(--line-2);
  border-radius: 6px;
  background: var(--surface);
  transition: all 0.12s ease;
}
.cal-today-btn:hover { border-color: var(--citrus); color: var(--citrus-deep); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.cal-dow {
  background: var(--bg-2);
  padding: 10px;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}
.cal-day {
  background: var(--surface);
  min-height: 96px;
  min-width: 0;
  padding: 7px 8px 6px;
  position: relative;
  cursor: pointer;
  transition: background 0.12s ease;
  overflow: hidden;
}
.cal-day:hover { background: #FEF8F5; }
.cal-day.is-other-month { background: var(--bg-3); color: var(--muted); }
.cal-day.is-today .cal-daynum {
  color: white;
  font-weight: 700;
  background: var(--citrus);
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.cal-day.is-weekend { background: #FAF7F0; }
.cal-day.is-weekend.is-other-month { background: #EDE7D9; }
.cal-daynum {
  font-size: 12px; font-weight: 500;
  color: var(--ink-2);
  font-variant-numeric: tabular-nums;
}
/* Weekday abbreviation stacked above the date in the first row (Google style) */
.cal-dow-inline {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 2px;
  line-height: 1;
  text-align: center;
}
.calendar-card .cal-dow-inline {
  color: var(--muted);
  margin-bottom: 4px;
}
/* Center-align the weekday+date stack on first-row cells */
.cal-day:has(.cal-dow-inline) {
  text-align: center;
}
/* Non-today daynum is a block-level div; make it inline-block so the parent's
   text-align: center actually centers it. Today's daynum stays inline-flex
   (the circle badge) via its higher-specificity :is-today rule. */
.cal-day:has(.cal-dow-inline):not(.is-today) .cal-daynum {
  display: inline-block;
}
.cal-day:has(.cal-dow-inline) .cal-events {
  text-align: left;
}
.cal-events {
  margin-top: 4px;
  display: flex; flex-direction: column;
  gap: 2px;
}
.cal-event {
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 3px;
  background: var(--citrus-soft);
  color: var(--citrus-deep);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.cal-event.is-milestone {
  background: var(--danger-soft); color: var(--danger);
  font-weight: 600;
}
.cal-event.is-recurring {
  background: var(--info-soft); color: var(--info);
}
.cal-event.is-complete { background: var(--leaf-soft); color: var(--leaf); }
.cal-event.is-overdue { background: var(--danger-soft); color: var(--danger); }
.cal-event.is-ooo { background: var(--leaf); color: #fff; font-weight: 600; }
.cal-event.is-focus { background: var(--blocked-soft); color: var(--blocked); }
.cal-event.is-lunch { background: var(--sun-soft); color: var(--sun); }
.cal-event.is-routine { background: var(--bg-3); color: var(--ink-3); }
.cal-event.is-past { opacity: 0.45; filter: saturate(0.7); }
.cal-event.is-past:hover { opacity: 0.85; filter: saturate(1); }
.cal-event.is-past-today { opacity: 0.6; filter: saturate(0.8); }
.cal-event.is-past-today:hover { opacity: 0.9; filter: saturate(1); }
.timed-pill.is-past { opacity: 0.45; filter: saturate(0.7); }
.timed-pill.is-past:hover { opacity: 0.9; filter: saturate(1); }
.timed-pill.is-past-today { opacity: 0.6; filter: saturate(0.8); }
.timed-pill.is-past-today:hover { opacity: 0.9; filter: saturate(1); }
.cal-event[draggable="true"] { cursor: grab; }
.cal-event[draggable="true"]:active { cursor: grabbing; }
.cal-event.is-range-locked { cursor: pointer; }
.cal-event.is-dragging { opacity: 0.4; }
.cal-event.is-drag-mobile,
.timed-pill.is-drag-mobile { opacity: 0.35; outline: 2px dashed var(--citrus); outline-offset: 1px; }
.timed-col-wrap.is-drag-over { background: var(--citrus-soft); }

/* ---------- Calendar event hover tooltip ---------- */
.cal-tooltip {
  position: fixed;
  top: -9999px; left: -9999px;
  max-width: 320px;
  min-width: 220px;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.45;
  pointer-events: none;
  opacity: 0;
  transform: translateY(-2px);
  transition: opacity 0.1s ease, transform 0.1s ease;
  z-index: 100;
  visibility: hidden;
}
.cal-tooltip.is-visible { opacity: 1; transform: translateY(0); visibility: visible; }
.cal-tooltip .tt-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 13px;
  color: var(--ink);
  margin-bottom: 4px;
  line-height: 1.3;
}
.cal-tooltip .tt-meta-row {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-bottom: 6px;
}
.cal-tooltip .tt-pill {
  display: inline-flex; align-items: center;
  padding: 1px 7px; border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 600;
  background: var(--bg-3); color: var(--ink-3);
  letter-spacing: 0.02em;
}
.cal-tooltip .tt-pill.status-not_started { background: var(--bg-3); color: var(--ink-3); }
.cal-tooltip .tt-pill.status-in_progress { background: var(--info-soft); color: var(--info); }
.cal-tooltip .tt-pill.status-complete { background: var(--leaf-soft); color: var(--leaf); }
.cal-tooltip .tt-pill.status-blocked { background: var(--blocked-soft); color: var(--blocked); }
.cal-tooltip .tt-pill.is-urgent { background: var(--danger-soft); color: var(--danger); }
.cal-tooltip .tt-pill.is-priority { background: var(--sun-soft); color: var(--sun); }
.cal-tooltip .tt-pill.is-milestone { background: var(--danger-soft); color: var(--danger); }
.cal-tooltip .tt-pill.is-recurring { background: var(--info-soft); color: var(--info); }
.cal-tooltip .tt-pill.is-ooo { background: var(--leaf-soft); color: var(--leaf); }
.cal-tooltip .tt-pill.is-focus { background: var(--blocked-soft); color: var(--blocked); }
.cal-tooltip .tt-pill.is-lunch { background: var(--sun-soft); color: var(--sun); }
.cal-tooltip .tt-pill.is-routine { background: var(--bg-3); color: var(--ink-3); }
.cal-tooltip .tt-desc {
  color: var(--ink-2);
  margin-bottom: 6px;
}
.cal-tooltip .tt-field {
  display: flex; gap: 6px;
  font-size: 11px;
  color: var(--ink-3);
  margin-top: 3px;
}
.cal-tooltip .tt-field .tt-k {
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 10px;
  min-width: 58px;
}
.cal-tooltip .tt-field .tt-v {
  color: var(--ink-2);
  flex: 1;
}
.cal-tooltip .tt-notes {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--line);
  font-size: 11px;
  color: var(--ink-3);
  max-height: 90px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
}
.cal-tooltip .tt-phase {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--line);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 600;
}
.cal-tooltip .tt-hint {
  margin-top: 6px;
  font-size: 10px;
  color: var(--muted);
  font-style: italic;
}

/* ---------- Right-click context menu ---------- */
.ctx-menu {
  position: fixed;
  top: -9999px; left: -9999px;
  min-width: 180px;
  background: var(--surface);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  padding: 4px;
  z-index: 200;
  visibility: hidden;
  opacity: 0;
  transition: opacity 0.08s ease;
}
.ctx-menu.is-visible { opacity: 1; visibility: visible; }
.ctx-menu button {
  display: flex; align-items: center; gap: 8px;
  width: 100%;
  padding: 7px 10px;
  border-radius: 5px;
  font-size: 12px; font-weight: 500;
  color: var(--ink-2);
  text-align: left;
  transition: background 0.1s ease;
}
.ctx-menu button:hover { background: var(--bg-2); color: var(--ink); }
.ctx-menu button.is-danger { color: var(--danger); }
.ctx-menu button.is-danger:hover { background: var(--danger-soft); }
.ctx-menu .ctx-sep { height: 1px; background: var(--line); margin: 4px 2px; }
.ctx-menu .ctx-kbd {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
}

/* ---------- Edit form (used inside modal for task / milestone / recurring) ---------- */
.edit-form { display: flex; flex-direction: column; gap: 12px; }
.edit-form .ef-row { display: flex; flex-direction: column; gap: 4px; }
.edit-form .ef-row.ef-inline { flex-direction: row; align-items: center; gap: 8px; flex-wrap: wrap; }
.edit-form label.ef-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted);
}
.edit-form input[type="text"],
.edit-form input[type="date"],
.edit-form textarea,
.edit-form select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--ink);
  font-size: 13px;
  font-family: inherit;
}
.edit-form textarea { min-height: 80px; resize: vertical; }
.edit-form input:focus, .edit-form textarea:focus, .edit-form select:focus {
  outline: none;
  border-color: var(--citrus);
  box-shadow: var(--ring);
}
.edit-form .ef-dates { display: flex; gap: 10px; }
.edit-form .ef-dates > .ef-row { flex: 1; }
.edit-form .ef-check {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
}
.edit-form .ef-check input { accent-color: var(--citrus); width: 14px; height: 14px; }
.edit-form .ef-footer {
  display: flex; gap: 8px; justify-content: flex-end;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  flex-wrap: wrap;
}
.edit-form .ef-footer .spacer { flex: 1; }
.edit-form .ef-kind-switch {
  display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
  padding: 10px 12px;
  margin-bottom: 4px;
  background: var(--bg-2);
  border: 1px dashed var(--line-2);
  border-radius: var(--radius-sm);
  font-size: 11px;
}
.edit-form .ef-kind-label {
  font-weight: 600;
  color: var(--ink-2);
  letter-spacing: 0.02em;
}
.edit-form .ef-kind-link {
  background: transparent;
  border: none;
  padding: 0;
  color: var(--citrus-deep);
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  text-decoration: underline dotted;
  text-underline-offset: 3px;
}
.edit-form .ef-kind-link:hover { color: var(--citrus); }
.ef-select-with-add {
  display: flex; gap: 6px; align-items: stretch;
}
.ef-select-with-add select { flex: 1; min-width: 0; }
.ef-add-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; flex-shrink: 0;
  padding: 0;
  border: 1px dashed var(--line-2);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s ease;
  font-family: inherit;
}
.ef-add-btn:hover {
  border-style: solid;
  border-color: var(--citrus);
  color: var(--citrus-deep);
  background: var(--citrus-soft);
}
.ef-add-btn svg { display: block; }
.ef-add-btn:disabled { opacity: 0.45; cursor: default; }

/* Quick-pick duration row sitting under a Start/End time input pair. */
.time-quickpicks {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  margin: 0;
}
.time-quick-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-transform: uppercase;
  margin-right: 2px;
}
.time-quickpick-btn {
  padding: 3px 9px;
  border: 1px solid var(--line-2);
  border-radius: 12px;
  background: var(--surface);
  color: var(--ink-2);
  font-size: 11px; font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.12s ease;
}
.time-quickpick-btn:hover {
  border-color: var(--citrus);
  color: var(--citrus-deep);
  background: var(--citrus-soft);
}
.time-quickpick-btn.is-active {
  border-color: var(--citrus);
  color: var(--citrus-deep);
  background: var(--citrus-soft);
  font-weight: 600;
}
.time-quickpick-btn.time-quickpick-allday {
  margin-left: auto;
  border-style: dashed;
  font-style: italic;
}
.time-quickpick-btn.time-quickpick-allday:hover {
  border-style: solid;
  color: var(--ink-3);
  background: var(--bg-3);
}

/* Inline text input that temporarily replaces a Phase / Group <select> when
   the user clicks the + button — matches the select's size + color treatment. */
.ef-inline-create {
  flex: 1; min-width: 0;
  padding: 8px 10px;
  border: 1px solid var(--citrus);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--ink);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  box-shadow: var(--ring);
}
.ef-inline-create::placeholder { color: var(--muted); font-style: italic; }
.edit-form .ef-section-title {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
  margin: 6px 0 2px;
  padding-bottom: 4px;
  border-bottom: 1px dashed var(--line);
}
.edit-form .ef-section-title:first-child { margin-top: 0; }

/* ---------- Add-task button (bottom of each group) ---------- */
.add-task-btn {
  display: flex; align-items: center; gap: 6px;
  width: 100%;
  padding: 9px 12px;
  margin-top: 4px;
  border: 1px dashed var(--line-2);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--muted);
  font-size: 12px; font-weight: 500;
  transition: all 0.12s ease;
}
.add-task-btn:hover {
  border-color: var(--citrus);
  color: var(--citrus-deep);
  background: var(--citrus-soft);
}
.add-task-btn svg { opacity: 0.8; }

/* ---------- Schedule modal — unified inline "new task" card ---------- */
.sched-new-card {
  display: flex; flex-direction: column;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 14px;
}
.sched-new-card-title-row {
  padding: 12px 14px 0;
}
.sched-title-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--ink);
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font-display);
  outline: none;
  transition: border-color 0.12s ease, box-shadow 0.12s ease;
}
.sched-title-input:focus { border-color: var(--citrus); box-shadow: var(--ring); }
.sched-title-input.is-shake { animation: sched-shake 0.35s ease; border-color: var(--danger); }
@keyframes sched-shake {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-4px); }
  40%  { transform: translateX(4px); }
  60%  { transform: translateX(-3px); }
  80%  { transform: translateX(3px); }
  100% { transform: translateX(0); }
}
.sched-new-card-dates {
  display: grid;
  grid-template-columns: 1fr 1fr 1.2fr;
  gap: 12px;
  padding: 10px 14px;
}
.sched-new-card-times {
  grid-template-columns: 120px 120px 1fr;
  align-items: start;
}
.sched-new-card-field {
  display: flex; flex-direction: column; gap: 4px;
  min-width: 0;
}
.sched-new-card-field .sched-date-input,
.sched-new-card-field select { width: 100%; }
.sched-new-card-field select {
  padding: 5px 8px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 12px;
  font-family: inherit;
}
.sched-repeat-sel {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 12px;
  font-family: inherit;
  color: var(--ink);
}
.sched-new-card-meta {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 10px;
  align-items: end;
  padding: 0 14px 12px;
}
.sched-create-btn {
  height: 34px;
  padding: 0 14px;
  font-size: 12px;
}
.sched-create-btn span { display: inline-flex; align-items: center; gap: 4px; }

/* "or pick an existing task" divider */
.sched-divider {
  display: flex; align-items: center;
  text-align: center;
  margin: 10px 0 8px;
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
}
.sched-divider::before,
.sched-divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--line);
}
.sched-divider span {
  padding: 0 12px;
}
/* Multi-day events render as one labeled pill per day. The start and end
   segments get a thin accent on their outer edge so the user can see which
   side of the range they're grabbing (drags on those segments resize from
   that edge instead of moving the whole range). */
.cal-event.is-range-start { box-shadow: inset 3px 0 0 currentColor; }
.cal-event.is-range-end { box-shadow: inset -3px 0 0 currentColor; }
.cal-event.is-range-start.is-range-end { box-shadow: inset 3px 0 0 currentColor, inset -3px 0 0 currentColor; }
.cal-day.is-drag-over {
  background: var(--citrus-soft);
  box-shadow: inset 0 0 0 2px var(--citrus);
}
.cal-event-more {
  font-size: 10px; color: var(--muted);
  padding: 2px 5px;
  font-weight: 500;
}

/* ---------- Schedule modal ---------- */
.modal:has(#schedule-modal-body) { max-width: 780px; width: 92vw; }
.modal:has(#schedule-modal-body) .modal-body { padding: 22px 26px; }
.modal-save-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px;
  margin-right: 4px;
  border: 1px solid var(--citrus);
  border-radius: 50%;
  background: var(--citrus-soft);
  color: var(--citrus-deep);
  cursor: pointer;
  transition: all 0.12s ease;
  padding: 0;
  font-family: inherit;
}
.modal-save-btn:hover {
  background: var(--citrus);
  color: white;
}
.modal-save-btn svg { display: block; }
.sched-section-title {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
  margin: 14px 0 8px;
}
.sched-section-title:first-child { margin-top: 0; }
.sched-list {
  display: flex; flex-direction: column; gap: 6px;
  margin-bottom: 10px;
}
.sched-row {
  display: flex; flex-direction: column; gap: 8px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
}
.sched-row.is-readonly { flex-direction: row; align-items: center; gap: 10px; }
.sched-row-main { display: flex; flex-direction: column; gap: 2px; }
.sched-row-title { font-weight: 600; color: var(--ink); font-size: 13px; }
.sched-row-meta { font-size: 11px; color: var(--muted); }
.sched-row-edit {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--line);
}
.sched-pill {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 600;
  background: var(--bg-3); color: var(--ink-3);
}
.sched-pill.is-milestone { background: var(--danger-soft); color: var(--danger); }
.sched-pill.is-recurring { background: var(--info-soft); color: var(--info); }
.sched-field-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted);
}
.sched-date-input {
  padding: 5px 8px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 12px;
}
.sched-date-input:focus { outline: none; border-color: var(--citrus); }
.btn-sched-save, .btn-sched-remove { padding: 5px 10px; font-size: 11px; }
.sched-new-dates {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 10px 12px;
  background: var(--bg-2);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.sched-hint { margin-left: auto; font-size: 11px; color: var(--muted); }
.sched-search {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 13px;
  margin-bottom: 6px;
}
.sched-search:focus { outline: none; border-color: var(--citrus); box-shadow: var(--ring); }
.sched-picker {
  max-height: 320px;
  overflow-y: auto;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 4px;
}
.sched-picker-phase {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
  padding: 8px 8px 4px;
}
.sched-picker-row {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  width: 100%;
  padding: 7px 9px;
  border-radius: 5px;
  text-align: left;
  font-size: 12px;
  color: var(--ink-2);
  transition: background 0.1s ease;
}
.sched-picker-row:hover { background: var(--bg-2); }
.sched-picker-row.is-on-day { background: var(--citrus-soft); color: var(--citrus-deep); }
.sched-picker-row.is-complete .sched-picker-title { text-decoration: line-through; color: var(--muted); }
.sched-picker-title { font-weight: 500; flex: 1; }
.sched-picker-meta {
  font-size: 10px; color: var(--muted);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.cal-legend {
  display: flex; gap: 16px;
  align-items: center;
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  font-size: 11px;
  flex-wrap: wrap;
}
.legend-item {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--ink-3);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
}
.legend-dot.milestone { background: var(--danger-soft); border: 1px solid var(--danger); }
.legend-dot.recurring { background: var(--info-soft); border: 1px solid var(--info); }
.legend-dot.complete { background: var(--leaf-soft); border: 1px solid var(--leaf); }
.legend-dot.ooo { background: var(--leaf-soft); border: 1px solid var(--leaf); }
.legend-dot.focus { background: var(--blocked-soft); border: 1px solid var(--blocked); }
.legend-dot.lunch { background: var(--sun-soft); border: 1px solid var(--sun); }
.legend-dot.routine { background: var(--bg-3); border: 1px solid var(--muted); }

/* Legend chip — a legend item that's clickable to toggle visibility */
.legend-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 9px;
  border: 1px solid transparent;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-3);
  cursor: pointer;
  transition: all 0.12s ease;
}
.legend-chip:hover { background: var(--bg-2); border-color: var(--line-2); }
.legend-chip.is-hidden {
  opacity: 0.45;
  text-decoration: line-through;
}
.legend-chip.is-hidden:hover { opacity: 0.75; }

.legend-swatch.task {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 3px;
  background: var(--citrus-soft);
  border: 1px solid var(--citrus);
}

.cal-upcoming {
  margin-top: 22px;
}
.cal-upcoming h3 {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 600;
  margin: 0 0 10px;
  letter-spacing: -0.01em;
}
.upcoming-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--surface);
  margin-bottom: 5px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.12s ease;
}
.upcoming-item:hover { border-color: var(--citrus); }
.upcoming-date {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  color: var(--citrus-deep);
  min-width: 70px;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.upcoming-title { flex: 1; color: var(--ink); font-weight: 500; }
.upcoming-meta { font-size: 11px; color: var(--muted); }

/* ---------- Bugs tab (global view) ---------- */
.bugs-global-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 22px;
}
.bug-stat-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
}
.bug-stat-num {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.bug-stat-num.is-critical { color: var(--danger); }
.bug-stat-num.is-high { color: var(--sun); }
.bug-stat-num.is-resolved { color: var(--leaf); }
.bug-stat-label {
  font-size: 11px; color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.03em;
  margin-top: 4px;
  text-transform: uppercase;
}

.global-bug-list {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 6px;
}
.global-bug-row {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 7px;
  transition: background 0.12s ease;
  cursor: pointer;
}
.global-bug-row:hover { background: var(--bg-2); }
.global-bug-row + .global-bug-row { border-top: 1px solid var(--line); }
.global-bug-title { font-size: 13px; font-weight: 500; color: var(--ink); }
.global-bug-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ---------- Modal ---------- */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,29,35,0.55);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.is-open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  max-width: 680px;
  width: 92vw;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
}
.modal-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 600;
  letter-spacing: -0.015em;
  margin: 0;
  flex: 1;
}
.modal-close {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 5px;
  color: var(--muted);
  transition: all 0.12s ease;
}
.modal-close:hover { background: var(--bg-2); color: var(--ink); }
.modal-body { padding: 18px 22px; }
.modal-body p { margin: 0 0 12px; font-size: 13px; line-height: 1.55; color: var(--ink-2); }
.modal-body p:last-child { margin-bottom: 0; }
.modal-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--line);
  display: flex; gap: 8px; justify-content: flex-end;
}
.modal-body .field-label { margin-top: 12px; }
.modal-body .field-label:first-child { margin-top: 0; }

.security-notice {
  display: flex; gap: 10px;
  padding: 12px 14px;
  background: var(--sun-soft);
  border: 1px solid rgba(217,119,6,0.2);
  border-radius: 7px;
  font-size: 12px; line-height: 1.5;
  color: var(--ink-2);
  margin-bottom: 14px;
}
.security-notice svg { color: var(--sun); flex-shrink: 0; margin-top: 1px; }

/* ---------- Admin Dashboard ---------- */
.sidebar-dashboard-btn {
  display: flex; align-items: center; gap: 10px;
  margin: 0 8px 12px;
  padding: 11px 13px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--citrus) 0%, var(--citrus-deep) 100%);
  color: white;
  font-size: 13px; font-weight: 600;
  letter-spacing: -0.005em;
  font-family: inherit;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: all 0.18s ease;
}
.sidebar-dashboard-btn:hover {
  filter: brightness(1.04);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.sidebar-dashboard-btn:active { transform: translateY(0); }
.sidebar-dashboard-btn svg { flex-shrink: 0; }
.sidebar-dashboard-btn .dash-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.22);
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}

.dash-overlay {
  position: fixed; inset: 0;
  background: rgba(26,29,35,0.68);
  backdrop-filter: blur(6px);
  z-index: 220;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 24px;
  overflow-y: auto;
}
.dash-overlay.is-open { display: flex; }
.dash-modal {
  background: var(--bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  max-width: calc(100vw - 32px);
  width: 100%;
  min-height: calc(100vh - 48px);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.dash-header {
  position: sticky; top: 0; z-index: 5;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  padding: 18px 24px 14px;
  display: flex; flex-direction: column; gap: 14px;
}
.dash-header-top { display: flex; align-items: flex-start; gap: 16px; }
.dash-header-top .dash-close { margin-left: auto; flex-shrink: 0; }
.dash-title {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 600;
  letter-spacing: -0.015em;
  margin: 0;
  flex: 1;
}
.dash-subtitle {
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
  margin-top: 4px;
}
.dash-close {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 6px;
  color: var(--muted);
  transition: all 0.12s ease;
}
.dash-close:hover { background: var(--bg-2); color: var(--ink); }

/* Filter bar — macOS-style segmented controls. A soft container holds a
   small muted prefix label + a row of tightly spaced buttons. The active
   button "lifts" with a white background and soft shadow, no noisy borders. */
.dash-filters {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.dash-filter-line {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  min-width: 0;
}
.dash-filter-line > .dash-filter-spacer { flex: 1; }
.dash-filter-divider {
  width: 1px;
  height: 20px;
  background: var(--line-2);
  flex-shrink: 0;
  margin: 0 2px;
}

.dash-filter-group {
  display: inline-flex;
  align-items: center;
  padding: 3px;
  gap: 1px;
  background: rgba(26,29,35,0.05);
  border: none;
  border-radius: 8px;
  height: 30px;
}
.dash-filter-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.02em;
  text-transform: none;
  color: var(--muted);
  padding: 0 8px 0 6px;
  display: inline-flex;
  align-items: center;
  height: 24px;
  white-space: nowrap;
  border: none;
  margin-right: 0;
}
.dash-chip {
  padding: 0 11px;
  height: 24px;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s ease, color 0.12s ease, box-shadow 0.12s ease;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  letter-spacing: 0.01em;
}
.dash-chip:hover {
  color: var(--ink);
  background: rgba(26,29,35,0.04);
}
.dash-chip.is-active {
  background: var(--surface);
