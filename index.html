<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wonderful Citrus · PickTrace 3.0 Migration Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   Design tokens — warm, editorial, Wonderful-inspired
   ========================================================== */
:root {
  --bg: #F7F3EC;
  --bg-2: #FBF8F3;
  --bg-3: #F1ECE2;
  --surface: #FFFFFF;
  --ink: #1A1D23;
  --ink-2: #3D4148;
  --ink-3: #6B6860;
  --muted: #9A948A;
  --line: #E9E3D6;
  --line-2: #D6CFC2;
  --citrus: #E8763A;
  --citrus-deep: #C95D26;
  --citrus-soft: #FBE8D8;
  --citrus-glow: rgba(232,118,58,0.14);
  --leaf: #4A7C59;
  --leaf-soft: #E1EBE3;
  --sun: #D97706;
  --sun-soft: #FCEBD3;
  --danger: #B23A48;
  --danger-soft: #F8DFE2;
  --blocked: #735785;
  --blocked-soft: #EADFF0;
  --info: #3E6F9A;
  --info-soft: #E5EEF5;
  --font-display: "Fraunces", "Iowan Old Style", Georgia, serif;
  --font-body: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-pill: 999px;
  --shadow-sm: 0 1px 2px rgba(26,29,35,0.04);
  --shadow-md: 0 4px 14px rgba(26,29,35,0.07);
  --shadow-lg: 0 16px 40px rgba(26,29,35,0.10);
  --ring: 0 0 0 3px rgba(232,118,58,0.22);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, a:focus-visible {
  outline: none;
  box-shadow: var(--ring);
  border-radius: var(--radius-sm);
}
input, textarea, select { font: inherit; color: inherit; }
a { color: var(--citrus-deep); text-decoration: none; }
a:hover { color: var(--citrus); text-decoration: underline; }
::selection { background: var(--citrus); color: white; }

/* ==========================================================
   App shell
   ========================================================== */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: 60px 1fr;
  grid-template-areas: "topbar topbar" "sidebar main";
  min-height: 100vh;
}

/* ---------- Topbar ---------- */
.topbar {
  grid-area: topbar;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.brand { display: flex; align-items: center; gap: 11px; }
.brand-mark {
  display: inline-block;
  height: 44px;
  width: auto;
  color: var(--citrus-deep);
  flex-shrink: 0;
  line-height: 0;
  /* CSS-driven 3D-ish rock. The SVG itself is a flat vector; perspective
     + rotateY tilts it left/right like a sign swaying on a pivot. Free
     (no JS, no WebGL, no redraws of a 3D scene). */
  animation: brand-rock 6s ease-in-out infinite;
  transform-origin: 50% 50%;
  will-change: transform;
}
.brand-mark svg {
  height: 100%;
  width: auto;
  display: block;
}
@keyframes brand-rock {
  0%, 100% { transform: perspective(320px) rotateY(-22deg); }
  50%      { transform: perspective(320px) rotateY( 22deg); }
}
.brand-text {
  font-family: var(--font-display);
  font-weight: 600; font-size: 17px;
  letter-spacing: -0.015em; line-height: 1;
}
.brand-sub {
  display: block;
  font-family: var(--font-body);
  font-size: 10px; font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-top: 4px;
}
.topbar-spacer { flex: 1; }
.countdown {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: var(--radius-pill);
  background: var(--citrus-soft); color: var(--citrus-deep);
  font-size: 12px; font-weight: 500;
}
.countdown b {
  font-family: var(--font-display); font-weight: 600;
  font-size: 14px; font-variant-numeric: tabular-nums;
}
.topbar-actions { display: flex; gap: 6px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500;
  transition: all 0.15s ease;
}
.btn-outline {
  border: 1px solid var(--line-2);
  background: var(--surface);
  color: var(--ink-2);
}
.btn-outline:hover { border-color: var(--citrus); color: var(--citrus-deep); background: var(--citrus-soft); }
.btn-ghost { color: var(--ink-3); }
.btn-ghost:hover { color: var(--citrus-deep); background: var(--citrus-soft); }
.btn-primary {
  background: var(--ink);
  color: white;
  padding: 8px 14px;
}
.btn-primary:hover { background: var(--citrus-deep); }
.btn-danger {
  background: var(--danger-soft);
  color: var(--danger);
}
.btn-danger:hover { background: var(--danger); color: white; }

.lock-indicator {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 500;
  background: var(--leaf-soft); color: var(--leaf);
}
.lock-indicator.is-locked { background: var(--sun-soft); color: var(--sun); }

/* ---------- Sidebar ---------- */
.sidebar {
  grid-area: sidebar;
  background: var(--surface);
  border-right: 1px solid var(--line);
  padding: 20px 14px;
  overflow-y: auto;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
}
.sidebar-heading {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
  padding: 0 8px 8px;
}
.nav-link {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 8px 10px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; color: var(--ink-2);
  text-align: left;
  position: relative;
  transition: all 0.15s ease;
}
.nav-link:hover { background: var(--bg-3); }
.nav-link.is-active { background: var(--citrus-soft); color: var(--citrus-deep); }
.nav-num {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 500;
  color: var(--muted);
  min-width: 22px;
}
.nav-link.is-active .nav-num { color: var(--citrus); }
.nav-progress {
  margin-left: auto;
  font-size: 10px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.sidebar-divider {
  border-top: 1px solid var(--line);
  margin: 16px 8px;
}
.sidebar-stats { padding: 0 8px; }
.stat-row {
  display: flex; justify-content: space-between;
  padding: 5px 0; font-size: 12px;
}
.stat-row .k { color: var(--ink-3); }
.stat-row .v {
  font-weight: 600; color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.stat-row.is-urgent .v { color: var(--danger); }
.stat-row.is-blocked .v { color: var(--blocked); }
.stat-row.is-complete .v { color: var(--leaf); }

.tab-nav {
  display: flex; gap: 2px;
  padding: 4px 8px 0;
  margin-bottom: 12px;
}
.tab-btn {
  padding: 7px 10px;
  font-size: 12px; font-weight: 500;
  color: var(--ink-3);
  border-radius: var(--radius-sm);
  flex: 1;
  transition: all 0.15s ease;
}
.tab-btn:hover { background: var(--bg-3); color: var(--ink-2); }
.tab-btn.is-active {
  background: var(--ink);
  color: white;
}

/* ---------- Main ---------- */
.main {
  grid-area: main;
  padding: 28px 32px 80px;
  max-width: 1180px;
}

.hero {
  margin-bottom: 28px;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--line);
  position: relative;
}
.hero-kicker {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--citrus-deep);
  padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--citrus-soft);
  margin-bottom: 16px;
}
.hero-title {
  font-family: var(--font-display);
  font-size: 44px; font-weight: 500;
  line-height: 1.05; letter-spacing: -0.025em;
  margin: 0 0 10px;
  color: var(--ink);
}
.hero-title em {
  color: var(--citrus-deep);
  font-style: italic; font-weight: 400;
}
.hero-subtitle {
  max-width: 640px;
  color: var(--ink-3);
  font-size: 15px; line-height: 1.55;
  margin: 0;
}
.hero-progress {
  margin-top: 22px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 18px;
}
.progress-track {
  height: 8px;
  background: var(--bg-3);
  border-radius: var(--radius-pill);
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--citrus) 0%, var(--citrus-deep) 100%);
  border-radius: var(--radius-pill);
  transition: width 0.4s ease;
}
.progress-label {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.progress-label .num { color: var(--citrus-deep); }
.progress-label .sub {
  font-family: var(--font-body); font-size: 11px;
  font-weight: 500; color: var(--muted);
  display: block; margin-top: 2px;
}

/* ---------- Tabs ---------- */
.view-tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 22px;
}
.view-tab {
  padding: 10px 16px;
  font-size: 13px; font-weight: 500;
  color: var(--ink-3);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  position: relative;
  transition: all 0.15s ease;
  display: inline-flex; align-items: center; gap: 7px;
}
.view-tab:hover { color: var(--ink); }
.view-tab.is-active {
  color: var(--citrus-deep);
}
.view-tab.is-active::after {
  content: "";
  position: absolute;
  bottom: -1px; left: 16px; right: 16px;
  height: 2px;
  background: var(--citrus);
  border-radius: 2px 2px 0 0;
}
.view-tab .count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px;
  padding: 0 5px; border-radius: var(--radius-pill);
  background: var(--bg-3);
  font-size: 10px; font-weight: 600;
  color: var(--ink-3);
}
.view-tab.is-active .count { background: var(--citrus-soft); color: var(--citrus-deep); }
.view-panel { display: none; }
.view-panel.is-active { display: block; }

/* ---------- Filter bar ---------- */
.filter-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.search-wrap {
  flex: 1; max-width: 320px;
  position: relative;
}
.search-wrap svg {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}
.search {
  width: 100%;
  padding: 9px 12px 9px 34px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 13px;
  transition: all 0.15s ease;
}
.search:focus {
  border-color: var(--citrus);
  outline: none;
  box-shadow: var(--ring);
}
.chip-group { display: flex; gap: 4px; }
.chip {
  padding: 6px 11px; border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 500;
  color: var(--ink-3);
  background: var(--surface);
  border: 1px solid var(--line-2);
  transition: all 0.15s ease;
}
.chip:hover { border-color: var(--ink-3); color: var(--ink-2); }
.chip.is-on {
  background: var(--ink); color: white;
  border-color: var(--ink);
}
.chip.is-on.chip-urgent { background: var(--danger); border-color: var(--danger); }

/* ---------- Attention panel ---------- */
.attention {
  background: linear-gradient(135deg, #fff 0%, var(--citrus-soft) 100%);
  border: 1px solid rgba(232,118,58,0.2);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}
.attention-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.attention-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 600;
  letter-spacing: -0.015em;
  color: var(--ink);
}
.attention-meta {
  margin-left: auto;
  font-size: 11px; color: var(--ink-3);
}
.attention-list {
  display: grid; gap: 7px;
}
.attention-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid rgba(232,118,58,0.15);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.12s ease;
}
.attention-item:hover { border-color: var(--citrus); transform: translateX(2px); }
.attention-item .dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.attention-item .dot.urgent { background: var(--danger); }
.attention-item .dot.blocked { background: var(--blocked); }
.attention-item .dot.due { background: var(--sun); }
.attention-item .title { flex: 1; color: var(--ink); font-weight: 500; }
.attention-item .meta { font-size: 11px; color: var(--muted); }

/* ---------- Phase sections ---------- */
.phase {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--line);
  margin-bottom: 16px;
  overflow: hidden;
  transition: box-shadow 0.15s ease;
}
.phase:hover { box-shadow: var(--shadow-sm); }
.phase.is-open { box-shadow: var(--shadow-sm); }

.phase-header {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s ease;
}
.phase-header:hover { background: var(--bg-2); }
.phase-num {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 500;
  color: var(--muted);
  min-width: 28px;
  letter-spacing: 0.05em;
}
.phase-title {
  font-family: var(--font-display);
  font-size: 19px; font-weight: 600;
  letter-spacing: -0.015em;
  color: var(--ink);
  flex: 1;
}
.phase-window {
  font-size: 11px; color: var(--muted);
  margin-left: 12px;
  white-space: nowrap;
}
.phase-stats {
  display: flex; align-items: center; gap: 14px;
  font-size: 11px;
}
.phase-stat {
  display: flex; align-items: center; gap: 4px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.phase-stat .n { font-weight: 600; color: var(--ink); }
.phase-stat.is-complete .n { color: var(--leaf); }
.phase-stat.is-urgent .n { color: var(--danger); }
.phase-ring {
  position: relative;
  width: 32px; height: 32px;
  flex-shrink: 0;
}
.phase-ring svg { transform: rotate(-90deg); }
.phase-ring circle { fill: none; stroke-width: 3; }
.phase-ring .bg { stroke: var(--line); }
.phase-ring .fg {
  stroke: var(--citrus);
  stroke-dasharray: var(--dash, 0 100);
  transition: stroke-dasharray 0.4s ease;
}
.phase-ring .pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600;
  color: var(--ink-2);
  font-variant-numeric: tabular-nums;
}
.phase-chevron {
  color: var(--muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.phase.is-open .phase-chevron { transform: rotate(180deg); }

.phase-body {
  display: none;
  padding: 0 20px 18px;
  border-top: 1px solid var(--line);
}
.phase.is-open .phase-body { display: block; }

.phase-desc {
  padding: 14px 0;
  font-size: 13px; color: var(--ink-3);
  line-height: 1.55;
  border-bottom: 1px dashed var(--line);
  margin-bottom: 14px;
}

.group-title {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
  margin: 14px 0 8px;
}
.group-title:first-child { margin-top: 4px; }

/* ---------- Task card ---------- */
.task {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  background: var(--surface);
  transition: all 0.12s ease;
  overflow: hidden;
}
.task:hover { border-color: var(--line-2); }
.task.is-urgent { border-left: 3px solid var(--danger); }
.task.is-complete { opacity: 0.72; }
.task.is-expanded { border-color: var(--citrus); box-shadow: 0 2px 8px rgba(232,118,58,0.08); }

.task-header {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  cursor: pointer;
}
.task-status {
  position: relative;
  flex-shrink: 0;
}
.task-status-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 9px;
  border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 500;
  border: 1px solid transparent;
  transition: all 0.12s ease;
}
.task-status-btn:hover { box-shadow: var(--shadow-sm); }
.task-status-btn::after {
  content: ""; display: inline-block;
  width: 0; height: 0;
  border-left: 3px solid transparent;
  border-right: 3px solid transparent;
  border-top: 4px solid currentColor;
  margin-left: 2px; opacity: 0.6;
}
.status-not_started { background: var(--bg-3); color: var(--ink-3); }
.status-in_progress { background: var(--info-soft); color: var(--info); }
.status-complete { background: var(--leaf-soft); color: var(--leaf); }
.status-blocked { background: var(--blocked-soft); color: var(--blocked); }

.task-status-menu {
  position: absolute; top: calc(100% + 4px); left: 0;
  background: var(--surface);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  padding: 4px;
  min-width: 160px;
  z-index: 20;
  display: none;
}
.task-status-menu.is-open { display: block; }
/* When a status dropdown is open, let it escape the rounded/clipping ancestors */
.task:has(.task-status-menu.is-open),
.phase:has(.task-status-menu.is-open) { overflow: visible; }
.task-status-menu button {
  display: flex; align-items: center; gap: 8px;
  width: 100%;
  padding: 7px 10px;
  border-radius: 5px;
  font-size: 12px; font-weight: 500;
  text-align: left;
  transition: background 0.1s ease;
}
.task-status-menu button:hover { background: var(--bg-2); }
.task-status-menu .dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.task-status-menu .kbd {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
}

.task-title {
  font-size: 13px; font-weight: 500;
  color: var(--ink);
  line-height: 1.4;
}
.task.is-complete .task-title { text-decoration: line-through; color: var(--ink-3); }

.task-badges {
  display: flex; gap: 5px; align-items: center;
}
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 500;
}
.badge-urgent { background: var(--danger-soft); color: var(--danger); }
.badge-priority { background: var(--sun-soft); color: var(--sun); }
.badge-owner {
  background: var(--bg-3); color: var(--ink-3);
  max-width: 100px; overflow: hidden;
  white-space: nowrap; text-overflow: ellipsis;
}
.badge-due { background: var(--info-soft); color: var(--info); }
.badge-due.is-overdue { background: var(--danger-soft); color: var(--danger); }
.badge-bugs { background: var(--sun-soft); color: var(--sun); }
.badge-bugs.has-critical { background: var(--danger-soft); color: var(--danger); }

.task-chevron {
  color: var(--muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.task.is-expanded .task-chevron { transform: rotate(180deg); }

.task-body {
  display: none;
  padding: 0 14px 14px;
  border-top: 1px dashed var(--line);
  margin-top: 0;
  padding-top: 12px;
}
.task.is-expanded .task-body { display: block; }

.task-desc {
  font-size: 13px; color: var(--ink-3);
  padding: 2px 0 10px;
  line-height: 1.55;
}

.task-fields {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));

function defaultTaskState(t) {
  return {
    status: t.defaultStatus || "not_started",
    urgent: t.urgent || false,
    priority: t.priority || null,
    notes: "",
    owner: "",
    dueDate: "",
    updated: null,
    bugs: []

}

function hydrateState(raw) {
  const out = raw || {};
  Object.values(TASK_INDEX).forEach(t => {
    if (!out[t.id]) out[t.id] = defaultTaskState(t);
    else {
      const d = defaultTaskState(t);
      for (const k of Object.keys(d)) if (!(k in out[t.id])) out[t.id][k] = d[k];
    }
  });
  return out;
}

/* ============================================================================
   ENCRYPTION (Web Crypto: PBKDF2 + AES-GCM)
   ============================================================================ */
const enc = new TextEncoder();
const dec = new TextDecoder();

function buf2b64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function b642buf(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }

async function deriveKey(passphrase, salt) {
  const material = await crypto.subtle.importKey("raw", enc.encode(passphrase), { name: "PBKDF2" }, false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" },
    material, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
}

async function encryptPayload(plaintext, passphrase) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(passphrase, salt);
  const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(plaintext));
  return { v: 1, salt: buf2b64(salt), iv: buf2b64(iv), data: buf2b64(ciphertext) };
}

async function decryptPayload(payload, passphrase) {
  const salt = b642buf(payload.salt);
  const iv = b642buf(payload.iv);
  const ciphertext = b642buf(payload.data);
  const key = await deriveKey(passphrase, salt);
  const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
  return dec.decode(plaintext);
}

/* ============================================================================
   STORAGE LAYER
   ============================================================================ */
function getLockConfig() {
  try { return JSON.parse(localStorage.getItem(LOCK_KEY)) || { enabled: false }; }
  catch { return { enabled: false }; }
}
function setLockConfig(cfg) { localStorage.setItem(LOCK_KEY, JSON.stringify(cfg)); }

async function saveState() {
  const json = JSON.stringify(STATE);
  const lockCfg = getLockConfig();
  if (lockCfg.enabled && PASSPHRASE) {
    const payload = await encryptPayload(json, PASSPHRASE);
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ encrypted: true, payload }));
  } else {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ encrypted: false, data: json }));
  }
}

async function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return hydrateState({});
    const wrapped = JSON.parse(raw);
    if (wrapped.encrypted) {
      if (!PASSPHRASE) throw new Error("locked");
      const json = await decryptPayload(wrapped.payload, PASSPHRASE);
      return hydrateState(JSON.parse(json));
    }
    return hydrateState(JSON.parse(wrapped.data || raw));
  } catch (e) {
    if (e.message === "locked") throw e;
    console.warn("State load failed, starting fresh", e);
    return hydrateState({});
  }
}

function saveUI() { localStorage.setItem(UI_KEY, JSON.stringify(UI)); }
function loadUI() {
  try { return { ...defaultUI(), ...JSON.parse(localStorage.getItem(UI_KEY) || "{}") }; }
  catch { return defaultUI(); }
}

/* ============================================================================
   UTILITIES

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const h = (tag, attrs = {}, children = []) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") el.className = v;
    else if (k === "html") el.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") el.addEventListener(k.slice(2), v);
    else if (k === "data") Object.entries(v).forEach(([dk, dv]) => el.dataset[dk] = dv);
    else if (v === true) el.setAttribute(k, "");
    else if (v !== false && v != null) el.setAttribute(k, v);
  }
  const kids = Array.isArray(children) ? children : [children];
  kids.forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === "string" || typeof c === "number") el.appendChild(document.createTextNode(String(c)));
    else el.appendChild(c);
  });
  return el;
};

function daysUntil(dateStr) {
  const target = new Date(dateStr + "T00:00:00");
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((target - now) / (1000 * 60 * 60 * 24));
}

/* Local (non-UTC) date formatters. toISOString() converts to UTC which
   silently shifts the date by a day for most US timezones — these keep
   calendar cells, due dates, and exported events aligned to the user's
   wall clock. */
function ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function ym(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  return `${y}-${m}`;
}

function fmtDate(dateStr) {
  if (!dateStr) return "";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function fmtDateShort(dateStr) {
  if (!dateStr) return "";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function uid() { return "b_" + Math.random().toString(36).slice(2, 10); }

/* ============================================================================
   COMPUTED STATS
   ============================================================================ */
function phaseStats(phase) {
  let total = 0, complete = 0, urgent = 0, inProgress = 0, blocked = 0, bugs = 0;
  phase.groups.forEach(g => g.tasks.forEach(t => {
    total++;
    const s = STATE[t.id];
    if (!s) return;
    if (s.status === "complete") complete++;
    if (s.status === "in_progress") inProgress++;
    if (s.status === "blocked") blocked++;
    if (s.urgent) urgent++;
    bugs += (s.bugs || []).filter(b => b.status === "open" || b.status === "in_progress").length;
  }));
  const pct = total ? Math.round((complete / total) * 100) : 0;
  return { total, complete, urgent, inProgress, blocked, bugs, pct };
}

function globalStats() {
  let total = 0, complete = 0, urgent = 0, blocked = 0, bugsOpen = 0, bugsCritical = 0, bugsResolved = 0, bugsHigh = 0;
  Object.entries(STATE).forEach(([id, s]) => {
    total++;
    if (s.status === "complete") complete++;
    if (s.urgent) urgent++;
    if (s.status === "blocked") blocked++;
    (s.bugs || []).forEach(b => {
      if (b.status === "resolved") bugsResolved++;
      else if (b.status === "open" || b.status === "in_progress") {
        bugsOpen++;
        if (b.severity === "critical") bugsCritical++;
        if (b.severity === "high") bugsHigh++;
      }
    });
  });
  return { total, complete, urgent, blocked, bugsOpen, bugsCritical, bugsResolved, bugsHigh, pct: total ? Math.round((complete / total) * 100) : 0 };
}

function allBugsWithContext() {
  const bugs = [];
  Object.entries(STATE).forEach(([tid, s]) => {
    (s.bugs || []).forEach(b => {
      bugs.push({ ...b, taskId: tid, taskTitle: TASK_INDEX[tid]?.title || tid });
    });
  });
  return bugs;
}

function eventsOnDate(dateStr) {
  const events = [];
  MILESTONES.forEach(m => {
    if (m.date === dateStr) events.push({ ...m, kind: "milestone" });
  });
  Object.entries(STATE).forEach(([tid, s]) => {
    if (s.dueDate === dateStr) {
      const t = TASK_INDEX[tid];
      events.push({
        title: t.title, taskId: tid,
        kind: "task", complete: s.status === "complete", urgent: s.urgent
      });
    }
  });
  const d = new Date(dateStr + "T00:00:00");
  const dow = d.getDay();
  RECURRING.forEach(r => {
    if (r.dayOfWeek === dow && dateStr >= r.startDate && dateStr <= r.endDate) {
      events.push({ title: r.title, desc: r.desc, kind: "recurring" });
    }
  });
  return events;
}

function attentionItems() {
  const items = [];
  const now = new Date(); now.setHours(0,0,0,0);
  Object.entries(STATE).forEach(([tid, s]) => {
    const t = TASK_INDEX[tid];
    if (!t) return;
    if (s.status === "complete") return;
    if (s.urgent) items.push({ tid, kind: "urgent", label: "Urgent" });
    else if (s.status === "blocked") items.push({ tid, kind: "blocked", label: "Blocked" });
    else if (s.dueDate) {
      const due = new Date(s.dueDate + "T00:00:00");
      const diff = Math.round((due - now) / (86400000));
      if (diff < 0) items.push({ tid, kind: "urgent", label: `Overdue ${Math.abs(diff)}d` });
      else if (diff <= 3) items.push({ tid, kind: "due", label: `Due in ${diff}d` });
    }
    // P0 bugs
    const crit = (s.bugs || []).filter(b => b.severity === "critical" && b.status !== "resolved" && b.status !== "wont_fix").length;
    if (crit > 0) items.push({ tid, kind: "urgent", label: `${crit} critical bug${crit > 1 ? "s" : ""}` });
  });
  // Sort: urgent first, then blocked, then due
  const order = { urgent: 0, blocked: 1, due: 2 };
  items.sort((a, b) => order[a.kind] - order[b.kind]);
  return items;
}

function renderPhaseList() {
  const list = $("#phase-list");
  if (!list) return;
  list.innerHTML = "";

  const q = (UI.search || "").toLowerCase().trim();
  const matchesFilter = (t) => {
    const s = STATE[t.id];
    if (UI.statusFilter !== "all" && s.status !== UI.statusFilter) return false;
    if (UI.urgentOnly && !s.urgent) return false;
    if (q) {
      const hay = (t.title + " " + (t.desc || "") + " " + (s.notes || "") + " " + (s.owner || "")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  };

  PHASES.forEach(p => {
    // build filtered groups for this phase
    const visibleGroups = p.groups.map(g => ({
      ...g,
      tasks: g.tasks.filter(matchesFilter)
    })).filter(g => g.tasks.length > 0);

    // if filtering and nothing matches, skip
    const isFiltering = q || UI.statusFilter !== "all" || UI.urgentOnly;
    if (isFiltering && visibleGroups.length === 0) return;

    const isOpen = UI.openPhases[p.id] || isFiltering;
    const st = phaseStats(p);

    const header = h("div", { class: "phase-header" }, [
      h("span", { class: "phase-num" }, p.num),
      h("div", { class: "phase-title" }, p.title),
      h("div", { class: "phase-window" }, p.window),
      h("div", { class: "phase-stats" }, [
        st.urgent > 0 ? h("div", { class: "phase-stat is-urgent" }, [h("span", { class: "n" }, st.urgent), h("span", {}, "urgent")]) : null,
        st.bugs > 0 ? h("div", { class: "phase-stat" }, [h("span", { class: "n" }, st.bugs), h("span", {}, "bugs")]) : null,
        h("div", { class: "phase-stat is-complete" }, [
          h("span", { class: "n" }, `${st.complete}/${st.total}`),
          h("span", {}, "done")
        ])
      ]),
      h("div", { class: "phase-ring", style: `--dash: ${st.pct} ${100 - st.pct}` }, [
        h("span", { class: "pct" }, st.pct + "%"),
        (() => {
          const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
          svg.setAttribute("width", "32"); svg.setAttribute("height", "32"); svg.setAttribute("viewBox", "0 0 32 32");
          const bg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          bg.setAttribute("cx","16"); bg.setAttribute("cy","16"); bg.setAttribute("r","14");
          bg.setAttribute("class","bg");
          svg.appendChild(bg);
          const fg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          fg.setAttribute("cx","16"); fg.setAttribute("cy","16"); fg.setAttribute("r","14");
          fg.setAttribute("pathLength","100"); fg.setAttribute("class","fg");
          svg.appendChild(fg);
          return svg;
        })()
      ]),
      h("div", { class: "phase-chevron", html: ICONS.chevron })
    ]);
    header.addEventListener("click", () => {
      UI.openPhases[p.id] = !UI.openPhases[p.id];
      saveUI();
      renderPhaseList();
    });

    const body = h("div", { class: "phase-body" });
    body.appendChild(h("div", { class: "phase-desc" }, p.desc));
    visibleGroups.forEach(g => {
      body.appendChild(h("div", { class: "group-title" }, g.title));
      g.tasks.forEach(t => body.appendChild(renderTask(t)));
    });

    const phase = h("section", {
      class: "phase" + (isOpen ? " is-open" : ""),
      id: "phase-" + p.id
    }, [header, body]);
    list.appendChild(phase);
  });

  if (list.children.length === 0) {
    list.appendChild(h("div", { class: "empty" }, [
      h("span", { class: "empty-emoji" }, "🔍"),
      h("div", {}, "No tasks match your filters")
    ]));
  }
}

/* ============================================================================
   TASK CARD
   ============================================================================ */
function renderTask(t) {
  const s = STATE[t.id];
  const isExpanded = UI.openTasks[t.id];
  const bugs = s.bugs || [];
  const openBugs = bugs.filter(b => b.status === "open" || b.status === "in_progress");
  const criticalBugs = openBugs.filter(b => b.severity === "critical").length;
  const overdue = s.dueDate && s.status !== "complete" && new Date(s.dueDate + "T00:00:00") < new Date(new Date().toDateString());

  const header = h("div", { class: "task-header" }, [
    // Status button
    h("div", { class: "task-status" }, [
      h("button", {
        class: "task-status-btn status-" + s.status,
        onclick: (e) => { e.stopPropagation(); toggleStatusMenu(t.id); }
      }, STATUS_LABELS[s.status]),
      renderStatusMenu(t.id)
    ]),
    h("div", { class: "task-title" }, t.title),
    h("div", { class: "task-badges" }, [
      s.urgent ? h("span", { class: "badge badge-urgent", html: ICONS.fire + "<span>Urgent</span>" }) : null,
      s.priority === "priority" ? h("span", { class: "badge badge-priority" }, "★ Priority") : null,
      s.owner ? h("span", { class: "badge badge-owner", title: "Owner: " + s.owner }, "@" + s.owner) : null,
      s.dueDate ? h("span", {
        class: "badge badge-due" + (overdue ? " is-overdue" : ""),
        title: overdue ? "Overdue" : "Due " + fmtDate(s.dueDate)
      }, (overdue ? "⚠ " : "") + fmtDateShort(s.dueDate)) : null,
      openBugs.length > 0 ? h("span", {
        class: "badge badge-bugs" + (criticalBugs > 0 ? " has-critical" : "")
      }, openBugs.length + " bug" + (openBugs.length > 1 ? "s" : "")) : null
    ].filter(Boolean)),
    h("div", { class: "task-chevron", html: ICONS.chevron })
  ]);
  header.addEventListener("click", (e) => {
    if (e.target.closest(".task-status-menu") || e.target.closest(".task-status-btn")) return;
    UI.openTasks[t.id] = !UI.openTasks[t.id];
    saveUI();
    renderPhaseList();
  });

  const task = h("div", {
    class: "task" +
      (s.urgent ? " is-urgent" : "") +
      (s.status === "complete" ? " is-complete" : "") +
      (isExpanded ? " is-expanded" : ""),
    id: "task-" + t.id
  }, [header]);

  if (isExpanded) {
    const body = h("div", { class: "task-body" });
    if (t.desc) body.appendChild(h("div", { class: "task-desc" }, t.desc));

    // Editable fields
    body.appendChild(h("div", { class: "task-fields" }, [
      h("div", {}, [
        h("label", { class: "field-label" }, "Owner"),
        h("input", {
          class: "field-input", type: "text",
          value: s.owner || "", placeholder: "Unassigned",
          onchange: (e) => updateTaskField(t.id, "owner", e.target.value)
        })
      ]),
      h("div", {}, [
        h("label", { class: "field-label" }, "Due date"),
        h("input", {
          class: "field-input", type: "date",
          value: s.dueDate || "",
          onchange: (e) => updateTaskField(t.id, "dueDate", e.target.value)
        })
      ]),
      h("div", {}, [
        h("label", { class: "field-label" }, "Last updated"),
        h("div", { style: "font-size:11px;color:var(--muted);padding:7px 0;" },
          s.updated ? new Date(s.updated).toLocaleString() : "Never")
      ])
    ]));

    body.appendChild(h("label", { class: "field-label" }, "Notes"));
    body.appendChild(h("textarea", {
      class: "notes-area", placeholder: "Progress notes, blockers, decisions, links…",
      value: s.notes || "",
      onchange: (e) => updateTaskField(t.id, "notes", e.target.value)
    }));

    body.appendChild(h("div", { class: "task-actions" }, [
      h("button", {
        class: "mini-btn" + (s.urgent ? " is-on" : ""),

      }, [
        h("span", { html: ICONS.fire }),
        h("span", {}, s.urgent ? "Unmark urgent" : "Mark urgent")
      ])
    ]));

    // Bugs section

    task.appendChild(body);
  }

  return task;
}

/* ============================================================================
   CALENDAR VIEW
   ============================================================================ */
function renderCalendarView(main) {
  const [yearStr, monthStr] = UI.calMonth.split("-");
  const year = parseInt(yearStr, 10);
  const month = parseInt(monthStr, 10) - 1;
  const monthDate = new Date(year, month, 1);
  const monthName = monthDate.toLocaleDateString("en-US", { month: "long", year: "numeric" });

  const wrap = h("div", { class: "calendar-wrap" });

  // Header
  wrap.appendChild(h("div", { class: "cal-header" }, [
    h("div", { class: "cal-title" }, monthName),
    h("button", {
      class: "cal-today-btn",
      onclick: () => { UI.calMonth = ym(new Date()); saveUI(); renderMain(); }
    }, "Today"),
    h("div", { class: "cal-nav" }, [
      h("button", {
        class: "cal-nav-btn", html: ICONS.chevLeft,
        onclick: () => { UI.calMonth = shiftMonth(UI.calMonth, -1); saveUI(); renderMain(); }
      }),
      h("button", {
        class: "cal-nav-btn", html: ICONS.chevRight,
        onclick: () => { UI.calMonth = shiftMonth(UI.calMonth, 1); saveUI(); renderMain(); }
      })
    ]),
    h("button", {
      class: "btn btn-outline",
      onclick: exportICS,
      html: ICONS.download + "<span>Export .ics</span>"
    })
  ]));

  // Grid
  const grid = h("div", { class: "cal-grid" });
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d => {
    grid.appendChild(h("div", { class: "cal-dow" }, d));
  });

  const firstDay = new Date(year, month, 1);
  const firstWeekday = firstDay.getDay();
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const prevLastDay = new Date(year, month, 0).getDate();

  const today = new Date();
  const todayStr = ymd(today);

  // Leading empty days (previous month)
  for (let i = firstWeekday - 1; i >= 0; i--) {
    const dayNum = prevLastDay - i;
    const d = new Date(year, month - 1, dayNum);
    grid.appendChild(renderCalDay(d, { otherMonth: true, todayStr }));
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    grid.appendChild(renderCalDay(new Date(year, month, d), { todayStr }));
  }
  // Trailing days (next month)
  const totalCells = grid.children.length - 7;
  const trailing = (7 - (totalCells % 7)) % 7;
  for (let d = 1; d <= trailing; d++) {
    grid.appendChild(renderCalDay(new Date(year, month + 1, d), { otherMonth: true, todayStr }));
  }

  wrap.appendChild(grid);

  // Legend
  wrap.appendChild(h("div", { class: "cal-legend" }, [
    h("div", { class: "legend-item" }, [h("span", { class: "legend-dot milestone" }), h("span", {}, "Milestone")]),
    h("div", { class: "legend-item" }, [h("span", { class: "legend-dot task" }), h("span", {}, "Task due")]),
    h("div", { class: "legend-item" }, [h("span", { class: "legend-dot complete" }), h("span", {}, "Complete")]),
    h("div", { class: "legend-item" }, [h("span", { class: "legend-dot recurring" }), h("span", {}, "Recurring")])
  ]));

  main.appendChild(wrap);

  // Upcoming list
  const upcoming = getUpcoming(30);
  const upWrap = h("div", { class: "cal-upcoming" }, [
    h("h3", {}, "Next 30 days")
  ]);
  if (upcoming.length === 0) {
    upWrap.appendChild(h("div", { class: "empty" }, [
      h("span", { class: "empty-emoji" }, "📅"),
      h("div", {}, "Nothing scheduled in the next 30 days")
    ]));
  } else {
    upcoming.forEach(ev => {
      upWrap.appendChild(h("div", {
        class: "upcoming-item",
        onclick: () => ev.taskId ? jumpToTask(ev.taskId) : null
      }, [
        h("div", { class: "upcoming-date" }, fmtDateShort(ev.date)),
        h("div", { class: "upcoming-title" }, ev.title),
        h("div", { class: "upcoming-meta" },
          ev.kind === "milestone" ? "Milestone" :
          ev.kind === "recurring" ? "Recurring" :
          ev.complete ? "Complete" : "Task due")
      ]));
    });
  }
  main.appendChild(upWrap);
}

function renderCalDay(date, opts) {
  const dateStr = ymd(date);
  const dayNum = date.getDate();
  const events = eventsOnDate(dateStr);
  const dow = date.getDay();
  const isWeekend = dow === 0 || dow === 6;

  const classes = ["cal-day"];
  if (opts.otherMonth) classes.push("is-other-month");
  if (dateStr === opts.todayStr) classes.push("is-today");
  if (isWeekend) classes.push("is-weekend");

  const cell = h("div", {
    class: classes.join(" "),
    onclick: () => events.length > 0 && showDayModal(dateStr, events)
  }, [
    h("div", { class: "cal-daynum" }, dayNum),
    h("div", { class: "cal-events" }, [
      ...events.slice(0, 3).map(ev => {
        let cls = "cal-event";
        if (ev.kind === "milestone" || ev.type === "critical") cls += " is-milestone";
        if (ev.kind === "recurring") cls += " is-recurring";
        if (ev.kind === "task" && ev.complete) cls += " is-complete";
        return h("div", { class: cls, title: ev.title }, ev.title);
      }),
      events.length > 3 ? h("div", { class: "cal-event-more" }, `+${events.length - 3} more`) : null
    ].filter(Boolean))
  ]);
  return cell;
}

function shiftMonth(ymStr, delta) {
  const [y, m] = ymStr.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return ym(d);
}

function getUpcoming(days) {
  const now = new Date(); now.setHours(0,0,0,0);
  const end = new Date(now); end.setDate(end.getDate() + days);
  const out = [];
  MILESTONES.forEach(m => {
    const d = new Date(m.date + "T00:00:00");
    if (d >= now && d <= end) out.push({ date: m.date, title: m.title, kind: "milestone" });
  });
  Object.entries(STATE).forEach(([tid, s]) => {
    if (!s.dueDate) return;
    const d = new Date(s.dueDate + "T00:00:00");
    if (d >= now && d <= end) {
      out.push({ date: s.dueDate, title: TASK_INDEX[tid].title, kind: "task", complete: s.status === "complete", taskId: tid });
    }
  });
  // Recurring
  for (let i = 0; i <= days; i++) {
    const d = new Date(now); d.setDate(d.getDate() + i);
    const ds = ymd(d);
    const dow = d.getDay();
    RECURRING.forEach(r => {
      if (r.dayOfWeek === dow && ds >= r.startDate && ds <= r.endDate) {
        out.push({ date: ds, title: r.title, kind: "recurring" });
      }
    });
  }
  out.sort((a, b) => a.date.localeCompare(b.date));
  return out;
}

function showDayModal(dateStr, events) {
  openModal({
    title: fmtDate(dateStr),
    body: h("div", {}, events.map(ev => h("div", {
      style: "padding:10px 12px; border:1px solid var(--line); border-radius:7px; margin-bottom:6px; cursor:" + (ev.taskId ? "pointer" : "default"),
      onclick: () => { if (ev.taskId) { closeModal(); jumpToTask(ev.taskId); } }
    }, [
      h("div", { style: "font-weight:600; color:var(--ink); margin-bottom:3px;" }, ev.title),
      ev.desc ? h("div", { style: "font-size:12px; color:var(--ink-3);" }, ev.desc) : null,
      h("div", { style: "font-size:11px; color:var(--muted); margin-top:4px;" },
        ev.kind === "milestone" ? "Milestone" :
        ev.kind === "recurring" ? "Recurring event" :
        "Task" + (ev.complete ? " · complete" : ""))
    ].filter(Boolean))))
  });
}

function renderBugsView(main) {

    ]),

    ]),
    h("div", { class: "bug-stat-card" }, [
      h("div", { class: "bug-stat-num" }, gs.bugsOpen),
      h("div", { class: "bug-stat-label" }, "All open")
    ]),
    h("div", { class: "bug-stat-card" }, [
      h("div", { class: "bug-stat-num is-resolved" }, gs.bugsResolved),
      h("div", { class: "bug-stat-label" }, "Resolved")
    ]),
    h("div", { class: "bug-stat-card" }, [
      h("div", { class: "bug-stat-num" }, bugs.length),
      h("div", { class: "bug-stat-label" }, "Total tracked")
    ])
  ]));

  if (bugs.length === 0) {
    main.appendChild(h("div", { class: "empty", style: "background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:60px 20px;" }, [
      h("span", { class: "empty-emoji" }, "🎉"),
      h("div", { style: "font-size:15px; margin-bottom:6px; color:var(--ink);" }, "No bugs logged yet"),
      h("div", {}, "Expand any task in the Tasks view and click \"Add bug\" to start tracking.")
    ]));
    return;
  }

  // Sort bugs: open critical first, then open high, etc.
  const severityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
  const statusOrder = { open: 0, in_progress: 1, resolved: 2, wont_fix: 3 };
  bugs.sort((a, b) => {
    if (statusOrder[a.status] !== statusOrder[b.status]) return statusOrder[a.status] - statusOrder[b.status];
    return severityOrder[a.severity] - severityOrder[b.severity];
  });

  const list = h("div", { class: "global-bug-list" });
  bugs.forEach(b => {
    list.appendChild(h("div", {
      class: "global-bug-row",
      onclick: () => { UI.openTasks[b.taskId] = true; UI.openBugs[b.id] = true; saveUI(); setView("tasks"); setTimeout(() => jumpToTask(b.taskId), 100); }
    }, [
      h("span", { class: "bug-severity sev-" + b.severity }, SEVERITY_LABELS[b.severity]),
      h("div", {}, [
        h("div", { class: "global-bug-title" }, b.title || "(Untitled bug)"),
        h("div", { class: "global-bug-sub" }, "in " + b.taskTitle + (b.reporter ? " · @" + b.reporter : ""))
      ]),
      b.zendeskUrl ? h("a", {
        class: "bug-link zendesk", href: b.zendeskUrl, target: "_blank",
        onclick: (e) => e.stopPropagation(),
        html: ICONS.zendesk + "<span>ZD</span>"
      }) : h("span", {}, ""),
      b.airtableUrl ? h("a", {
        class: "bug-link airtable", href: b.airtableUrl, target: "_blank",
        onclick: (e) => e.stopPropagation(),
        html: ICONS.airtable + "<span>AT</span>"
      }) : h("span", {}, ""),
      h("span", { class: "bug-status-chip bst-" + b.status }, BUG_STATUS_LABELS[b.status])
    ]));
  });
  main.appendChild(list);
}

async function setStatus(taskId, status) {
  STATE[taskId].status = status;
  STATE[taskId].updated = new Date().toISOString();
  UI.statusMenu = null;
  await saveState();
  saveUI();
  renderShell();
}

async function toggleUrgent(taskId) {
  STATE[taskId].urgent = !STATE[taskId].urgent;
  STATE[taskId].updated = new Date().toISOString();
  await saveState();
  renderShell();
}

async function updateTaskField(taskId, field, value) {
  STATE[taskId][field] = value;
  STATE[taskId].updated = new Date().toISOString();
  await saveState();
  renderPhaseList();
  toast("Saved");
}

function toggleStatusMenu(taskId) {
  UI.statusMenu = UI.statusMenu === taskId ? null : taskId;
  saveUI();
  renderPhaseList();
}

async function addBug(taskId) {
  const bug = {
    id: uid(),
    title: "",
    severity: "medium",
    status: "open",
    reporter: "",
    reportedDate: ymd(new Date()),
    stepsToReproduce: "",
    resolution: "",
    zendeskUrl: "",
    airtableUrl: "",
    updated: new Date().toISOString()
  };
  STATE[taskId].bugs = STATE[taskId].bugs || [];
  STATE[taskId].bugs.push(bug);
  UI.openBugs[bug.id] = true;
  await saveState();
  saveUI();
  renderPhaseList();
  toast("Bug added");
}

async function updateBug(taskId, bugId, field, value) {
  const bug = STATE[taskId].bugs.find(b => b.id === bugId);
  if (!bug) return;
  bug[field] = value;
  bug.updated = new Date().toISOString();
  await saveState();
  // re-render to reflect any chip changes
  renderPhaseList();
}

async function deleteBug(taskId, bugId) {
  if (!confirm("Delete this bug? This can't be undone.")) return;
  STATE[taskId].bugs = (STATE[taskId].bugs || []).filter(b => b.id !== bugId);
  delete UI.openBugs[bugId];
  await saveState();
  saveUI();
  renderPhaseList();
  toast("Bug deleted");
}

function jumpToTask(taskId) {
  if (UI.view !== "tasks") setView("tasks");
  const t = TASK_INDEX[taskId];
  UI.openPhases[t.phaseId] = true;
  UI.openTasks[taskId] = true;
  saveUI();
  renderPhaseList();
  setTimeout(() => {
    const el = document.getElementById("task-" + taskId);
    if (el) {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      el.style.transition = "box-shadow 0.3s";
      el.style.boxShadow = "0 0 0 3px rgba(232,118,58,0.25)";
      setTimeout(() => el.style.boxShadow = "", 1500);
    }
  }, 100);
}

/* ============================================================================
   EXPORT / IMPORT
   ============================================================================ */
function exportJSON() {
  const lockCfg = getLockConfig();
  const data = {
    schemaVersion: 3,
    exportedAt: new Date().toISOString(),
    encrypted: false,
    state: STATE,
    lockConfig: lockCfg
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  downloadBlob(blob, `wonderful-picktrace-tracker-${ymd(new Date())}.json`);
  localStorage.setItem(BACKUP_KEY, new Date().toISOString());
  $("#backup-reminder").classList.remove("is-on");
  toast("Exported", "success");
}

function icsEscape(s) {
  return (s || "").replace(/\\/g, "\\\\").replace(/,/g, "\\,").replace(/;/g, "\\;").replace(/\n/g, "\\n");
}

function icsDate(ymd) {
  return ymd.replace(/-/g, "");
}

function exportICS() {
  const lines = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//PickTrace//Wonderful Migration Tracker v3//EN",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH",
    "X-WR-CALNAME:Wonderful Citrus PickTrace 3.0 Migration",
    "X-WR-TIMEZONE:America/Los_Angeles"
  ];
  const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";

  // Milestones
  MILESTONES.forEach((m, i) => {
    const start = icsDate(m.date);
    const endDate = new Date(m.date + "T00:00:00");
    endDate.setDate(endDate.getDate() + 1);
    const end = ymd(endDate).replace(/-/g,"");
    lines.push(
      "BEGIN:VEVENT",
      `UID:milestone-${i}-${m.date}@wonderful-picktrace`,
      `DTSTAMP:${stamp}`,
      `DTSTART;VALUE=DATE:${start}`,
      `DTEND;VALUE=DATE:${end}`,
      `SUMMARY:${icsEscape(m.title)}`,
      `DESCRIPTION:${icsEscape(m.desc || "")}`,
      `CATEGORIES:Milestone${m.type === "critical" ? ",Critical" : ""}`,
      "END:VEVENT"
    );
  });

  // Task due dates
  Object.entries(STATE).forEach(([tid, s]) => {
    if (!s.dueDate) return;
    const t = TASK_INDEX[tid];
    const start = icsDate(s.dueDate);
    const endDate = new Date(s.dueDate + "T00:00:00");
    endDate.setDate(endDate.getDate() + 1);
    const end = ymd(endDate).replace(/-/g,"");
    lines.push(
      "BEGIN:VEVENT",
      `UID:task-${tid}@wonderful-picktrace`,
      `DTSTAMP:${stamp}`,
      `DTSTART;VALUE=DATE:${start}`,
      `DTEND;VALUE=DATE:${end}`,
      `SUMMARY:${icsEscape(t.title + (s.urgent ? " [URGENT]" : ""))}`,
      `DESCRIPTION:${icsEscape((t.desc || "") + (s.notes ? "\nNotes: " + s.notes : "") + (s.owner ? "\nOwner: " + s.owner : ""))}`,
      `STATUS:${s.status === "complete" ? "COMPLETED" : s.status === "in_progress" ? "IN-PROCESS" : "NEEDS-ACTION"}`,
      `CATEGORIES:Task,${TASK_INDEX[tid].phaseId}`,
      "END:VEVENT"
    );
  });

  // Recurring weekly events
  RECURRING.forEach((r, i) => {
    const startDate = new Date(r.startDate + "T00:00:00");
    while (startDate.getDay() !== r.dayOfWeek) startDate.setDate(startDate.getDate() + 1);
    const start = ymd(startDate).replace(/-/g,"");
    const endDate = new Date(startDate); endDate.setDate(endDate.getDate() + 1);
    const end = ymd(endDate).replace(/-/g,"");
    const until = r.endDate.replace(/-/g,"") + "T235959Z";
    lines.push(
      "BEGIN:VEVENT",
      `UID:recurring-${i}@wonderful-picktrace`,
      `DTSTAMP:${stamp}`,
      `DTSTART;VALUE=DATE:${start}`,
      `DTEND;VALUE=DATE:${end}`,
      `SUMMARY:${icsEscape(r.title)}`,
      `DESCRIPTION:${icsEscape(r.desc || "")}`,
      `RRULE:FREQ=WEEKLY;UNTIL=${until}`,
      "CATEGORIES:Recurring",
      "END:VEVENT"
    );
  });

  lines.push("END:VCALENDAR");
  const ics = lines.join("\r\n");
  const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
  downloadBlob(blob, `wonderful-picktrace-calendar-${ymd(new Date())}.ics`);
  toast("Calendar exported", "success");
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function importJSON(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.state) { toast("Invalid file", "warn"); return; }
    if (!confirm("Importing will overwrite your current progress. Continue?")) return;
    STATE = hydrateState(data.state);
    if (data.lockConfig) setLockConfig(data.lockConfig);
    await saveState();
    renderShell();
    toast("Imported", "success");
  } catch (e) {
    console.error(e);
    toast("Import failed — invalid file", "warn");
  }
}

function setupPassphrase() {
  const body = h("div", {}, [
    h("div", { class: "security-notice" }, [
      h("div", { html: ICONS.alert }),
      h("div", {}, "There is no password recovery. Choose something you'll remember — if you forget it, you'll have to reset the tracker.")
    ]),
    h("label", { class: "field-label" }, "New passphrase"),
    h("input", { class: "field-input", type: "password", id: "pp-1", autocomplete: "new-password" }),
    h("label", { class: "field-label" }, "Confirm passphrase"),
    h("input", { class: "field-input", type: "password", id: "pp-2", autocomplete: "new-password" }),
    h("div", { id: "pp-error", style: "color:var(--danger);font-size:12px;margin-top:6px;min-height:18px;" })
  ]);
  const footer = [
    h("button", { class: "btn btn-outline", onclick: () => { closeModal(); openSettings(); } }, "Cancel"),
    h("button", { class: "btn btn-primary", onclick: async () => {
      const p1 = $("#pp-1").value, p2 = $("#pp-2").value;

      await saveState();
      closeModal();
      toast("Encryption enabled", "success");
      renderShell();

  const body = h("div", {}, [
    h("label", { class: "field-label" }, "Current passphrase"),
    h("input", { class: "field-input", type: "password", id: "pp-old", autocomplete: "current-password" }),
    h("label", { class: "field-label" }, "New passphrase"),
    h("input", { class: "field-input", type: "password", id: "pp-1", autocomplete: "new-password" }),

  ]);
  const footer = [
    h("button", { class: "btn btn-outline", onclick: () => { closeModal(); openSettings(); } }, "Cancel"),
    h("button", { class: "btn btn-primary", onclick: async () => {
      const old = $("#pp-old").value, p1 = $("#pp-1").value, p2 = $("#pp-2").value;

}

async function disableEncryption() {
  if (!confirm("Disable encryption? Your data will be stored in plain text on this browser.")) return;
  PASSPHRASE = null;
  setLockConfig({ enabled: false });
  await saveState();
  closeModal();
  toast("Encryption disabled");
  renderShell();
}

async function resetAll() {
  if (!confirm("Reset the tracker? This will delete all progress, bugs, and settings on this browser. Cannot be undone.")) return;
  if (!confirm("Are you absolutely sure? Export a backup first if you might want this data later.")) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(UI_KEY);
  localStorage.removeItem(LOCK_KEY);
  localStorage.removeItem(BACKUP_KEY);
  PASSPHRASE = null;
  STATE = hydrateState({});
  UI = defaultUI();
  closeModal();
  renderShell();
  toast("Tracker reset");
}

function openHelp() {
  const body = h("div", {}, [
    h("p", {}, "This tracker runs entirely in your browser. Data lives in localStorage and persists across sessions until you clear it or switch browsers."),
    h("div", { style: "margin:14px 0; padding:12px 14px; background:var(--bg-2); border-radius:7px;" }, [
      h("div", { style: "font-weight:600; margin-bottom:8px; color:var(--ink);" }, "Keyboard shortcuts"),
      h("div", { style: "display:grid; grid-template-columns:auto 1fr; gap:6px 12px; font-size:12px;" }, [
        h("kbd", {}, "/"), h("span", {}, "Focus search"),
        h("kbd", {}, "?"), h("span", {}, "Show this help"),
        h("kbd", {}, "Esc"), h("span", {}, "Close / collapse")
      ])
    ]),
    h("div", { style: "margin:14px 0;" }, [
      h("div", { style: "font-weight:600; margin-bottom:6px; color:var(--ink);" }, "Status colors"),
      h("div", { style: "display:flex; flex-wrap:wrap; gap:6px;" }, [
        h("span", { class: "task-status-btn status-not_started" }, "Not started"),
        h("span", { class: "task-status-btn status-in_progress" }, "In progress"),
        h("span", { class: "task-status-btn status-complete" }, "Complete"),
        h("span", { class: "task-status-btn status-blocked" }, "Blocked")
      ])
    ]),
    h("p", { style: "font-size:12px; color:var(--ink-3);" }, "Export a JSON backup weekly so your work survives a browser reset. The .ics export works with Google Calendar, Outlook, and Apple Calendar.")
  ]);
  openModal({ title: "How this tracker works", body });
}

/* ============================================================================
   LOCK SCREEN FLOW
   ============================================================================ */
async function attemptUnlock() {
  const input = $("#lock-input");
  const err = $("#lock-error");
  const pass = input.value;
  if (!pass) { err.textContent = "Enter your passphrase"; return; }
  PASSPHRASE = pass;
  try {
    STATE = await loadState();
    $("#lock-screen").classList.remove("is-on");
    err.textContent = "";
    boot();
  } catch (e) {
    console.error(e);
    err.textContent = "Incorrect passphrase";
    PASSPHRASE = null;
    input.value = "";
    input.focus();
  }
}

function showLockScreen() {
  $("#lock-screen").classList.add("is-on");
  setTimeout(() => $("#lock-input").focus(), 100);
}

/* ============================================================================
   BACKUP REMINDER
   ============================================================================ */
function checkBackupReminder() {
  const last = localStorage.getItem(BACKUP_KEY);
  const now = Date.now();
  if (!last) {
    // Don't nag new users; set a grace period.
    localStorage.setItem(BACKUP_KEY, new Date(now - 86400000).toISOString());
    return;
  }
  const lastMs = new Date(last).getTime();
  const daysSince = (now - lastMs) / 86400000;
  if (daysSince >= 7) {
    setTimeout(() => $("#backup-reminder").classList.add("is-on"), 1500);
  }
}

/* ============================================================================
   BOOT
   ============================================================================ */
async function boot() {
  renderShell();
  checkBackupReminder();
  // Update countdown every minute
  setInterval(() => {
    const cd = daysUntil(GO_LIVE);
    const el = document.querySelector(".countdown b");
    if (el) el.textContent = cd > 0 ? `${cd} days` : (cd === 0 ? "TODAY" : `${Math.abs(cd)}d`);
  }, 60000);
}

async function init() {
  UI = loadUI();
  const lockCfg = getLockConfig();
  if (lockCfg.enabled) {
    showLockScreen();
  } else {
    STATE = await loadState();
    boot();
  }

  // Global event wiring
  document.addEventListener("click", (e) => {
    // Close status menu when clicking outside
    if (!e.target.closest(".task-status") && UI.statusMenu) {
      UI.statusMenu = null;
      saveUI();
      renderPhaseList();
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      const overlay = $("#modal-overlay");
      if (overlay.classList.contains("is-open")) { closeModal(); return; }
      if ($("#lock-screen").classList.contains("is-on")) return;
      UI.statusMenu = null;
      saveUI();
      renderPhaseList();
      document.activeElement?.blur();
    }
    if ($("#lock-screen").classList.contains("is-on")) return;
    if (document.activeElement && ["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) return;
    if (e.key === "/" && !e.metaKey && !e.ctrlKey) {
      e.preventDefault();
      setView("tasks");
      setTimeout(() => $("#search-input")?.focus(), 100);
    }
    if (e.key === "?") {
      e.preventDefault();
      openHelp();
    }
  });

  $("#import-file").addEventListener("change", (e) => {
    const f = e.target.files[0];
    if (f) importJSON(f);
    e.target.value = "";
  });

  $("#lock-submit").addEventListener("click", attemptUnlock);
  $("#lock-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") attemptUnlock();
  });
  $("#lock-reset").addEventListener("click", async () => {
    if (!confirm("Reset the tracker? All encrypted data will be lost — this cannot be undone.")) return;
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(LOCK_KEY);
    localStorage.removeItem(UI_KEY);
    PASSPHRASE = null;
    STATE = hydrateState({});
    UI = defaultUI();
    $("#lock-screen").classList.remove("is-on");
    boot();
  });

  $("#backup-now").addEventListener("click", exportJSON);
  $("#backup-dismiss").addEventListener("click", () => {
    $("#backup-reminder").classList.remove("is-on");
    // Snooze 3 days
    const snooze = new Date(Date.now() - 4 * 86400000).toISOString();
    localStorage.setItem(BACKUP_KEY, snooze);
  });
}

init();
</script>
