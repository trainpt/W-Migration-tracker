// Add helpers for repeat cadence labels and matching.
const REPEAT_OPTIONS = ["none", "daily", "weekly", "biweekly", "monthly"];
function ordinalSuffix(n) {
  const v = n % 100;
  if (v >= 11 && v <= 13) return n + "th";
  switch (n % 10) {
    case 1: return n + "st";
    case 2: return n + "nd";
    case 3: return n + "rd";
    default: return n + "th";
  }
}
function repeatOptionLabel(value, startDateStr) {
  if (value === "none") return "Doesn't repeat";
  if (value === "daily") return "Every day";
  const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  if (!startDateStr) {
    if (value === "weekly")   return "Every week";
    if (value === "biweekly") return "Every 2 weeks";
    if (value === "monthly")  return "Every month";
  }
  const d = startDateStr ? new Date(startDateStr + "T00:00:00") : null;
  if (value === "weekly")   return d ? `Every ${dayNames[d.getDay()]}` : "Every week";
  if (value === "biweekly") return d ? `Every other ${dayNames[d.getDay()]}` : "Every 2 weeks";
  if (value === "monthly")  return d ? `Every month on the ${ordinalSuffix(d.getDate())}` : "Every month";
  return value;
}
// Returns true if `dateStr` is one of the recurrence dates given a start date.
function repeatMatches(repeat, startDateStr, dateStr) {
  if (!startDateStr) return false;
  const start = new Date(startDateStr + "T00:00:00");
  const cur = new Date(dateStr + "T00:00:00");
  if (cur < start) return false;
  if (repeat === "daily") return true;
  if (repeat === "weekly") {
    const days = Math.round((cur - start) / 86400000);
    return days % 7 === 0;
  }
  if (repeat === "biweekly") {
    const days = Math.round((cur - start) / 86400000);
    return days % 14 === 0;
  }
  if (repeat === "monthly") {
    return start.getDate() === cur.getDate();
  }
  return false;
}

function hydrateState(raw) {
  const out = raw || {};
  if (!Array.isArray(out.__customTasks)) out.__customTasks = [];
  if (!Array.isArray(out.__customPhases)) out.__customPhases = [];
  if (!out.__customGroups || typeof out.__customGroups !== "object") out.__customGroups = {};
  if (!out.__overrides || typeof out.__overrides !== "object") out.__overrides = {};
  if (!Array.isArray(out.__milestones)) {
    out.__milestones = MILESTONES_DEFAULT.map(m => ({ ...m }));
  }
  if (!Array.isArray(out.__recurring)) {
    out.__recurring = RECURRING_DEFAULT.map(r => ({ ...r }));
  }
  // Per-occurrence event status/notes.
  // Key formats:
  //   recurring (legacy): `${recurringIndex}:${YYYY-MM-DD}`
  //   task occurrence:    `task:${taskId}:${YYYY-MM-DD}`
  if (!out.__occurrenceNotes || typeof out.__occurrenceNotes !== "object") {
    out.__occurrenceNotes = {};
  }
  // Per-occurrence time overrides — { startTime, endTime } keyed the same way.
  if (!out.__occurrenceTimes || typeof out.__occurrenceTimes !== "object") {
    out.__occurrenceTimes = {};
  }
  // Backfill status/notes/time on milestones.
  out.__milestones.forEach(m => {
    if (m.status == null) m.status = "scheduled";
    if (m.notes == null) m.notes = "";
    if (m.time == null) m.time = "";        // HH:MM, "" = all-day
    if (m.endTime == null) m.endTime = "";  // optional end time
  });
  // Migrate legacy recurring entries → custom tasks with repeat: "weekly".
  // Per-occurrence notes/status get re-keyed under "task:{taskId}:{date}".
  // Drop the recurring array once migrated so this only runs once.
  if (!out.__recurringMigrated && out.__recurring.length > 0) {
    out.__recurring.forEach((r, idx) => {
      const newId = "ct-rec-" + idx + "-" + Math.random().toString(36).slice(2, 7);
      out.__customTasks.push({
        id: newId,
        phaseId: "psync",       // bucket converted recurring under the sync phase
        groupId: "apr21-debrief",
        title: r.title,
        desc: (r.desc || "") + " (migrated from recurring series)"
      });
      out[newId] = {
        ...defaultTaskState({ id: newId }),
        startDate: r.startDate || "",
        dueDate: r.endDate || "",
        repeat: "weekly",
        repeatDay: typeof r.dayOfWeek === "number" ? r.dayOfWeek : null,
        notes: ""
      };
      // Re-key per-occurrence notes from `${idx}:${date}` to `task:${newId}:${date}`
      Object.keys(out.__occurrenceNotes).forEach(k => {
        const [recIdx, date] = k.split(":");
        if (parseInt(recIdx, 10) === idx) {
          out.__occurrenceNotes["task:" + newId + ":" + date] = out.__occurrenceNotes[k];
          delete out.__occurrenceNotes[k];
        }
      });
    });
    out.__recurring = [];
    out.__recurringMigrated = true;
  }
  MILESTONES = out.__milestones;
  RECURRING = out.__recurring;

  // Set STATE early so rebuildTaskIndex() can see custom tasks.
  STATE = out;
  rebuildTaskIndex();

  Object.values(TASK_INDEX).forEach(t => {
    if (!out[t.id]) out[t.id] = defaultTaskState(t);
    else {
      const d = defaultTaskState(t);
      for (const k of Object.keys(d)) if (!(k in out[t.id])) out[t.id][k] = d[k];
    }
  });
  return out;
}

/* Computed PHASES with overrides applied + custom tasks injected. */
function effectivePhases() {
  const deleted = new Set(STATE?.__phaseDeleted || []);
  const groupReassign = STATE?.__phaseGroupAssignments || {};
  const applyGroupId = (p) => {
    const override = groupReassign[p.id];
    return override ? { ...p, groupId: override } : p;
  };
  const customByGroup = {};
  (STATE?.__customTasks || []).forEach(t => {
    const k = t.phaseId + "::" + t.groupId;
    (customByGroup[k] = customByGroup[k] || []).push(t);
  });
  const customGroupsFor = (phaseId) => {
    const extras = (STATE?.__customGroups || {})[phaseId] || [];
    return extras.map(g => ({
      id: g.id,
      title: g.title,
      tasks: customByGroup[phaseId + "::" + g.id] || [],
      custom: true
    }));
  };
  const hardcoded = PHASES.filter(p => !deleted.has(p.id)).map(p => {
    const meta = phaseMeta(p);
    const groups = [
      ...p.groups.map(g => {
        const extras = customByGroup[p.id + "::" + g.id] || [];
        return {
          ...g,
          title: groupMeta(p.id, g).title,
          tasks: [...g.tasks, ...extras]
        };
      }),
      ...customGroupsFor(p.id)
    ];
    return applyGroupId({ ...p, num: meta.num, title: meta.title, window: meta.window, desc: meta.desc, groups });
  });
  // User-created phases appended at the end — each carries its own groups
  // plus any custom groups keyed to its id.
  const customPhases = (STATE?.__customPhases || []).filter(p => !deleted.has(p.id)).map(p => {
    const meta = phaseMeta(p);
    const baseGroups = (p.groups || []).map(g => ({
      ...g,
      title: groupMeta(p.id, g).title || g.title,
      tasks: customByGroup[p.id + "::" + g.id] || []
    }));
    return applyGroupId({
      ...p,
      custom: true,
      num: meta.num || p.num,
      title: meta.title || p.title,
      window: meta.window || p.window || "",
      desc: meta.desc || p.desc || "",
      groups: [...baseGroups, ...customGroupsFor(p.id)]
    });
  });
  return [...hardcoded, ...customPhases];
}

/* Phase Groups — returns merged seeded + custom groups, with renames + order applied. */
function effectiveGroups() {
  const overrides = STATE?.__phaseGroupOverrides || {};
  const custom = STATE?.__phaseGroups || [];
  const seeded = PHASE_GROUPS_DEFAULT.map(g => ({ ...g, seeded: true }));
  const all = [...seeded, ...custom].map(g => {
    const ov = overrides[g.id];
    return ov?.title ? { ...g, title: ov.title } : g;
  });
  const order = STATE?.__phaseGroupOrder;
  if (Array.isArray(order) && order.length) {
    const byId = new Map(all.map(g => [g.id, g]));
    const ordered = order.map(id => byId.get(id)).filter(Boolean);
    const trailing = all.filter(g => !order.includes(g.id));
    return [...ordered, ...trailing];
  }
  return all;
}

/* Returns [{ group, phases }] for sidebar render. Phases without a known
   group fall under the seeded "Features in Development" group. */
function groupedPhases() {
  const groups = effectiveGroups();
  if (!groups.length) return [];
  const fallbackId = groups[0].id;
  const phases = effectivePhases();
  const byGroup = new Map(groups.map(g => [g.id, []]));
  for (const p of phases) {
    const gid = byGroup.has(p.groupId) ? p.groupId : fallbackId;
    byGroup.get(gid).push(p);
  }
  return groups.map(g => ({ group: g, phases: byGroup.get(g.id) || [] }));
}

// Create a new custom phase (returns its id). Num auto-assigns if blank.
async function createCustomPhase(title, opts = {}) {
  const t = (title || "").trim();
  if (!t) return null;
  STATE.__customPhases = STATE.__customPhases || [];
  const totalExisting = PHASES.length + STATE.__customPhases.length;
  const id = "cp-" + Date.now().toString(36) + "-" + Math.floor(Math.random() * 10000).toString(36);
  const num = opts.num || String(totalExisting).padStart(2, "0");
  const groupId = opts.groupId || (effectiveGroups()[0]?.id) || "grp-features-in-dev";
  STATE.__customPhases.push({
    id, num, title: t,
    groupId,
    window: opts.window || "",
    desc: opts.desc || "",
    groups: []
  });
  await saveState();
  return id;
}

// Create a new phase group (returns its id).
async function createPhaseGroup(title) {
  const t = (title || "").trim();
  if (!t) return null;
  STATE.__phaseGroups = STATE.__phaseGroups || [];
  STATE.__phaseGroupOrder = STATE.__phaseGroupOrder || effectiveGroups().map(g => g.id);
  const id = "pg-" + Date.now().toString(36) + "-" + Math.floor(Math.random() * 10000).toString(36);
  STATE.__phaseGroups.push({ id, title: t });
  if (!STATE.__phaseGroupOrder.includes(id)) STATE.__phaseGroupOrder.push(id);

async function renamePhaseGroup(groupId, newTitle) {
  const t = (newTitle || "").trim();
  if (!t || !groupId) return false;
  STATE.__phaseGroupOverrides = STATE.__phaseGroupOverrides || {};
  STATE.__phaseGroupOverrides[groupId] = { ...(STATE.__phaseGroupOverrides[groupId] || {}), title: t };
  // For non-seeded groups, also mutate the canonical entry so deletes/renames stay consistent.
  const cust = (STATE.__phaseGroups || []).find(g => g.id === groupId);
  if (cust) cust.title = t;
  await saveState();
  return true;
}

// Delete a phase group. mode: "delete-phases" wipes member phases too;
// "move" reassigns them to the seeded group. The seeded "Features in Development"
// group is protected from deletion if it's the only one left.
async function deletePhaseGroup(groupId, mode) {
  const groups = effectiveGroups();
  if (groups.length <= 1) return false;
  const member = groupedPhases().find(gp => gp.group.id === groupId);
  const phaseIds = (member?.phases || []).map(p => p.id);
  if (phaseIds.length && mode === "delete-phases") {
    STATE.__phaseDeleted = STATE.__phaseDeleted || [];
    for (const pid of phaseIds) if (!STATE.__phaseDeleted.includes(pid)) STATE.__phaseDeleted.push(pid);
    STATE.__customPhases = (STATE.__customPhases || []).filter(p => !phaseIds.includes(p.id));
  } else if (phaseIds.length) {
    const fallback = groups.find(g => g.id !== groupId)?.id || PHASE_GROUPS_DEFAULT[0].id;
    STATE.__phaseGroupAssignments = STATE.__phaseGroupAssignments || {};
    for (const pid of phaseIds) STATE.__phaseGroupAssignments[pid] = fallback;
  }
  STATE.__phaseGroups = (STATE.__phaseGroups || []).filter(g => g.id !== groupId);
  STATE.__phaseGroupOrder = (STATE.__phaseGroupOrder || []).filter(id => id !== groupId);
  if (STATE.__phaseGroupOverrides) delete STATE.__phaseGroupOverrides[groupId];
  await saveState();
  return true;
}

// Delete a phase. Hardcoded → tombstone in __phaseDeleted; custom → splice.
async function deletePhase(phaseId) {
  if (!phaseId) return false;
  const isCustom = (STATE.__customPhases || []).some(p => p.id === phaseId);
  if (isCustom) {
    STATE.__customPhases = STATE.__customPhases.filter(p => p.id !== phaseId);
  } else {
    STATE.__phaseDeleted = STATE.__phaseDeleted || [];
    if (!STATE.__phaseDeleted.includes(phaseId)) STATE.__phaseDeleted.push(phaseId);
  }
  if (STATE.__phaseGroupAssignments) delete STATE.__phaseGroupAssignments[phaseId];
  await saveState();
  return true;
}

// Create a new custom group inside a phase (returns its id).
async function createCustomGroup(phaseId, title) {
  const t = (title || "").trim();
  if (!t || !phaseId) return null;
  STATE.__customGroups = STATE.__customGroups || {};
  STATE.__customGroups[phaseId] = STATE.__customGroups[phaseId] || [];
  const id = "cg-" + Date.now().toString(36) + "-" + Math.floor(Math.random() * 10000).toString(36);
  STATE.__customGroups[phaseId].push({ id, title: t });
  await saveState();
  return id;
}

// In-place "create a new phase" affordance: swaps the <select> for a styled
// text input. Enter commits, Esc / blur cancels (unless blur follows a save).
function startInlinePhaseCreate(selectEl, addBtn, refillPhases, refillGroups) {
  const input = h("input", {
    type: "text",
    class: "ef-inline-create",
    placeholder: "New phase name — Enter to save, Esc to cancel"
  });
  const origClass = selectEl.className;
  if (origClass) input.className += " " + origClass;
  selectEl.replaceWith(input);
  addBtn.disabled = true;
  input.focus();

  let done = false;
  const restore = () => {
    if (done) return;
    done = true;
    input.replaceWith(selectEl);
    addBtn.disabled = false;
  };
  const commit = async () => {
    if (done) return;
    const name = input.value.trim();
    if (!name) { restore(); return; }
    done = true; // prevent double-fire from blur
    const newId = await createCustomPhase(name);
    input.replaceWith(selectEl);
    addBtn.disabled = false;
    if (newId) {
      refillPhases(newId);
      if (refillGroups) refillGroups();
      toast("Phase added");
    }
  };
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); commit(); }
    else if (e.key === "Escape") { e.preventDefault(); restore(); }
  });
  input.addEventListener("blur", () => {
    // Save if user typed something; otherwise silently cancel.
    if (input.value.trim()) commit(); else restore();
  });
}

/* Seed milestone titles (lowercased) — used as the retroactive "native" set
   for milestones that were created before `source` tagging existed. */
const SEED_MILESTONE_TITLES = new Set(
  (typeof MILESTONES_DEFAULT !== "undefined" ? MILESTONES_DEFAULT : [])
    .map(m => (m.title || "").trim().toLowerCase())
);

/* Collapse the 7 milestone types into the 5 chip buckets used by the legend
   filter. meeting / milestone / critical all fall under "meeting". */
function milestoneFilterKey(type) {
  if (type === "ooo" || type === "focus" || type === "lunch" || type === "routine") return type;
  return "meeting";
}

/* Calendar filter — combines "Wonderful only" + per-type toggles. Hides if
   any filter wants it hidden. */
function passesCalendarFilter(m) {
  if (!m) return true;
  // Per-type visibility (applies regardless of wonderful filter)
  if (UI.calTypeFilters) {
    const typeKey = milestoneFilterKey(m.type || "meeting");
    if (UI.calTypeFilters[typeKey] === false) return false;
  }
  if (!UI.calWonderfulOnly) return true;
  const title = (m.title || "").trim().toLowerCase();
  if (title.includes("wonderful")) return true;
  if (m.source === "manual") return true;
  if (m.source === "gcal") return false;
  // Legacy (no source): only pass if it's a known seed milestone
  return SEED_MILESTONE_TITLES.has(title);
}

// Returns true if the given task state should be visible under the current
// global archive-filter setting. Centralized so every list, count, calendar
// pill and stat respects the same rule.
function isArchived(s) { return !!(s && (s.archived || s.hidden)); }
function passesArchiveFilter(s) {
  const arch = isArchived(s);
  if (UI.archiveFilter === "archived") return arch;
  if (UI.archiveFilter === "all") return true;
  return !arch; // "active"
}

/* ============================================================================
   ENCRYPTION (Web Crypto: PBKDF2 + AES-GCM)
   ============================================================================ */
const enc = new TextEncoder();
const dec = new TextDecoder();

function buf2b64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function b642buf(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }

async function deriveKey(passphrase, salt) {
  const material = await crypto.subtle.importKey("raw", enc.encode(passphrase), { name: "PBKDF2" }, false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" },
    material, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
}

async function encryptPayload(plaintext, passphrase) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(passphrase, salt);
  const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(plaintext));
  return { v: 1, salt: buf2b64(salt), iv: buf2b64(iv), data: buf2b64(ciphertext) };
}

async function decryptPayload(payload, passphrase) {
  const salt = b642buf(payload.salt);
  const iv = b642buf(payload.iv);
  const ciphertext = b642buf(payload.data);
  const key = await deriveKey(passphrase, salt);
  const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
  return dec.decode(plaintext);
}

/* ============================================================================
   STORAGE LAYER
   ============================================================================ */
/* One-time wipe of pre-v4 keys: old task IDs no longer exist after the
   April-23-PDF rebuild, so any preserved STATE would be orphaned. */
["wonderful-pt3-tracker-v3", "wonderful-pt3-ui-v3",
 "wonderful-pt3-lock-v3", "wonderful-pt3-last-backup-v3"]
  .forEach(k => localStorage.removeItem(k));

function getLockConfig() {
  try { return JSON.parse(localStorage.getItem(LOCK_KEY)) || { enabled: false }; }
  catch { return { enabled: false }; }
}
function setLockConfig(cfg) { localStorage.setItem(LOCK_KEY, JSON.stringify(cfg)); }

async function saveState() {
  const json = JSON.stringify(STATE);
  const lockCfg = getLockConfig();
  if (lockCfg.enabled && PASSPHRASE) {
    const payload = await encryptPayload(json, PASSPHRASE);
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ encrypted: true, payload }));
  } else {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ encrypted: false, data: json }));
  }
}

async function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return hydrateState({});
    const wrapped = JSON.parse(raw);
    if (wrapped.encrypted) {
      if (!PASSPHRASE) throw new Error("locked");
      const json = await decryptPayload(wrapped.payload, PASSPHRASE);
      return hydrateState(JSON.parse(json));
    }
    return hydrateState(JSON.parse(wrapped.data || raw));
  } catch (e) {
    if (e.message === "locked") throw e;
    console.warn("State load failed, starting fresh", e);
    return hydrateState({});
  }
}

function saveUI() { localStorage.setItem(UI_KEY, JSON.stringify(UI)); }
function loadUI() {
  try { return { ...defaultUI(), ...JSON.parse(localStorage.getItem(UI_KEY) || "{}") }; }
  catch { return defaultUI(); }
}

/* ============================================================================
   UTILITIES
   ============================================================================ */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const h = (tag, attrs = {}, children = []) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") el.className = v;
    else if (k === "html") el.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") el.addEventListener(k.slice(2), v);
    else if (k === "data") Object.entries(v).forEach(([dk, dv]) => el.dataset[dk] = dv);
    else if (v === true) el.setAttribute(k, "");
    else if (v !== false && v != null) el.setAttribute(k, v);
  }
  const kids = Array.isArray(children) ? children : [children];
  kids.forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === "string" || typeof c === "number") el.appendChild(document.createTextNode(String(c)));
    else el.appendChild(c);
  });
  return el;
};

function daysUntil(dateStr) {
  const target = new Date(dateStr + "T00:00:00");
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((target - now) / (1000 * 60 * 60 * 24));
}

/* Local (non-UTC) date formatters. toISOString() converts to UTC which
   silently shifts the date by a day for most US timezones — these keep
   calendar cells, due dates, and exported events aligned to the user's
   wall clock. */
function ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function ym(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  return `${y}-${m}`;
}

function fmtDate(dateStr) {
  if (!dateStr) return "";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function fmtDateShort(dateStr) {
  if (!dateStr) return "";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function uid() { return "b_" + Math.random().toString(36).slice(2, 10); }

};

/* ============================================================================
   COMPUTED STATS
   ============================================================================ */
function phaseStats(phase) {
  let total = 0, complete = 0, urgent = 0, inProgress = 0, blocked = 0, bugs = 0;
  phase.groups.forEach(g => g.tasks.forEach(t => {
    const s = STATE[t.id];
    if (!s) return;
    if (!passesArchiveFilter(s)) return;
    total++;
    if (s.status === "complete") complete++;
    if (s.status === "in_progress") inProgress++;
    if (s.status === "blocked") blocked++;
    if (s.urgent) urgent++;
    bugs += (s.bugs || []).filter(b => b.status === "open" || b.status === "in_progress").length;
  }));
  const pct = total ? Math.round((complete / total) * 100) : 0;
  return { total, complete, urgent, inProgress, blocked, bugs, pct };
}

function globalStats() {
  let total = 0, complete = 0, urgent = 0, blocked = 0, bugsOpen = 0, bugsCritical = 0, bugsResolved = 0, bugsHigh = 0;
  Object.entries(STATE).forEach(([id, s]) => {
    // Skip meta keys (__customTasks, __milestones, __recurring, __overrides) —
    // only real task-state entries have a corresponding TASK_INDEX row.
    if (!TASK_INDEX[id]) return;
    if (!passesArchiveFilter(s)) return;
    total++;
    if (s.status === "complete") complete++;
    if (s.urgent) urgent++;
    if (s.status === "blocked") blocked++;
    (s.bugs || []).forEach(b => {
      if (b.status === "resolved") bugsResolved++;
      else if (b.status === "open" || b.status === "in_progress") {
        bugsOpen++;
        if (b.severity === "critical") bugsCritical++;
        if (b.severity === "high") bugsHigh++;
      }
    });
  });
  return { total, complete, urgent, blocked, bugsOpen, bugsCritical, bugsResolved, bugsHigh, pct: total ? Math.round((complete / total) * 100) : 0 };
}

function allBugsWithContext() {
  const bugs = [];
  Object.entries(STATE).forEach(([tid, s]) => {
    if (!TASK_INDEX[tid]) return;
    if (!passesArchiveFilter(s)) return;
    (s.bugs || []).forEach(b => {
      bugs.push({ ...b, taskId: tid, taskTitle: getTitle(TASK_INDEX[tid], s) });
    });
  });
  return bugs;
}

/* Compute merge-range flags for a milestone rendered on dateStr.
   Two cases:
   1. Native range — milestone has dateEnd spanning multiple days.
   2. Virtual range — a DIFFERENT milestone with identical title+type sits on
      the adjacent day. Groups same-title same-type events on consecutive days
      into a visual band (matches OOO behavior for Focus time, Lunch, etc). */
function milestoneRangeInfo(m, dateStr) {
  const rangeStart = m.date;
  const rangeEnd = m.dateEnd || m.date;
  // Native multi-day
  if (rangeEnd > rangeStart) {
    return {
      isRange: true,
      isStart: dateStr === rangeStart,
      isEnd:   dateStr === rangeEnd,
      isMid:   dateStr > rangeStart && dateStr < rangeEnd
    };
  }
  // Virtual range via adjacent same-title, same-type milestone
  const prev = addDays(dateStr, -1);
  const next = addDays(dateStr, 1);
  const sameOn = (d) => MILESTONES.some(o =>
    o !== m && o.title === m.title && (o.type || "meeting") === (m.type || "meeting") &&
    d >= o.date && d <= (o.dateEnd || o.date) &&
    passesCalendarFilter(o)
  );
  const hasPrev = sameOn(prev);
  const hasNext = sameOn(next);
  if (hasPrev || hasNext) {
    return { isRange: true, isStart: !hasPrev, isEnd: !hasNext, isMid: hasPrev && hasNext };
  }
  return { isRange: false, isStart: false, isEnd: false, isMid: false };
}

function eventsOnDate(dateStr) {
  const events = [];
  MILESTONES.forEach((m, i) => {
    const rangeStart = m.date;
    const rangeEnd = m.dateEnd || m.date;
    if (dateStr < rangeStart || dateStr > rangeEnd) return;
    if (!passesCalendarFilter(m)) return;
    events.push({
      ...m,
      kind: "milestone",
      milestoneIndex: i,
      ...milestoneRangeInfo(m, dateStr)
    });
  });
  const d = new Date(dateStr + "T00:00:00");
  const dow = d.getDay();
  Object.entries(STATE).forEach(([tid, s]) => {
    const t = TASK_INDEX[tid];
    if (!t) return;
    if (!passesArchiveFilter(s)) return;
    // Sidebar phase filter — hide task pills whose phase doesn't match
    if (UI.phaseFilter && t.phaseId !== UI.phaseFilter) return;
    const range = taskRange(s);
    if (!range) return;
    if (dateStr < range.start || dateStr > range.end) return;
    // Repeating task: cadence is derived from startDate via repeatMatches().
    if (s.repeat && s.repeat !== "none") {
      const anchor = s.startDate || range.start;
      if (!repeatMatches(s.repeat, anchor, dateStr)) return;
      events.push({
        title: getTitle(t, s), taskId: tid,
        kind: "task", complete: s.status === "complete", urgent: s.urgent,
        startDate: range.start, dueDate: range.end,
        isStart: false, isEnd: false, isMid: false, isRange: false,
        isRepeatOccurrence: true
      });
      return;
    }
    // One-off / ranged task: existing per-day rendering with bridging info.
    events.push({
      title: getTitle(t, s), taskId: tid,
      kind: "task", complete: s.status === "complete", urgent: s.urgent,
      startDate: range.start, dueDate: range.end,
      isStart: dateStr === range.start,
      isEnd: dateStr === range.end,
      isMid: dateStr > range.start && dateStr < range.end,
      isRange: range.start !== range.end
    });
  });
  // Legacy recurring (kept for safety; should be empty after migration).
  RECURRING.forEach((r, i) => {
    if (r.dayOfWeek === dow && dateStr >= r.startDate && dateStr <= r.endDate) {
      events.push({
        title: r.title, desc: r.desc, kind: "recurring",
        dayOfWeek: r.dayOfWeek, startDate: r.startDate, endDate: r.endDate,
        recurringIndex: i
      });
    }
  });
  return events;
}

// Returns { start, end } strings (YYYY-MM-DD) for a task's calendar range,
// or null if not scheduled. End >= start; single-day is { start: x, end: x }.
function taskRange(s) {
  if (!s) return null;
  const start = s.startDate || s.dueDate;
  const end = s.dueDate || s.startDate;
  if (!start || !end) return null;
  return start <= end ? { start, end } : { start: end, end: start };
}

/* ---------- Unified event status/notes (calendar ↔ tasks sync) ----------
   Tasks use STATE[id].status / .notes (existing).
   Milestones use STATE.__milestones[i].status / .notes.
   Recurring is per-occurrence: STATE.__occurrenceNotes["i:YYYY-MM-DD"]. */
const EVENT_STATUS_LABELS = {
  scheduled: "Scheduled",
  flagged:   "Flagged",
  completed: "Completed",
  cancelled: "Cancelled"
};
const EVENT_STATUS_COLORS = {
  scheduled: "var(--info)",
  flagged:   "var(--sun)",
  completed: "var(--leaf)",
  cancelled: "var(--muted)"
};
const EVENT_STATUS_CYCLE = ["scheduled", "flagged", "completed", "cancelled"];

function occKey(ev, dateStr) {
  // Recurring pills (legacy) use the recurring-array index.
  // Task occurrences (the new repeat-tasks) use the task id.
  if (ev.kind === "task") return "task:" + ev.taskId + ":" + dateStr;
  return ev.recurringIndex + ":" + dateStr;
}

// Per-occurrence time access.
// Returns { startTime, endTime } strings (HH:MM, "" = all-day) for a given
// task occurrence on dateStr. Falls back to the task's own startTime/endTime.
function eventTimes(ev, dateStr) {
  if (!ev) return { startTime: "", endTime: "" };
  if (ev.kind === "milestone") {
    const m = MILESTONES[ev.milestoneIndex];
    return { startTime: m?.time || "", endTime: m?.endTime || "" };
  }
  if (ev.kind === "task") {
    const k = "task:" + ev.taskId + ":" + dateStr;
    const ovr = STATE.__occurrenceTimes?.[k];
    if (ovr && (ovr.startTime || ovr.endTime)) {
      return { startTime: ovr.startTime || "", endTime: ovr.endTime || "" };
    }
    const s = STATE[ev.taskId];
    return { startTime: s?.startTime || "", endTime: s?.endTime || "" };
  }
  if (ev.kind === "recurring") {
    const k = ev.recurringIndex + ":" + dateStr;
    const ovr = STATE.__occurrenceTimes?.[k];
    if (ovr) return { startTime: ovr.startTime || "", endTime: ovr.endTime || "" };
  }
  return { startTime: "", endTime: "" };
}

async function setEventTimes(ev, dateStr, startTime, endTime, applyToAll) {
  if (!ev) return;
  if (ev.kind === "milestone") {
    const m = MILESTONES[ev.milestoneIndex];
    if (!m) return;
    m.time = startTime || "";
    m.endTime = endTime || "";
  } else if (ev.kind === "task") {
    if (applyToAll) {
      // Write to the task itself; clear any per-occurrence overrides.
      STATE[ev.taskId].startTime = startTime || "";
      STATE[ev.taskId].endTime = endTime || "";
      STATE[ev.taskId].updated = new Date().toISOString();
      // Drop any occurrence-time overrides for this task.
      Object.keys(STATE.__occurrenceTimes || {}).forEach(k => {
        if (k.startsWith("task:" + ev.taskId + ":")) delete STATE.__occurrenceTimes[k];
      });
    } else {
      STATE.__occurrenceTimes = STATE.__occurrenceTimes || {};
      const k = "task:" + ev.taskId + ":" + dateStr;
      STATE.__occurrenceTimes[k] = { startTime: startTime || "", endTime: endTime || "" };
    }
  } else if (ev.kind === "recurring") {
    STATE.__occurrenceTimes = STATE.__occurrenceTimes || {};
    const k = ev.recurringIndex + ":" + dateStr;
    STATE.__occurrenceTimes[k] = { startTime: startTime || "", endTime: endTime || "" };
  }
  await saveState();
  renderMain();
}

// Add minutes to HH:MM, wrapping at 24h. Returns HH:MM string.
function addMinutesToTime(hhmm, minutes) {
  if (!hhmm) return "";
  const [h, m] = hhmm.split(":").map(n => parseInt(n, 10));
  if (isNaN(h)) return "";
  const total = (h * 60 + (m || 0) + minutes + 24 * 60) % (24 * 60);
  const newH = Math.floor(total / 60);
  const newM = total % 60;
  return String(newH).padStart(2, "0") + ":" + String(newM).padStart(2, "0");
}

// Wire a Start/End time input pair: when the user sets the start and end is
// empty, auto-fill end to start + 1 hour. Returns a quick-pick duration row
// (15 / 30 / 1h / 2h / All day) that you can append next to the inputs.
function makeTimePair(startInput, endInput, opts = {}) {
  const onChange = opts.onChange || null;
  let selectedMin = null;
  const presetBtns = [];
  const syncActive = () => {
    presetBtns.forEach(b => {
      b.classList.toggle("is-active", b._pickMin === selectedMin);
    });
  };
  const fireChange = () => {
    if (onChange) onChange();
    // Also dispatch DOM change so existing onchange handlers fire (e.g. the
    // schedule modal's per-occurrence save-on-change).
    try {
      startInput.dispatchEvent(new Event("change"));
      endInput.dispatchEvent(new Event("change"));
    } catch {}
  };
  startInput.addEventListener("change", () => {
    if (!startInput.value) return;
    if (selectedMin != null) {
      endInput.value = addMinutesToTime(startInput.value, selectedMin);
      try { endInput.dispatchEvent(new Event("change")); } catch {}
    } else if (!endInput.value) {
      endInput.value = addMinutesToTime(startInput.value, 60);
      try { endInput.dispatchEvent(new Event("change")); } catch {}
    }
  });
  // If the user manually edits the end time, drop the "locked" duration so
  // future start-time changes don't clobber their explicit value.
  endInput.addEventListener("input", () => {
    if (selectedMin != null) {
      selectedMin = null;
      syncActive();
    }
  });
  const presets = [
    { label: "15m", min: 15 },
    { label: "30m", min: 30 },
    { label: "1h",  min: 60 },
    { label: "1.5h", min: 90 },
    { label: "2h",  min: 120 },
    { label: "3h",  min: 180 },
    { label: "4h",  min: 240 },
    { label: "6h",  min: 360 },
    { label: "8h",  min: 480 }
  ];
  const row = h("div", { class: "time-quickpicks" });
  if (!opts.hideLabel) row.appendChild(h("span", { class: "time-quick-label" }, "Duration"));
  presets.forEach(p => {
    const btn = h("button", {
      type: "button",
      class: "time-quickpick-btn",
      title: `Set end time to start + ${p.label}`,
      onclick: () => {
        if (!startInput.value) startInput.value = "09:00";
        endInput.value = addMinutesToTime(startInput.value, p.min);
        selectedMin = p.min;
        syncActive();
        fireChange();
      }
    }, p.label);
    btn._pickMin = p.min;
    presetBtns.push(btn);
    row.appendChild(btn);
  });
  row.appendChild(h("button", {
    type: "button",
    class: "time-quickpick-btn time-quickpick-allday",
    title: "Clear time → all-day event",
    onclick: () => {
      startInput.value = "";
      endInput.value = "";
      selectedMin = null;
      syncActive();
      fireChange();
    }
  }, "All day"));
  return row;
}

// Format "HH:MM" → "10:30 AM" for display.
function fmtTime(hhmm) {
  if (!hhmm) return "";
  const [h, m] = hhmm.split(":").map(n => parseInt(n, 10));
  if (isNaN(h)) return "";
  const am = h < 12;
  const dispH = h === 0 ? 12 : (h > 12 ? h - 12 : h);
  return `${dispH}:${String(m || 0).padStart(2, "0")} ${am ? "AM" : "PM"}`;
}
// Format a time range, smart short form when end is omitted.
function fmtTimeRange(start, end) {
  if (!start && !end) return "";
  if (start && !end) return fmtTime(start);
  return fmtTime(start) + " – " + fmtTime(end);
}

// True when a calendar pill should use per-occurrence status/notes
// (everything except a one-off / ranged non-repeating task).
function eventIsOccurrence(ev) {
  if (!ev) return false;
  if (ev.kind === "milestone" || ev.kind === "recurring") return true;
  if (ev.kind === "task" && ev.isRepeatOccurrence) return true;
  return false;
}

function eventStatus(ev, dateStr) {
  if (!ev) return "";
  if (ev.kind === "milestone") return MILESTONES[ev.milestoneIndex]?.status || "scheduled";
  if (ev.kind === "recurring") {
    return STATE.__occurrenceNotes?.[occKey(ev, dateStr)]?.status || "scheduled";
  }
  if (ev.kind === "task") {
    if (ev.isRepeatOccurrence) {
      return STATE.__occurrenceNotes?.[occKey(ev, dateStr)]?.status || "scheduled";
    }
    return STATE[ev.taskId]?.status || "not_started";
  }
  return "";
}

function eventNotes(ev, dateStr) {
  if (!ev) return "";
  if (ev.kind === "milestone") return MILESTONES[ev.milestoneIndex]?.notes || "";
  if (ev.kind === "recurring") {
    return STATE.__occurrenceNotes?.[occKey(ev, dateStr)]?.notes || "";
  }
  if (ev.kind === "task") {
    if (ev.isRepeatOccurrence) {
      return STATE.__occurrenceNotes?.[occKey(ev, dateStr)]?.notes || "";
    }
    return STATE[ev.taskId]?.notes || "";
  }
  return "";
}

async function setEventStatus(ev, dateStr, status) {
  if (!ev || !status) return;
  if (ev.kind === "milestone") {
    const m = MILESTONES[ev.milestoneIndex];
    if (!m) return;
    m.status = status;
  } else if (ev.kind === "recurring") {
    STATE.__occurrenceNotes = STATE.__occurrenceNotes || {};
    const k = occKey(ev, dateStr);
    STATE.__occurrenceNotes[k] = STATE.__occurrenceNotes[k] || {};
    STATE.__occurrenceNotes[k].status = status;
  } else if (ev.kind === "task") {
    if (!STATE[ev.taskId]) return;
    if (ev.isRepeatOccurrence) {
      STATE.__occurrenceNotes = STATE.__occurrenceNotes || {};
      const k = occKey(ev, dateStr);
      STATE.__occurrenceNotes[k] = STATE.__occurrenceNotes[k] || {};
      STATE.__occurrenceNotes[k].status = status;
    } else {
      STATE[ev.taskId].status = status;
      STATE[ev.taskId].updated = new Date().toISOString();
    }
  }
  await saveState();
  renderMain();
}

async function setEventNotes(ev, dateStr, notes) {
  if (!ev) return;
  const next = notes == null ? "" : String(notes);
  if (ev.kind === "milestone") {
    const m = MILESTONES[ev.milestoneIndex];
    if (!m) return;
    if ((m.notes || "") === next) return;
    m.notes = next;
  } else if (ev.kind === "recurring") {
    STATE.__occurrenceNotes = STATE.__occurrenceNotes || {};
    const k = occKey(ev, dateStr);
    STATE.__occurrenceNotes[k] = STATE.__occurrenceNotes[k] || {};
    if ((STATE.__occurrenceNotes[k].notes || "") === next) return;
    STATE.__occurrenceNotes[k].notes = next;
  } else if (ev.kind === "task") {
    if (!STATE[ev.taskId]) return;
    if (ev.isRepeatOccurrence) {
      STATE.__occurrenceNotes = STATE.__occurrenceNotes || {};
      const k = occKey(ev, dateStr);
      STATE.__occurrenceNotes[k] = STATE.__occurrenceNotes[k] || {};
      if ((STATE.__occurrenceNotes[k].notes || "") === next) return;
      STATE.__occurrenceNotes[k].notes = next;
    } else {
      if ((STATE[ev.taskId].notes || "") === next) return;
      STATE[ev.taskId].notes = next;
      STATE[ev.taskId].updated = new Date().toISOString();
    }
  }
  await saveState();
  // No re-render — notes save on blur, view doesn't depend on the text.
}

async function cycleEventStatus(ev, dateStr) {
  if (!ev) return;
  // Non-repeating task pill cycles through the task status set;
  // everything else (milestone / recurring / repeat-task occurrence) cycles
  // through the event-status set.
  if (ev.kind === "task" && !ev.isRepeatOccurrence) {
    return cycleTaskStatus(ev.taskId);
  }
  const cur = eventStatus(ev, dateStr);
  const next = EVENT_STATUS_CYCLE[(EVENT_STATUS_CYCLE.indexOf(cur) + 1) % EVENT_STATUS_CYCLE.length];
  await setEventStatus(ev, dateStr, next);
}

function eventStatusMeta(ev, dateStr) {
  const s = eventStatus(ev, dateStr);
  if (ev.kind === "task" && !ev.isRepeatOccurrence) {
    return {
      key: s,
      label: STATUS_LABELS[s] || s,
      color: ({
        not_started: "var(--ink-3)",
        in_progress: "var(--info)",
        complete:    "var(--leaf)",
        blocked:     "var(--blocked)"
      })[s] || "var(--ink-3)"
    };
  }
  return {
    key: s,
    label: EVENT_STATUS_LABELS[s] || s,
    color: EVENT_STATUS_COLORS[s] || "var(--ink-3)"
  };
}

function attentionItems() {
  const items = [];
  const now = new Date(); now.setHours(0,0,0,0);
  Object.entries(STATE).forEach(([tid, s]) => {
    const t = TASK_INDEX[tid];
    if (!t) return;
    if (!passesArchiveFilter(s)) return;
    if (s.status === "complete") return;
    if (s.urgent) items.push({ tid, kind: "urgent", label: "Urgent" });
    else if (s.status === "blocked") items.push({ tid, kind: "blocked", label: "Blocked" });
    else if (s.dueDate) {
      const due = new Date(s.dueDate + "T00:00:00");
      const diff = Math.round((due - now) / (86400000));
      if (diff < 0) items.push({ tid, kind: "urgent", label: `Overdue ${Math.abs(diff)}d` });
      else if (diff <= 3) items.push({ tid, kind: "due", label: `Due in ${diff}d` });
    }
    // P0 bugs
    const crit = (s.bugs || []).filter(b => b.severity === "critical" && b.status !== "resolved" && b.status !== "wont_fix").length;
    if (crit > 0) items.push({ tid, kind: "urgent", label: `${crit} critical bug${crit > 1 ? "s" : ""}` });
  });
  // Sort: urgent first, then blocked, then due
  const order = { urgent: 0, blocked: 1, due: 2 };
  items.sort((a, b) => order[a.kind] - order[b.kind]);
  return items;
}

// Track whether the cursor is currently inside the sidebar so renderShell()
// can preserve the expanded state across DOM rebuilds (CSS :hover doesn't
// re-fire on the new element until the next mousemove, and a hit-test on
// coordinates fails because the new sidebar starts collapsed/narrow).
let __cursorInSidebar = false;
window.addEventListener("mousemove", (e) => {
  __cursorInSidebar = !!(e.target && e.target.closest && e.target.closest(".sidebar"));
}, { passive: true, capture: true });
// If the cursor leaves the window entirely, drop the flag so a re-render
// after the user has moved away doesn't pin the sidebar open.
window.addEventListener("mouseout", (e) => {
  if (!e.relatedTarget && !e.toElement) __cursorInSidebar = false;
}, { passive: true });

/* ============================================================================
   HYBRID VIEW HELPERS — owners, teams, risk derivation, cycle actions
   (Imported from the Claude Design hybrid prototype.)
   ============================================================================ */
const TEAM_HUES = {
  delight: 28, vep: 258, office: 210, field: 140, client: 12, none: 0
};
// Maps owner-name fragments → team key. First match wins. Default: "none".
const OWNER_TEAM_MAP = [
  { match: /daniel|gomez/i, team: "client" },
  { match: /ella|brewer/i, team: "delight" },
  { match: /chai|chaitanya|vemprala/i, team: "office" },
  { match: /sabeen|pradhan/i, team: "vep" },
  { match: /harrison|steed/i, team: "client" },
  { match: /pascal|stewart/i, team: "field" },
  { match: /martin|carlos m/i, team: "client" },
  { match: /jackie|torrez/i, team: "client" },
  { match: /carlos v|vasquez/i, team: "field" },
  { match: /rogelio|rosa/i, team: "client" },
  { match: /austin|addison/i, team: "office" }
];
function teamForOwner(owner) {
  if (!owner) return "none";
  for (const r of OWNER_TEAM_MAP) if (r.match.test(owner)) return r.team;
  return "field";
}
function teamHueOf(owner) { return TEAM_HUES[teamForOwner(owner)] || 0; }
function ownerInitials(owner) {
  if (!owner) return "—";
  return owner.trim().split(/\s+/).map(p => p[0]).join("").slice(0, 2).toUpperCase();
}

const RISK_META = {
  low:      { label: "Low",      color: "var(--leaf)",       order: 0 },
  med:      { label: "Medium",   color: "var(--sun)",        order: 1 },
  high:     { label: "High",     color: "var(--citrus)",     order: 2 },
  critical: { label: "Critical", color: "var(--danger)",     order: 3 }
};
const RISK_CYCLE = ["low", "med", "high", "critical"];
const STATUS_CYCLE = ["not_started", "in_progress", "complete", "blocked"];

// Effective risk: stored value, else derived from urgent + due-date heuristic.
function riskOf(t, s) {
  if (!s) return "low";
  if (s.risk) return s.risk;
  if (s.urgent) return "critical";
  if (s.status === "blocked") return "high";
  if (s.dueDate && s.status !== "complete") {
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(s.dueDate + "T00:00:00");
    const days = Math.ceil((due - today) / 86400000);
    if (days < 0) return "critical";
    if (days <= 14) return "high";
    if (days <= 30) return "med";
  }
  return "low";
}

async function cycleRisk(taskId) {
  if (!STATE[taskId]) return;
  const cur = riskOf(TASK_INDEX[taskId], STATE[taskId]);
  const next = RISK_CYCLE[(RISK_CYCLE.indexOf(cur) + 1) % RISK_CYCLE.length];
  STATE[taskId].risk = next;
  // Keep urgent flag in sync with critical so other surfaces (sidebar urgent
  // count, attentionItems, due badge) reflect the same intent.
  STATE[taskId].urgent = next === "critical";
  STATE[taskId].updated = new Date().toISOString();
  await saveState();
  renderMain();
}

async function cycleTaskStatus(taskId) {
  if (!STATE[taskId]) return;
  const cur = STATE[taskId].status || "not_started";
  const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur) + 1) % STATUS_CYCLE.length];
  STATE[taskId].status = next;
  STATE[taskId].updated = new Date().toISOString();
  await saveState();
  renderMain();
}

// Returns a sorted list of unique non-empty owner names already in use,
// used to power the inline-owner autocomplete.
function getKnownOwners() {
  const set = new Set();
  Object.entries(STATE).forEach(([id, s]) => {
    if (!TASK_INDEX[id]) return;
    if (s && s.owner && typeof s.owner === "string") set.add(s.owner.trim());
  });
  return Array.from(set).filter(Boolean).sort();
}

// Quick "assign owner" dialog. Opens from the task right-click menu.
// Pre-fills the current owner, autocompletes from known owners, and offers
// Clear / Cancel / Save actions.
function openOwnerAssignModal(taskId) {
  const s = STATE[taskId];
  const t = TASK_INDEX[taskId];
  if (!s || !t) return;
  const cur = s.owner || "";

  const listId = "owner-dl-" + taskId;
  const dl = document.createElement("datalist");
  dl.id = listId;
  getKnownOwners().forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    dl.appendChild(opt);
  });

  const input = h("input", {
    class: "field-input",
    type: "text",
    list: listId,
    value: cur,
    placeholder: "owner name",
    autocomplete: "off"
  });

  const form = h("div", { class: "edit-form" });
  form.appendChild(h("div", { class: "ef-row" }, [
    h("label", { class: "ef-label" }, "Owner"),
    input,
    dl
  ]));
  const hint = getKnownOwners().length
    ? "Start typing to pick from existing owners, or add a new name."
    : "No owners yet — type a name to start a roster.";
  form.appendChild(h("div", { style: "font-size:11px;color:var(--muted);margin-top:-4px;" }, hint));

  const save = async () => {
    const v = input.value.trim();
    if (v === cur) { closeModal(); return; }
    STATE[taskId].owner = v;
    STATE[taskId].updated = new Date().toISOString();
    await saveState();
    closeModal();
    renderShell();
    toast(v ? "Assigned" : "Cleared");
  };
  const saveBtn = h("button", { class: "btn btn-primary", onclick: save }, "Save");
  const clearBtn = h("button", {
    class: "btn btn-danger",
    onclick: async () => {
      if (!cur) { closeModal(); return; }
      STATE[taskId].owner = "";
      STATE[taskId].updated = new Date().toISOString();
      await saveState();
      closeModal();
      renderShell();
      toast("Cleared");
    }
  }, "Clear");
  const cancel = h("button", { class: "btn btn-outline", onclick: closeModal }, "Cancel");

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); save(); }
  });

  form.appendChild(h("div", { class: "ef-footer" }, [
    clearBtn, h("div", { class: "spacer" }), cancel, saveBtn
  ]));

  openModal({
    title: (cur ? "Change owner · " : "Assign owner · ") + getTitle(t, s),
    body: form
  });
  setTimeout(() => { input.focus(); input.select(); }, 50);
}

// Inline owner editor — replaces the anchor element with a text input that
// commits on Enter/blur and cancels on Escape. Suggests existing owners.
function startInlineOwner(taskId, anchorEl) {
  const cur = STATE[taskId]?.owner || "";
  const listId = "owner-suggest-" + taskId + "-" + Math.floor(Math.random() * 1000000);
  const dl = document.createElement("datalist");
  dl.id = listId;
  getKnownOwners().forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    dl.appendChild(opt);
  });
  const input = h("input", {
    class: "risk-owner-input",
    type: "text",
    list: listId,
    value: cur,
    placeholder: "owner name",
    onclick: (e) => e.stopPropagation()
  });
  const wrap = h("span", { class: "risk-owner-edit-wrap", onclick: (e) => e.stopPropagation() }, [input, dl]);
  anchorEl.replaceWith(wrap);
  input.focus();
  input.select();
  let committed = false;
  const commit = async () => {
    if (committed) return;
    committed = true;
    const v = input.value.trim();
    if (v === cur) { renderMain(); return; }
    STATE[taskId].owner = v;
    STATE[taskId].updated = new Date().toISOString();
    await saveState();
    renderMain();
  };
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); input.blur(); }
    else if (e.key === "Escape") { committed = true; renderMain(); }
  });
  input.addEventListener("blur", commit);
}

// Days-until helpers (relative to today, not a fixed prototype date).
function relativeDays(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + "T00:00:00");
  return Math.ceil((d - today) / 86400000);
}
function relativeDueLabel(dateStr) {
  const d = relativeDays(dateStr);
  if (d == null) return "—";
  if (d < 0) return `${Math.abs(d)}d over`;
  if (d === 0) return "today";
  return `${d}d`;
}

/* ============================================================================
   TASKS VIEW
   ============================================================================ */
function renderTasksView(main) {
  // Build a flat row list with effective phase metadata + state.
  const rows = [];
  effectivePhases().forEach(p => {
    p.groups.forEach(g => {
      g.tasks.forEach(t => {
        const s = STATE[t.id];
        if (!s) return;
        if (!passesArchiveFilter(s)) return;
        rows.push({
          t, s, phaseId: p.id, phaseNum: p.num, phaseTitle: p.title,
          groupId: g.id, groupTitle: g.title,
          title: getTitle(t, s),
          desc: getDesc(t, s),
          risk: riskOf(t, s)
        });
      });
    });
  });

  // Sidebar phase filter — when set, scope every downstream surface (heatmap,
  // counts, list, matrix) to just that phase.
  const phaseScoped = UI.phaseFilter
    ? rows.filter(r => r.phaseId === UI.phaseFilter)
    : rows;
  const activePhase = UI.phaseFilter
    ? effectivePhases().find(p => p.id === UI.phaseFilter)
    : null;

  // Search filter (title / notes / owner / phase).
  const q = (UI.search || "").toLowerCase().trim();
  const filtered = q
    ? phaseScoped.filter(r => (r.title + " " + r.desc + " " + (r.s.notes || "") + " " +
        (r.s.owner || "") + " " + r.phaseTitle).toLowerCase().includes(q))
    : phaseScoped;

  // ---- At-risk header (editorial line + countdown ring + stat line)
  const atRiskCount = filtered.filter(r => r.s.status !== "complete" &&
    (r.risk === "critical" || r.risk === "high")).length;
  const totalCount = filtered.length;
  const doneCount = filtered.filter(r => r.s.status === "complete").length;
  const days = daysUntil(GO_LIVE);

  const riskHero = h("section", { class: "risk-hero" }, [
    h("div", { class: "risk-hero-text" }, [

      ]),

  main.appendChild(h("div", { class: "risk-toggle-row" }, [

  } else {

  }
}

function renderCountdownRing(days) {
  const svgNs = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNs, "svg");
  svg.setAttribute("width", "92"); svg.setAttribute("height", "92");
  svg.setAttribute("viewBox", "0 0 92 92");
  svg.style.transform = "rotate(-90deg)";
  const bg = document.createElementNS(svgNs, "circle");
  bg.setAttribute("cx", "46"); bg.setAttribute("cy", "46"); bg.setAttribute("r", "34");
  bg.setAttribute("stroke", "var(--bg-3)"); bg.setAttribute("stroke-width", "6");
  bg.setAttribute("fill", "none");
  svg.appendChild(bg);
  const fg = document.createElementNS(svgNs, "circle");
  fg.setAttribute("cx", "46"); fg.setAttribute("cy", "46"); fg.setAttribute("r", "34");
  fg.setAttribute("stroke", "var(--citrus)"); fg.setAttribute("stroke-width", "6");
  fg.setAttribute("fill", "none"); fg.setAttribute("stroke-linecap", "round");
  const c = 2 * Math.PI * 34;
  const pct = Math.max(0, Math.min(1, 1 - days / 180));
  fg.setAttribute("stroke-dasharray", `${c * pct} ${c}`);
  svg.appendChild(fg);
  return h("div", { class: "risk-ring" }, [
    svg,
    h("div", { class: "risk-ring-inner" }, [
      h("div", { class: "risk-ring-num" }, days >= 0 ? days : 0),
      h("div", { class: "risk-ring-lbl" }, "days")
    ])
  ]);
}

function renderOwnerHeatmap(rows) {
  // Aggregate by owner string (free-form). Skip rows without an owner.
  const byOwner = new Map();
  rows.forEach(r => {
    if (!r.s.owner) return;
    if (r.s.status === "complete") return;
    const key = r.s.owner.trim();
    if (!byOwner.has(key)) byOwner.set(key, { owner: key, open: 0, critical: 0 });
    const b = byOwner.get(key);
    b.open += 1;
    if (r.risk === "critical") b.critical += 1;
  });
  const list = Array.from(byOwner.values())
    .sort((a, b) => b.critical - a.critical || b.open - a.open);

  // Hide the heatmap entirely when there's nothing to show — empty state was
  // taking up a big block and adding visual noise.
  if (list.length === 0) return null;

  const cells = list.map(o => {
        const hue = teamHueOf(o.owner);
        const opacity = Math.min(1, 0.25 + o.open * 0.12);
        return h("div", {
          class: "heat-cell",
          title: `${o.owner} — ${o.open} open · ${o.critical} critical`
        }, [
          h("div", {
            class: "heat-bar",
            style: `background: hsl(${hue} 60% 55%); opacity: ${opacity};`
          }, o.critical > 0 ? [h("div", { class: "heat-crit-dot" }, o.critical)] : []),
          h("div", { class: "heat-name" }, o.owner.split(" ")[0]),
          h("div", { class: "heat-count" }, o.open)
        ]);
      });

  return h("section", { class: "owner-heatmap" }, [
    h("div", { class: "heat-title" }, "Owner workload"),
    h("div", { class: "heat-row" }, cells)
  ]);
}

function renderRiskList(rows) {
  const buckets = {
    critical: rows.filter(r => r.risk === "critical" && r.s.status !== "complete"),
    high:     rows.filter(r => r.risk === "high"     && r.s.status !== "complete"),
    med:      rows.filter(r => r.risk === "med"      && r.s.status !== "complete"),
    low:      rows.filter(r => r.risk === "low"      && r.s.status !== "complete"),
    done:     rows.filter(r => r.s.status === "complete")
  };
  const order = ["critical", "high", "med", "low", "done"];
  const meta = {
    critical: { label: "Critical — blocks July 13", color: "var(--danger)" },
    high:     { label: "High risk",                color: "var(--citrus-deep)" },
    med:      { label: "Medium",                   color: "var(--sun)" },
    low:      { label: "Low",                      color: "var(--leaf)" },
    done:     { label: "Shipped",                  color: "var(--leaf)" }
  };
  const wrap = h("div", { class: "risk-list" });
  let any = false;
  order.forEach(k => {
    if (!buckets[k].length) return;
    any = true;
    const section = h("section", {
      class: "risk-bucket",
      style: `border-left-color: ${meta[k].color};`
    });
    section.appendChild(h("div", { class: "risk-bucket-head" }, [
      h("span", { class: "risk-bucket-label", style: `color: ${meta[k].color};` }, meta[k].label),
      h("span", { class: "risk-bucket-count" }, buckets[k].length)
    ]));
    // Subtle sub-grouping by phase. Tasks keep their original order within
    // each phase; the phase order matches PHASES[] (sidebar order).
    const phaseOrder = effectivePhases().map(p => p.id);
    const byPhase = new Map();
    buckets[k].forEach(r => {
      if (!byPhase.has(r.phaseId)) byPhase.set(r.phaseId, []);
      byPhase.get(r.phaseId).push(r);
    });
    // Skip the per-phase divider when a phase filter is already active —
    // every row in the bucket is from the same phase, so the divider is noise.
    const showPhaseDivider = !UI.phaseFilter;
    // One shared grid for the whole bucket — tasks from single-task phases
    // pair freely across phase boundaries instead of each wasting a full row.
    const grid = h("div", { class: "risk-rows-grid" });
    phaseOrder.forEach(pid => {
      const inPhase = byPhase.get(pid);
      if (!inPhase || !inPhase.length) return;
      const head = inPhase[0];
      // Only show a full-width divider for phases with 2+ tasks; single-task
      // phases flow freely — the corner phase tag on each card identifies them.
      if (showPhaseDivider && inPhase.length > 1) {
        grid.appendChild(h("div", { class: "risk-phase-divider" }, [
          h("span", { class: "risk-phase-divider-num" }, head.phaseNum),
          h("span", { class: "risk-phase-divider-name" }, head.phaseTitle),
          h("span", { class: "risk-phase-divider-count" }, inPhase.length)
        ]));
      }
      inPhase.forEach(r => grid.appendChild(renderRiskRow(r)));
    });
    section.appendChild(grid);
    wrap.appendChild(section);
  });
  if (!any) {
    wrap.appendChild(h("div", { class: "empty" }, [
      h("span", { class: "empty-emoji" }, "🔍"),
      h("div", {}, lbl("emptyTasks"))
    ]));
  }
  return wrap;
}

/* ============================================================================
   DESCRIPTION CALLOUT (hover tooltip — no layout shift)
   ============================================================================ */
let _descCalloutEl = null;
function getDescCalloutEl() {
  if (!_descCalloutEl) {
    _descCalloutEl = document.createElement("div");
    _descCalloutEl.className = "desc-callout";
    document.body.appendChild(_descCalloutEl);
  }
  return _descCalloutEl;
}
function showDescCallout(text, anchorEl) {
  if (!text) return;
  const tip = getDescCalloutEl();
  tip.textContent = text;
  tip.style.maxWidth = Math.min(300, Math.max(220, anchorEl.getBoundingClientRect().width)) + "px";
  tip.style.top = "-9999px";
  tip.style.left = "-9999px";
  tip.classList.remove("is-above");
  tip.style.display = "block";

  requestAnimationFrame(() => {
    const rect = anchorEl.getBoundingClientRect();
    const tr = tip.getBoundingClientRect();
    const cardCenterX = rect.left + rect.width / 2;

    // Center callout under card, clamped to viewport
    let left = Math.round(cardCenterX - tr.width / 2);
    left = Math.max(8, Math.min(left, window.innerWidth - tr.width - 8));

    // Flip above if not enough space below
    const below = rect.bottom + 8 + tr.height < window.innerHeight - 8;
    const top = below ? rect.bottom + 8 : rect.top - tr.height - 8;
    if (!below) tip.classList.add("is-above");

    // Arrow points at card center; offset relative to callout left edge
    const arrowX = Math.round(cardCenterX - left);
    tip.style.setProperty("--arrow-x", arrowX + "px");
    tip.style.left = left + "px";
    tip.style.top = top + "px";
  });
}
function hideDescCallout() {
  if (_descCalloutEl) _descCalloutEl.style.display = "none";
}

function renderRiskRow(r) {

    not_started: "var(--ink-3)",
    in_progress: "var(--info)",
    complete:    "var(--leaf)",
    blocked:     "var(--blocked)"
  })[s.status] || "var(--ink-3)";
  const statusLabel = (STATUS_LABELS[s.status] || s.status).toUpperCase();
  const dueLabel = s.dueDate ? relativeDueLabel(s.dueDate) : "";
  const dueDays = relativeDays(s.dueDate);
  const dueColor = dueDays == null ? "var(--muted)"
    : dueDays < 0 ? "var(--danger)"
    : dueDays < 14 ? "var(--sun)"
    : "var(--ink-3)";

        e.stopPropagation();

        showStatusDropdown(rect.left, rect.bottom + 4, t.id);
      }
    }, statusLabel),
    h("div", { class: "risk-row-title" }, title),
    h("div", { class: "risk-row-meta" }, [
      archived ? h("button", {
        class: "risk-unarchive-btn",
        title: "Unarchive this task",
        onclick: (e) => { e.stopPropagation(); setTaskArchived(t.id, false); }
      }, "Unarchive") : null,
      archived ? h("span", { class: "risk-archived-tag" }, "ARCHIVED") : null,
      h("button", {
        class: "risk-urgent-btn" + (s.urgent ? " is-on" : ""),
        title: s.urgent ? "Unmark urgent" : "Mark urgent",
        "aria-label": s.urgent ? "Unmark urgent" : "Mark urgent",
        "aria-pressed": s.urgent ? "true" : "false",
        html: ICONS.fire,
        onclick: (e) => { e.stopPropagation(); toggleUrgent(t.id); }
      }),
      s.owner ? h("span", {
        class: "risk-owner-pill",
        title: s.owner + " — right-click the row to change",
        style: `background: hsl(${ownerHue} 55% 94%); color: hsl(${ownerHue} 40% 30%);`
      }, initials) : null,
      dueLabel ? h("span", {
        class: "risk-due", style: `color: ${dueColor};`
      }, dueLabel) : null,
      openBugs > 0 ? h("span", { class: "risk-bug-chip" }, "🐞 " + openBugs) : null,
      (s.repeat && s.repeat !== "none") ? (() => {
        const anchor = s.startDate || s.dueDate || "";
        const label = repeatOptionLabel(s.repeat, anchor);
        const shortLabel = ({
          daily: "↻ Daily",
          weekly: "↻ Weekly",
          biweekly: "↻ Bi-weekly",
          monthly: "↻ Monthly"
        })[s.repeat] || "↻ Repeats";
        return h("span", {
          class: "risk-repeat-tag",
          title: label + " — each occurrence has its own status + notes"
        }, shortLabel);
      })() : null
    ].filter(Boolean))
  ]);
  main.addEventListener("click", () => {
    UI.openTasks[t.id] = !UI.openTasks[t.id];
    saveUI();
    renderMain();

    const bugTitleInput   = h("input",    { class: "risk-bug-form-title", type: "text", placeholder: "Bug title — describe the issue" });
    const bugSevSel       = h("select",   { class: "risk-bug-form-select" }, [
      h("option", { value: "medium" }, "Medium"),
      h("option", { value: "high"   }, "High"),
      h("option", { value: "critical" }, "Critical"),
      h("option", { value: "low"    }, "Low")
    ]);
    const bugStatusSel    = h("select",   { class: "risk-bug-form-select" }, [
      h("option", { value: "open"       }, "Open"),
      h("option", { value: "in_progress"}, "In progress"),
      h("option", { value: "resolved"   }, "Resolved"),
      h("option", { value: "wont_fix"   }, "Won't fix")
    ]);
    const bugReporterInput = h("input",   { class: "risk-bug-form-reporter", type: "text", placeholder: "Reporter" });
    const bugDescInput    = h("textarea", { class: "risk-bug-form-desc", placeholder: "Steps to reproduce, expected vs. actual…" });

    const showForm  = () => { bugForm.style.display = "flex"; addBugBtn.style.display = "none"; bugTitleInput.focus(); };
    const hideForm  = () => { bugForm.style.display = "none"; addBugBtn.style.display = ""; bugTitleInput.value = ""; bugDescInput.value = ""; };
    const submitBug = () => {
      if (!bugTitleInput.value.trim()) return;
      addBugInline(t.id, {
        title: bugTitleInput.value, severity: bugSevSel.value,
        status: bugStatusSel.value, reporter: bugReporterInput.value,
        description: bugDescInput.value
      });
    };

    bugTitleInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); submitBug(); } });

    const bugForm = h("div", { class: "risk-bug-form", style: "display:none;" }, [
      bugTitleInput,
      h("div", { class: "risk-bug-form-row" }, [
        bugSevSel, bugStatusSel, bugReporterInput,
        h("button", { class: "risk-bug-form-add", type: "button", onclick: submitBug }, "Save bug"),
        h("button", { class: "risk-bug-form-cancel", type: "button", onclick: hideForm }, "Cancel")
      ]),
      bugDescInput
    ]);

    const addBugBtn = h("button", { class: "risk-bug-add-toggle", type: "button", onclick: showForm }, "+ Add bug");

    const makeBugItem = (b) => {
      // ── View row ──────────────────────────────────────────────────
      const bugView = h("div", {
        class: "risk-bug",
        style: `border-left-color: ${sevColor(b.severity)}; cursor: pointer;`,
        title: "Click to edit"
      }, [
        h("span", { class: "risk-bug-sev", style: `color: ${sevColor(b.severity)};` },
          (b.severity || "medium").toUpperCase()),
        h("span", { class: "risk-bug-title" }, b.title),
        b.stepsToReproduce ? h("span", { class: "risk-bug-steps-hint", title: b.stepsToReproduce }, "notes") : null,
        h("span", { class: "risk-bug-status" }, (b.status || "").replace(/_/g, " ")),
        b.reporter ? h("span", { class: "risk-bug-reporter" }, b.reporter) : null,
        h("button", {
          class: "risk-bug-del-btn", title: "Delete bug",
          onclick: async (e) => {
            e.stopPropagation();
            if (!confirm("Delete this bug? This can't be undone.")) return;
            STATE[t.id].bugs = (STATE[t.id].bugs || []).filter(x => x.id !== b.id);
            await saveState(); renderMain(); toast("Bug deleted");
          }
        }, "×")
      ].filter(Boolean));

      // ── Edit form ─────────────────────────────────────────────────
      const eTitle    = h("input",    { class: "risk-bug-form-title",    type: "text", value: b.title || "" });
      const eSev      = h("select",   { class: "risk-bug-form-select" }, [
        h("option", { value: "medium",   ...(b.severity === "medium"   ? { selected: true } : {}) }, "Medium"),
        h("option", { value: "high",     ...(b.severity === "high"     ? { selected: true } : {}) }, "High"),
        h("option", { value: "critical", ...(b.severity === "critical" ? { selected: true } : {}) }, "Critical"),
        h("option", { value: "low",      ...(b.severity === "low"      ? { selected: true } : {}) }, "Low")
      ]);
      const eStatus   = h("select",   { class: "risk-bug-form-select" }, [
        h("option", { value: "open",        ...(b.status === "open"        ? { selected: true } : {}) }, "Open"),
        h("option", { value: "in_progress", ...(b.status === "in_progress" ? { selected: true } : {}) }, "In progress"),
        h("option", { value: "resolved",    ...(b.status === "resolved"    ? { selected: true } : {}) }, "Resolved"),
        h("option", { value: "wont_fix",    ...(b.status === "wont_fix"    ? { selected: true } : {}) }, "Won't fix")
      ]);
      const eReporter = h("input",    { class: "risk-bug-form-reporter",  type: "text", value: b.reporter || "", placeholder: "Reporter" });
      const eDesc     = h("textarea", { class: "risk-bug-form-desc",      placeholder: "Steps to reproduce, expected vs. actual…" }, b.stepsToReproduce || "");

      const openEdit  = () => { bugEdit.style.display = "flex"; bugView.style.display = "none"; eTitle.focus(); };
      const closeEdit = () => { bugEdit.style.display = "none"; bugView.style.display = ""; };
      const saveEdit  = async () => {
        if (!eTitle.value.trim()) return;
        b.title            = eTitle.value.trim();
        b.severity         = eSev.value;
        b.status           = eStatus.value;
        b.reporter         = eReporter.value.trim();
        b.stepsToReproduce = eDesc.value.trim();
        STATE[t.id].updated = new Date().toISOString();
        await saveState(); renderMain();
      };
      eTitle.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); saveEdit(); } });

      const bugEdit = h("div", { class: "risk-bug-form", style: "display:none;" }, [
        eTitle,
        h("div", { class: "risk-bug-form-row" }, [
          eSev, eStatus, eReporter,
          h("button", { class: "risk-bug-form-add",    type: "button", onclick: saveEdit  }, "Save"),
          h("button", { class: "risk-bug-form-cancel", type: "button", onclick: closeEdit }, "Cancel")
        ]),
        eDesc
      ]);

      bugView.addEventListener("click", (e) => {
        if (e.target.closest(".risk-bug-del-btn")) return;
        openEdit();
      });

      const wrap = h("div", { class: "risk-bug-item" });
      wrap.appendChild(bugView);
      wrap.appendChild(bugEdit);
      return wrap;
    };

    const body = h("div", { class: "risk-row-body" }, [
      noteArea,
      ...(s.bugs || []).map(makeBugItem),
      addBugBtn,
      bugForm
    ]);
    row.appendChild(body);
  }
  return row;
}

function renderMatrixView(rows) {
  const phases = effectivePhases();
  // Owners with at least one task in the filtered set.
  const ownerKeys = Array.from(new Set(rows.filter(r => r.s.owner).map(r => r.s.owner.trim())));
  ownerKeys.sort();

  if (ownerKeys.length === 0) {
    return h("div", { class: "empty" }, [
      h("span", { class: "empty-emoji" }, "👥"),
      h("div", {}, "No tasks have an owner yet — assign owners to populate the matrix.")
    ]);
  }

  const wrap = h("div", { class: "matrix-wrap" });
  const table = h("table", { class: "matrix-table" });
  const thead = h("thead");
  const headRow = h("tr", {}, [
    h("th", { class: "matrix-th matrix-owner-th" }, "Owner"),
    ...phases.map(p => h("th", { class: "matrix-th" }, [
      h("div", { class: "matrix-phase-num" }, p.num),
      h("div", { class: "matrix-phase-name" }, p.title)
    ])),
    h("th", { class: "matrix-th matrix-load-th" }, "Load")
  ]);
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = h("tbody");
  ownerKeys.forEach(owner => {
    const ownerRows = rows.filter(r => (r.s.owner || "").trim() === owner);
    const open = ownerRows.filter(r => r.s.status !== "complete").length;
    const crit = ownerRows.filter(r => r.s.status !== "complete" && r.risk === "critical").length;
    const blocked = ownerRows.filter(r => r.s.status === "blocked").length;
    const hue = teamHueOf(owner);
    const tr = h("tr");
    tr.appendChild(h("td", { class: "matrix-owner-cell" }, [
      h("div", {
        class: "matrix-avatar",
        style: `background: hsl(${hue} 55% 88%); color: hsl(${hue} 45% 30%);`
      }, ownerInitials(owner)),
      h("div", { class: "matrix-owner-meta" }, [
        h("div", { class: "matrix-owner-name" }, owner),
        h("div", { class: "matrix-owner-role" }, teamForOwner(owner).toUpperCase())
      ])
    ]));
    phases.forEach(p => {
      const cellRows = ownerRows.filter(r => r.phaseId === p.id);
      const cell = h("td", { class: "matrix-cell" });
      const chipGrid = h("div", { class: "matrix-chip-grid" });
      cellRows.forEach(r => chipGrid.appendChild(renderMatrixChip(r)));
      cell.appendChild(chipGrid);
      tr.appendChild(cell);
    });
    tr.appendChild(h("td", { class: "matrix-load-cell" }, [renderLoadBar(open, crit, blocked)]));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);

  if (UI.matrixSelected) {
    const sel = rows.find(r => r.t.id === UI.matrixSelected);
    if (sel) wrap.appendChild(renderMatrixEdit(sel));
  }
  return wrap;
}

function renderMatrixChip(r) {
  const { t, s, title, risk } = r;
  const sel = UI.matrixSelected === t.id;
  const isComplete = s.status === "complete";
  const isBlocked = s.status === "blocked";
  const dueDays = relativeDays(s.dueDate);
  const overdue = dueDays != null && dueDays < 0 && !isComplete;
  const isNew = title.startsWith("⚠ NEW") || title.startsWith("⚠ Scope");
  const statusColor = ({
    not_started: "var(--ink-3)",
    in_progress: "var(--info)",
    complete:    "var(--leaf)",
    blocked:     "var(--blocked)"
  })[s.status] || "var(--ink-3)";
  const bg = sel ? "var(--citrus-soft)"
    : isComplete ? "#EFF5E8"
    : isBlocked ? "#EADFF0"
    : "var(--surface)";
  const chip = h("div", {
    class: "matrix-chip" + (sel ? " is-selected" : "") + (isComplete ? " is-complete" : ""),
    style: `border-left-color: ${RISK_META[risk].color}; background: ${bg};`,
    title: title
  }, [
    h("div", { class: "matrix-chip-top" }, [
      h("span", {
        class: "matrix-chip-status", style: `color: ${statusColor};`
      }, (STATUS_LABELS[s.status] || s.status).toUpperCase()),
      (s.bugs || []).filter(b => b.status !== "resolved" && b.status !== "wont_fix").length > 0
        ? h("span", { class: "matrix-chip-bugs" },
            "🐞" + (s.bugs || []).filter(b => b.status !== "resolved" && b.status !== "wont_fix").length)
        : null,
      overdue ? h("span", { class: "matrix-chip-over" }, "⚠") : null
    ].filter(Boolean)),
    h("div", {
      class: "matrix-chip-title" + (isNew ? " is-new" : "")
    }, isNew ? title.replace(/^⚠\s*(NEW\s*—\s*|Scope[^—]*—\s*)?/, "") : title)
  ]);
  chip.addEventListener("click", (e) => {
    e.stopPropagation();
    UI.matrixSelected = (UI.matrixSelected === t.id) ? null : t.id;
    saveUI();
    renderMain();
  });
  chip.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    e.stopPropagation();
    openTaskContextMenu(e.clientX, e.clientY, t.id);
  });
  return chip;
}

function renderLoadBar(open, critical, blocked) {
  const max = 6;
  const sev = critical > 0 ? "var(--danger)"
    : blocked > 0 ? "var(--blocked)"
    : open > 3 ? "var(--sun)"
    : "var(--leaf)";
  const dots = [];
  for (let i = 0; i < max; i++) {
    dots.push(h("div", {
      class: "matrix-load-dot",
      style: `background: ${i < open ? sev : "var(--bg-3)"};`
    }));
  }
  return h("div", { class: "matrix-load-wrap" }, [
    h("div", { class: "matrix-load-cells" }, dots),
    h("div", { class: "matrix-load-num" }, [
      h("span", {}, String(open)),
      critical > 0 ? h("span", { class: "matrix-load-crit" }, ` · ${critical} crit`) : null
    ].filter(Boolean))
  ]);
}

function renderMatrixEdit(r) {
  const { t, s, title, phaseNum, phaseTitle, risk } = r;
  const statusColor = ({
    not_started: "var(--ink-3)", in_progress: "var(--info)",
    complete: "var(--leaf)", blocked: "var(--blocked)"
  })[s.status] || "var(--ink-3)";
  const wrap = h("div", { class: "matrix-edit" });
  wrap.appendChild(h("div", { class: "matrix-edit-head" }, [
    h("div", {}, [
      h("div", { class: "matrix-edit-kicker" }, `${phaseNum} · ${phaseTitle}`),
      h("div", { class: "matrix-edit-title" }, title)
    ]),
    h("button", {
      class: "matrix-edit-close",
      onclick: () => { UI.matrixSelected = null; saveUI(); renderMain(); }
    }, "×")
  ]));
  wrap.appendChild(h("div", { class: "matrix-edit-row" }, [
    h("button", {
      class: "matrix-edit-chip",
      style: `background: ${statusColor}20; color: ${statusColor};`,
      onclick: (e) => {
        e.stopPropagation();
        const rect = e.currentTarget.getBoundingClientRect();
        showStatusDropdown(rect.left, rect.bottom + 4, t.id);
      }
    }, (STATUS_LABELS[s.status] || s.status) + " ▾"),
    h("button", {
      class: "matrix-edit-chip",
      style: `background: ${RISK_META[risk].color}20; color: ${RISK_META[risk].color};`,
      onclick: () => cycleRisk(t.id)
    }, RISK_META[risk].label + " risk ↻"),
    s.dueDate ? h("span", { class: "matrix-edit-due" }, "Due " + s.dueDate) : null
  ].filter(Boolean)));
  wrap.appendChild(h("textarea", {
    class: "matrix-edit-note",
    placeholder: "Note…",
    onblur: (e) => appendTaskNote(t.id, e.target.value)
  }, s.notes || ""));
  (s.bugs || []).forEach(b => {
    wrap.appendChild(h("div", {
      class: "risk-bug",
      style: `border-left-color: ${b.severity === "critical" ? "var(--danger)" : "var(--sun)"}; margin-bottom: 4px;`
    }, [
      h("span", {
        class: "risk-bug-sev",
        style: `color: ${b.severity === "critical" ? "var(--danger)" : "var(--sun)"};`
      }, (b.severity || "med").toUpperCase()),
      h("span", { class: "risk-bug-title" }, b.title)
    ]));
  });
  wrap.appendChild(h("input", {
    class: "risk-bug-input", type: "text",
    placeholder: "🐞 New bug (Enter)",
    onkeydown: (e) => {
      if (e.key === "Enter" && e.target.value.trim()) {
        addBugInline(t.id, { title: e.target.value });
        e.target.value = "";
      }
    }
  }));
  return wrap;
}
