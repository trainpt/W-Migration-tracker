    labels.appendChild(h("div", { class: "timed-hour-label" },
      `${hh} ${h_ < 12 ? "AM" : "PM"}`));
  }
  wrap.appendChild(labels);
  // 7 day columns
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(d.getDate() + i);
    const dateStr = ymd(d);
    const colWrap = h("div", { class: "timed-col-wrap", "data-date": dateStr });
  attachMobileDateGestures(colWrap, dateStr);
    colWrap.appendChild(h("div", {
      class: "timed-col-header" + (dateStr === todayStr ? " is-today" : "")
    }, [
      h("span", { class: "timed-col-dow" }, d.toLocaleDateString("en-US", { weekday: "short" })),
      h("span", { class: "timed-col-num" }, String(d.getDate()))
    ]));
    colWrap.appendChild(renderTimedDayColumn(dateStr, { todayStr }));
    wrap.appendChild(colWrap);
  }
  return wrap;
}

function renderCalDay(date, opts) {
  const dateStr = ymd(date);
  const dayNum = date.getDate();
  const events = eventsOnDate(dateStr);
  // Sort priority (mirrors Google Calendar month view):
  //   1. Any ranged milestone band (OOO, or virtual ranges from adjacent
  //      same-title milestones like Focus time / Lunch) at the top
  //   2. Single-day OOO
  //   3. All-day single events
  //   4. Timed events by start time
  const sortKey = (ev) => {
    if (ev.kind === "milestone" && (ev.isRange || ev.type === "ooo")) return 0;
    const times = eventTimes(ev, dateStr);
    if (!times.startTime) return 2;
    return 3 + (parseInt(times.startTime.replace(":", ""), 10) || 0) / 10000;
  };
  events.sort((a, b) => sortKey(a) - sortKey(b));
  const dow = date.getDay();
  const isWeekend = dow === 0 || dow === 6;

  const classes = ["cal-day"];
  if (opts.otherMonth) classes.push("is-other-month");
  if (dateStr === opts.todayStr) classes.push("is-today");
  if (isWeekend) classes.push("is-weekend");
  // Tint the whole cell when an OOO milestone is active on this day — mirrors
  // Google Calendar's faint green column fill.
  const oooHere = events.find(ev => ev.kind === "milestone" && ev.type === "ooo");
  if (oooHere) classes.push("has-ooo");
  // Cell contains the *start* of ANY multi-day milestone range (native or
  // virtual via adjacent same-title events) → open overflow so the label can
  // float past the cell's right edge and center over the boundary.
  if (events.some(ev => ev.kind === "milestone" && ev.isRange && ev.isStart && !ev.isEnd)) {
    classes.push("has-range-start");
  }

  const dowLabel = opts.topRow
    ? h("div", { class: "cal-dow-inline" },
        date.toLocaleDateString("en-US", { weekday: "short" }).toUpperCase())
    : null;

  const cell = h("div", {
    class: classes.join(" "),
    "data-date": dateStr,
    onclick: () => showScheduleModal(dateStr)
  }, [
    dowLabel,
    h("div", { class: "cal-daynum" }, dayNum),
    h("div", { class: "cal-events" }, [
      ...events.slice(0, 3).map(ev => {
        let cls = "cal-event";
        if (ev.kind === "milestone") {
          cls += " " + (MILESTONE_TYPE_CLS[ev.type] || "is-milestone");
        } else if (ev.type === "critical") {
          cls += " is-milestone";
        }
        if (ev.kind === "recurring") cls += " is-recurring";
        if (ev.kind === "task" && ev.complete) cls += " is-complete";
        const pillTimes = eventTimes(ev, dateStr);
        if (dateStr < opts.todayStr) cls += " is-past";
        else if (isEventTimePast(pillTimes, dateStr, opts.todayStr)) cls += " is-past-today";
        // Per-event status (flagged / completed / cancelled) — works for milestones
        // and per-occurrence recurring; tasks use their existing status path.
        if (ev.kind !== "task") {
          const evStatus = eventStatus(ev, dateStr);
          if (evStatus === "flagged")   cls += " is-status-flagged";
          if (evStatus === "completed") cls += " is-status-completed";
          if (evStatus === "cancelled") cls += " is-status-cancelled";
        }
        if (ev.isRange) {
          if (ev.isStart) cls += " is-range-start";
          if (ev.isEnd) cls += " is-range-end";
        }
        const edge = ev.isRange
          ? (ev.isStart && ev.isEnd ? "single"
             : ev.isStart ? "start"
             : ev.isEnd ? "end"
             : "mid")
          : "single";
        const isDraggable = ev.taskId && edge !== "mid";
        if (edge === "mid") cls += " is-range-locked";
        const attrs = {
          class: cls,
          "aria-label": ev.title,
          onmouseenter: (e) => showEventTooltip(e.currentTarget, ev, dateStr),
          onmouseleave: hideEventTooltip,
          oncontextmenu: (e) => {
            e.preventDefault();
            e.stopPropagation();
            hideEventTooltip();
            if (ev.kind === "task" && ev.taskId) openTaskContextMenu(e.clientX, e.clientY, ev.taskId);
            else if (ev.kind === "milestone") openMilestoneContextMenu(e.clientX, e.clientY, ev.milestoneIndex, dateStr);
            else if (ev.kind === "recurring") openRecurringContextMenu(e.clientX, e.clientY, ev.recurringIndex, dateStr);
          }
        };
        if (ev.taskId) {
          attrs["data-task-id"] = ev.taskId;
          attrs["data-edge"] = edge;
        }
        // Clicking the pill itself edits that specific event; clicking the
        // surrounding day cell still opens the day-schedule modal.
        attrs.onclick = (e) => {
          e.stopPropagation();
          hideEventTooltip();
          if (ev.kind === "task") {
            if (ev.isRepeatOccurrence) {
              openEventUpdateModal(ev, dateStr);
            } else {
              openTaskEditor(ev.taskId);
            }
          } else if (ev.kind === "milestone") {
            openMilestoneEditor(ev.milestoneIndex);
          } else if (ev.kind === "recurring") {
            openEventUpdateModal(ev, dateStr);
          }
        };
        if (isDraggable) {
          attrs.draggable = "true";
          attrs.ondragstart = (e) => {
            e.stopPropagation();
            hideEventTooltip();
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", JSON.stringify({
              taskId: ev.taskId, anchor: dateStr,
              start: ev.startDate, end: ev.dueDate, edge
            }));
            e.currentTarget.classList.add("is-dragging");
          };
          attrs.ondragend = (e) => e.currentTarget.classList.remove("is-dragging");
        }
        // Time prefix on month-view pill, à la Google Calendar.
        const label = pillTimes.startTime
          ? fmtTime(pillTimes.startTime).replace(/:00 /, " ").toLowerCase() + " · " + ev.title
          : ev.title;
        // Milestone labels always get wrapped in a span so CSS can float the
        // label across a range's cell boundary. Tasks/recurring stay as
        // text nodes so their own range styling isn't affected.
        const pillEl = ev.kind === "milestone"
          ? h("div", attrs, [h("span", { class: "evt-inner" }, label)])
          : h("div", attrs, label);
        // Mobile: tap=preview, hold=edit, long-press=drag-to-move
        attachMobileCalGestures(pillEl, ev, dateStr, edge, isDraggable);
        return pillEl;
      }),
      events.length > 3 ? h("div", { class: "cal-event-more" }, `+${events.length - 3} more`) : null
    ].filter(Boolean))
  ]);

  // Drop target wiring
  cell.addEventListener("dragover", (e) => {
    if (!e.dataTransfer.types.includes("text/plain")) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    cell.classList.add("is-drag-over");
  });
  cell.addEventListener("dragleave", () => cell.classList.remove("is-drag-over"));
  cell.addEventListener("drop", (e) => {
    e.preventDefault();
    cell.classList.remove("is-drag-over");
    let payload;
    try { payload = JSON.parse(e.dataTransfer.getData("text/plain")); }
    catch { return; }
    if (!payload || !payload.taskId) return;
    dropTaskOnDate(payload, dateStr);
  });

  // Mobile: long-press on the cell creates a new entry on that date.
  attachMobileDateGestures(cell, dateStr);

  return cell;
}

function shiftMonth(ymStr, delta) {
  const [y, m] = ymStr.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return ym(d);
}

function getUpcoming(days) {
  const now = new Date(); now.setHours(0,0,0,0);
  const end = new Date(now); end.setDate(end.getDate() + days);
  const out = [];
  MILESTONES.forEach(m => {
    if (!passesCalendarFilter(m)) return;
    const d = new Date(m.date + "T00:00:00");
    if (d >= now && d <= end) out.push({ date: m.date, title: m.title, kind: "milestone" });
  });
  Object.entries(STATE).forEach(([tid, s]) => {
    const t = TASK_INDEX[tid];
    if (!t) return;
    if (!passesArchiveFilter(s)) return;
    if (UI.phaseFilter && t.phaseId !== UI.phaseFilter) return;
    const range = taskRange(s);
    if (!range) return;
    const startD = new Date(range.start + "T00:00:00");
    const endD = new Date(range.end + "T00:00:00");
    if (endD < now || startD > end) return;
    out.push({
      date: range.start, title: getTitle(t, s), kind: "task",
      complete: s.status === "complete", taskId: tid,
      startDate: range.start, dueDate: range.end
    });
  });
  // Recurring
  for (let i = 0; i <= days; i++) {
    const d = new Date(now); d.setDate(d.getDate() + i);
    const ds = ymd(d);
    const dow = d.getDay();
    RECURRING.forEach(r => {
      if (r.dayOfWeek === dow && ds >= r.startDate && ds <= r.endDate) {
        out.push({ date: ds, title: r.title, kind: "recurring" });
      }
    });
  }
  out.sort((a, b) => a.date.localeCompare(b.date));
  return out;
}

function showDayModal(dateStr, events) {
  openModal({
    title: fmtDate(dateStr),
    body: h("div", {}, events.map(ev => h("div", {
      style: "padding:10px 12px; border:1px solid var(--line); border-radius:7px; margin-bottom:6px; cursor:" + (ev.taskId ? "pointer" : "default"),
      onclick: () => { if (ev.taskId) { closeModal(); jumpToTask(ev.taskId); } }
    }, [
      h("div", { style: "font-weight:600; color:var(--ink); margin-bottom:3px;" }, ev.title),
      ev.desc ? h("div", { style: "font-size:12px; color:var(--ink-3);" }, ev.desc) : null,
      h("div", { style: "font-size:11px; color:var(--muted); margin-top:4px;" },
        ev.kind === "milestone" ? "Milestone" :
        ev.kind === "recurring" ? "Recurring event" :
        "Task" + (ev.complete ? " · complete" : ""))
    ].filter(Boolean))))
  });
}

/* ============================================================================
   CALENDAR SCHEDULING
   ============================================================================ */
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return ymd(d);
}
function diffDays(a, b) {
  const da = new Date(a + "T00:00:00");
  const db = new Date(b + "T00:00:00");
  return Math.round((db - da) / 86400000);
}

async function scheduleTask(taskId, startStr, endStr) {
  if (!STATE[taskId]) return;
  let start = startStr || endStr || "";
  let end = endStr || startStr || "";
  if (start && end && start > end) { const t = start; start = end; end = t; }
  STATE[taskId].startDate = (start && end && start !== end) ? start : "";
  STATE[taskId].dueDate = end || "";
  STATE[taskId].updated = new Date().toISOString();
  await saveState();
  renderMain();
  toast(end ? "Scheduled" : "Removed from calendar");
}

async function unscheduleTask(taskId) {
  if (!STATE[taskId]) return;
  STATE[taskId].startDate = "";
  STATE[taskId].dueDate = "";
  STATE[taskId].updated = new Date().toISOString();
  await saveState();
  renderMain();
  toast("Removed from calendar");
}

async function dropTaskOnDate(payload, dropDate) {
  const { taskId, edge, start, end, anchor } = payload;
  if (!taskId || !dropDate) return;
  let newStart = start;
  let newEnd = end;
  if (edge === "single") {
    newStart = dropDate;
    newEnd = dropDate;
  } else if (edge === "start") {
    newStart = dropDate;
    if (newStart > newEnd) newEnd = newStart;
  } else if (edge === "end") {
    newEnd = dropDate;
    if (newEnd < newStart) newStart = newEnd;
  } else {
    // mid (or unknown) → ignore. Middle days of a range aren't draggable;
    // the user must grab the start or end edge to resize/move.
    return;
  }
  if (newStart === start && newEnd === end) return;
  await scheduleTask(taskId, newStart, newEnd);
}

// Builds an "On this day" row for milestones / recurring with an inline
// status cycler + notes textarea. Notes save on blur; status cycle re-renders
// the modal so the pill colour stays in sync.
function buildEventUpdateRow(ev, dateStr, title, kindLabel, kindClass, refresh) {
  const evMeta = eventStatusMeta(ev, dateStr);
  const notesArea = h("textarea", {
    class: "sched-notes",
    placeholder: "Notes / what transpired…",
    onblur: (e) => setEventNotes(ev, dateStr, e.target.value)
  }, eventNotes(ev, dateStr));
  const curTimes = eventTimes(ev, dateStr);
  const endT = h("input", {
    type: "time", class: "sched-date-input", value: curTimes.endTime || "",
    onchange: (e) => setEventTimes(ev, dateStr, startT.value, e.target.value, ev.kind === "milestone")
  });
  const startT = h("input", {
    type: "time", class: "sched-date-input", value: curTimes.startTime || "",
    onchange: (e) => {
      if (e.target.value && !endT.value) {
        endT.value = addMinutesToTime(e.target.value, 60);
      }
      setEventTimes(ev, dateStr, e.target.value, endT.value, ev.kind === "milestone");
    }
  });
  return h("div", { class: "sched-row" }, [
    h("div", { class: "sched-row-main" }, [
      h("span", { class: "sched-pill " + kindClass }, kindLabel),
      h("div", { class: "sched-row-title" }, title)
    ]),
    h("div", { class: "sched-row-edit" }, [
      h("button", {
        class: "sched-status-pill",
        style: `background: ${evMeta.color}20; color: ${evMeta.color};`,
        onclick: async () => { await cycleEventStatus(ev, dateStr); refresh(); },
        title: "Click to cycle status"
      }, evMeta.label + " ↻"),
      h("label", { class: "sched-field-label" }, "Time"),
      startT,
      h("label", { class: "sched-field-label" }, "to"),
      endT
    ]),
    notesArea
  ]);
}

function showScheduleModal(dateStr) {
  // Build refreshable body so edits inside the modal update the lists in place.
  const wrap = h("div", { id: "schedule-modal-body" });
  // Holder for the inline "create task" callback so the header ✓ button and
  // keyboard Enter from anywhere in the card can submit the same form.
  const saveHolder = { fn: null };
  const renderBody = () => {
    wrap.innerHTML = "";

    // --- Already scheduled on this day ---
    const dow = new Date(dateStr + "T00:00:00").getDay();
    const tasksHere = Object.entries(STATE)
      .map(([tid, s]) => ({ tid, s, range: taskRange(s) }))
      .filter(x => {
        if (!x.range) return false;
        if (dateStr < x.range.start || dateStr > x.range.end) return false;
        // Honor sidebar phase filter so the day modal matches the calendar view.
        if (UI.phaseFilter) {
          const t = TASK_INDEX[x.tid];
          if (!t || t.phaseId !== UI.phaseFilter) return false;
        }
        if (x.s.repeat && x.s.repeat !== "none") {
          const anchor = x.s.startDate || x.range.start;
          return repeatMatches(x.s.repeat, anchor, dateStr);
        }
        return true;
      });

    const milestonesHere = MILESTONES.filter(m => {
      const rs = m.date, re = m.dateEnd || m.date;
      return dateStr >= rs && dateStr <= re && passesCalendarFilter(m);
    });
    const recurringHere = RECURRING.filter(r =>
      r.dayOfWeek === dow && dateStr >= r.startDate && dateStr <= r.endDate
    );

    if (tasksHere.length || milestonesHere.length || recurringHere.length) {
      wrap.appendChild(h("div", { class: "sched-section-title" }, "On this day"));
      const list = h("div", { class: "sched-list" });

      // ---- Milestones on this day (status + notes editable)
      milestonesHere.forEach(m => {
        const idx = MILESTONES.indexOf(m);
        const ev = { kind: "milestone", milestoneIndex: idx };
        list.appendChild(buildEventUpdateRow(ev, dateStr, m.title, "Milestone", "is-milestone", renderBody));
      });
      // ---- Recurring occurrences on this day (status + notes per-occurrence)
      recurringHere.forEach(r => {
        const idx = RECURRING.indexOf(r);
        const ev = { kind: "recurring", recurringIndex: idx };
        list.appendChild(buildEventUpdateRow(ev, dateStr, r.title, "Recurring", "is-recurring", renderBody));
      });
      // ---- Tasks scheduled here (range edit + status + notes)
      tasksHere.forEach(({ tid, s, range }) => {
        const t = TASK_INDEX[tid];
        const isRepeat = !!(s.repeat && s.repeat !== "none");
        const ev = { kind: "task", taskId: tid, isRepeatOccurrence: isRepeat };
        const startInput = h("input", { type: "date", class: "sched-date-input", value: range.start });
        const endInput = h("input", { type: "date", class: "sched-date-input", value: range.end });
        // Per-occurrence (or task-level for non-repeating) time inputs.
        const curTimes = eventTimes(ev, dateStr);
        const endTimeInput = h("input", {
          type: "time", class: "sched-date-input", value: curTimes.endTime || "",
          onchange: (e) => setEventTimes(ev, dateStr, startTimeInput.value, e.target.value, !isRepeat)
        });
        const startTimeInput = h("input", {
          type: "time", class: "sched-date-input", value: curTimes.startTime || "",
          onchange: (e) => {
            if (e.target.value && !endTimeInput.value) {
              endTimeInput.value = addMinutesToTime(e.target.value, 60);
            }
            setEventTimes(ev, dateStr, e.target.value, endTimeInput.value, !isRepeat);
          }
        });
        const cadenceLabel = isRepeat
          ? repeatOptionLabel(s.repeat, s.startDate || range.start)
          : "";
        const rangeLabel = isRepeat
          ? `${cadenceLabel} · ${fmtDateShort(range.start)} → ${fmtDateShort(range.end)}`
          : (range.start === range.end
              ? fmtDateShort(range.start)
              : `${fmtDateShort(range.start)} → ${fmtDateShort(range.end)}`);
        const evMeta = eventStatusMeta(ev, dateStr);
        const notesArea = h("textarea", {
          class: "sched-notes",
          placeholder: isRepeat
            ? `Notes for ${fmtDateShort(dateStr)} — what transpired…`
            : "Notes / what transpired…",
          onblur: (e) => setEventNotes(ev, dateStr, e.target.value)
        }, eventNotes(ev, dateStr));
        // Repeating tasks cycle the per-occurrence event status set;
        // one-off tasks open the existing status dropdown.
        const statusBtn = isRepeat
          ? h("button", {
              class: "sched-status-pill",
              style: `background: ${evMeta.color}20; color: ${evMeta.color};`,
              onclick: async (e) => { e.stopPropagation(); await cycleEventStatus(ev, dateStr); renderBody(); },
              title: "Click to cycle this occurrence's status"
            }, evMeta.label + " ↻")
          : h("button", {
              class: "sched-status-pill",
              style: `background: ${evMeta.color}20; color: ${evMeta.color};`,
              onclick: (e) => {
                e.stopPropagation();
                const rect = e.currentTarget.getBoundingClientRect();
                showStatusDropdown(rect.left, rect.bottom + 4, tid);
              },
              title: "Pick status"
            }, evMeta.label + " ▾");
        list.appendChild(h("div", { class: "sched-row" }, [
          h("div", { class: "sched-row-main" }, [
            isRepeat ? h("span", { class: "sched-pill is-recurring" }, "Recurring") : null,
            h("div", { class: "sched-row-title" }, getTitle(t, s)),
            h("div", { class: "sched-row-meta" }, rangeLabel)
          ].filter(Boolean)),
          h("div", { class: "sched-row-edit" }, [
            statusBtn,
            isRepeat ? null : h("label", { class: "sched-field-label" }, "Start"),
            isRepeat ? null : startInput,
            isRepeat ? null : h("label", { class: "sched-field-label" }, "End"),
            isRepeat ? null : endInput,
            h("label", { class: "sched-field-label" }, isRepeat ? "Time (this day)" : "Time"),
            startTimeInput,
            h("label", { class: "sched-field-label" }, "to"),
            endTimeInput,
            isRepeat ? null : h("button", {
              class: "btn btn-outline btn-sched-save",
              onclick: () => scheduleTask(tid, startInput.value, endInput.value).then(renderBody)
            }, "Update"),
            isRepeat ? null : h("button", {
              class: "btn btn-danger btn-sched-remove",
              onclick: () => unscheduleTask(tid).then(renderBody)
            }, "Remove")
          ].filter(Boolean)),
          notesArea
        ]));
      });
      wrap.appendChild(list);
    }

    // --- Create a new task right here (no separate modal) ---
    wrap.appendChild(h("div", { class: "sched-section-title" }, "Create a task on this day"));

    const startNew = h("input", { type: "date", class: "sched-date-input", value: dateStr });
    const endNew = h("input", { type: "date", class: "sched-date-input", value: dateStr });
    const startTimeNew = h("input", { type: "time", class: "sched-date-input" });
    const endTimeNew = h("input", { type: "time", class: "sched-date-input" });
    const titleNew = h("input", {
      type: "text",
      class: "sched-title-input",
      placeholder: "Task title — press Enter to create"
    });
    // Single dropdown — cadence anchors off the Start date below.
    const repeatSel = h("select", { class: "sched-repeat-sel" });
    const refreshRepeatLabels = () => {
      const anchor = startNew.value || dateStr;
      const cur = repeatSel.value || "none";
      repeatSel.innerHTML = "";
      REPEAT_OPTIONS.forEach(opt => {
        const o = h("option",
          opt === cur ? { value: opt, selected: true } : { value: opt },
          repeatOptionLabel(opt, anchor));
        repeatSel.appendChild(o);
      });
    };
    refreshRepeatLabels();
    startNew.addEventListener("change", refreshRepeatLabels);

    // Phase + group pickers (default to the first phase / first group).
    const phaseSel = h("select", { class: "sched-phase-sel" });
    const fillPhases = (preferId) => {
      phaseSel.innerHTML = "";
      effectivePhases().forEach((p, i) => {
        const sel = preferId ? p.id === preferId : i === 0;
        phaseSel.appendChild(h("option",
          sel ? { value: p.id, selected: true } : { value: p.id },
          `${p.num} — ${p.title}`));
      });
    };
    fillPhases();
    const groupSel = h("select", { class: "sched-group-sel" });
    const fillGroups = (preferId) => {
      groupSel.innerHTML = "";
      const p = effectivePhases().find(x => x.id === phaseSel.value);
      if (!p) return;
      p.groups.forEach((g, i) => {
        const sel = preferId ? g.id === preferId : i === 0;
        groupSel.appendChild(h("option",
          sel ? { value: g.id, selected: true } : { value: g.id },
          g.title));
      });
    };
    fillGroups();
    phaseSel.addEventListener("change", () => fillGroups());

    const phaseAddBtn = h("button", {
      type: "button",
      class: "ef-add-btn",
      title: "Create a new phase",
      onclick: () => startInlinePhaseCreate(phaseSel, phaseAddBtn, fillPhases, fillGroups),
      html: ICONS.plus
    });
    const groupAddBtn = h("button", {
      type: "button",
      class: "ef-add-btn",
      title: "Create a new group in this phase",
      onclick: () => {
        if (!phaseSel.value) { toast("Pick a phase first"); return; }
        startInlineGroupCreate(groupSel, groupAddBtn, phaseSel.value, fillGroups);
      },
      html: ICONS.plus
    });

    const createInline = async () => {
      const title = titleNew.value.trim();
      if (!title) {
        titleNew.focus();
        titleNew.classList.add("is-shake");
        setTimeout(() => titleNew.classList.remove("is-shake"), 400);
        toast("Title required");
        return;
      }
      const sd = startNew.value || dateStr;
      let ed = endNew.value || sd;
      const isRepeating = repeatSel.value && repeatSel.value !== "none";
      // Repeating tasks need a forward range so `taskRange` lets `repeatMatches`
      // generate future occurrences. If the user didn't pick an end past the
      // start, extend it ~1 year out from the start date.
      if (isRepeating && ed <= sd) {
        const d = new Date(sd + "T00:00:00");
        d.setFullYear(d.getFullYear() + 1);
        ed = d.toISOString().slice(0, 10);
      }
      const phaseId = phaseSel.value;
      const groupId = groupSel.value;
      const id = "ct-" + Date.now().toString(36) + "-" + Math.floor(Math.random() * 10000).toString(36);
      STATE.__customTasks = STATE.__customTasks || [];
      STATE.__customTasks.push({ id, phaseId, groupId, title, desc: "" });
      rebuildTaskIndex();
      const t = TASK_INDEX[id];
      STATE[id] = defaultTaskState(t);
      if (isRepeating) {
        // Anchor the cadence to the start date explicitly.
        STATE[id].startDate = sd;
        STATE[id].dueDate = ed;
      } else if (sd && ed && sd > ed) {
        STATE[id].startDate = ed;
        STATE[id].dueDate = sd;
      } else {
        STATE[id].startDate = (sd && ed && sd !== ed) ? sd : "";
        STATE[id].dueDate = ed || sd || "";
      }
      if (isRepeating) {
        STATE[id].repeat = repeatSel.value;
      }
      STATE[id].startTime = startTimeNew.value || "";
      STATE[id].endTime = endTimeNew.value || "";
      STATE[id].updated = new Date().toISOString();
      UI.openPhases[phaseId] = true;
      saveUI();
      await saveState();
      titleNew.value = "";
      repeatSel.value = "none";
      startTimeNew.value = "";
      endTimeNew.value = "";
      renderBody();
      renderMain();
      toast("Task added");
    };

    titleNew.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); createInline(); }
    });

    // Expose the create handler so the modal header ✓ button can submit too.
    saveHolder.fn = createInline;

    const newCard = h("div", { class: "sched-new-card" }, [
      // Title row
      h("div", { class: "sched-new-card-title-row" }, [titleNew]),
      // Date pickers + repeat dropdown in one strip
      h("div", { class: "sched-new-card-dates" }, [
        h("div", { class: "sched-new-card-field" }, [
          h("label", { class: "sched-field-label" }, "Start"),
          startNew
        ]),
        h("div", { class: "sched-new-card-field" }, [
          h("label", { class: "sched-field-label" }, "End"),
          endNew
        ]),
        h("div", { class: "sched-new-card-field" }, [
          h("label", { class: "sched-field-label" }, "Repeats"),
          repeatSel
        ])
      ]),
      // Optional time strip — duration quick-picks live in the third column
      h("div", { class: "sched-new-card-dates sched-new-card-times" }, [
        h("div", { class: "sched-new-card-field" }, [
          h("label", { class: "sched-field-label" }, "Start time"),
          startTimeNew
        ]),
        h("div", { class: "sched-new-card-field" }, [
          h("label", { class: "sched-field-label" }, "End time"),
          endTimeNew
        ]),
        h("div", { class: "sched-new-card-field" }, [
          h("label", { class: "sched-field-label" }, "Duration"),
          makeTimePair(startTimeNew, endTimeNew, { hideLabel: true })
        ])
      ]),
      // Phase + group + create button
      h("div", { class: "sched-new-card-meta" }, [
        h("div", { class: "sched-new-card-field" }, [
          h("label", { class: "sched-field-label" }, "Phase"),
          h("div", { class: "ef-select-with-add" }, [phaseSel, phaseAddBtn])
        ]),
        h("div", { class: "sched-new-card-field" }, [
          h("label", { class: "sched-field-label" }, "Group"),
          h("div", { class: "ef-select-with-add" }, [groupSel, groupAddBtn])
        ]),
        h("button", {
          class: "btn btn-primary sched-create-btn",
          onclick: createInline
        }, [
          h("span", { html: ICONS.plus }),
          h("span", {}, "Create task")
        ])
      ])
    ]);
    wrap.appendChild(newCard);

    // --- Or schedule an existing task (separate, secondary section) ---
    wrap.appendChild(h("div", { class: "sched-divider" }, [
      h("span", {}, "or pick an existing task")
    ]));

    const search = h("input", {
      type: "text", class: "sched-search",
      placeholder: "Search tasks…",
      oninput: (e) => filterPickerList(e.target.value)
    });
    wrap.appendChild(search);

    const picker = h("div", { class: "sched-picker", id: "sched-picker" });
    const scheduledIds = new Set(tasksHere.map(x => x.tid));
    effectivePhases().forEach(p => {
      const phaseRows = [];
      p.groups.forEach(g => {
        g.tasks.forEach(t => {
          const s = STATE[t.id];
          if (!passesArchiveFilter(s)) return;
          const range = taskRange(s);
          const isComplete = s.status === "complete";
          const displayTitle = getTitle(t, s);
          const row = h("button", {
            class: "sched-picker-row"
              + (scheduledIds.has(t.id) ? " is-on-day" : "")
              + (isComplete ? " is-complete" : ""),
            "data-search": (displayTitle + " " + (s.owner || "") + " " + p.title).toLowerCase(),
            onclick: () => scheduleTask(t.id, startNew.value, endNew.value).then(renderBody)
          }, [
            h("span", { class: "sched-picker-title" }, displayTitle),
            h("span", { class: "sched-picker-meta" },
              range ? (range.start === range.end ? fmtDateShort(range.start) : `${fmtDateShort(range.start)}→${fmtDateShort(range.end)}`)
                    : "unscheduled")
          ]);
          phaseRows.push(row);
        });
      });
      if (phaseRows.length) {
        picker.appendChild(h("div", { class: "sched-picker-phase" }, p.title));
        phaseRows.forEach(r => picker.appendChild(r));
      }
    });
    wrap.appendChild(picker);
  };

  function filterPickerList(q) {
    const ql = q.toLowerCase().trim();
    const picker = document.getElementById("sched-picker");
    if (!picker) return;
    picker.querySelectorAll(".sched-picker-row").forEach(row => {
      row.style.display = (!ql || row.dataset.search.includes(ql)) ? "" : "none";
    });
  }

  renderBody();
  openModal({ title: "Schedule · " + fmtDate(dateStr), body: wrap });

  // Inject a ✓ "save inline task" button into the modal header so the user
  // can submit the create form without mousing down to the Create button.
  const hdr = $("#modal-overlay .modal-header");
  if (hdr && !hdr.querySelector(".modal-save-btn")) {
    const saveBtn = h("button", {
      class: "modal-save-btn",
      title: "Create task (or press Enter in the title field)",
      "aria-label": "Create task",
      html: ICONS.check,
      onclick: () => {
        if (typeof saveHolder.fn === "function") saveHolder.fn();
      }
    });
    const closeBtn = hdr.querySelector(".modal-close");
    if (closeBtn) hdr.insertBefore(saveBtn, closeBtn);
    else hdr.appendChild(saveBtn);
  }
}

/* ============================================================================
   BUGS GLOBAL VIEW
   ============================================================================ */
function renderBugsView(main) {
  const gs = globalStats();
  const bugs = allBugsWithContext();

  main.appendChild(h("div", { class: "bugs-global-summary" }, [
    h("div", { class: "bug-stat-card" }, [
      h("div", { class: "bug-stat-num is-critical" }, gs.bugsCritical),
      h("div", { class: "bug-stat-label" }, "Critical · open")
    ]),
    h("div", { class: "bug-stat-card" }, [
      h("div", { class: "bug-stat-num is-high" }, gs.bugsHigh),
      h("div", { class: "bug-stat-label" }, "High · open")
    ]),
    h("div", { class: "bug-stat-card" }, [
      h("div", { class: "bug-stat-num" }, gs.bugsOpen),
      h("div", { class: "bug-stat-label" }, "All open")
    ]),
    h("div", { class: "bug-stat-card" }, [
      h("div", { class: "bug-stat-num is-resolved" }, gs.bugsResolved),
      h("div", { class: "bug-stat-label" }, "Resolved")
    ]),
    h("div", { class: "bug-stat-card" }, [
      h("div", { class: "bug-stat-num" }, bugs.length),
      h("div", { class: "bug-stat-label" }, "Total tracked")
    ])
  ]));

  if (bugs.length === 0) {
    main.appendChild(h("div", { class: "empty", style: "background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:60px 20px;" }, [
      h("span", { class: "empty-emoji" }, "🎉"),
      h("div", { style: "font-size:15px; margin-bottom:6px; color:var(--ink);" }, "No bugs logged yet"),
      h("div", {}, "Expand any task in the Tasks view and click \"Add bug\" to start tracking.")
    ]));
    return;
  }

  // Sort bugs: open critical first, then open high, etc.
  const severityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
  const statusOrder = { open: 0, in_progress: 1, resolved: 2, wont_fix: 3 };
  bugs.sort((a, b) => {
    if (statusOrder[a.status] !== statusOrder[b.status]) return statusOrder[a.status] - statusOrder[b.status];
    return severityOrder[a.severity] - severityOrder[b.severity];
  });

  const list = h("div", { class: "global-bug-list" });
  bugs.forEach(b => {
    list.appendChild(h("div", {
      class: "global-bug-row",
      onclick: () => { UI.openTasks[b.taskId] = true; UI.openBugs[b.id] = true; saveUI(); setView("tasks"); setTimeout(() => jumpToTask(b.taskId), 100); }
    }, [
      h("span", { class: "bug-severity sev-" + b.severity }, SEVERITY_LABELS[b.severity]),
      h("div", {}, [
        h("div", { class: "global-bug-title" }, b.title || "(Untitled bug)"),
        h("div", { class: "global-bug-sub" }, "in " + b.taskTitle + (b.reporter ? " · @" + b.reporter : ""))
      ]),
      b.zendeskUrl ? h("a", {
        class: "bug-link zendesk", href: b.zendeskUrl, target: "_blank",
        onclick: (e) => e.stopPropagation(),
        html: ICONS.zendesk + "<span>ZD</span>"
      }) : h("span", {}, ""),
      b.airtableUrl ? h("a", {
        class: "bug-link airtable", href: b.airtableUrl, target: "_blank",
        onclick: (e) => e.stopPropagation(),
        html: ICONS.airtable + "<span>AT</span>"
      }) : h("span", {}, ""),
      h("span", { class: "bug-status-chip bst-" + b.status }, BUG_STATUS_LABELS[b.status])
    ]));
  });
  main.appendChild(list);
}

/* ============================================================================
   ACTIONS
   ============================================================================ */
async function setStatus(taskId, status) {
  STATE[taskId].status = status;
  STATE[taskId].updated = new Date().toISOString();
  UI.statusMenu = null;
  await saveState();
  saveUI();
  renderShell();
}

async function toggleUrgent(taskId) {
  STATE[taskId].urgent = !STATE[taskId].urgent;
  STATE[taskId].updated = new Date().toISOString();
  await saveState();
  renderShell();
}

async function updateTaskField(taskId, field, value) {
  STATE[taskId][field] = value;
  STATE[taskId].updated = new Date().toISOString();
  await saveState();
  renderPhaseList();
  toast("Saved");
}

function toggleStatusMenu(taskId) {
  UI.statusMenu = UI.statusMenu === taskId ? null : taskId;
  saveUI();
  renderPhaseList();
}

function startOwnerInline(taskId, badgeEl) {
  const current = STATE[taskId]?.owner || "";
  const input = h("input", {
    class: "badge-edit-input",
    type: "text",
    value: current,
    placeholder: "owner name",
    onclick: (e) => e.stopPropagation()
  });
  badgeEl.replaceWith(input);
  input.focus();
  input.select();
  let committed = false;
  const commit = () => {
    if (committed) return;
    committed = true;
    const val = input.value.trim();
    if (val !== current) {
      updateTaskField(taskId, "owner", val);
    } else {
      renderPhaseList();
    }
  };
  input.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") { ev.preventDefault(); input.blur(); }
    else if (ev.key === "Escape") { committed = true; renderPhaseList(); }
  });
  input.addEventListener("blur", commit);
}

async function addBug(taskId) {
  const bug = {
    id: uid(),
    title: "",
    severity: "medium",
    status: "open",
    reporter: "",
    reportedDate: ymd(new Date()),
    stepsToReproduce: "",
    resolution: "",
    zendeskUrl: "",
    airtableUrl: "",
    updated: new Date().toISOString()
  };
  STATE[taskId].bugs = STATE[taskId].bugs || [];
  STATE[taskId].bugs.push(bug);
  UI.openBugs[bug.id] = true;
  await saveState();
  saveUI();
  renderPhaseList();
  toast("Bug added");
}

async function updateBug(taskId, bugId, field, value) {
  const bug = STATE[taskId].bugs.find(b => b.id === bugId);
  if (!bug) return;
  bug[field] = value;
  bug.updated = new Date().toISOString();
  await saveState();
  // re-render to reflect any chip changes
  renderPhaseList();
}

async function deleteBug(taskId, bugId) {
  if (!confirm("Delete this bug? This can't be undone.")) return;
  STATE[taskId].bugs = (STATE[taskId].bugs || []).filter(b => b.id !== bugId);
  delete UI.openBugs[bugId];
  await saveState();
  saveUI();
  renderPhaseList();
  toast("Bug deleted");
}

function jumpToTask(taskId) {
  if (UI.view !== "tasks") setView("tasks");
  const t = TASK_INDEX[taskId];
  UI.openPhases[t.phaseId] = true;
  UI.openTasks[taskId] = true;
  saveUI();
  renderPhaseList();
  setTimeout(() => {
    const el = document.getElementById("task-" + taskId);
    if (el) {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      el.style.transition = "box-shadow 0.3s";
      el.style.boxShadow = "0 0 0 3px rgba(232,118,58,0.25)";
      setTimeout(() => el.style.boxShadow = "", 1500);
    }
  }, 100);
}

/* ============================================================================
   EXPORT / IMPORT
   ============================================================================ */
function exportJSON() {
  const lockCfg = getLockConfig();
  const data = {
    schemaVersion: 3,
    exportedAt: new Date().toISOString(),
    encrypted: false,
    state: STATE,
    lockConfig: lockCfg
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  downloadBlob(blob, `wonderful-picktrace-tracker-${ymd(new Date())}.json`);
  localStorage.setItem(BACKUP_KEY, new Date().toISOString());
  $("#backup-reminder").classList.remove("is-on");
  toast("Exported", "success");
}

function icsEscape(s) {
  return (s || "").replace(/\\/g, "\\\\").replace(/,/g, "\\,").replace(/;/g, "\\;").replace(/\n/g, "\\n");
}

function icsDate(ymd) {
  return ymd.replace(/-/g, "");
}

function exportICS() {
  const lines = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//PickTrace//Wonderful Migration Tracker v3//EN",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH",
    "X-WR-CALNAME:Wonderful Citrus PickTrace 3.0 Migration",
    "X-WR-TIMEZONE:America/Los_Angeles"
  ];
  const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";

  // Milestones
  MILESTONES.forEach((m, i) => {
    const start = icsDate(m.date);
    const endDate = new Date(m.date + "T00:00:00");
    endDate.setDate(endDate.getDate() + 1);
    const end = ymd(endDate).replace(/-/g,"");
    lines.push(
      "BEGIN:VEVENT",
      `UID:milestone-${i}-${m.date}@wonderful-picktrace`,
      `DTSTAMP:${stamp}`,
      `DTSTART;VALUE=DATE:${start}`,
      `DTEND;VALUE=DATE:${end}`,
      `SUMMARY:${icsEscape(m.title)}`,
      `DESCRIPTION:${icsEscape(m.desc || "")}`,
      `CATEGORIES:Milestone${m.type === "critical" ? ",Critical" : ""}`,
      "END:VEVENT"
    );
  });

  // Task due dates (single day or range when startDate is set) — respects
  // the global archive filter so archived tasks don't bleed into exports.
  Object.entries(STATE).forEach(([tid, s]) => {
    const t = TASK_INDEX[tid];
    if (!t) return;
    if (!passesArchiveFilter(s)) return;
    const range = taskRange(s);
    if (!range) return;
    const start = icsDate(range.start);
    const endDate = new Date(range.end + "T00:00:00");
    endDate.setDate(endDate.getDate() + 1);
    const end = ymd(endDate).replace(/-/g,"");
    const tTitle = getTitle(t, s);
    const tDesc = getDesc(t, s);
    lines.push(
      "BEGIN:VEVENT",
      `UID:task-${tid}@wonderful-picktrace`,
      `DTSTAMP:${stamp}`,
      `DTSTART;VALUE=DATE:${start}`,
      `DTEND;VALUE=DATE:${end}`,
      `SUMMARY:${icsEscape(tTitle + (s.urgent ? " [URGENT]" : ""))}`,
      `DESCRIPTION:${icsEscape(tDesc + (s.notes ? "\nNotes: " + s.notes : "") + (s.owner ? "\nOwner: " + s.owner : ""))}`,
      `STATUS:${s.status === "complete" ? "COMPLETED" : s.status === "in_progress" ? "IN-PROCESS" : "NEEDS-ACTION"}`,
      `CATEGORIES:Task,${t.phaseId}`,
      "END:VEVENT"
    );
  });

  // Recurring weekly events
  RECURRING.forEach((r, i) => {
    const startDate = new Date(r.startDate + "T00:00:00");
    while (startDate.getDay() !== r.dayOfWeek) startDate.setDate(startDate.getDate() + 1);
    const start = ymd(startDate).replace(/-/g,"");
    const endDate = new Date(startDate); endDate.setDate(endDate.getDate() + 1);
    const end = ymd(endDate).replace(/-/g,"");
    const until = r.endDate.replace(/-/g,"") + "T235959Z";
    lines.push(
      "BEGIN:VEVENT",
      `UID:recurring-${i}@wonderful-picktrace`,
      `DTSTAMP:${stamp}`,
      `DTSTART;VALUE=DATE:${start}`,
      `DTEND;VALUE=DATE:${end}`,
      `SUMMARY:${icsEscape(r.title)}`,
      `DESCRIPTION:${icsEscape(r.desc || "")}`,
      `RRULE:FREQ=WEEKLY;UNTIL=${until}`,
      "CATEGORIES:Recurring",
      "END:VEVENT"
    );
  });

  lines.push("END:VCALENDAR");
  const ics = lines.join("\r\n");
  const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
  downloadBlob(blob, `wonderful-picktrace-calendar-${ymd(new Date())}.ics`);
  toast("Calendar exported", "success");
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function importJSON(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.state) { toast("Invalid file", "warn"); return; }
    if (!confirm("Importing will overwrite your current progress. Continue?")) return;
    STATE = hydrateState(data.state);
    if (data.lockConfig) setLockConfig(data.lockConfig);
    await saveState();
    renderShell();
    toast("Imported", "success");
  } catch (e) {
    console.error(e);
    toast("Import failed — invalid file", "warn");
  }
}

/* ---- ICS description cleanup: strip Google Meet / Zoom boilerplate between
   `-::~:~::…-` delimiter pairs, collapse extra blanks. Preserves inner content. */
function cleanIcsDescription(raw) {
  if (!raw) return "";
  // Delimiter shape: `-::` … any run of `~` and `:` … `::-`
  const delim = /-::[~:]+::-/g;
  const parts = raw.split(delim);
  // delimiters come in pairs; odd-indexed parts are the Meet/Zoom boilerplate
  const cleaned = parts.filter((_, i) => i % 2 === 0).join("").trim();
  return cleaned.replace(/\n{3,}/g, "\n\n").trim();
}

function icsDecode(s) {
  return (s || "").replace(/\\n/g,"\n").replace(/\\,/g,",").replace(/\\;/g,";").replace(/\\\\/g,"\\");
}

/* ---- Parse one ICS DT field into { date, time, allDay } in the browser's
   local timezone. Values ending in Z are UTC (converted); TZID=… values and
   floating values are treated as local (close enough for same-TZ users; a
   proper cross-TZ fix would need IANA offset math). */
function parseIcsDtField(dtField) {
  if (!dtField || !dtField.value) return null;
  const params = dtField.params || "";
  const raw = dtField.value;
  const allDay = /VALUE=DATE(?!-TIME)/.test(params) || !raw.includes("T");
  const pad = n => String(n).padStart(2, "0");

  if (allDay) {
    const date = raw.slice(0,4) + "-" + raw.slice(4,6) + "-" + raw.slice(6,8);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return null;
    return { date, time: "", allDay: true };
  }

  const isUtc = raw.endsWith("Z");
  const v = raw.replace("Z", "");
  if (v.length < 13) return null;
  const Y  = +v.slice(0, 4);
  const Mo = +v.slice(4, 6);
  const D  = +v.slice(6, 8);
  const H  = +v.slice(9, 11);
  const Mi = +v.slice(11, 13);
  if ([Y, Mo, D, H, Mi].some(Number.isNaN)) return null;

  const d = isUtc
    ? new Date(Date.UTC(Y, Mo - 1, D, H, Mi))
    : new Date(Y, Mo - 1, D, H, Mi);

  const date = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  return { date, time, allDay: false };
}

/* ---- Shape an ICS VEVENT into a wizard row.
   For all-day multi-day events (OOO / conference / PTO) we store the inclusive
   end date on `dateEnd` so the calendar can render the full strip.
   ICS semantic: DTEND for VALUE=DATE is exclusive → inclusive end = dtend − 1. */
function icsEventToRow(ev) {
  const dt = parseIcsDtField(ev["DTSTART"]);
  if (!dt) return null;
  const dte = parseIcsDtField(ev["DTEND"]);
  const rawDesc = icsDecode(ev["DESCRIPTION"] && ev["DESCRIPTION"].value || "");
  const title = icsDecode(ev["SUMMARY"] && ev["SUMMARY"].value || "").trim() || "Untitled Event";

  // Multi-day span detection. Two cases:
  //   (1) Classic all-day: both DTSTART and DTEND use VALUE=DATE. DTEND is
  //       exclusive, so inclusive end = DTEND − 1 day.
  //   (2) Timed "virtual all-day": DTSTART/DTEND are UTC times that resolve
  //       to local midnight on different dates (Google encodes OOO like this:
  //       DTSTART:20260430T070000Z → 00:00 PDT, DTEND:20260502T070000Z →
  //       00:00 PDT two days later). Promote to all-day multi-day.
  let dateEnd = "";
  let multiDay = false;
  let allDay = dt.allDay;
  let time = dt.time;
  let endTime = dte && !dt.allDay ? dte.time : "";

  const computeInclusiveEnd = (endDateStr) => {
    const endD = new Date(endDateStr + "T00:00:00");
    endD.setDate(endD.getDate() - 1);
    return ymd(endD);
  };

  if (dt.allDay && dte && dte.allDay) {
    const inclusiveEnd = computeInclusiveEnd(dte.date);
    if (inclusiveEnd > dt.date) { dateEnd = inclusiveEnd; multiDay = true; }
  } else if (dte && !dt.allDay && !dte.allDay
             && dt.time === "00:00" && dte.time === "00:00"
             && dte.date > dt.date) {
    const inclusiveEnd = computeInclusiveEnd(dte.date);
    if (inclusiveEnd > dt.date) {
      dateEnd = inclusiveEnd;
      multiDay = true;
      // Promote to all-day — the "midnight-to-midnight" encoding is semantically an all-day block
      allDay = true;
      time = "";
      endTime = "";
    }
  }

  // Auto-categorize using ICS signals + title
  const signals = {
    allDay,
    multiDay,
    busystatus: ev["X-MICROSOFT-CDO-BUSYSTATUS"] && ev["X-MICROSOFT-CDO-BUSYSTATUS"].value,
    transp: ev["TRANSP"] && ev["TRANSP"].value
  };
  const type = autoCategorizeType(title, signals);

  return {
    uid: (ev["UID"] && ev["UID"].value) || (dt.date + "|" + title),
    date: dt.date,
    dateEnd,
    time,
    endTime,
    allDay,
    title,
    type,
    notes: cleanIcsDescription(rawDesc),
    rawNotes: rawDesc,
    status: ((ev["STATUS"] && ev["STATUS"].value) || "").toUpperCase() === "CANCELLED" ? "cancelled" : "scheduled",
    selected: true,
    isDuplicate: false,
    showRaw: false,
    expanded: false,
    _deleted: false
  };
}

async function importGoogleCalendar(file) {
  try {
    const text = await file.text();
    const unfolded = text.replace(/\r\n[ \t]/g,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
    const lines = unfolded.split("\n");

    const events = [];
    let cur = null;
    for (const raw of lines) {
      if (raw.trim() === "BEGIN:VEVENT") { cur = {}; continue; }
      if (raw.trim() === "END:VEVENT")   { if (cur) events.push(cur); cur = null; continue; }
      if (!cur) continue;
      const ci = raw.indexOf(":");
      if (ci === -1) continue;
      const keyPart = raw.slice(0, ci);
      const val     = raw.slice(ci + 1);
      const baseKey = keyPart.split(";")[0].toUpperCase();
      if (cur[baseKey] === undefined) {
        cur[baseKey] = { params: keyPart.toUpperCase(), value: val };
      }
    }

    if (!events.length) { toast("No events found in file", "warn"); return; }

    const todayStr = ymd(new Date());
    let recurringSkipped = 0, pastSkipped = 0;
    const rows = [];
    for (const ev of events) {
      if (ev["RRULE"]) { recurringSkipped++; continue; }
      const r = icsEventToRow(ev);
      if (!r) continue;
      if (r.date < todayStr) { pastSkipped++; continue; }
      rows.push(r);
    }

    if (!rows.length) {
      const bits = [];
      if (recurringSkipped) bits.push(`${recurringSkipped} recurring`);
      if (pastSkipped) bits.push(`${pastSkipped} past`);
      toast("No future events to import" + (bits.length ? ` · ${bits.join(" · ")} skipped` : ""), "warn");
      return;
    }

    recomputeImportDuplicates(rows, false);
    openImportWizard(rows, { recurringSkipped, pastSkipped });
  } catch (e) {
    console.error(e);
    toast("Import failed — check that this is a valid .ics file", "warn");
  }
}

/* ---- Routine/low-signal event patterns (case-insensitive substring).
   Used by the wizard's "Hide routine" button and the Settings cleanup. */
const ROUTINE_PATTERNS = [
  "sprint kick off",   // matches "Sprint Kick Off 🚀" and "[New] Sprint Kick Off 🚀"
  "all hands meeting",
  "focus time",        // matches "✍ Focus time"
  "lunch"              // matches "🛡 🍱 Lunch"
];
function isRoutineTitle(title) {
  const t = (title || "").toLowerCase();
  return ROUTINE_PATTERNS.some(p => t.includes(p));
}

/* ---- Auto-categorize event type from title (and optional ICS signals).
   ICS signals take precedence; otherwise falls back to substring match. */
const TYPE_PATTERNS = [
  { type: "ooo",     patterns: ["out of office", "ooo", "pto", "vacation", "holiday"] },
  { type: "focus",   patterns: ["focus time"] },
  { type: "lunch",   patterns: ["lunch"] },
  { type: "routine", patterns: ["sprint kick off", "all hands meeting"] }
];
function autoCategorizeType(title, signals) {
  // Signals from ICS: { allDay, multiDay, busystatus, transp }
  if (signals) {
    const bs = (signals.busystatus || "").toUpperCase();
    if (bs === "OOF" || bs === "OUTOFOFFICE") return "ooo";
    // Multi-day all-day events are typically OOO / PTO / conferences
    if (signals.allDay && signals.multiDay) return "ooo";
  }
  const t = (title || "").toLowerCase();
  for (const { type, patterns } of TYPE_PATTERNS) {
    if (patterns.some(p => t.includes(p))) return type;
  }
  return "meeting";
}

/* Display metadata for milestone types — used by wizard dropdown, calendar
   pill class, and legend/filter chip. */
const MILESTONE_TYPE_META = [
  { key: "meeting",   label: "Meeting",       cls: "is-milestone" },
  { key: "milestone", label: "Milestone",     cls: "is-milestone" },
  { key: "critical",  label: "Critical",      cls: "is-milestone" },
  { key: "ooo",       label: "Out of office", cls: "is-ooo" },
  { key: "focus",     label: "Focus time",    cls: "is-focus" },
  { key: "lunch",     label: "Lunch",         cls: "is-lunch" },
  { key: "routine",   label: "Routine",       cls: "is-routine" }
];
const MILESTONE_TYPE_CLS = Object.fromEntries(MILESTONE_TYPE_META.map(m => [m.key, m.cls]));

/* ---- Settings utility: re-run autoCategorizeType on every stored milestone
   based on its current title. Useful to retroactively tag imports that
   predated auto-categorization with their correct type (ooo/focus/lunch/etc). */
async function recategorizeMilestones() {
  const list = STATE.__milestones || [];
  let changed = 0;
  const before = {};
  for (const m of list) {
    const newType = autoCategorizeType(m.title, {
      allDay: !m.time && !m.endTime,
      multiDay: !!m.dateEnd,
      busystatus: "",
      transp: ""
    });
    if (newType !== m.type) {
      before[m.type || "(none)"] = (before[m.type || "(none)"] || 0) + 1;
      m.type = newType;
      changed++;
    }
  }
  if (!changed) { toast("All milestones already categorized", "warn"); return; }
  await saveState();
  renderShell();
  toast(`Re-categorized ${changed} milestone${changed === 1 ? "" : "s"}`, "success");
}

/* ---- Settings utility: delete any existing milestones whose title matches
   the routine patterns. Confirms first, reports count. */
async function removeRoutineMilestones() {
  const list = STATE.__milestones || [];
  const matchCount = list.reduce((n, m) => n + (isRoutineTitle(m.title) ? 1 : 0), 0);
  if (!matchCount) { toast("No routine events found in tracker", "warn"); return; }
  if (!confirm(`Remove ${matchCount} routine event${matchCount === 1 ? "" : "s"} (Sprint Kick Off / All Hands / Focus time / Lunch) from the tracker? This cannot be undone.`)) return;
  // Mutate in place so MILESTONES (same reference) stays synchronized
  for (let i = list.length - 1; i >= 0; i--) {
    if (isRoutineTitle(list[i].title)) list.splice(i, 1);
  }
  await saveState();
  closeModal();
  renderShell();
  toast(`Removed ${matchCount} routine event${matchCount === 1 ? "" : "s"}`, "success");
}

/* ---- Mark rows as duplicates based on current milestones.
   matchByTitle = true: match on title only (for replace-in-place);
   matchByTitle = false: match on date + title (classic dedupe). */
function recomputeImportDuplicates(rows, matchByTitle) {
  const existing = STATE.__milestones || [];
  if (matchByTitle) {
    const titles = new Set(existing.map(m => (m.title || "").trim().toLowerCase()));
    for (const r of rows) {
      const key = (r.title || "").trim().toLowerCase();
      r.isDuplicate = titles.has(key);
      r.selected = true; // replace mode: default to selected
    }
  } else {
    const keys = new Set(existing.map(m => m.date + "|" + m.title));
    for (const r of rows) {
      const isDup = keys.has(r.date + "|" + r.title);
      r.isDuplicate = isDup;
      r.selected = !isDup;
    }
  }
}

/* ---- Wizard: review/edit/remove candidate events before import. */
function openImportWizard(rows, meta) {
  const today = new Date();
  const twoYearsOut = new Date(today.getFullYear() + 2, today.getMonth(), today.getDate());
  // Column defs — widths are mutable (drag handles update them in place)
  const cols = [
    { key: "check",   width: 44,  resizable: false, label: "" },
    { key: "date",    width: 160, resizable: true,  label: "Date" },
    { key: "time",    width: 230, resizable: true,  label: "Time" },
    { key: "title",   width: 380, resizable: true,  label: "Title" },
    { key: "type",    width: 140, resizable: true,  label: "Type" },
    { key: "flags",   width: 100, resizable: true,  label: "Flags" },
    { key: "actions", width: 80,  resizable: false, label: "" }
  ];
  const state = {
    search: "",
    from: ymd(today),
    to: ymd(twoYearsOut),
    hideDupes: false,
    matchByTitle: false
  };

  const getVisible = () => {
    const q = state.search.trim().toLowerCase();
    return rows.filter(r => {
      if (r._deleted) return false;
      if (state.from && r.date < state.from) return false;
      if (state.to && r.date > state.to) return false;
      if (state.hideDupes && r.isDuplicate) return false;
      if (q) {
        const hay = (r.title + " " + (r.notes || "")).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    }).sort((a, b) => (a.date + (a.time || "")).localeCompare(b.date + (b.time || "")));
  };

  let rerenderBody, rerenderFooter, rerenderSummary;

  const summaryEl = h("div", { class: "iw-summary" });
  rerenderSummary = () => {
    summaryEl.innerHTML = "";
    const total = rows.filter(r => !r._deleted).length;
    const selected = rows.filter(r => !r._deleted && r.selected).length;
    const dupes = rows.filter(r => !r._deleted && r.isDuplicate).length;
    const dupLabel = state.matchByTitle ? "replace" : "duplicate";
    const mainEl = h("span", {
      html: `<strong>${total}</strong> event${total === 1 ? "" : "s"} · <strong>${selected}</strong> selected` +
            (dupes ? ` · <strong>${dupes}</strong> ${dupLabel}${dupes === 1 ? "" : "s"}` : "")
    });
    summaryEl.appendChild(mainEl);
    if (meta.recurringSkipped) summaryEl.appendChild(h("span", { class: "iw-pill iw-pill-warn" }, `${meta.recurringSkipped} recurring hidden`));
    if (meta.pastSkipped) summaryEl.appendChild(h("span", { class: "iw-pill" }, `${meta.pastSkipped} past hidden`));
  };

  // Toolbar
  const searchIn = h("input", { class: "iw-search", type: "text", placeholder: "Search title or notes…" });
  searchIn.addEventListener("input", (e) => { state.search = e.target.value; rerenderBody(); rerenderFooter(); });

  const fromIn = h("input", { class: "iw-date", type: "date", value: state.from });
  fromIn.addEventListener("change", (e) => { state.from = e.target.value; rerenderBody(); rerenderFooter(); });
  const toIn = h("input", { class: "iw-date", type: "date", value: state.to });
  toIn.addEventListener("change", (e) => { state.to = e.target.value; rerenderBody(); rerenderFooter(); });

  const hideDupesCb = h("input", { type: "checkbox" });
  hideDupesCb.addEventListener("change", (e) => { state.hideDupes = e.target.checked; rerenderBody(); rerenderFooter(); });

  const matchTitleCb = h("input", { type: "checkbox" });
  matchTitleCb.addEventListener("change", (e) => {
    state.matchByTitle = e.target.checked;
    recomputeImportDuplicates(rows, state.matchByTitle);
    rerenderBody(); rerenderFooter(); rerenderSummary();
  });

  const bulkType = h("select", { class: "iw-select" },
    [h("option", { value: "" }, "Set type…")].concat(
      MILESTONE_TYPE_META.map(t => h("option", { value: t.key }, t.label.toLowerCase()))
    )
  );
  const applyBulkType = h("button", { class: "iw-btn-sm" }, "Apply to selected");
  applyBulkType.addEventListener("click", () => {
    if (!bulkType.value) { toast("Choose a type first", "warn"); return; }
    const visible = getVisible();
    let n = 0;
    for (const r of visible) { if (r.selected) { r.type = bulkType.value; n++; } }
    toast(`Set type on ${n} row${n === 1 ? "" : "s"}`, "success");
    rerenderBody();
  });

  const bulkDel = h("button", { class: "iw-btn-sm iw-danger-btn" }, "Remove selected");
  bulkDel.addEventListener("click", () => {
    const visible = getVisible();
    let n = 0;
    for (const r of visible) { if (r.selected) { r._deleted = true; n++; } }
    if (!n) { toast("Nothing selected", "warn"); return; }
    toast(`${n} row${n === 1 ? "" : "s"} removed`);
    rerenderBody();
    rerenderFooter();
    rerenderSummary();
  });

  const skipRoutine = h("button", {
    class: "iw-btn-sm",
    title: "Hide routine events (Sprint Kick Off, All Hands, Focus time, Lunch) — they won't be imported and any toggle can't bring them back"
  }, "Hide routine");
  skipRoutine.addEventListener("click", () => {
    let n = 0;
    for (const r of rows) {
      if (r._deleted) continue;
      if (isRoutineTitle(r.title)) {
        r._deleted = true;
        n++;
      }
    }
    if (!n) { toast("No routine events to hide", "warn"); return; }
    toast(`Hid ${n} routine event${n === 1 ? "" : "s"}`);
    rerenderBody();
    rerenderFooter();
    rerenderSummary();
  });

  const toolbar = h("div", { class: "iw-toolbar" }, [
    searchIn,
    h("span", { class: "iw-label" }, "From"), fromIn,
    h("span", { class: "iw-label" }, "To"), toIn,
    h("span", { class: "iw-sep" }),
    h("label", { class: "iw-check" }, [hideDupesCb, h("span", {}, "Hide duplicates")]),
    h("label", {
      class: "iw-check",
      title: "Match existing milestones by title only; importing will replace them with these values"
    }, [matchTitleCb, h("span", {}, "Replace existing (title match)")]),
    h("span", { class: "iw-sep" }),
    bulkType, applyBulkType, skipRoutine, bulkDel
  ]);

  // Table
  const tableWrap = h("div", { class: "iw-table-wrap" });

  rerenderBody = () => {
    tableWrap.innerHTML = "";
    const visible = getVisible();

    if (!visible.length) {
      tableWrap.appendChild(h("div", { class: "iw-empty" }, "No events match the current filters."));
      return;
    }

    const masterCb = h("input", { type: "checkbox" });
    masterCb.checked = visible.every(r => r.selected);
    masterCb.addEventListener("change", () => {
      const next = masterCb.checked;
      for (const r of visible) r.selected = next;
      rerenderBody();
      rerenderFooter();
    });

    // Colgroup drives column widths (table-layout: fixed). Build once, keep a
    // reference to each <col> so drag handles update widths live.
    const colEls = cols.map(c => {
      const el = document.createElement("col");
      el.style.width = c.width + "px";
      return el;
    });
    const colgroup = document.createElement("colgroup");
    colEls.forEach(c => colgroup.appendChild(c));

    const makeResizer = (idx) => {
      const handle = h("div", { class: "iw-resizer", title: "Drag to resize" });
      handle.addEventListener("mousedown", (e) => {
        e.preventDefault();
        e.stopPropagation();
        const startX = e.clientX;
        const startW = cols[idx].width;
        handle.classList.add("is-dragging");
        document.body.style.cursor = "col-resize";
        const onMove = (ev) => {
          const w = Math.max(60, startW + (ev.clientX - startX));
          cols[idx].width = w;
          if (colEls[idx]) colEls[idx].style.width = w + "px";
        };
        const onUp = () => {
          handle.classList.remove("is-dragging");
          document.body.style.cursor = "";
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });
      return handle;
    };

    const headerCells = cols.map((c, i) => {
      const content = c.key === "check" ? masterCb : c.label;
      const th = h("th", { class: c.resizable ? "iw-th-resizable" : "" }, [
        h("span", { class: "iw-th-wrap" }, [content])
      ]);
      if (c.resizable) th.appendChild(makeResizer(i));
      return th;
    });
    const thead = h("thead", {}, [h("tr", {}, headerCells)]);

    const tbody = h("tbody", {});

    for (const r of visible) {
      const trClass = [
        r.isDuplicate ? (state.matchByTitle ? "iw-row-replace" : "iw-row-dupe") : "",
        !r.selected ? "iw-row-unchecked" : ""
      ].filter(Boolean).join(" ");

      const selCb = h("input", { type: "checkbox" });
      selCb.checked = r.selected;

      const dateIn = h("input", { type: "date", value: r.date });
      dateIn.addEventListener("change", () => { if (dateIn.value) r.date = dateIn.value; });
      // For multi-day events, also expose a date-end input so user can tweak it
      let dateEndIn = null;
      if (r.dateEnd) {
        dateEndIn = h("input", { type: "date", value: r.dateEnd, title: "End date (inclusive)" });
        dateEndIn.addEventListener("change", () => { r.dateEnd = dateEndIn.value || ""; });
      }
      const dateCell = dateEndIn
        ? h("div", { class: "iw-date-range" }, [dateIn, h("span", { class: "iw-date-arrow" }, "→"), dateEndIn])
        : dateIn;

      let timeCell;
      if (r.allDay) {
        const switchBtn = h("button", { class: "iw-raw-toggle", title: "Switch to timed" }, "set time");
        switchBtn.addEventListener("click", () => {
          r.allDay = false;
          r.time = r.time || "09:00";
          r.endTime = r.endTime || "10:00";
          rerenderBody();
        });
        timeCell = h("div", { class: "iw-time-group" }, [h("span", { class: "iw-allday" }, "all-day"), switchBtn]);
      } else {
        const startIn = h("input", { type: "time", value: r.time || "" });
        startIn.addEventListener("change", () => { r.time = startIn.value; });
        const endIn = h("input", { type: "time", value: r.endTime || "" });
        endIn.addEventListener("change", () => { r.endTime = endIn.value; });
        timeCell = h("div", { class: "iw-time-group" }, [startIn, h("span", { class: "iw-time-arrow" }, "→"), endIn]);
      }

      const titleIn = h("input", { class: "iw-title-input", type: "text", value: r.title });
      titleIn.addEventListener("input", () => { r.title = titleIn.value; });

      const typeSel = h("select", {},
        MILESTONE_TYPE_META.map(t => h("option", { value: t.key }, t.label.toLowerCase()))
      );
      typeSel.value = r.type || "meeting";
      typeSel.addEventListener("change", () => { r.type = typeSel.value; });

      const flagsTd = h("td", { class: "iw-col-flags" }, []);
      if (r.isDuplicate) {
        if (state.matchByTitle) {
          flagsTd.appendChild(h("span", {
            class: "iw-badge iw-badge-replace",
            title: "An existing milestone matches this title — importing will replace it"
          }, "Replace"));
        } else {
          flagsTd.appendChild(h("span", {
            class: "iw-badge iw-badge-dupe",
            title: "A milestone with this date + title already exists"
          }, "Dupe"));
        }
      }

      const expandBtn = h("button", {
        class: "iw-row-btn",
        title: r.expanded ? "Collapse notes" : "Edit notes",
        html: ICONS.chevron
      });
      expandBtn.addEventListener("click", () => { r.expanded = !r.expanded; rerenderBody(); });

      const delBtn = h("button", { class: "iw-row-btn iw-row-del", title: "Remove row", html: ICONS.x });
      delBtn.addEventListener("click", () => {
        r._deleted = true;
        rerenderBody();
        rerenderFooter();
        rerenderSummary();
      });

      const tr = h("tr", { class: trClass }, [
        h("td", { class: "iw-col-check" }, [selCb]),
        h("td", { class: "iw-col-date" }, [dateCell]),
        h("td", { class: "iw-col-time" }, [timeCell]),
        h("td", {}, [titleIn]),
        h("td", { class: "iw-col-type" }, [typeSel]),
        flagsTd,
        h("td", { class: "iw-col-actions" }, [expandBtn, delBtn])
      ]);

      selCb.addEventListener("change", () => {
        r.selected = selCb.checked;
        tr.classList.toggle("iw-row-unchecked", !r.selected);
        masterCb.checked = visible.every(x => x.selected);
        rerenderFooter();
        rerenderSummary();
      });

      tbody.appendChild(tr);

      if (r.expanded) {
        const notesTa = h("textarea", { placeholder: "Notes" });
        notesTa.value = r.showRaw ? r.rawNotes : r.notes;
        notesTa.addEventListener("input", () => {
          if (r.showRaw) r.rawNotes = notesTa.value;
          else r.notes = notesTa.value;
        });
        const rawToggle = h("button", { class: "iw-raw-toggle" }, r.showRaw ? "show cleaned" : "show raw");
        rawToggle.addEventListener("click", () => { r.showRaw = !r.showRaw; rerenderBody(); });
        const wrap = h("div", { class: "iw-expand-wrap" }, [
          h("div", { class: "iw-expand-label" }, [
            h("span", {}, r.showRaw ? "Notes (raw)" : "Notes (cleaned)"),
            rawToggle
          ]),
          notesTa
        ]);
        tbody.appendChild(h("tr", { class: "iw-expand-row" }, [
          h("td", { colspan: 7 }, [wrap])
        ]));
      }
    }

    const table = h("table", { class: "iw-table" }, [thead, tbody]);
    table.insertBefore(colgroup, thead);
    tableWrap.appendChild(table);
  };

  // Footer
  const footer = h("div", { class: "iw-footer" });
  rerenderFooter = () => {
    footer.innerHTML = "";
    // When the search box has text, "Import" only brings in visible (filtered)
    // events. From / To / Hide-duplicates also narrow the visible set, so this
    // honors any active filter, not just text search.
    const isFiltering = !!(state.search && state.search.trim()) || !!state.from || !!state.to || !!state.hideDupes;
    const visible = getVisible();
    const totalSelected = rows.filter(r => !r._deleted && r.selected).length;
    const visSelected = visible.filter(r => r.selected).length;
    const importSet = isFiltering ? visible.filter(r => r.selected) : rows.filter(r => !r._deleted && r.selected);
    const importCount = importSet.length;

    const info = h("div", { class: "iw-footer-info" }, []);
    if (isFiltering) {
      info.appendChild(document.createTextNode("Will import: "));
      info.appendChild(h("strong", {}, String(importCount)));
      info.appendChild(document.createTextNode(` filtered event${importCount === 1 ? "" : "s"} · ${totalSelected} selected total`));
    } else {
      info.appendChild(document.createTextNode("Will import: "));
      info.appendChild(h("strong", {}, String(totalSelected)));
      info.appendChild(document.createTextNode(` event${totalSelected === 1 ? "" : "s"} · ${visSelected} visible selected`));
    }

    const cancelBtn = h("button", { class: "btn btn-outline" }, "Cancel");
    cancelBtn.addEventListener("click", closeModal);

    const repCount = state.matchByTitle
      ? importSet.filter(r => r.isDuplicate).length
      : 0;
    const importLabel = state.matchByTitle && repCount
      ? `Import ${importCount} (${repCount} replace)`
      : (isFiltering
          ? `Import ${importCount} filtered event${importCount === 1 ? "" : "s"}`
          : `Import ${importCount} event${importCount === 1 ? "" : "s"}`);
    const importBtn = h("button", { class: "btn btn-primary" }, importLabel);
    if (!importCount) importBtn.setAttribute("disabled", "");
    importBtn.addEventListener("click", () => performImportFromWizard(importSet, state.matchByTitle));

    footer.appendChild(info);
    footer.appendChild(h("div", { class: "iw-footer-actions" }, [cancelBtn, importBtn]));
  };

  rerenderSummary();
  rerenderBody();

  openModal({ title: "Review calendar import", body: [summaryEl, toolbar, tableWrap] });
  // Expand the modal to wizard size and slot the footer into the modal chrome
  const modalEl = document.querySelector("#modal-overlay .modal");
  if (modalEl) {
    modalEl.classList.add("is-wizard");
    const mb = modalEl.querySelector(".modal-body");
    if (mb) mb.appendChild(footer);
    rerenderFooter();
  }
}

async function performImportFromWizard(rows, matchByTitle) {
  let added = 0, updated = 0, skipped = 0;
  for (const r of rows) {
    if (r._deleted || !r.selected) continue;
    const title = (r.title || "").trim();
    if (!title || !r.date) { skipped++; continue; }
    const newEvent = {
      date: r.date,
      dateEnd: r.dateEnd || "",
      title,
      type: r.type || "meeting",
      desc: "",
      notes: r.notes || "",
      time: r.allDay ? "" : (r.time || ""),
      endTime: r.allDay ? "" : (r.endTime || ""),
      status: r.status || "scheduled",
      source: "gcal"
    };
    if (matchByTitle && r.isDuplicate) {
      // Replace the first existing milestone with this title (case-insensitive).
      // One candidate → one replacement. Multiple candidates sharing a title
      // each consume one existing match, so net counts stay balanced.
      const tKey = title.toLowerCase();
      const idx = STATE.__milestones.findIndex(m => (m.title || "").trim().toLowerCase() === tKey);
      if (idx >= 0) {
        STATE.__milestones.splice(idx, 1, newEvent);
        updated++;
        continue;
      }
      // No match found (another candidate already consumed it) — fall through to add.
    }
    STATE.__milestones.push(newEvent);
    added++;
  }
  await saveState();
  closeModal();
  renderShell();
  const bits = [];
  if (updated) bits.push(`${updated} replaced`);
  if (added)   bits.push(`${added} added`);
  if (skipped) bits.push(`${skipped} skipped`);
  toast(bits.join(" · ") || "Nothing imported", (added + updated) ? "success" : "warn");
}
