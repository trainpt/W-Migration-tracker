// ---------- Date window resolution ----------
function resolveDashboardWindow(filter) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const out = { start: null, end: null, label: "" };
  const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
  switch (filter.timeRange) {
    case "this_week": {
      const dow = today.getDay(); // 0 = Sun
      const mondayOffset = dow === 0 ? -6 : 1 - dow;
      const start = addDays(today, mondayOffset);
      const end = addDays(start, 6);
      out.start = ymd(start); out.end = ymd(end);
      out.label = "This week";
      break;
    }
    case "this_month": {
      const start = new Date(today.getFullYear(), today.getMonth(), 1);
      const end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
      out.start = ymd(start); out.end = ymd(end);
      out.label = "This month";
      break;
    }
    case "last_30d":
      out.start = ymd(addDays(today, -29));
      out.end = ymd(today);
      out.label = "Last 30 days";
      break;
    case "last_90d":
      out.start = ymd(addDays(today, -89));
      out.end = ymd(today);
      out.label = "Last 90 days";
      break;
    case "project": {
      // Earliest scheduled date to the latest end.
      let min = null, max = null;
      Object.entries(STATE).forEach(([id, s]) => {
        if (!TASK_INDEX[id]) return;
        if (!passesArchiveFilter(s)) return;
        const r = taskRange(s);
        if (!r) return;
        if (!min || r.start < min) min = r.start;
        if (!max || r.end > max) max = r.end;
      });
      MILESTONES.forEach(m => {
        if (!m.date) return;
        if (!min || m.date < min) min = m.date;
        if (!max || m.date > max) max = m.date;
      });
      if (!min) min = ymd(addDays(today, -90));
      if (!max) max = ymd(addDays(today, 90));
      out.start = min; out.end = max;
      out.label = "Project-to-date";
      break;
    }
    case "custom":
      out.start = filter.customStart || ymd(addDays(today, -30));
      out.end = filter.customEnd || ymd(today);
      if (out.start > out.end) { const t = out.start; out.start = out.end; out.end = t; }
      out.label = `${fmtDateShort(out.start)} → ${fmtDateShort(out.end)}`;
      break;
    case "all":
    default:
      out.start = ymd(addDays(today, -365));
      out.end = ymd(addDays(today, 365));
      out.label = "All time";
      break;
  }
  return out;
}

function dashboardTaskPasses(tid, s, filter) {
  if (!TASK_INDEX[tid]) return false;
  if (!passesArchiveFilter(s)) return false;
  const t = TASK_INDEX[tid];
  if (filter.phases && filter.phases.length) {
    if (!filter.phases.includes(t.phaseId)) return false;
  }
  if (filter.statuses && filter.statuses.length) {
    if (!filter.statuses.includes(s.status || "not_started")) return false;
  }
  return true;
}

// Break "HH:MM" into minutes since midnight.
function timeStrToMinutes(s) {
  if (!s) return null;
  const [h, m] = s.split(":").map(n => parseInt(n, 10));
  if (isNaN(h) || isNaN(m)) return null;
  return h * 60 + m;
}
function taskDurationMinutes(s) {
  const a = timeStrToMinutes(s.startTime);
  const b = timeStrToMinutes(s.endTime);
  if (a == null || b == null || b <= a) return 0;
  return b - a;
}

// Enumerate the dates that a task is "active on" inside [winStart, winEnd].
// For repeating tasks, only the matching cadence days count.
// Returns array of YYYY-MM-DD strings.
function taskOccurrencesInWindow(s, winStart, winEnd) {
  const range = taskRange(s);
  if (!range) return [];
  const start = range.start > winStart ? range.start : winStart;
  const end = range.end < winEnd ? range.end : winEnd;
  if (start > end) return [];
  const out = [];
  const cur = new Date(start + "T00:00:00");
  const stop = new Date(end + "T00:00:00");
  while (cur <= stop) {
    const d = ymd(cur);
    if (s.repeat && s.repeat !== "none") {
      const anchor = s.startDate || range.start;
      if (repeatMatches(s.repeat, anchor, d)) out.push(d);
    } else {
      out.push(d);
    }
    cur.setDate(cur.getDate() + 1);
  }
  return out;
}

// ---------- Analytics ----------
function computeDashboardMetrics(filter) {
  const window = resolveDashboardWindow(filter);
  const todayStr = ymd(new Date());
  const today = new Date(); today.setHours(0, 0, 0, 0);

  // Base filtered set — respects phases/statuses, skips archived.
  const filteredTasks = [];
  Object.entries(STATE).forEach(([tid, s]) => {
    if (!dashboardTaskPasses(tid, s, filter)) return;
    filteredTasks.push({ tid, s, t: TASK_INDEX[tid] });
  });

  // KPI rollups.
  let total = 0, complete = 0, inProgress = 0, notStarted = 0, blocked = 0, urgent = 0;
  let overdue = 0, dueThisWeek = 0, dueToday = 0, startingSoon = 0;
  let bugsOpen = 0, bugsResolved = 0, bugsInProgress = 0, bugsWontFix = 0;
  let bugsCritical = 0, bugsHigh = 0, bugsMedium = 0, bugsLow = 0;
  const weekEnd = ymd(new Date(today.getTime() + 7 * 86400000));

  const overdueList = [];
  const blockedList = [];
  const urgentList = [];
  const dueSoonList = [];
  const topBugMap = {};

  filteredTasks.forEach(({ tid, s, t }) => {
    total++;
    const st = s.status || "not_started";
    if (st === "complete") complete++;
    else if (st === "in_progress") inProgress++;
    else if (st === "blocked") blocked++;
    else notStarted++;
    if (s.urgent) urgent++;

    const isDone = st === "complete";
    if (s.dueDate && !isDone) {
      if (s.dueDate < todayStr) {
        overdue++;
        overdueList.push({ tid, title: getTitle(t, s), dueDate: s.dueDate, status: st });
      } else if (s.dueDate === todayStr) {
        dueToday++;
        dueSoonList.push({ tid, title: getTitle(t, s), dueDate: s.dueDate, status: st });
      } else if (s.dueDate <= weekEnd) {
        dueThisWeek++;
        dueSoonList.push({ tid, title: getTitle(t, s), dueDate: s.dueDate, status: st });
      }
    }
    if (st === "blocked") {
      blockedList.push({ tid, title: getTitle(t, s), status: st, notes: s.notes || "" });
    }
    if (s.urgent && !isDone) {
      urgentList.push({ tid, title: getTitle(t, s), status: st, dueDate: s.dueDate || "" });
    }
    // Starting soon (start within next 14d, not yet started)
    if (s.startDate && !isDone && st === "not_started" && s.startDate > todayStr) {
      const diff = (new Date(s.startDate + "T00:00:00") - today) / 86400000;
      if (diff <= 14) startingSoon++;
    }

    (s.bugs || []).forEach(b => {
      const bs = b.status || "open";
      if (bs === "resolved") bugsResolved++;
      else if (bs === "wont_fix") bugsWontFix++;
      else if (bs === "in_progress") { bugsInProgress++; bugsOpen++; }
      else { bugsOpen++; }
      if (bs !== "resolved" && bs !== "wont_fix") {
        const sev = b.severity || "medium";
        if (sev === "critical") bugsCritical++;
        else if (sev === "high") bugsHigh++;
        else if (sev === "medium") bugsMedium++;
        else bugsLow++;
        if (!topBugMap[tid]) topBugMap[tid] = { tid, title: getTitle(t, s), count: 0 };
        topBugMap[tid].count++;
      }
    });
  });

  // Sort attention lists.
  overdueList.sort((a, b) => a.dueDate.localeCompare(b.dueDate));
  blockedList.sort((a, b) => a.title.localeCompare(b.title));
  urgentList.sort((a, b) => (a.dueDate || "9999").localeCompare(b.dueDate || "9999"));
  dueSoonList.sort((a, b) => a.dueDate.localeCompare(b.dueDate));
  const topBugTasks = Object.values(topBugMap).sort((a, b) => b.count - a.count).slice(0, 5);

  const pct = total ? Math.round((complete / total) * 100) : 0;

  // Phase rollups (respect filter, except we always show all phases — ones
  // filtered out just render empty/zeroed).
  const phases = effectivePhases().map(p => {
    let pt = 0, pc = 0, pip = 0, pb = 0, pn = 0;
    p.groups.forEach(g => g.tasks.forEach(t => {
      const s = STATE[t.id];
      if (!s) return;
      if (!dashboardTaskPasses(t.id, s, filter)) return;
      pt++;
      const st = s.status || "not_started";
      if (st === "complete") pc++;
      else if (st === "in_progress") pip++;
      else if (st === "blocked") pb++;
      else pn++;
    }));
    // Include custom tasks mapped to this phase.
    (STATE.__customTasks || []).forEach(ct => {
      if (ct.phaseId !== p.id) return;
      const s = STATE[ct.id];
      if (!s) return;
      if (!dashboardTaskPasses(ct.id, s, filter)) return;
      pt++;
      const st = s.status || "not_started";
      if (st === "complete") pc++;
      else if (st === "in_progress") pip++;
      else if (st === "blocked") pb++;
      else pn++;
    });
    return {
      id: p.id, num: p.num, title: p.title,
      total: pt, complete: pc, inProgress: pip, blocked: pb, notStarted: pn,
      pct: pt ? Math.round((pc / pt) * 100) : 0
    };
  });

  // Velocity: completed tasks per ISO-week inside the window.
  // A task counts on its `updated` date if status is "complete" and updated
  // falls within [windowStart, windowEnd].
  const velocityMap = {};
  const heatmapMap = {};
  const activityByPhase = {};
  phases.forEach(p => { activityByPhase[p.id] = 0; });

  // Seed weeks for the window so gaps render as zero bars.
  const weekKey = (d) => {
    const tmp = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const dow = tmp.getDay(); // 0-Sun
    const mondayOffset = dow === 0 ? -6 : 1 - dow;
    tmp.setDate(tmp.getDate() + mondayOffset);
    return ymd(tmp);
  };
  {
    const s = new Date(window.start + "T00:00:00");
    const e = new Date(window.end + "T00:00:00");
    const cur = new Date(weekKey(s) + "T00:00:00");
    while (cur <= e) {
      velocityMap[ymd(cur)] = 0;
      cur.setDate(cur.getDate() + 7);
    }
  }
  // Heatmap: seed every day in window (so empty days render).
  {
    const cur = new Date(window.start + "T00:00:00");
    const e = new Date(window.end + "T00:00:00");
    while (cur <= e) {
      heatmapMap[ymd(cur)] = 0;
      cur.setDate(cur.getDate() + 1);
    }
  }

  filteredTasks.forEach(({ tid, s, t }) => {
    // Velocity: completion event on `updated` when status is complete.
    if ((s.status || "") === "complete" && s.updated) {
      const upd = s.updated.slice(0, 10);
      if (upd >= window.start && upd <= window.end) {
        const wk = weekKey(new Date(upd + "T00:00:00"));
        velocityMap[wk] = (velocityMap[wk] || 0) + 1;
      }
    }
    // Heatmap: each day the task is "active" (on-range or repeat-match).
    const dates = taskOccurrencesInWindow(s, window.start, window.end);
    dates.forEach(d => {
      heatmapMap[d] = (heatmapMap[d] || 0) + 1;
    });
    // Activity by phase inside window.
    if (t && activityByPhase[t.phaseId] != null) {
      activityByPhase[t.phaseId] += dates.length;
    }
  });

  const velocity = Object.keys(velocityMap).sort().map(k => ({ weekStart: k, count: velocityMap[k] }));
  // 4-week moving average for trend overlay.
  const velocityMA = velocity.map((v, i) => {
    const slice = velocity.slice(Math.max(0, i - 3), i + 1);
    return slice.reduce((a, x) => a + x.count, 0) / slice.length;
  });

  // Upcoming milestones (next 8, any not-past).
  const upcomingMilestones = MILESTONES
    .filter(m => m.date)
    .map(m => ({ ...m, daysUntil: daysUntil(m.date) }))
    .filter(m => m.daysUntil >= -1)
    .sort((a, b) => a.daysUntil - b.daysUntil)
    .slice(0, 8);

  // Recent activity: most recent `updated` tasks in window.
  const recent = filteredTasks
    .filter(x => x.s.updated)
    .map(x => ({
      tid: x.tid,
      title: getTitle(x.t, x.s),
      status: x.s.status || "not_started",
      updated: x.s.updated,
      phaseId: x.t.phaseId
    }))
    .sort((a, b) => b.updated.localeCompare(a.updated))
    .slice(0, 12);

  // Scheduled time rollup per phase across window.
  const hoursByPhase = phases.map(p => {
    let mins = 0;
    const acc = (tid, s) => {
      if (!dashboardTaskPasses(tid, s, filter)) return;
      const dur = taskDurationMinutes(s);
      if (!dur) return;
      const occ = taskOccurrencesInWindow(s, window.start, window.end);
      mins += dur * occ.length;
    };
    const p0 = PHASES.find(x => x.id === p.id);
    if (p0) p0.groups.forEach(g => g.tasks.forEach(tt => {
      const s = STATE[tt.id]; if (s) acc(tt.id, s);
    }));
    (STATE.__customTasks || []).filter(ct => ct.phaseId === p.id).forEach(ct => {
      const s = STATE[ct.id]; if (s) acc(ct.id, s);
    });
    return { phaseId: p.id, title: p.title, num: p.num, hours: mins / 60, minutes: mins };
  });
  const totalScheduledMinutes = hoursByPhase.reduce((a, x) => a + x.minutes, 0);

  // Hours in the next 7 days & this month — always relative to today, ignoring window.
  let hoursNext7 = 0, hoursNext30 = 0;
  const sevenEnd = ymd(new Date(today.getTime() + 7 * 86400000));
  const thirtyEnd = ymd(new Date(today.getTime() + 30 * 86400000));
  filteredTasks.forEach(({ tid, s }) => {
    const dur = taskDurationMinutes(s);
    if (!dur) return;
    const occ7 = taskOccurrencesInWindow(s, todayStr, sevenEnd);
    const occ30 = taskOccurrencesInWindow(s, todayStr, thirtyEnd);
    hoursNext7 += dur * occ7.length / 60;
    hoursNext30 += dur * occ30.length / 60;
  });

  // Trend: compare completed-this-period vs. previous equal-length period.
  let completedThisPeriod = 0, completedPrevPeriod = 0;
  {
    const startD = new Date(window.start + "T00:00:00");
    const endD = new Date(window.end + "T00:00:00");
    const len = (endD - startD) / 86400000 + 1;
    const prevStart = ymd(new Date(startD.getTime() - len * 86400000));
    const prevEnd = ymd(new Date(startD.getTime() - 86400000));
    filteredTasks.forEach(({ s }) => {
      if ((s.status || "") !== "complete" || !s.updated) return;
      const upd = s.updated.slice(0, 10);
      if (upd >= window.start && upd <= window.end) completedThisPeriod++;
      else if (upd >= prevStart && upd <= prevEnd) completedPrevPeriod++;
    });
  }

  return {
    window,
    total, complete, inProgress, notStarted, blocked, urgent, pct,
    overdue, dueThisWeek, dueToday, startingSoon,
    bugsOpen, bugsResolved, bugsInProgress, bugsWontFix,
    bugsCritical, bugsHigh, bugsMedium, bugsLow,
    overdueList, blockedList, urgentList, dueSoonList, topBugTasks,
    phases, velocity, velocityMA, heatmapMap,
    upcomingMilestones, recent,
    hoursByPhase, totalScheduledMinutes, hoursNext7, hoursNext30,
    completedThisPeriod, completedPrevPeriod
  };
}

// ---------- SVG chart helpers ----------
function dashSvg(tag, attrs = {}, children = []) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    el.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    if (typeof c === "string" || typeof c === "number") {
      el.appendChild(document.createTextNode(String(c)));
    } else el.appendChild(c);
  });
  return el;
}

// Velocity bar chart w/ moving-average overlay.
function renderVelocityChart(velocity, movingAvg) {
  const totalCompletions = velocity.reduce((a, v) => a + v.count, 0);

  // Empty state: no completions in the window — show a calm placeholder
  // instead of a misleading flat-zero chart that wastes vertical space.
  if (!totalCompletions) {
    return h("div", {
      class: "dash-empty",
      style: "min-height: 140px; display:flex; align-items:center; justify-content:center;"
    }, "No completions recorded in this window yet");
  }

  const W = 640, H = 180;
  const padL = 32, padR = 12, padT = 10, padB = 28;
  const iw = W - padL - padR;
  const ih = H - padT - padB;
  const n = velocity.length || 1;
  const maxV = Math.max(1, ...velocity.map(v => v.count), ...movingAvg);
  const barW = iw / n * 0.7;
  const gap = iw / n * 0.3;

  const svg = dashSvg("svg", {
    class: "dash-chart-svg",
    viewBox: `0 0 ${W} ${H}`,
    preserveAspectRatio: "xMidYMid meet"
  });

  // Build integer-valued ticks from 0..maxV and dedupe. When maxV is small
  // (e.g. 1 or 2) we show fewer ticks; when larger, aim for ~4.
  const desired = Math.min(4, Math.max(1, maxV));
  const step = Math.max(1, Math.ceil(maxV / desired));
  const tickVals = [];
  for (let v = 0; v <= maxV; v += step) tickVals.push(v);
  if (tickVals[tickVals.length - 1] !== maxV) tickVals.push(maxV);

  tickVals.forEach(val => {
    const y = padT + ih - (val / maxV) * ih;
    svg.appendChild(dashSvg("line", {
      x1: padL, x2: W - padR, y1: y, y2: y,
      stroke: "var(--line)", "stroke-width": 1,
      "stroke-dasharray": val === 0 ? "0" : "2 3"
    }));
    svg.appendChild(dashSvg("text", {
      x: padL - 6, y: y + 3, "font-size": 9, fill: "var(--muted)", "text-anchor": "end"
    }, String(val)));
  });

  // Bars.
  velocity.forEach((v, i) => {
    const h = (v.count / maxV) * ih;
    const x = padL + i * (iw / n) + gap / 2;
    const y = padT + ih - h;
    if (h <= 0) return;
    svg.appendChild(dashSvg("rect", {
      x, y, width: barW, height: h,
      rx: 2, fill: "var(--citrus)", opacity: 0.85
    }));
  });

  // Moving avg line.
  if (velocity.length > 1) {
    const maPoints = movingAvg.map((v, i) => {
      const cx = padL + i * (iw / n) + (iw / n) / 2;
      const cy = padT + ih - (v / maxV) * ih;
      return `${cx},${cy}`;
    }).join(" ");
    svg.appendChild(dashSvg("polyline", {
      points: maPoints, fill: "none",
      stroke: "var(--ink)", "stroke-width": 1.6,
      "stroke-linejoin": "round", "stroke-linecap": "round",
      opacity: 0.72
    }));
  }

  // X-axis labels — pick year-aware format so multi-year spans are clear.
  // If all weeks share a year, show "Apr 14"; otherwise show "Apr '25".
  const years = new Set(velocity.map(v => v.weekStart.slice(0, 4)));
  const labelOf = (iso) => {
    const d = new Date(iso + "T00:00:00");
    const mon = d.toLocaleDateString("en-US", { month: "short" });
    if (years.size > 1) return `${mon} '${String(d.getFullYear()).slice(2)}`;
    return `${mon} ${d.getDate()}`;
  };
  const idxs = n <= 5
    ? velocity.map((_, i) => i)
    : [0, Math.floor(n / 3), Math.floor(2 * n / 3), n - 1];
  idxs.forEach(i => {
    const v = velocity[i];
    if (!v) return;
    const cx = padL + i * (iw / n) + (iw / n) / 2;
    svg.appendChild(dashSvg("text", {
      x: cx, y: H - 8, "font-size": 9, fill: "var(--muted)", "text-anchor": "middle"
    }, labelOf(v.weekStart)));
  });

  return svg;
}

// GitHub-style heatmap. Columns = weeks, rows = days (Mon-Sun).
function renderHeatmap(heatmapMap, windowStart, windowEnd) {
  const cells = [];
  const start = new Date(windowStart + "T00:00:00");
  const end = new Date(windowEnd + "T00:00:00");
  // Align start to the Monday of its week.
  const startDow = start.getDay();
  const mondayOffset = startDow === 0 ? -6 : 1 - startDow;
  const gridStart = new Date(start);
  gridStart.setDate(gridStart.getDate() + mondayOffset);

  const todayStr = ymd(new Date());
  const counts = Object.values(heatmapMap);
  const maxC = Math.max(1, ...counts);
  const bucket = (c) => {
    if (!c) return 0;
    const pct = c / maxC;
    if (pct < 0.25) return 1;
    if (pct < 0.5) return 2;
    if (pct < 0.8) return 3;
    return 4;
  };

  const cur = new Date(gridStart);
  const monthLabels = [];
  let prevMonth = -1;
  let colIdx = 0;
  while (cur <= end) {
    for (let dow = 0; dow < 7; dow++) {
      const dStr = ymd(cur);
      const inWindow = dStr >= windowStart && dStr <= windowEnd;
      const c = inWindow ? (heatmapMap[dStr] || 0) : -1;
      const level = c === -1 ? -1 : bucket(c);
      cells.push({
        date: dStr, count: c, level,
        isToday: dStr === todayStr,
        col: colIdx, row: dow
      });
      // Month label on the Monday that starts a new month.
      if (dow === 0 && cur.getMonth() !== prevMonth) {
        monthLabels.push({ col: colIdx, label: cur.toLocaleDateString("en-US", { month: "short" }) });
        prevMonth = cur.getMonth();
      }
      cur.setDate(cur.getDate() + 1);
      if (cur > end && dow < 6) {
        // Pad rest of column with out-of-window cells so grid stays rectangular.
        for (let r = dow + 1; r < 7; r++) {
          cells.push({ date: null, count: -1, level: -1, col: colIdx, row: r });
        }
        break;
      }
    }
    colIdx++;
  }

  const wrap = h("div", { class: "dash-heatmap-wrap" });
  const inner = h("div", { class: "dash-heatmap-inner" });

  const dayLabels = h("div", { class: "dash-heatmap-daylabels" });
  ["Mon", "", "Wed", "", "Fri", "", ""].forEach(l =>
    dayLabels.appendChild(h("span", {}, l || " "))
  );

  const colWrap = h("div", { class: "dash-heatmap-col-wrap" });
  const monthRow = h("div", { class: "dash-heatmap-monthrow" });
  const colW = 12 + 3; // cell + gap
  monthLabels.forEach(m => {
    monthRow.appendChild(h("span", {
      style: `left: ${m.col * colW}px`
    }, m.label));
  });

  const grid = h("div", { class: "dash-heatmap-grid" });
  cells.forEach(c => {
    const cls = "dash-heatmap-cell"
      + (c.level > 0 ? ` l${c.level}` : "")
      + (c.isToday ? " is-today" : "");
    const cell = h("div", {
      class: cls,
      title: c.date ? `${fmtDate(c.date)} · ${c.count >= 0 ? c.count : 0} task${c.count === 1 ? "" : "s"}` : ""
    });
    if (c.level < 0) cell.style.visibility = "hidden";
    grid.appendChild(cell);
  });

  colWrap.appendChild(monthRow);
  colWrap.appendChild(grid);
  inner.appendChild(dayLabels);
  inner.appendChild(colWrap);
  wrap.appendChild(inner);

  // Legend
  const legend = h("div", { class: "dash-heatmap-scale" }, [
    h("span", {}, "Less"),
    h("i", { class: "dash-heatmap-cell" }),
    h("i", { class: "dash-heatmap-cell l1" }),
    h("i", { class: "dash-heatmap-cell l2" }),
    h("i", { class: "dash-heatmap-cell l3" }),
    h("i", { class: "dash-heatmap-cell l4" }),
    h("span", {}, "More")
  ]);
  wrap.appendChild(legend);
  return wrap;
}

// Progress ring SVG for the hero KPI.
function renderProgressRing(pct, label, subLabel) {
  const size = 96, stroke = 10;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (c * pct) / 100;
  const svg = dashSvg("svg", {
    width: size, height: size, viewBox: `0 0 ${size} ${size}`
  }, [
    dashSvg("circle", {
      cx: size / 2, cy: size / 2, r, fill: "none",
      stroke: "var(--bg-3)", "stroke-width": stroke
    }),
    dashSvg("circle", {
      cx: size / 2, cy: size / 2, r, fill: "none",
      stroke: "var(--citrus)", "stroke-width": stroke,
      "stroke-linecap": "round",
      "stroke-dasharray": c,
      "stroke-dashoffset": offset,
      transform: `rotate(-90 ${size / 2} ${size / 2})`
    })
  ]);
  const text = h("div", { class: "dash-kpi-ring-text" }, [
    h("div", { class: "dash-kpi-val" }, [
      String(pct), h("span", { class: "dash-kpi-unit" }, "%")
    ]),
    h("div", { class: "dash-kpi-meta" }, label),
    subLabel ? h("div", { class: "dash-kpi-meta" }, subLabel) : null
  ].filter(Boolean));
  return h("div", { class: "dash-kpi-ring" }, [svg, text]);
}

// Donut chart for bug status.
function renderDonut(segments, totalLabel) {
  const size = 110, stroke = 16;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const svg = dashSvg("svg", {
    width: size, height: size, viewBox: `0 0 ${size} ${size}`
  });
  svg.appendChild(dashSvg("circle", {
    cx: size / 2, cy: size / 2, r, fill: "none",
    stroke: "var(--bg-3)", "stroke-width": stroke
  }));
  const total = segments.reduce((a, s) => a + s.value, 0);
  let accPct = 0;
  if (total > 0) {
    segments.forEach(seg => {
      if (!seg.value) return;
      const pct = seg.value / total;
      const segLen = c * pct;
      const gap = c - segLen;
      const rot = accPct * 360 - 90;
      svg.appendChild(dashSvg("circle", {
        cx: size / 2, cy: size / 2, r, fill: "none",
        stroke: seg.color, "stroke-width": stroke,
        "stroke-dasharray": `${segLen} ${gap}`,
        transform: `rotate(${rot} ${size / 2} ${size / 2})`
      }));
      accPct += pct;
    });
  }
  // Centered total.
  svg.appendChild(dashSvg("text", {
    x: size / 2, y: size / 2 - 3, "text-anchor": "middle",
    "font-family": "var(--font-display)", "font-size": 22, "font-weight": 600,
    fill: "var(--ink)"
  }, String(total)));
  svg.appendChild(dashSvg("text", {
    x: size / 2, y: size / 2 + 13, "text-anchor": "middle",
    "font-size": 9, fill: "var(--muted)",
    "letter-spacing": "0.08em"
  }, totalLabel));
  return svg;
}

// Small inline sparkline for KPI trend.
function renderSparkline(values, color) {
  if (!values.length) return null;
  const W = 110, H = 26;
  const max = Math.max(1, ...values);
  const step = values.length > 1 ? W / (values.length - 1) : 0;
  const pts = values.map((v, i) =>
    `${i * step},${H - (v / max) * (H - 2) - 1}`
  ).join(" ");
  const svg = dashSvg("svg", {
    class: "dash-kpi-spark",
    viewBox: `0 0 ${W} ${H}`, preserveAspectRatio: "none"
  }, [
    dashSvg("polyline", {
      points: pts, fill: "none",
      stroke: color || "var(--citrus)", "stroke-width": 1.6,
      "stroke-linejoin": "round", "stroke-linecap": "round"
    })
  ]);
  return svg;
}

// ---------- UI: filter bar ----------
function renderDashboardFilters(host, filter, rerender) {
  host.innerHTML = "";

  const line = h("div", { class: "dash-filter-line" });

  // When
  const ranges = [
    ["all", "All time"],
    ["this_week", "Week"],
    ["this_month", "Month"],
    ["last_30d", "30d"],
    ["last_90d", "90d"],
    ["project", "Project"],
    ["custom", "Custom"]
  ];
  const rangeGroup = h("div", { class: "dash-filter-group" }, [
    h("span", { class: "dash-filter-label" }, "When")
  ]);
  ranges.forEach(([v, label]) => {
    rangeGroup.appendChild(h("button", {
      class: "dash-chip" + (filter.timeRange === v ? " is-active" : ""),
      onclick: () => { filter.timeRange = v; rerender(); }
    }, label));
  });
  line.appendChild(rangeGroup);

  if (filter.timeRange === "custom") {
    const wrap = h("div", { class: "dash-custom-range" });
    wrap.appendChild(h("input", {
      type: "date", value: filter.customStart || "",
      onchange: (e) => { filter.customStart = e.target.value; rerender(); }
    }));
    wrap.appendChild(h("span", {}, "→"));
    wrap.appendChild(h("input", {
      type: "date", value: filter.customEnd || "",
      onchange: (e) => { filter.customEnd = e.target.value; rerender(); }
    }));
    line.appendChild(wrap);
  }

  // Divider
  line.appendChild(h("div", { class: "dash-filter-divider" }));

  // Status
  const statuses = [
    ["not_started", "Not started"],
    ["in_progress", "In progress"],
    ["complete", "Complete"],
    ["blocked", "Blocked"]
  ];
  const statGroup = h("div", { class: "dash-filter-group" }, [
    h("span", { class: "dash-filter-label" }, "Status")
  ]);
  statGroup.appendChild(h("button", {
    class: "dash-chip" + (!filter.statuses.length ? " is-active" : ""),
    onclick: () => { filter.statuses = []; rerender(); }
  }, "All"));
  statuses.forEach(([v, label]) => {
    const on = filter.statuses.includes(v);
    statGroup.appendChild(h("button", {
      class: "dash-chip" + (on ? ` is-active is-status-${v}` : ""),
      onclick: () => {
        if (on) filter.statuses = filter.statuses.filter(x => x !== v);
        else filter.statuses = [...filter.statuses, v];
        rerender();
      }
    }, label));
  });
  line.appendChild(statGroup);

  // Divider
  line.appendChild(h("div", { class: "dash-filter-divider" }));

  // Phases
  const phaseGroup = h("div", { class: "dash-filter-group" }, [
    h("span", { class: "dash-filter-label" }, "Phases")
  ]);
  phaseGroup.appendChild(h("button", {
    class: "dash-chip" + (!filter.phases.length ? " is-active" : ""),
    onclick: () => { filter.phases = []; rerender(); }
  }, "All"));
  effectivePhases().forEach(p => {
    const on = filter.phases.includes(p.id);
    phaseGroup.appendChild(h("button", {
      class: "dash-chip" + (on ? " is-active is-phase" : ""),
      title: `${p.num} — ${p.title}`,
      onclick: () => {
        if (on) filter.phases = filter.phases.filter(x => x !== p.id);
        else filter.phases = [...filter.phases, p.id];
        rerender();
      }
    }, `${p.num}`));
  });
  line.appendChild(phaseGroup);

  // Reset — pushed to far right
  line.appendChild(h("div", { class: "dash-filter-spacer" }));
  const hasFilter = filter.timeRange !== "all"
    || (filter.phases && filter.phases.length)
    || (filter.statuses && filter.statuses.length);
  if (hasFilter) {
    line.appendChild(h("button", {
      class: "dash-filter-reset",
      title: "Clear all filters",
      onclick: () => {
        filter.timeRange = "all";
        filter.phases = [];
        filter.statuses = [];
        filter.customStart = "";
        filter.customEnd = "";
        rerender();
      }
    }, "Reset"));
  }

  host.appendChild(line);
}

function renderAttentionList(items, emptyMsg, pillFn, onItemClick, maxItems) {
  if (!items.length) {
    return h("div", { class: "dash-empty" }, emptyMsg);
  }
  const list = h("div", { class: "dash-item-list" });

    }, [

function jumpToTask(tid) {
  const t = TASK_INDEX[tid];
  if (!t) return;
  UI.view = "tasks";
  UI.phaseFilter = t.phaseId || null;
  UI.activeNavPhase = UI.phaseFilter;
  UI.openPhases = UI.openPhases || {};
  UI.openPhases[t.phaseId] = true;
  saveUI();
  closeDashboard();
  renderShell();
  // Scroll into view after render. Tasks use id="task-<id>".
  setTimeout(() => {
    const el = document.getElementById("task-" + tid);
    if (el) {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      el.classList.add("is-dash-flash");
      setTimeout(() => el.classList.remove("is-dash-flash"), 1500);
    }
  }, 140);
}

      col: 2
    })

  host.appendChild(kpiRow1);

  const kpiRow2 = h("div", { class: "dash-row" }, [

      sub: "in backlog",

      col: 3
    }),
    dashKpiCard({
      title: "Next 7 days", value: Math.round(m.hoursNext7), unit: "h",
      sub: "scheduled time",
      meta: m.hoursNext7 ? `${Math.round(m.hoursNext7 / 7 * 10) / 10}h/day avg` : "No scheduled time",
      col: 3
    }),

      title: "Total tasks", value: m.total, tone: "",

        : "(all phases)",

    })

    : (m.window.start > todayStrForHeat ? m.window.start : todayStrForHeat);

    h("div", { class: "dash-card-title" }, [
      h("span", {}, "Task density"),
      h("span", { class: "dash-card-sub" },
        m.window.end < todayStrForHeat
          ? "Scheduled + recurring tasks per day"
          : `Today → ${fmtDateShort(m.window.end)}`)
    ]),
    renderHeatmap(m.heatmapMap, heatStart, m.window.end)
  ]);
  host.appendChild(heatmapCard);

  // ---- Section: Needs attention (3 columns, all same height) ----
  host.appendChild(dashSectionHead("Needs attention"));
  const attentionWrap = h("div", { class: "dash-row dash-row-three" });

  attentionWrap.appendChild(h("div", { class: "dash-card" }, [
    h("div", { class: "dash-card-title" }, [
      h("span", {}, "Overdue"),
      h("span", { class: "dash-card-sub" }, `${m.overdueList.length}`)
    ]),
    renderAttentionList(m.overdueList, "Nothing overdue ✓",
      (it) => h("span", { class: "dash-item-pill is-overdue" }, `${Math.abs(daysUntil(it.dueDate))}d late`),
      (it) => jumpToTask(it.tid)
    )
  ]));

  attentionWrap.appendChild(h("div", { class: "dash-card" }, [
    h("div", { class: "dash-card-title" }, [
      h("span", {}, "Blocked"),
      h("span", { class: "dash-card-sub" }, `${m.blockedList.length}`)
    ]),
    renderAttentionList(m.blockedList, "No blockers",
      (it) => h("span", { class: "dash-item-pill is-blocked" }, "blocked"),
      (it) => jumpToTask(it.tid)
    )
  ]));

  const urgentListEl = renderAttentionList(m.urgentList, "Nothing flagged",
    (it) => {
      if (it.dueDate) {
        const d = daysUntil(it.dueDate);
        const label = d < 0 ? `${Math.abs(d)}d late` : d === 0 ? "today" : `${d}d`;
        return h("span", {
          class: "dash-item-pill " + (d < 0 ? "is-overdue" : "is-urgent")
        }, label);
      }
      return h("span", { class: "dash-item-pill is-urgent" }, "urgent");
    },
    (it) => jumpToTask(it.tid),
    // Show more urgent items since the capped list scrolls within the card.
    30
  );
  // Cap the list height so one busy column doesn't make the attention row tower
  // over Overdue / Blocked. Long lists become scrollable inside the card.
  if (urgentListEl.classList.contains("dash-item-list") && m.urgentList.length > 6) {
    urgentListEl.classList.add("is-capped");
  }
  attentionWrap.appendChild(h("div", { class: "dash-card" }, [
    h("div", { class: "dash-card-title" }, [
      h("span", {}, "Flagged urgent"),
      h("span", { class: "dash-card-sub" },
        m.urgentList.length > 6 ? `${m.urgentList.length} · scroll ↕` : `${m.urgentList.length}`)
    ]),
    urgentListEl
  ]));

  host.appendChild(attentionWrap);

  // ---- Section: Bugs + time budget (3 columns, all same height) ----
  host.appendChild(dashSectionHead("Bugs & time budget"));
  const bugsRow = h("div", { class: "dash-row dash-row-three" });

  const bugCard = h("div", { class: "dash-card" }, [
    h("div", { class: "dash-card-title" }, [
      h("span", {}, "Bug health"),
      h("span", { class: "dash-card-sub" }, `${m.bugsOpen + m.bugsResolved + m.bugsWontFix} total`)
    ]),
    h("div", { class: "dash-donut-wrap" }, [
      renderDonut([
        { label: "Open", value: m.bugsOpen - m.bugsInProgress, color: "var(--danger)" },
        { label: "In progress", value: m.bugsInProgress, color: "var(--sun)" },
        { label: "Resolved", value: m.bugsResolved, color: "var(--leaf)" },
        { label: "Won't fix", value: m.bugsWontFix, color: "var(--muted)" }
      ], "Bugs"),
      h("div", { class: "dash-donut-legend" }, [
        h("div", { class: "dash-donut-legend-row" }, [
          h("i", { style: "background:var(--danger)" }),
          h("span", {}, "Open"),
          h("span", { class: "v" }, String(m.bugsOpen - m.bugsInProgress))
        ]),
        h("div", { class: "dash-donut-legend-row" }, [
          h("i", { style: "background:var(--sun)" }),
          h("span", {}, "In progress"),
          h("span", { class: "v" }, String(m.bugsInProgress))
        ]),
        h("div", { class: "dash-donut-legend-row" }, [
          h("i", { style: "background:var(--leaf)" }),
          h("span", {}, "Resolved"),
          h("span", { class: "v" }, String(m.bugsResolved))
        ]),
        h("div", { class: "dash-donut-legend-row" }, [
          h("i", { style: "background:var(--muted)" }),
          h("span", {}, "Won't fix"),
          h("span", { class: "v" }, String(m.bugsWontFix))
        ])
      ])
    ]),
    (() => {
      const openSum = m.bugsCritical + m.bugsHigh + m.bugsMedium + m.bugsLow;
      if (!openSum) return null;
      const bar = h("div", { class: "dash-bug-sev-bar" }, [
        m.bugsCritical ? h("div", { class: "dash-bug-sev-seg is-critical", style: `flex:${m.bugsCritical}` }) : null,
        m.bugsHigh ? h("div", { class: "dash-bug-sev-seg is-high", style: `flex:${m.bugsHigh}` }) : null,
        m.bugsMedium ? h("div", { class: "dash-bug-sev-seg is-medium", style: `flex:${m.bugsMedium}` }) : null,
        m.bugsLow ? h("div", { class: "dash-bug-sev-seg is-low", style: `flex:${m.bugsLow}` }) : null
      ].filter(Boolean));
      return h("div", {}, [
        h("div", { class: "dash-chart-legend" }, [
          h("span", {}, [h("i", { style: "background:var(--danger)" }), `Critical ${m.bugsCritical}`]),
          h("span", {}, [h("i", { style: "background:var(--sun)" }), `High ${m.bugsHigh}`]),
          h("span", {}, [h("i", { style: "background:var(--info)" }), `Medium ${m.bugsMedium}`]),
          h("span", {}, [h("i", { style: "background:var(--muted)" }), `Low ${m.bugsLow}`])
        ]),
        bar
      ]);
    })()
  ].filter(Boolean));
  bugsRow.appendChild(bugCard);

  const topBugsCard = h("div", { class: "dash-card" }, [
    h("div", { class: "dash-card-title" }, [
      h("span", {}, "Tasks with most open bugs"),
      h("span", { class: "dash-card-sub" }, "Top 5")
    ]),
    (() => {
      if (!m.topBugTasks.length) {
        return h("div", { class: "dash-empty" }, "No open bugs ✓");
      }
      const list = h("div", { class: "dash-item-list" });
      m.topBugTasks.forEach(it => {
        list.appendChild(h("div", {
          class: "dash-item",
          onclick: () => jumpToTask(it.tid)

      });
      return list;
    })()
  ]);
  bugsRow.appendChild(topBugsCard);

  const timeCard = h("div", { class: "dash-card" }, [
    h("div", { class: "dash-card-title" }, [
      h("span", {}, "Scheduled time per phase"),
      h("span", { class: "dash-card-sub" }, `${Math.round(m.totalScheduledMinutes / 60 * 10) / 10}h total`)
    ]),
    (() => {
      const rows = m.hoursByPhase.filter(p => p.minutes > 0);
      if (!rows.length) {
        return h("div", { class: "dash-empty" }, "No scheduled time-of-day set on tasks");
      }
      const maxMin = Math.max(...rows.map(r => r.minutes));
      const wrap = h("div", {});
      rows.forEach(r => {
        const hLabel = r.hours >= 1
          ? `${Math.round(r.hours * 10) / 10}h`
          : `${Math.round(r.minutes)}m`;
        wrap.appendChild(h("div", { class: "dash-time-row" }, [
          h("span", { class: "dash-time-title", title: `${r.num} · ${r.title}` },
            r.title.length > 14 ? r.title.slice(0, 13) + "…" : r.title),
          h("div", { class: "dash-time-bar-wrap" }, [
            h("div", {
              class: "dash-time-bar-fill",
              style: `width: ${(r.minutes / maxMin) * 100}%`

          h("span", { class: "dash-time-value" }, hLabel)
        ]));
      });
      return wrap;
    })()
  ]);
  bugsRow.appendChild(timeCard);
  host.appendChild(bugsRow);

  // ---- Section: Recent activity ----
  host.appendChild(dashSectionHead("Recent activity"));
  const recentCard = h("div", { class: "dash-card" }, [
    h("div", { class: "dash-card-title" }, [
      h("span", {}, "Last 12 updates"),
      h("span", { class: "dash-card-sub" }, "Tasks most recently changed")
    ]),
    (() => {
      if (!m.recent.length) {
        return h("div", { class: "dash-empty" }, "No recent updates inside this filter");
      }
      const list = h("div", { class: "dash-item-list" });
      m.recent.forEach(it => {
        const when = new Date(it.updated);
        const diffMs = Date.now() - when.getTime();
        const diffMin = Math.round(diffMs / 60000);
        let whenStr = "";
        if (diffMin < 1) whenStr = "just now";
        else if (diffMin < 60) whenStr = `${diffMin}m ago`;
        else if (diffMin < 60 * 24) whenStr = `${Math.round(diffMin / 60)}h ago`;
        else whenStr = `${Math.round(diffMin / 60 / 24)}d ago`;
        const statusLabel = STATUS_LABELS[it.status] || it.status;
        list.appendChild(h("div", {
          class: "dash-item",
          onclick: () => jumpToTask(it.tid)
        }, [
          h("span", { class: `dash-item-dot is-${it.status}` }),
          h("span", { class: "dash-item-title" }, it.title),
          h("span", { class: "dash-item-meta" }, statusLabel),
          h("span", { class: "dash-item-meta" }, whenStr)
        ]));
      });
      return list;
    })()
  ]);
  host.appendChild(recentCard);
}

// ---------- Open / close ----------
function openDashboard() {
  // Lazy-create the overlay element once.
  let overlay = document.getElementById("dash-overlay");
  if (!overlay) {
    overlay = document.createElement("div");
    overlay.id = "dash-overlay";
    overlay.className = "dash-overlay";
    document.body.appendChild(overlay);
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeDashboard();
    });
  }
  overlay.innerHTML = "";

  // Persisted filter state.
  UI.dashboard = UI.dashboard || {};
  const filter = {
    timeRange: UI.dashboard.timeRange || "all",
    customStart: UI.dashboard.customStart || "",
    customEnd: UI.dashboard.customEnd || "",
    phases: Array.isArray(UI.dashboard.phases) ? [...UI.dashboard.phases] : [],
    statuses: Array.isArray(UI.dashboard.statuses) ? [...UI.dashboard.statuses] : []
  };

  const body = h("div", { class: "dash-body" });
  const filtersHost = h("div", { class: "dash-filters" });

  const rerender = () => {
    const m = computeDashboardMetrics(filter);
    renderDashboardFilters(filtersHost, filter, rerender);
    renderDashboardBody(body, m, filter);
    // Update subtitle text.
    const sub = overlay.querySelector(".dash-subtitle");
    if (sub) {
      sub.textContent = `${m.window.label} · ${m.total} tasks in filter · updated ${new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}`;
    }
    // Persist.
    UI.dashboard = {
      timeRange: filter.timeRange,
      customStart: filter.customStart,
      customEnd: filter.customEnd,
      phases: [...filter.phases],
      statuses: [...filter.statuses]
    };
    saveUI();
  };

  const modal = h("div", { class: "dash-modal" }, [
    h("div", { class: "dash-header" }, [
      h("div", { class: "dash-header-top" }, [
        h("div", {}, [
          h("h2", { class: "dash-title" }, "Admin Dashboard"),
          h("div", { class: "dash-subtitle" }, "")
        ]),
        h("button", {
          class: "dash-close",
          onclick: closeDashboard,
          title: "Close (Esc)",
          html: ICONS.x
        })
      ]),
      filtersHost
    ]),
    body
  ]);
  overlay.appendChild(modal);

  rerender();
  overlay.classList.add("is-open");
  document.body.style.overflow = "hidden";
}

function closeDashboard() {
  const overlay = document.getElementById("dash-overlay");
  if (!overlay) return;
  overlay.classList.remove("is-open");
  overlay.innerHTML = "";
  document.body.style.overflow = "";
}

function openModal({ title, body, footer }) {
  const overlay = $("#modal-overlay");
  overlay.innerHTML = "";
  const modal = h("div", {
    class: "modal",
    onclick: (e) => {
      // The modal stops click propagation so the overlay doesn't close it,
      // but we still need the global "close floating menus on outside click"
      // behavior — dismiss the ctx-menu here if the click wasn't inside it.
      if (!e.target.closest("#ctx-menu")) hideContextMenu();
      e.stopPropagation();
    }
  }, [
    h("div", { class: "modal-header" }, [
      h("div", { class: "modal-title" }, title),
      h("button", { class: "modal-close", onclick: closeModal, html: ICONS.x })
    ]),
    h("div", { class: "modal-body" }, body instanceof HTMLElement ? [body] : body),
    footer ? h("div", { class: "modal-footer" }, footer) : null
  ].filter(Boolean));
  overlay.appendChild(modal);
  overlay.classList.add("is-open");
  overlay.onclick = closeModal;
}

function closeModal() {
  const overlay = $("#modal-overlay");
  overlay.classList.remove("is-open");
  overlay.innerHTML = "";
}

function setupPassphrase() {
  const body = h("div", {}, [
    h("div", { class: "security-notice" }, [
      h("div", { html: ICONS.alert }),
      h("div", {}, "There is no password recovery. Choose something you'll remember — if you forget it, you'll have to reset the tracker.")
    ]),
    h("label", { class: "field-label" }, "New passphrase"),
    h("input", { class: "field-input", type: "password", id: "pp-1", autocomplete: "new-password" }),
    h("label", { class: "field-label" }, "Confirm passphrase"),
    h("input", { class: "field-input", type: "password", id: "pp-2", autocomplete: "new-password" }),
    h("div", { id: "pp-error", style: "color:var(--danger);font-size:12px;margin-top:6px;min-height:18px;" })
  ]);
  const footer = [
    h("button", { class: "btn btn-outline", onclick: () => { closeModal(); openSettings(); } }, "Cancel"),
    h("button", { class: "btn btn-primary", onclick: async () => {
      const p1 = $("#pp-1").value, p2 = $("#pp-2").value;
      const err = $("#pp-error");
      if (p1.length < 8) { err.textContent = "Passphrase must be at least 8 characters."; return; }
      if (p1 !== p2) { err.textContent = "Passphrases do not match."; return; }
      PASSPHRASE = p1;
      setLockConfig({ enabled: true, createdAt: new Date().toISOString() });
      await saveState();
      closeModal();
      toast("Encryption enabled", "success");
      renderShell();
    } }, "Enable encryption")
  ];
  openModal({ title: "Set up passphrase", body, footer });
  setTimeout(() => $("#pp-1")?.focus(), 50);
}

function changePassphrase() {
  const body = h("div", {}, [
    h("label", { class: "field-label" }, "Current passphrase"),
    h("input", { class: "field-input", type: "password", id: "pp-old", autocomplete: "current-password" }),
    h("label", { class: "field-label" }, "New passphrase"),
    h("input", { class: "field-input", type: "password", id: "pp-1", autocomplete: "new-password" }),
    h("label", { class: "field-label" }, "Confirm new passphrase"),
    h("input", { class: "field-input", type: "password", id: "pp-2", autocomplete: "new-password" }),
    h("div", { id: "pp-error", style: "color:var(--danger);font-size:12px;margin-top:6px;min-height:18px;" })
  ]);
  const footer = [
    h("button", { class: "btn btn-outline", onclick: () => { closeModal(); openSettings(); } }, "Cancel"),
    h("button", { class: "btn btn-primary", onclick: async () => {
      const old = $("#pp-old").value, p1 = $("#pp-1").value, p2 = $("#pp-2").value;
      const err = $("#pp-error");
      if (old !== PASSPHRASE) { err.textContent = "Current passphrase incorrect."; return; }
      if (p1.length < 8) { err.textContent = "New passphrase must be at least 8 characters."; return; }
      if (p1 !== p2) { err.textContent = "New passphrases do not match."; return; }
      PASSPHRASE = p1;
      await saveState();
      closeModal();
      toast("Passphrase updated", "success");
    } }, "Update")
  ];
  openModal({ title: "Change passphrase", body, footer });
  setTimeout(() => $("#pp-old")?.focus(), 50);
}

async function disableEncryption() {
  if (!confirm("Disable encryption? Your data will be stored in plain text on this browser.")) return;
  PASSPHRASE = null;
  setLockConfig({ enabled: false });
  await saveState();
  closeModal();
  toast("Encryption disabled");
  renderShell();
}

async function resetAll() {
  if (!confirm("Reset the tracker? This will delete all progress, bugs, and settings on this browser. Cannot be undone.")) return;
  if (!confirm("Are you absolutely sure? Export a backup first if you might want this data later.")) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(UI_KEY);
  localStorage.removeItem(LOCK_KEY);
  localStorage.removeItem(BACKUP_KEY);
  PASSPHRASE = null;
  STATE = hydrateState({});
  UI = defaultUI();
  closeModal();
  renderShell();
  toast("Tracker reset");
}

function openHelp() {
  const body = h("div", {}, [
    h("p", {}, "This tracker runs entirely in your browser. Data lives in localStorage and persists across sessions until you clear it or switch browsers."),
    h("div", { style: "margin:14px 0; padding:12px 14px; background:var(--bg-2); border-radius:7px;" }, [
      h("div", { style: "font-weight:600; margin-bottom:8px; color:var(--ink);" }, "Keyboard shortcuts"),
      h("div", { style: "display:grid; grid-template-columns:auto 1fr; gap:6px 12px; font-size:12px;" }, [
        h("kbd", {}, "/"), h("span", {}, "Focus search"),
        h("kbd", {}, "?"), h("span", {}, "Show this help"),
        h("kbd", {}, "Esc"), h("span", {}, "Close / collapse")
      ])
    ]),
    h("div", { style: "margin:14px 0;" }, [
      h("div", { style: "font-weight:600; margin-bottom:6px; color:var(--ink);" }, "Status colors"),
      h("div", { style: "display:flex; flex-wrap:wrap; gap:6px;" }, [
        h("span", { class: "task-status-btn status-not_started" }, "Not started"),
        h("span", { class: "task-status-btn status-in_progress" }, "In progress"),
        h("span", { class: "task-status-btn status-complete" }, "Complete"),
        h("span", { class: "task-status-btn status-blocked" }, "Blocked")
      ])
    ]),
    h("p", { style: "font-size:12px; color:var(--ink-3);" }, "Export a JSON backup weekly so your work survives a browser reset. The .ics export works with Google Calendar, Outlook, and Apple Calendar.")
  ]);
  openModal({ title: "How this tracker works", body });
}

/* ============================================================================
   LOCK SCREEN FLOW
   ============================================================================ */
async function attemptUnlock() {
  const input = $("#lock-input");
  const err = $("#lock-error");
  const pass = input.value;
  if (!pass) { err.textContent = "Enter your passphrase"; return; }
  PASSPHRASE = pass;
  try {
    STATE = await loadState();
    $("#lock-screen").classList.remove("is-on");
    err.textContent = "";
    boot();
  } catch (e) {
    console.error(e);
    err.textContent = "Incorrect passphrase";
    PASSPHRASE = null;
    input.value = "";
    input.focus();
  }
}

function showLockScreen() {
  $("#lock-screen").classList.add("is-on");
  setTimeout(() => $("#lock-input").focus(), 100);
}

/* ============================================================================
   BACKUP REMINDER
   ============================================================================ */
function checkBackupReminder() {
  const last = localStorage.getItem(BACKUP_KEY);
  const now = Date.now();
  if (!last) {
    // Don't nag new users; set a grace period.
    localStorage.setItem(BACKUP_KEY, new Date(now - 86400000).toISOString());
    return;
  }
  const lastMs = new Date(last).getTime();
  const daysSince = (now - lastMs) / 86400000;
  if (daysSince >= 7) {
    setTimeout(() => $("#backup-reminder").classList.add("is-on"), 1500);
  }
}

/* ============================================================================
   BOOT
   ============================================================================ */
async function boot() {
  renderShell();
  checkBackupReminder();
  // Update countdown every minute
  setInterval(() => {
    const cd = daysUntil(GO_LIVE);
    const txt = cd > 0 ? `${cd} days` : (cd === 0 ? "TODAY" : `${Math.abs(cd)}d`);
    document.querySelectorAll(".countdown b").forEach(el => { el.textContent = txt; });
  }, 60000);
}

async function init() {
  UI = loadUI();
  const lockCfg = getLockConfig();
  if (lockCfg.enabled) {
    showLockScreen();
  } else {
    STATE = await loadState();
    boot();
  }

  // Global event wiring
  document.addEventListener("click", (e) => {
    // Close status menu when clicking outside
    if (!e.target.closest(".task-status") && UI.statusMenu) {
      UI.statusMenu = null;
      saveUI();
      renderPhaseList();
    }
    // Close context menu on any outside click
    if (!e.target.closest("#ctx-menu")) hideContextMenu();
    // Close mobile menu on outside click
    const mm = document.querySelector(".mobile-menu.is-open");
    if (mm && !e.target.closest(".mobile-menu") && !e.target.closest(".topbar-hamburger")) {
      mm.classList.remove("is-open");
      const hb = document.querySelector(".topbar-hamburger");
      if (hb) {
        hb.classList.remove("is-open");
        hb.setAttribute("aria-expanded", "false");
        hb.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>';
      }
    }
  });
  window.addEventListener("resize", () => {
    if (window.innerWidth > 768) {
      const mm = document.querySelector(".mobile-menu.is-open");
      if (mm) {
        mm.classList.remove("is-open");
        const hb = document.querySelector(".topbar-hamburger");
        if (hb) {
          hb.classList.remove("is-open");
          hb.setAttribute("aria-expanded", "false");
          hb.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>';
        }
      }
    }
  });
  document.addEventListener("scroll", hideContextMenu, true);
  window.addEventListener("blur", hideContextMenu);

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      hideContextMenu();
      const mmOpen = document.querySelector(".mobile-menu.is-open");
      if (mmOpen) {
        mmOpen.classList.remove("is-open");
        const hb = document.querySelector(".topbar-hamburger");
        if (hb) {
          hb.classList.remove("is-open");
          hb.setAttribute("aria-expanded", "false");
          hb.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>';
        }
        return;
      }
      const dashOverlay = document.getElementById("dash-overlay");
      if (dashOverlay && dashOverlay.classList.contains("is-open")) { closeDashboard(); return; }
      const overlay = $("#modal-overlay");
      if (overlay.classList.contains("is-open")) { closeModal(); return; }
      if ($("#lock-screen").classList.contains("is-on")) return;
      UI.statusMenu = null;
      saveUI();
      renderPhaseList();
      document.activeElement?.blur();
    }
    if ($("#lock-screen").classList.contains("is-on")) return;
    if (document.activeElement && ["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) return;
    if (UI.statusMenu && /^[1-4]$/.test(e.key)) {
      e.preventDefault();
      const map = ["not_started", "in_progress", "complete", "blocked"];
      setStatus(UI.statusMenu, map[parseInt(e.key, 10) - 1]);
      return;
    }
    if (e.key === "/" && !e.metaKey && !e.ctrlKey) {
      e.preventDefault();
      setView("tasks");
      setTimeout(() => $("#search-input")?.focus(), 100);
    }
    if (e.key === "?") {
      e.preventDefault();
      openHelp();
    }
  });

  // Logo follows the mouse — rAF-throttled, re-queries .brand-mark each
  // frame so it survives renderShell() rebuilds.
  let lastMouseX = window.innerWidth / 2;
  let lastMouseY = window.innerHeight / 2;
  let logoRafQueued = false;
  const MAX_TILT = 28;
  const updateLogoTilt = () => {
    logoRafQueued = false;
    const mark = document.querySelector(".brand-mark");
    if (!mark) return;
    const rect = mark.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = lastMouseX - cx;
    const dy = lastMouseY - cy;
    const ny = Math.max(-1, Math.min(1, dx / (window.innerWidth / 2)));
    const nx = Math.max(-1, Math.min(1, dy / (window.innerHeight / 2)));
    const ry = ny * MAX_TILT;
    const rx = -nx * (MAX_TILT * 0.5);
    mark.style.transform = `perspective(420px) rotateY(${ry.toFixed(2)}deg) rotateX(${rx.toFixed(2)}deg)`;
  };
  window.addEventListener("mousemove", (e) => {
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    if (!logoRafQueued) {
      logoRafQueued = true;
      requestAnimationFrame(updateLogoTilt);
    }
  }, { passive: true });

  $("#import-file").addEventListener("change", (e) => {
    const f = e.target.files[0];
    if (f) importJSON(f);
    e.target.value = "";
  });

  $("#gcal-import-file").addEventListener("change", (e) => {
    const f = e.target.files[0];
    if (f) importGoogleCalendar(f);
    e.target.value = "";
  });

  $("#lock-submit").addEventListener("click", attemptUnlock);
  $("#lock-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") attemptUnlock();
  });
  $("#lock-reset").addEventListener("click", async () => {
    if (!confirm("Reset the tracker? All encrypted data will be lost — this cannot be undone.")) return;
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(LOCK_KEY);
    localStorage.removeItem(UI_KEY);
    PASSPHRASE = null;
    STATE = hydrateState({});
    UI = defaultUI();
    $("#lock-screen").classList.remove("is-on");
    boot();
  });

  $("#backup-now").addEventListener("click", exportJSON);
  $("#backup-dismiss").addEventListener("click", () => {
    $("#backup-reminder").classList.remove("is-on");
    // Snooze 3 days
    const snooze = new Date(Date.now() - 4 * 86400000).toISOString();
    localStorage.setItem(BACKUP_KEY, snooze);
  });
}

init();
</script>
</body>
</html>
